<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trận Pháp Ngũ Linh - Tứ Sắc (Chuẩn Logic)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fafafa; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; text-transform: uppercase; letter-spacing: 2px; }
        
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 30px; background: #f8f9fa; padding: 20px; border-radius: 10px; border: 1px solid #eee; }
        select, button { padding: 12px 20px; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; outline: none; }
        button { background: #e67e22; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #d35400; }
        
        /* Ma trận 4 cột */
        .matrix-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
            margin-bottom: 30px;
        }
        .card-cell { 
            background: #fff; border: 2px solid #eee; border-radius: 8px; padding: 20px 10px; 
            text-align: center; font-weight: bold; font-size: 16px; position: relative;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.02);
        }
        .pos-num { position: absolute; top: 5px; right: 8px; font-size: 11px; color: #aaa; }
        
        /* Màu sắc theo hệ bài */
        .txt-Xanh { color: #27ae60; }
        .txt-Vang { color: #e67e22; } /* Vàng cam dễ nhìn */
        .txt-Trang { color: #7f8c8d; } /* Xám đậm thay cho trắng tinh */
        .txt-Do { color: #c0392b; }
        
        .result-area { background: #2c3e50; color: #ecf0f1; padding: 25px; border-radius: 10px; font-family: 'Consolas', monospace; line-height: 1.7; overflow-x: auto; }
        .copy-btn { background: #27ae60; margin-top: 15px; width: 100%; font-size: 16px; }
        .target-highlight { border-color: #f1c40f !important; background: #fffde7; }
    </style>
</head>
<body>

<div class="container">
    <h2>TRẬN PHÁP NGŨ LINH</h2>
    
    <div class="controls">
        <label><b>Chọn màu bài:</b></label>
        <select id="colorPick">
            <option value="Xanh">CÔNG DANH (XANH)</option>
            <option value="Vang">TÀI LỘC (VÀNG CAM)</option>
            <option value="Trang">GIA ĐẠO (XÁM TRẮNG)</option>
            <option value="Do">TÌNH DUYÊN (ĐỎ)</option>
        </select>
        <button onclick="startDivination()">KHAI TRẬN</button>
    </div>

    <div id="matrixBox" class="matrix-grid"></div>

    <div id="resultText" class="result-area" style="display:none;"></div>
    <button id="btnCopy" class="copy-btn" style="display:none;" onclick="copyToClipboard()">SAO CHÉP KẾT QUẢ THẢO LUẬN</button>
</div>

<script>
// Cấu trúc Data chờ sẵn
const DIVINATION_DATA = {
    "MUC_1": "--- Dán dữ liệu TƯỚNG ---",
    "MUC_2": "--- Dán dữ liệu SĨ ---",
    "MUC_3": "--- Dán dữ liệu TƯỢNG ---",
    "MUC_4": "--- Dán dữ liệu XE ---",
    "MUC_5": "--- Dán dữ liệu PHÁO ---",
    "MUC_6": "--- Dán dữ liệu NGỰA ---",
    "MUC_7": "--- Dán dữ liệu CHỐT ---"
};

const CardEngine = {
    generateDeck: function(color) {
        const names = ['TƯỚNG', 'SĨ', 'TƯỢNG', 'XE', 'PHÁO', 'NGỰA', 'CHỐT'];
        const faces = ['Đ', 'N'];
        let d = [];
        names.forEach(n => {
            faces.forEach(f => {
                d.push({n, f, color}, {n, f, color});
            });
        });
        return d.sort(() => Math.random() - 0.5);
    },

    getMatrix: function(deck) {
        let mat = [];
        let disc = [];
        let tmp = [...deck];
        while (mat.length < 12) {
            if (tmp.length < 4) { tmp = [...tmp, ...disc]; disc = []; }
            disc.push(tmp.shift(), tmp.shift(), tmp.shift());
            mat.push(tmp.shift());
        }
        return { mat, laTT: tmp.length > 0 ? tmp[0] : disc[0] };
    },

    // LOGIC NHẢY CHUẨN: Tiến về phía Gốc (1) và vòng lại
    calculateSteps: function(mat, laTT) {
        let finalMat = [...mat];
        let foundIdx = -1;
        
        // Tìm vị trí trùng nước bài (Ưu tiên tận cùng bên trái - Index cao)
        for (let i = 11; i >= 0; i--) {
            if (finalMat[i].n === laTT.n) {
                foundIdx = i;
                break;
            }
        }

        let startIdx;
        if (foundIdx !== -1) {
            startIdx = foundIdx;
            finalMat[startIdx] = laTT;
        } else {
            finalMat.push(laTT); // Vị trí 13 (Index 12)
            startIdx = 12;
        }

        let results = [];
        let currentIdx = startIdx;
        let N = finalMat.length;

        for (let i = 0; i < 5; i++) {
            // Nhảy 5 nhịp tiến về phía Gốc (Index giảm dần)
            // Nhịp 1 là chính nó, nhịp 2 là index-1... nhịp 5 là index-4
            currentIdx = (currentIdx - 4 + N * 10) % N; 
            results.push({
                card: finalMat[currentIdx],
                pos: currentIdx + 1
            });
        }
        return { finalMat, results, startPos: startIdx + 1 };
    }
};

function startDivination() {
    const color = document.getElementById('colorPick').value;
    const { mat, laTT } = CardEngine.getMatrix(CardEngine.generateDeck(color));
    const { finalMat, results, startPos } = CardEngine.calculateSteps(mat, laTT);

    // Hiển thị Matrix
    const box = document.getElementById('matrixBox');
    box.innerHTML = "";
    const colorClass = `txt-${color}`;

    // Vẽ từ 12 về 1 theo hàng (Hàng trên 12-11-10-9, v.v.)
    for (let i = 11; i >= 0; i--) {
        const div = document.createElement('div');
        div.className = `card-cell ${colorClass}`;
        if (i + 1 === startPos) div.classList.add('target-highlight');
        div.innerHTML = `<span class="pos-num">${i + 1}</span>${finalMat[i].n} ${finalMat[i].f}`;
        box.appendChild(div);
    }

    // Kết quả Text
    let txt = `--- KẾT QUẢ TRẢI BÀI NGŨ LINH (${color.toUpperCase()}) ---\n`;
    txt += `Lá Tượng Trưng: ${laTT.n} ${laTT.f}\n`;
    txt += `Bắt đầu tại Vị trí: ${startPos}\n\n`;
    
    txt += `SƠ ĐỒ MA TRẬN:\n`;
    for (let r = 2; r >= 0; r--) {
        let row = "";
        for (let c = 3; c >= 0; c--) {
            let idx = r * 4 + c;
            row += `[${finalMat[idx].n} ${finalMat[idx].f}]`.padEnd(12);
        }
        txt += row + "\n";
    }
    if (finalMat.length === 13) txt += `(Lá 13 nằm ngoài bên trái: ${finalMat[12].n} ${finalMat[12].f})\n`;

    txt += `\n--- 5 LÁ LINH HỒN (NHẢY TIẾN VỀ GỐC) ---\n`;
    results.forEach((res, i) => {
        txt += `Lần ${i+1} (nhảy đến vị trí ${res.pos}): ${res.card.n} ${res.card.f}\n`;
    });

    txt += `\n--- LUẬN GIẢI TỔNG ĐOÁN ---\n`;
    for(let i=0; i < results.length - 1; i++) {
        txt += `+ Cặp ${i+1}: ${results[i].card.n} & ${results[i+1].card.n} -> (Dán nội dung giải mã)\n`;
    }

    const resArea = document.getElementById('resultText');
    resArea.innerText = txt;
    resArea.style.display = 'block';
    document.getElementById('btnCopy').style.display = 'block';
}

function copyToClipboard() {
    const el = document.createElement('textarea');
    el.value = document.getElementById('resultText').innerText;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    alert("Đã sao chép kết quả!");
}
</script>
</body>
</html>
