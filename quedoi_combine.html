<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Tra Cứu Đối Quẻ Song Song</title>
    <style>
        :root {
            --primary: #a04000;
            --vach-color: #3498db;
            --bg: #fdf6e3;
            --card: #ffffff;
            --border: #d2b48c;
        }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg); 
            display: flex; flex-direction: column; align-items: center; padding: 20px;
            margin: 0; color: #2c3e50;
        }
        .section-container { 
            background: var(--card); padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 700px; width: 100%; text-align: center;
            border: 1px solid #e0d0b0; margin-bottom: 50px;
        }
        h2 { color: #5d4037; margin-bottom: 25px; text-transform: uppercase; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        
        /* Layout Controls */
        .grid { display: flex; gap: 15px; margin-bottom: 25px; justify-content: center; }
        .menu-column { flex: 1; display: flex; flex-direction: column; }
        .label-small { font-size: 13px; color: #8b572a; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        
        select { 
            width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--border); 
            font-size: 16px; background-color: #fff; cursor: pointer; outline: none;
        }

        /* Result Area */
        .result-area {
            background: #fff9f0; border: 2px double #e67e22;
            border-radius: 15px; padding: 25px; margin-top: 10px;
        }

        /* Vạch quẻ hiển thị ngang */
        .que-visual { display: flex; gap: 30px; justify-content: center; align-items: center; margin: 15px 0; }
        .quai-don { display: flex; flex-direction: column; gap: 8px; width: 90px; }
        .vach { height: 14px; border-radius: 3px; }
        .vach.duong { background-color: var(--vach-color); width: 100%; }
        .vach.am { display: flex; justify-content: space-between; }
        .vach.am::before, .vach.am::after { content: ''; background-color: var(--vach-color); width: 43%; height: 100%; border-radius: 3px; }

        /* Tên quẻ 200% & Bold */
        .que-name { margin-top: 10px; font-weight: bold; color: #a04000; font-size: 2.5rem; line-height: 1.2; }
        .sub-info { font-size: 15px; color: #7f8c8d; font-style: italic; margin-top: 8px; }
        
        .divider-line { width: 100%; height: 2px; background: var(--border); margin: 40px 0; opacity: 0.3; }
    </style>
</head>
<body>

<div class="section-container">
    <h2>Cách 1: Đối Hào (Âm Dương Biến)</h2>
    <p style="font-size: 14px; color: #8b572a; margin-top:-15px">Nguyên lý: Hào Âm biến Dương, Hào Dương biến Âm</p>
    
    <div class="grid">
        <div class="menu-column">
            <div class="label-small">Thượng Gốc</div>
            <select id="c1_thuong" onchange="logicC1()">
                <option value="Kiền">Kiền</option><option value="Đoài">Đoài</option>
                <option value="Ly">Ly</option><option value="Chấn">Chấn</option>
                <option value="Tốn">Tốn</option><option value="Khảm">Khảm</option>
                <option value="Cấn">Cấn</option><option value="Khôn">Khôn</option>
            </select>
        </div>
        <div class="menu-column">
            <div class="label-small">Hạ Gốc</div>
            <select id="c1_ha" onchange="logicC1()">
                <option value="Kiền">Kiền</option><option value="Đoài">Đoài</option>
                <option value="Ly">Ly</option><option value="Chấn">Chấn</option>
                <option value="Tốn">Tốn</option><option value="Khảm">Khảm</option>
                <option value="Cấn">Cấn</option><option value="Khôn">Khôn</option>
            </select>
        </div>
    </div>

    <div class="result-area">
        <div class="que-visual">
            <div id="c1_vachT" class="quai-don"></div>
            <div id="c1_vachH" class="quai-don"></div>
        </div>
        <div id="c1_ten" class="que-name">---</div>
        <div id="c1_mota" class="sub-info">Kết quả hiển thị tại đây</div>
    </div>
</div>

<div class="section-container">
    <h2>Cách 2: Việt Dịch Chánh Tông (Đảo Hình)</h2>
    <p style="font-size: 14px; color: #8b572a; margin-top:-15px">Nguyên lý: Lộn ngược hình quẻ (Phản quẻ)</p>

    <div class="grid">
        <div class="menu-column">
            <div class="label-small">Chọn Quẻ Gốc</div>
            <select id="c2_select" onchange="logicC2()"></select>
        </div>
    </div>

    <div class="result-area">
        <div class="que-visual">
            <div id="c2_vachT" class="quai-don"></div>
            <div id="c2_vachH" class="quai-don"></div>
        </div>
        <div id="c2_ten" class="que-name">---</div>
        <div id="c2_mota" class="sub-info">Kết quả hiển thị tại đây</div>
    </div>
</div>

<script>
    // --- DATA CHUNG ---
    const QUAI_V = {
        "Kiền": [1,1,1], "Khôn": [0,0,0], "Chấn": [0,0,1], "Tốn": [1,1,0],
        "Khảm": [0,1,0], "Ly": [1,0,1], "Cấn": [1,0,0], "Đoài": [0,1,1]
    };
    const TUONG = { "Kiền":"Thiên", "Khôn":"Địa", "Ly":"Hỏa", "Khảm":"Thủy", "Chấn":"Lôi", "Tốn":"Phong", "Cấn":"Sơn", "Đoài":"Trạch" };

    const DATA_64 = {
        "Kiền-Kiền": "Thuần Càn", "Kiền-Đoài": "Thiên Trạch Lý", "Kiền-Ly": "Thiên Hỏa Đồng Nhân", "Kiền-Chấn": "Thiên Lôi Vô Vọng", "Kiền-Tốn": "Thiên Phong Cấu", "Kiền-Khảm": "Thiên Thủy Tụng", "Kiền-Cấn": "Thiên Sơn Độn", "Kiền-Khôn": "Thiên Địa Bĩ",
        "Khôn-Kiền": "Địa Thiên Thái", "Khôn-Đoài": "Địa Trạch Lâm", "Khôn-Ly": "Địa Hỏa Minh Di", "Khôn-Chấn": "Địa Lôi Phục", "Khôn-Tốn": "Địa Phong Thăng", "Khôn-Khảm": "Địa Thủy Sư", "Khôn-Cấn": "Địa Sơn Khiêm", "Khôn-Khôn": "Thuần Khôn",
        "Ly-Kiền": "Hỏa Thiên Đại Hữu", "Ly-Đoài": "Hỏa Trạch Khuê", "Ly-Ly": "Thuần Ly", "Ly-Chấn": "Hỏa Lôi Phệ Hạp", "Ly-Tốn": "Hỏa Phong Đỉnh", "Ly-Khảm": "Hỏa Thủy Vị Tế", "Ly-Cấn": "Hỏa Sơn Lữ", "Ly-Khôn": "Hỏa Địa Tấn",
        "Khảm-Kiền": "Thủy Thiên Nhu", "Khảm-Đoài": "Thủy Trạch Tiết", "Khảm-Ly": "Thủy Hỏa Ký Tế", "Khảm-Chấn": "Thủy Lôi Truân", "Khảm-Tốn": "Thủy Phong Tỉnh", "Khảm-Khảm": "Thuần Khảm", "Khảm-Cấn": "Thủy Sơn Kiển", "Khảm-Khôn": "Thủy Địa Tỷ",
        "Chấn-Kiền": "Lôi Thiên Đại Tráng", "Chấn-Đoài": "Lôi Trạch Quy Muội", "Chấn-Ly": "Lôi Hỏa Phong", "Chấn-Chấn": "Thuần Chấn", "Chấn-Tốn": "Lôi Phong Hằng", "Chấn-Khảm": "Lôi Thủy Giải", "Chấn-Cấn": "Lôi Sơn Tiểu Quá", "Chấn-Khôn": "Lôi Địa Dự",
        "Tốn-Kiền": "Phong Thiên Tiểu Súc", "Tốn-Đoài": "Phong Trạch Trung Phu", "Tốn-Ly": "Phong Hỏa Gia Nhân", "Tốn-Chấn": "Phong Lôi Ích", "Tốn-Tốn": "Thuần Tốn", "Tốn-Khảm": "Phong Thủy Hoán", "Tốn-Cấn": "Phong Sơn Tiệm", "Tốn-Khôn": "Phong Địa Quán",
        "Cấn-Kiền": "Sơn Thiên Đại Súc", "Cấn-Đoài": "Sơn Trạch Tổn", "Cấn-Ly": "Sơn Hỏa Bí", "Cấn-Chấn": "Sơn Lôi Di", "Cấn-Tốn": "Sơn Phong Cổ", "Cấn-Khảm": "Sơn Thủy Mông", "Cấn-Cấn": "Thuần Cấn", "Cấn-Khôn": "Sơn Địa Bác",
        "Đoài-Kiền": "Trạch Thiên Quải", "Đoài-Đoài": "Thuần Đoài", "Đoài-Ly": "Trạch Hỏa Cách", "Đoài-Chấn": "Trạch Lôi Tùy", "Đoài-Tốn": "Trạch Phong Đại Quá", "Đoài-Khảm": "Trạch Thủy Khốn", "Đoài-Cấn": "Trạch Sơn Hàm", "Đoài-Khôn": "Trạch Địa Tụy"
    };

    // --- LOGIC CÁCH 1 (ĐỐI HÀO) ---
    const DOI_HÀO = { "Kiền":"Khôn", "Khôn":"Kiền", "Đoài":"Cấn", "Cấn":"Đoài", "Ly":"Khảm", "Khảm":"Ly", "Chấn":"Tốn", "Tốn":"Chấn" };
    function logicC1() {
        const t = document.getElementById("c1_thuong").value;
        const h = document.getElementById("c1_ha").value;
        const dT = DOI_HÀO[t]; const dH = DOI_HÀO[h];
        const resName = DATA_64[`${dT}-${dH}`];
        document.getElementById("c1_ten").innerText = resName;
        document.getElementById("c1_mota").innerText = `${TUONG[dT]} ${TUONG[dH]} (Quẻ ${dT} trên ${dH})`;
        drawVach(dT, 'c1_vachT'); drawVach(dH, 'c1_vachH');
    }

    // --- LOGIC CÁCH 2 (VIỆT DỊCH - ĐẢO HÌNH) ---
    const DATA_C2 = {
        "Lôi Địa Dự": { t: "Chấn", h: "Khôn", doi: "Địa Sơn Khiêm" },
        "Địa Sơn Khiêm": { t: "Khôn", h: "Cấn", doi: "Lôi Địa Dự" },
        "Trạch Hoả Cách": { t: "Đoài", h: "Ly", doi: "Hoả Phong Đỉnh" },
        "Hoả Phong Đỉnh": { t: "Ly", h: "Tốn", doi: "Trạch Hoả Cách" },
        "Phong Lôi Ích": { t: "Tốn", h: "Chấn", doi: "Sơn Trạch Tổn" },
        "Sơn Trạch Tổn": { t: "Cấn", h: "Đoài", doi: "Phong Lôi Ích" },

        "Thiên Hoả Đồng Nhân": { t: "Kiền", h: "Ly", doi: "Hoả Thiên Đại Hữu" },

        "Thiên Lôi Vô Vọng": { t: "Kiền", h: "Chấn", doi: "Sơn Thiên Đại Súc" },
        "Sơn Thiên Đại Súc": { t: "Cấn", h: "Kiền", doi: "Thiên Lôi Vô Vọng" },
        "Thiên Phong Cấu": { t: "Kiền", h: "Tốn", doi: "Trạch Thiên Quải" },
        "Trạch Thiên Quải": { t: "Đoài", h: "Kiền", doi: "Thiên Phong Cấu" },
        "Thiên Thủy Tụng": { t: "Kiền", h: "Khảm", doi: "Thủy Thiên Nhu" },
        "Thủy Thiên Nhu": { t: "Khảm", h: "Kiền", doi: "Thiên Thủy Tụng" },
        "Thiên Sơn Độn": { t: "Kiền", h: "Cấn", doi: "Lôi Thiên Đại Tráng" },
        "Lôi Thiên Đại Tráng": { t: "Chấn", h: "Kiền", doi: "Thiên Sơn Độn" },
        "Thiên Địa Bĩ": { t: "Kiền", h: "Khôn", doi: "Địa Thiên Thái" },
        "Địa Thiên Thái": { t: "Khôn", h: "Kiền", doi: "Thiên Địa Bĩ" },
        "Thuần Kiền": { t: "Kiền", h: "Kiền", doi: "Thuần Khôn" },
        "Thuần Khôn": { t: "Khôn", h: "Khôn", doi: "Thuần Kiền" },
        "Trạch Lôi Tùy": { t: "Đoài", h: "Chấn", doi: "Sơn Phong Cổ" },
        "Sơn Phong Cổ": { t: "Cấn", h: "Tốn", doi: "Trạch Lôi Tùy" },
        "Trạch Phong Đại Quá": { t: "Đoài", h: "Tốn", doi: "Sơn Lôi Di" },
        "Sơn Lôi Di": { t: "Cấn", h: "Chấn", doi: "Trạch Phong Đại Quá" },
        "Trạch Thủy Khốn": { t: "Đoài", h: "Khảm", doi: "Thủy Phong Tĩnh" },
        "Thủy Phong Tĩnh": { t: "Khảm", h: "Tốn", doi: "Trạch Thủy Khốn" },
        "Trạch Địa Tụy": { t: "Đoài", h: "Khôn", doi: "Địa Phong Thăng" },
        "Địa Phong Thăng": { t: "Khôn", h: "Tốn", doi: "Trạch Địa Tụy" },
        "Thuần Đoài": { t: "Đoài", h: "Đoài", doi: "Thuần Tốn" },
        "Thuần Tốn": { t: "Tốn", h: "Tốn", doi: "Thuần Đoài" },
        "Hoả Lôi Phệ Hạp": { t: "Ly", h: "Chấn", doi: "Sơn Hoả Bí" },
        "Sơn Hoả Bí": { t: "Cấn", h: "Ly", doi: "Hoả Lôi Phệ Hạp" },
        "Hoả Thủy Vị Tế": { t: "Ly", h: "Khảm", doi: "Thủy Hoả Ký Tế" },
        "Thủy Hoả Ký Tế": { t: "Khảm", h: "Ly", doi: "Hoả Thủy Vị Tế" },
        "Hoả Sơn Lữ": { t: "Ly", h: "Cấn", doi: "Lôi Hoả Phong" },
        "Lôi Hoả Phong": { t: "Chấn", h: "Ly", doi: "Hoả Sơn Lữ" },
        "Hoả Địa Tấn": { t: "Ly", h: "Khôn", doi: "Địa Hoả Minh Di" },
        "Địa Hoả Minh Di": { t: "Khôn", h: "Ly", doi: "Hoả Địa Tấn" },

        "Thủy Sơn Kiển": { t: "Khảm", h: "Cấn", doi: "Lôi Thủy Giải" },

        "Phong Trạch Trung Phu": { t: "Tốn", h: "Đoài", doi: "Lôi Sơn Tiểu Quá" },

        "Phong Sơn Tiệm": { t: "Tốn", h: "Cấn", doi: "Lôi Trạch Quy Muội" },
        "Thuần Chấn": { t: "Chấn", h: "Chấn", doi: "Thuần Cấn" },
        "Thuần Cấn": { t: "Cấn", h: "Cấn", doi: "Thuần Chấn" },

        "Thủy Trạch Tiết": { t: "Khảm", h: "Đoài", doi: "Phong Thủy Hoán" },

        "Địa Trạch Lâm": { t: "Khôn", h: "Đoài", doi: "Phong Địa Quán" },
        "Phong Lôi Ích": { t: "Tốn", h: "Chấn", doi: "Sơn Trạch Tổn" },
        "Sơn Trạch Tổn": { t: "Cấn", h: "Đoài", doi: "Phong Lôi Ích" },
        "Thủy Địa Tỷ": { t: "Khảm", h: "Khôn", doi: "Địa Thủy Sư" },
        "Địa Thủy Sư": { t: "Khôn", h: "Khảm", doi: "Thủy Địa Tỷ" },
        "Thủy Lôi Truân": { t: "Khảm", h: "Chấn", doi: "Sơn Thủy Mông" },
        "Sơn Thủy Mông": { t: "Cấn", h: "Khảm", doi: "Thủy Lôi Truân" },
        "Sơn Địa Bác": { t: "Cấn", h: "Khôn", doi: "Địa Lôi Phục" },
        "Địa Lôi Phục": { t: "Khôn", h: "Chấn", doi: "Sơn Địa Bác" }
    };

    function logicC2() {
        const name = document.getElementById("c2_select").value;
        const doiName = DATA_C2[name].doi;
        const res = DATA_C2[doiName];
        document.getElementById("c2_ten").innerText = doiName;
        document.getElementById("c2_mota").innerText = `${TUONG[res.t]} ${TUONG[res.h]} (Tượng: ${res.t} trên ${res.h})`;
        drawVach(res.t, 'c2_vachT'); drawVach(res.h, 'c2_vachH');
    }

    // --- TOOL VẼ VẠCH ---
    function drawVach(name, id) {
        const cont = document.getElementById(id); cont.innerHTML = '';
        QUAI_V[name].forEach(v => {
            const d = document.createElement('div');
            d.className = v === 1 ? 'vach duong' : 'vach am';
            cont.appendChild(d);
        });
    }

    // --- KHỞI TẠO ---
    const c2Sel = document.getElementById("c2_select");
    Object.keys(DATA_C2).sort().forEach(n => {
        let o = document.createElement('option'); o.value = n; o.text = n; c2Sel.appendChild(o);
    });

    logicC1();
    logicC2();
</script>
</body>
</html>
