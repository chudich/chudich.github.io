<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch Lý Song Hành - Phân Minh 2 Cách</title>
    <style>
        :root {
            --primary: #a04000;
            --vach-color: #3498db;
            --bg: #fdf6e3;
            --card: #ffffff;
            --border: #d2b48c;
        }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg); 
            display: flex; flex-direction: column; align-items: center; padding: 20px;
            margin: 0; color: #2c3e50;
        }
        .section-container { 
            background: var(--card); padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 700px; width: 100%; text-align: center;
            border: 1px solid #e0d0b0; margin-bottom: 50px;
        }
        h2 { color: #5d4037; margin-bottom: 10px; text-transform: uppercase; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .method-desc { font-size: 14px; color: #8b572a; font-style: italic; margin-bottom: 20px; }
        
        .grid { display: flex; gap: 15px; margin-bottom: 25px; justify-content: center; }
        .menu-column { flex: 1; display: flex; flex-direction: column; }
        .label-small { font-size: 13px; color: #8b572a; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        
        select { 
            width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--border); 
            font-size: 16px; background-color: #fff; cursor: pointer; outline: none;
        }

        .result-area {
            background: #fff9f0; border: 2px double #e67e22;
            border-radius: 15px; padding: 25px; margin-top: 10px;
        }

        .que-visual { display: flex; gap: 30px; justify-content: center; align-items: center; margin: 15px 0; }
        .quai-don { display: flex; flex-direction: column; gap: 8px; width: 90px; }
        .vach { height: 14px; border-radius: 3px; }
        .vach.duong { background-color: var(--vach-color); width: 100%; }
        .vach.am { display: flex; justify-content: space-between; }
        .vach.am::before, .vach.am::after { content: ''; background-color: var(--vach-color); width: 43%; height: 100%; border-radius: 3px; }

        /* Tên quẻ 200% và Đậm */
        .que-name { margin-top: 10px; font-weight: bold; color: #a04000; font-size: 2.5rem; line-height: 1.2; }
        .sub-info { font-size: 15px; color: #7f8c8d; font-style: italic; margin-top: 8px; }
    </style>
</head>
<body>

<div class="section-container">
    <h2>CÁCH 1: ĐỐI HÀO (BIẾN DỊCH)</h2>
    <div class="method-desc">Quy tắc: Đảo ngược tính chất từng hào (Âm thành Dương, Dương thành Âm)</div>
    <div class="grid">
        <div class="menu-column">
            <div class="label-small">Thượng Gốc</div>
            <select id="c1_thuong" onchange="logicC1()">
                <option value="Kiền">Kiền</option><option value="Đoài">Đoài</option>
                <option value="Ly">Ly</option><option value="Chấn">Chấn</option>
                <option value="Tốn">Tốn</option><option value="Khảm">Khảm</option>
                <option value="Cấn">Cấn</option><option value="Khôn">Khôn</option>
            </select>
        </div>
        <div class="menu-column">
            <div class="label-small">Hạ Gốc</div>
            <select id="c1_ha" onchange="logicC1()">
                <option value="Kiền">Kiền</option><option value="Đoài">Đoài</option>
                <option value="Ly">Ly</option><option value="Chấn">Chấn</option>
                <option value="Tốn">Tốn</option><option value="Khảm">Khảm</option>
                <option value="Cấn">Cấn</option><option value="Khôn">Khôn</option>
            </select>
        </div>
    </div>
    <div class="result-area">
        <div class="que-visual">
            <div id="c1_vachT" class="quai-don"></div>
            <div id="c1_vachH" class="quai-don"></div>
        </div>
        <div id="c1_ten" class="que-name">---</div>
        <div id="c1_mota" class="sub-info">Kết quả biến vạch</div>
    </div>
</div>

<div class="section-container">
    <h2>CÁCH 2: VIỆT DỊCH CHÁNH TÔNG</h2>
    <div class="method-desc">Quy tắc: Đối quẻ theo danh mục 64 quẻ đối truyền thống</div>
    <div class="grid">
        <div class="menu-column">
            <div class="label-small">Chọn Quẻ Gốc</div>
            <select id="c2_select" onchange="logicC2()"></select>
        </div>
    </div>
    <div class="result-area">
        <div class="que-visual">
            <div id="c2_vachT" class="quai-don"></div>
            <div id="c2_vachH" class="quai-don"></div>
        </div>
        <div id="c2_ten" class="que-name">---</div>
        <div id="c2_mota" class="sub-info">Kết quả theo danh sách đối</div>
    </div>
</div>

<script>
    const QUAI_V = {
        "Kiền": [1,1,1], "Khôn": [0,0,0], "Chấn": [0,0,1], "Tốn": [1,1,0],
        "Khảm": [0,1,0], "Ly": [1,0,1], "Cấn": [1,0,0], "Đoài": [0,1,1],
        "Thiên": [1,1,1], "Địa": [0,0,0], "Lôi": [0,0,1], "Phong": [1,1,0],
        "Thủy": [0,1,0], "Hoả": [1,0,1], "Sơn": [1,0,0], "Trạch": [0,1,1]
    };

    const TUONG = { "Kiền":"Thiên", "Khôn":"Địa", "Ly":"Hoả", "Khảm":"Thủy", "Chấn":"Lôi", "Tốn":"Phong", "Cấn":"Sơn", "Đoài":"Trạch" };
    
    // Ánh xạ tên quẻ từ cặp quái đơn
    const DATA_NAME = {
        "Kiền-Kiền": "Thuần Kiền", "Khôn-Khôn": "Thuần Khôn", "Kiền-Đoài": "Thiên Trạch Lý", "Tốn-Kiền": "Phong Thiên Tiểu Súc",
        "Kiền-Ly": "Thiên Hoả Đồng Nhân", "Ly-Kiền": "Hoả Thiên Đại Hữu", "Kiền-Chấn": "Thiên Lôi Vô Vọng", "Cấn-Kiền": "Sơn Thiên Đại Súc",
        "Kiền-Tốn": "Thiên Phong Cấu", "Đoài-Kiền": "Trạch Thiên Quải", "Kiền-Khảm": "Thiên Thủy Tụng", "Khảm-Kiền": "Thủy Thiên Nhu",
        "Kiền-Cấn": "Thiên Sơn Độn", "Chấn-Kiền": "Lôi Thiên Đại Tráng", "Kiền-Khôn": "Thiên Địa Bĩ", "Khôn-Kiền": "Địa Thiên Thái",
        "Đoài-Ly": "Trạch Hoả Cách", "Ly-Tốn": "Hoả Phong Đỉnh", "Đoài-Chấn": "Trạch Lôi Tùy", "Cấn-Tốn": "Sơn Phong Cổ",
        "Đoài-Tốn": "Trạch Phong Đại Quá", "Cấn-Chấn": "Sơn Lôi Di", "Đoài-Khảm": "Trạch Thủy Khốn", "Khảm-Tốn": "Thủy Phong Tĩnh",
        "Đoài-Cấn": "Trạch Sơn Hàm", "Chấn-Tốn": "Lôi Phong Hằng", "Đoài-Khôn": "Trạch Địa Tụy", "Khôn-Tốn": "Địa Phong Thăng",
        "Đoài-Đoài": "Thuần Đoài", "Tốn-Tốn": "Thuần Tốn", "Ly-Chấn": "Hoả Lôi Phệ Hạp", "Cấn-Ly": "Sơn Hoả Bí",
        "Ly-Khảm": "Hoả Thủy Vị Tế", "Khảm-Ly": "Thủy Hoả Ký Tế", "Ly-Cấn": "Hoả Sơn Lữ", "Chấn-Ly": "Lôi Hoả Phong",
        "Ly-Khôn": "Hoả Địa Tấn", "Khôn-Ly": "Địa Hoả Minh Di", "Ly-Đoài": "Hoả Trạch Khuê", "Tốn-Ly": "Phong Hoả Gia Nhân",
        "Ly-Ly": "Thuần Ly", "Khảm-Khảm": "Thuần Khảm", "Chấn-Khảm": "Lôi Thủy Giải", "Khảm-Cấn": "Thủy Sơn Kiển",
        "Chấn-Cấn": "Lôi Sơn Tiểu Quá", "Tốn-Đoài": "Phong Trạch Trung Phu", "Chấn-Khôn": "Lôi Địa Dự", "Khôn-Cấn": "Địa Sơn Khiêm",
        "Chấn-Đoài": "Lôi Trạch Quy Muội", "Tốn-Cấn": "Phong Sơn Tiệm", "Chấn-Chấn": "Thuần Chấn", "Cấn-Cấn": "Thuần Cấn",
        "Tốn-Khảm": "Phong Thủy Hoán", "Khảm-Đoài": "Thủy Trạch Tiết", "Tốn-Khôn": "Phong Địa Quán", "Khôn-Đoài": "Địa Trạch Lâm",
        "Tốn-Chấn": "Phong Lôi Ích", "Cấn-Đoài": "Sơn Trạch Tổn", "Khảm-Khôn": "Thủy Địa Tỷ", "Khôn-Khảm": "Địa Thủy Sư",
        "Khảm-Chấn": "Thủy Lôi Truân", "Cấn-Khảm": "Sơn Thủy Mông", "Cấn-Khôn": "Sơn Địa Bác", "Khôn-Chấn": "Địa Lôi Phục"
    };

    // --- LOGIC CÁCH 1 (ĐỐI HÀO) ---
    const DOI_HÀO_QUAI = { "Kiền":"Khôn", "Khôn":"Kiền", "Đoài":"Cấn", "Cấn":"Đoài", "Ly":"Khảm", "Khảm":"Ly", "Chấn":"Tốn", "Tốn":"Chấn" };
    function logicC1() {
        const t = document.getElementById("c1_thuong").value;
        const h = document.getElementById("c1_ha").value;
        const dT = DOI_HÀO_QUAI[t]; const dH = DOI_HÀO_QUAI[h];
        const resName = DATA_NAME[`${dT}-${dH}`] || "Chưa có tên";
        document.getElementById("c1_ten").innerText = resName;
        document.getElementById("c1_mota").innerText = `Hào đảo: ${TUONG[dT]} ${TUONG[dH]} (${dT}/${dH})`;
        drawVach(dT, 'c1_vachT'); drawVach(dH, 'c1_vachH');
    }

    // --- LOGIC CÁCH 2 (DATA 64 QUẺ ĐỐI) ---
    const PAIR_DATA = {
        "Thiên Trạch Lý": "Phong Thiên Tiểu Súc", "Phong Thiên Tiểu Súc": "Thiên Trạch Lý",
        "Thiên Hoả Đồng Nhân": "Hoả Thiên Đại Hữu", "Hoả Thiên Đại Hữu": "Thiên Hoả Đồng Nhân",
        "Thiên Lôi Vô Vọng": "Sơn Thiên Đại Súc", "Sơn Thiên Đại Súc": "Thiên Lôi Vô Vọng",
        "Thiên Phong Cấu": "Trạch Thiên Quải", "Trạch Thiên Quải": "Thiên Phong Cấu",
        "Thiên Thủy Tụng": "Thủy Thiên Nhu", "Thủy Thiên Nhu": "Thiên Thủy Tụng",
        "Thiên Sơn Độn": "Lôi Thiên Đại Tráng", "Lôi Thiên Đại Tráng": "Thiên Sơn Độn",
        "Thiên Địa Bĩ": "Địa Thiên Thái", "Địa Thiên Thái": "Thiên Địa Bĩ",
        "Thuần Kiền": "Thuần Khôn", "Thuần Khôn": "Thuần Kiền",
        "Trạch Hoả Cách": "Hoả Phong Đỉnh", "Hoả Phong Đỉnh": "Trạch Hoả Cách",
        "Trạch Lôi Tùy": "Sơn Phong Cổ", "Sơn Phong Cổ": "Trạch Lôi Tùy",
        "Trạch Phong Đại Quá": "Sơn Lôi Di", "Sơn Lôi Di": "Trạch Phong Đại Quá",
        "Trạch Thủy Khốn": "Thủy Phong Tĩnh", "Thủy Phong Tĩnh": "Trạch Thủy Khốn",
        "Trạch Sơn Hàm": "Lôi Phong Hằng", "Lôi Phong Hằng": "Trạch Sơn Hàm",
        "Trạch Địa Tụy": "Địa Phong Thăng", "Địa Phong Thăng": "Trạch Địa Tụy",
        "Thuần Đoài": "Thuần Tốn", "Thuần Tốn": "Thuần Đoài",
        "Hoả Lôi Phệ Hạp": "Sơn Hoả Bí", "Sơn Hoả Bí": "Hoả Lôi Phệ Hạp",
        "Hoả Thủy Vị Tế": "Thủy Hoả Ký Tế", "Thủy Hoả Ký Tế": "Hoả Thủy Vị Tế",
        "Hoả Sơn Lữ": "Lôi Hoả Phong", "Lôi Hoả Phong": "Hoả Sơn Lữ",
        "Hoả Địa Tấn": "Địa Hoả Minh Di", "Địa Hoả Minh Di": "Hoả Địa Tấn",
        "Hoả Trạch Khuê": "Phong Hoả Gia Nhân", "Phong Hoả Gia Nhân": "Hoả Trạch Khuê",
        "Thuần Ly": "Thuần Khảm", "Thuần Khảm": "Thuần Ly",
        "Lôi Thủy Giải": "Thủy Sơn Kiển", "Thủy Sơn Kiển": "Lôi Thủy Giải",
        "Lôi Sơn Tiểu Quá": "Phong Trạch Trung Phu", "Phong Trạch Trung Phu": "Lôi Sơn Tiểu Quá",
        "Lôi Địa Dự": "Địa Sơn Khiêm", "Địa Sơn Khiêm": "Lôi Địa Dự",
        "Lôi Trạch Quy Muội": "Phong Sơn Tiệm", "Phong Sơn Tiệm": "Lôi Trạch Quy Muội",
        "Thuần Chấn": "Thuần Cấn", "Thuần Cấn": "Thuần Chấn",
        "Phong Thuỷ Hoán": "Thủy Trạch Tiết", "Thủy Trạch Tiết": "Phong Thuỷ Hoán",
        "Phong Địa Quán": "Địa Trạch Lâm", "Địa Trạch Lâm": "Phong Địa Quán",
        "Phong Lôi Ích": "Sơn Trạch Tổn", "Sơn Trạch Tổn": "Phong Lôi Ích",
        "Thủy Địa Tỷ": "Địa Thủy Sư", "Địa Thủy Sư": "Thủy Địa Tỷ",
        "Thủy Lôi Truân": "Sơn Thủy Mông", "Sơn Thủy Mông": "Thủy Lôi Truân",
        "Sơn Địa Bác": "Địa Lôi Phục", "Địa Lôi Phục": "Sơn Địa Bác"
    };

    function logicC2() {
        const selected = document.getElementById("c2_select").value;
        const target = PAIR_DATA[selected];
        
        // Tách quái đơn để vẽ vạch
        const parts = target.split(' ');
        let th, ha;
        if (parts[0] === "Thuần") {
            th = ha = parts[1];
        } else {
            th = parts[0]; ha = parts[1];
        }

        document.getElementById("c2_ten").innerText = target;
        document.getElementById("c2_mota").innerText = `Đối Việt Dịch: ${th} trên ${ha}`;
        drawVach(th, 'c2_vachT'); drawVach(ha, 'c2_vachH');
    }

    function drawVach(name, id) {
        const cont = document.getElementById(id); cont.innerHTML = '';
        const vachs = QUAI_V[name] || [0,0,0];
        vachs.forEach(v => {
            const d = document.createElement('div');
            d.className = v === 1 ? 'vach duong' : 'vach am';
            cont.appendChild(d);
        });
    }

    // Khởi tạo
    const c2Sel = document.getElementById("c2_select");
    Object.keys(PAIR_DATA).sort().forEach(n => {
        let o = document.createElement('option'); o.value = n; o.text = n; c2Sel.appendChild(o);
    });

    logicC1();
    logicC2();
</script>
</body>
</html>
