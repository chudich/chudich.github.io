<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<!-- QUAN TRỌNG: mobile scale -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tính Trực + Sao</title>

<style>

/* ===== RESET ===== */
* {
  box-sizing: border-box;
}

/* ===== BASE ===== */
html {
  font-size: clamp(16px, 2.8vw, 20px);
}

body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 12px;
  background: #f5f5f5;
}

/* ===== TITLE ===== */
h1 {
  text-align: center;
  font-size: 1.4rem;
  margin-bottom: 12px;
}

/* ===== LAYOUT ===== */
.container {
  display: flex;
  flex-direction: column; /* mobile: xếp dọc */
  gap: 12px;
}

@media (min-width: 768px) {
  .container {
    flex-direction: row; /* tablet trở lên: ngang */
    justify-content: center;
  }
}

/* ===== BOX ===== */
.box {
  background: white;
  padding: 14px;
  border-radius: 12px;
  width: 100%;
  max-width: 500px;
  margin: auto;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  font-size: 1.1rem;
  margin-bottom: 10px;
}

/* ===== INPUT ===== */
select, button {
  width: 100%;
  font-size: 1.1rem;
  padding: 12px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* ===== BUTTON ===== */
button {
  background: #4CAF50;
  color: white;
  font-weight: bold;
  border: none;
}

button:active {
  opacity: 0.8;
}

/* ===== RESULT ===== */
.result {
  margin-top: 10px;
  padding: 12px;
  background: #eef;
  border-radius: 8px;
  font-size: 1.1rem;
  line-height: 1.5;
}

/* ===== DOWNLOAD BUTTON ===== */
.download-btn {
  margin-top: 12px;
  font-size: 1.1rem;
  background: #2196F3;
}

</style>
</head>

<body>

<h1>Tính Trực (Trung Hoa - Việt Nam)</h1>

<div class="container">

<!-- TQ -->
<div class="box">
<h2>Trung Hoa (Tiết Khí)</h2>

<select id="tqMonth"></select>
<select id="tqDay"></select>

<button onclick="calc('tq')">Tìm Trực</button>

<div class="result" id="tqResult"></div>
</div>

<!-- VN -->
<div class="box">
<h2>Việt Nam (Tháng Sóc)</h2>

<select id="vnMonth"></select>
<select id="vnDay"></select>

<button onclick="calc('vn')">Tìm Trực</button>

<div class="result" id="vnResult"></div>
</div>

</div>

<button class="download-btn" onclick="downloadImage()">📸 Tải ảnh kết quả</button>

<script>

// ===== DATA =====
const chi = ["Tý","Sửu","Dần","Mão","Thìn","Tỵ","Ngọ","Mùi","Thân","Dậu","Tuất","Hợi"];

const truc = [
"Kiến","Trừ","Mãn","Bình","Định","Chấp",
"Phá","Nguy","Thành","Thu","Khai","Bế"
];

const sao28 = [
"Giác (Nai)","Cang (Rồng)","Đê","Phòng","Tâm","Vĩ","Cơ",
"Đẩu","Ngưu","Nữ","Hư","Nguy","Thất","Bích",
"Khuê","Lâu","Vị","Mão","Tất","Chủy","Sâm",
"Tỉnh","Quỷ","Liễu","Tinh","Trương","Dực","Chẩn"
];

// ===== INIT =====
function initSelect(id){
    const el = document.getElementById(id);
    chi.forEach(c=>{
        let opt = document.createElement("option");
        opt.value = c;
        opt.text = c;
        el.appendChild(opt);
    });
}

["tqMonth","tqDay","vnMonth","vnDay"].forEach(initSelect);

// ===== CORE =====
function calc(type){

    let m = document.getElementById(type+"Month").value;
    let d = document.getElementById(type+"Day").value;

    let mIndex = chi.indexOf(m);
    let dIndex = chi.indexOf(d);

    let index = (dIndex - mIndex + 12) % 12;
    let trucName = truc[index];

    let sao = sao28[dIndex % 28];

    let result = `
    <b>Tháng:</b> ${m} <br>
    <b>Ngày:</b> ${d} <br><br>
    👉 <b>Trực:</b> ${trucName}<br>
    ⭐ <b>Sao:</b> ${sao}
    `;

    document.getElementById(type+"Result").innerHTML = result;
}

// ===== DOWNLOAD =====
function downloadImage(){
    html2canvas(document.body).then(canvas=>{
        let link = document.createElement("a");
        link.download = "truc_result.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}

</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
