    <style>
        /* Tối ưu hiển thị cho người mắt kém và thiết bị di động */
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 15px; 
            background-color: #f0f2f5; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { 
            width: 100%; 
            max-width: 600px; 
            background: #fff; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); 
            box-sizing: border-box;
        }
        h2 { 
            color: #d32f2f; 
            text-align: center; 
            font-size: 28px; 
            text-transform: uppercase;
            margin-bottom: 25px;
            font-weight: 900;
        }
        .form-group { 
            margin-bottom: 20px; 
            width: 100%;
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: bold; 
            font-size: 20px; 
            color: #333;
        }
        input[type="text"] { 
            width: 100%; 
            padding: 18px; 
            border: 3px solid #bcbcbc; 
            border-radius: 10px; 
            font-size: 22px; /* Chữ rất to */
            font-weight: bold;
            box-sizing: border-box;
            background-color: #fffdec; /* Nền vàng nhạt dễ nhìn */
        }
        input[type="text"]:focus { 
            border-color: #d32f2f; 
            outline: none; 
        }
        #result-area { 
            margin-top: 25px; 
            padding: 20px; 
            border: 4px solid #333; 
            border-radius: 12px; 
            min-height: 150px; 
            white-space: pre-wrap; 
            background: #ffffff; 
            font-size: 22px; /* Nội dung kết quả to rõ */
            font-weight: 600;
            line-height: 1.5;
            color: #000;
        }
        .button-group { 
            display: flex; 
            flex-direction: column; /* Nút bấm xếp chồng trên mobile */
            gap: 15px; 
            margin-top: 10px; 
        }
        button { 
            padding: 20px; 
            cursor: pointer; 
            border: none; 
            border-radius: 12px; 
            font-weight: 900; 
            font-size: 22px;
            text-transform: uppercase;
        }
        .btn-extract { background-color: #b71c1c; color: white; }
        .btn-copy { background-color: #1565c0; color: white; }
        button:active { transform: scale(0.95); }

        /* Ngăn chữ quá nhỏ trên một số trình duyệt */
        @media screen and (max-width: 480px) {
            h2 { font-size: 24px; }
            input[type="text"], button { font-size: 20px; }
            #result-area { font-size: 19px; }

 CÁC LÁ BÀI TƯỚNG
1. TƯỚNG XANH :
Quân bài Tướng chịu ảnh hưởng của Mộc Tinh,vị vua trị vì ở Thượng Đình,và dĩ nhiên vua lúc nào cũng có cả quyền hành trong tay,danh dự và nhất là lòng vị tha nếu là vị minh quân.

Màu đỏ là màu của sợi chỉ hồng,tượng trưng cho những cuộc hôn nhân do ông Tơ bà Nguyệt dẫn đường đưa lối,TƯỚNG ĐỎ trong quẻ bài Tứ Sắc được ví là ông Tơ,một ông lão được xem là người tác hợp những cuộc tình duyên tiến tới hôn nhân.

Ngoài ra TƯỚNG ĐỎ còn tượng trưng cho người đàn ông đã có tuổi,có uy quyền,có địa vị,có tiền bạc,luôn giúp đỡ người xin quẻ 1 cách thầm lặng trong hôn nhân.
TƯỚNG ĐỎ N : Lá TƯỚNG ĐỎ Ngược là lá bài ngăn cách mọi sự liên hệ về tình cảm,tình ái và cả tình bạn.Lá bài này luôn gây sự gãy đổ,biểu thị cho những bất công,bất nghĩa,bất nhân mà người xin quẻ phải đương đầu 1 cách tuyệt vọng vì kẻ bất nhân ấy là kẻ cầm trong tay hoàn cảnh của người xin quẻ.

1. SĨ XANH :

Trong các cuộc hôn nhân nếu ông Tơ là người đưa đường dẫn lối thì bà Nguyệt là người se duyên chặt chẽ,luôn luôn nuôi mỹ ý làm đẹp cho cuộc sống lứa đôi.
SĨ ĐỎ Đ : lá SĨ ĐỎ Đứng tiêu biểu cho người đàn bà đứng tuổi đứng đắn,dạt dào tình thương,nhiều đức độ lúc nào cũng gần gũi với người xin quẻ để ngầm tác hợp nâng đỡ,xây dựng hạnh phúc cho người xin quẻ,dù người xin quẻ là thanh niên hay thiếu nữ.
Lá SĨ ĐỎ Đứng cũng là lá bài tràn đầy hy vọng về phương diện tình cảm,còn nếu người xin quẻ đã lập gia đình lá SĨ ĐỎ Đứng sẽ là lá bài tuyệt vời hạnh phúc.Những thiếu thốn về bất kì phương diện nào : tiền tài,sự nghiệp,đằm ấm,sức khỏe …v…v đều được bù đắp thật đầy đủ ngoài sự mong ước của người xin quẻ.
SĨ ĐỎ N : Lá SĨ ĐỎ Ngược đầu được xem là lá bài phản phúc trong tình bạn,gian trá trong tình yêu,bất nghĩa trong tình cảm gia đình,lừa đảo trong công việc,bất tín trong hôn nhân,dù người xin quẻ trải qua nhiều đắng cay thử thách rốt cuộc cũng đành ôm hận.

    function extractFromLibrary() {
        const inputs = document.querySelectorAll('.card-input');
        const resultArea = document.getElementById('result-area');
        let finalResults = [];

        // Giữ nguyên format thư viện để dò tìm chính xác
        const lib = THU_VIEN_DATA;

        inputs.forEach(input => {
            let userText = input.value.trim();
            if (!userText) return;

            // Làm sạch input (bỏ "1 : ", chuyển hoa)
            let searchKey = userText.replace(/^\d+\s*:\s*/, "").toUpperCase();

            // Tìm vị trí của Key trong thư viện
            let startPos = lib.toUpperCase().indexOf(searchKey);

            if (startPos !== -1) {
                // Cắt từ vị trí tìm thấy
                let remainText = lib.substring(startPos);
                
                // Tìm điểm kết thúc bằng cách tìm lá bài tiếp theo (thường có dấu " : ")
                // Ta bỏ qua dấu ":" của chính lá bài đang xét
                let endPos = remainText.indexOf(" : ", searchKey.length + 2);
                
                let foundText = "";
                if (endPos !== -1) {
                    // Tìm ngược lại tên lá bài phía trước dấu ":" để ngắt dòng
                    let segment = remainText.substring(0, endPos);
                    let lastNewline = segment.lastIndexOf("\n");
                    foundText = (lastNewline !== -1) ? segment.substring(0, lastNewline) : segment;
                } else {
                    foundText = remainText; // Lá cuối cùng
                }
                finalResults.push(foundText.trim());
            } else {
                finalResults.push("❌ Không tìm thấy: " + userText);
            }
        });

        resultArea.innerText = finalResults.join("\n\n------------------\n\n");
    }

    function copyResult() {
        const text = document.getElementById('result-area').innerText;
        if (!text || text.includes("Dữ liệu sẽ hiện")) return;
        
        navigator.clipboard.writeText(text).then(() => {
            alert("Đã sao chép!");
        });
    }
</script>
