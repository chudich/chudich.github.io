<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRA CỨU CHUẨN</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background-color: #eee; }
        .box { max-width: 100%; background: #fff; padding: 15px; border-radius: 10px; }
        h2 { text-align: center; color: #b71c1c; font-size: 24px; }
        
        .f-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; font-size: 20px; margin-bottom: 5px; }
        input { 
            width: 100%; padding: 15px; border: 3px solid #333; border-radius: 8px; 
            font-size: 22px; font-weight: bold; box-sizing: border-box; background: #FFFDE7; 
        }

        #result { 
            margin-top: 20px; padding: 15px; border: 4px solid #b71c1c; border-radius: 10px; 
            min-height: 200px; white-space: pre-wrap; background: #fff; 
            font-size: 22px; line-height: 1.5; font-weight: bold; color: #000;
        }

        .btns { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button { 
            padding: 20px; font-size: 22px; font-weight: bold; border: none; 
            border-radius: 10px; color: #fff; text-transform: uppercase;
        }
        .b-ex { background: #b71c1c; }
        .b-cp { background: #0d47a1; }
    </style>
</head>
<body>

<div class="box">
    <h2>HỆ THỐNG TRA CỨU</h2>
    
    <div class="f-group"><label>Form 1:</label><input type="text" class="card-in"></div>
    <div class="f-group"><label>Form 2:</label><input type="text" class="card-in"></div>
    <div class="f-group"><label>Form 3:</label><input type="text" class="card-in"></div>
    <div class="f-group"><label>Form 4:</label><input type="text" class="card-in"></div>

    <div class="btns">
        <button class="b-ex" onclick="solve()">TRÍCH XUẤT DATA</button>
        <button class="b-cp" onclick="copy()">SAO CHÉP</button>
    </div>

    <div id="result"></div>
</div>

<script>
    // DÁN TOÀN BỘ DATA FILE 01 VÀO GIỮA HAI DẤU ` DƯỚI ĐÂY
    const DATABASE_TEXT = `
1 : Ý NGHĨA CỦA CÁC LÁ BÀI TỨ SẮC
TƯỚNG XANH Đ : Lá TƯỚNG XANH Đứng là lá bài tuyệt vời trong mọi ao ước,xin xỏ về công danh,thi cử,tiến thân…hoặc mọi sự khơi mào cho công việc làm ăn trong bất kì ngành nghề nào.Mọi khuếch trương vừa mang lại danh dự vừa thu thập lợi lộc.Lá TƯỚNG XANH Đứng trong quẻ bài là 1 quý nhân đứng tuổi,nghiêm nghị,có uy quyền và có tấm lòng vị tha,tha thiết bảo vệ ,tiến cử và giúp đỡ về mọi mặt của người xin quẻ
TƯỚNG XANH N : Lá TƯỚNG XANH Ngược đầu là viễn cảnh của mọi mưu tính sẽ thất bại,thất vọng vì bị lừa dối của người trên trước,tuy có uy quyền nhưng không đức độ.Ngoài ra còn báo hiệu cho sự xích mích giữa người xin quẻ với kẻ trên trước có thể có những phiền toái khó tránh.
CHỐT VÀNG N : Lá CHỐT VÀNG Ngược đầu đem đến tất cả sự não nề cho người xin quẻ, như thất bại trong công việc,thua lỗ trong mọi sự khuếch trương gây công nợ lôi cuốn đến chốn tụng đình,còn hoen ố danh dự.
CHỐT TRẮNG Đ : Là lá bài tượng trưng cho tất cả sự đổ vỡ,tan nát,sụp đổ,phá sản,ly tán,tang tóc không phương cứu vãn.
    `;

    function solve() {
        const ins = document.querySelectorAll('.card-in');
        const out = document.getElementById('result');
        let final = [];

        ins.forEach(input => {
            let val = input.value.trim();
            if (!val) return;

            // Xử lý Input: Bỏ số thứ tự, lấy phần chữ in hoa (Ví dụ: CHỐT VÀNG N)
            let key = val.replace(/^\d+\s*[:.-]\s*/, "").toUpperCase();
            
            // Tìm vị trí chính xác của "KEY :"
            let startIdx = DATABASE_TEXT.toUpperCase().indexOf(key + " :");
            
            if (startIdx !== -1) {
                // Cắt từ điểm bắt đầu
                let part = DATABASE_TEXT.substring(startIdx);
                
                // Thuật toán "Điểm Dừng": Tìm dấu " : " tiếp theo tính từ sau tên lá bài hiện tại
                // Dấu " : " tiếp theo chính là dấu mốc của lá bài kế tiếp
                let searchAfter = key.length + 5; 
                let nextCardIdx = part.indexOf(" : ", searchAfter);

                let content = "";
                if (nextCardIdx !== -1) {
                    // Nếu tìm thấy lá tiếp theo, ta cắt lùi lại để lấy trọn vẹn phần text trước đó
                    let temp = part.substring(0, nextCardIdx);
                    // Tìm dòng cuối cùng (vì lá bài tiếp theo nằm ở dòng mới)
                    let lastLineIdx = temp.lastIndexOf("\n");
                    content = (lastLineIdx !== -1) ? temp.substring(0, lastLineIdx) : temp;
                } else {
                    content = part; // Nếu là lá cuối cùng trong Database
                }
                final.push(content.trim());
            } else {
                final.push("❌ KHÔNG CÓ DATA: " + val);
            }
        });

        out.innerText = final.join("\n\n--------------------\n\n");
    }

    function copy() {
        const text = document.getElementById('result').innerText;
        if (!text) return;
        const area = document.createElement('textarea');
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand('copy');
        document.body.removeChild(area);
        alert("Đã sao chép!");
    }
</script>

</body>
</html>
