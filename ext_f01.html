<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRA CỨU NGŨ LINH</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background-color: #f4f4f4; }
        .container { max-width: 100%; background: #fff; padding: 15px; border-radius: 10px; box-sizing: border-box; }
        h2 { text-align: center; color: #b71c1c; font-size: 24px; margin-bottom: 20px; font-weight: bold; }
        
        /* 4 Form xếp dọc hoàn toàn */
        .form-group { margin-bottom: 15px; width: 100%; }
        label { display: block; font-weight: bold; font-size: 20px; margin-bottom: 5px; color: #333; }
        input[type="text"] { 
            width: 100%; 
            padding: 15px; 
            border: 3px solid #555; 
            border-radius: 8px; 
            font-size: 22px; 
            font-weight: bold; 
            box-sizing: border-box;
            background-color: #FFFDE7; /* Vàng nhạt dễ nhìn */
        }

        #result-area { 
            margin-top: 20px; 
            padding: 15px; 
            border: 3px solid #b71c1c; 
            border-radius: 10px; 
            min-height: 200px; 
            white-space: pre-wrap; 
            background: #fff; 
            font-size: 20px; 
            line-height: 1.6; 
            font-weight: bold; 
            color: #000;
        }

        .button-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        button { 
            padding: 18px; 
            font-size: 20px; 
            font-weight: bold; 
            border: none; 
            border-radius: 10px; 
            color: white; 
            text-transform: uppercase;
            cursor: pointer;
        }
        .btn-extract { background-color: #b71c1c; }
        .btn-copy { background-color: #0d47a1; }
    </style>
</head>
<body>

<div class="container">
    <h2>HỆ THỐNG TRA CỨU</h2>
    
    <div class="form-group"><label>Lá bài 1:</label><input type="text" class="card-input" placeholder="Ví dụ: 1 : TƯỚNG XANH Đ"></div>
    <div class="form-group"><label>Lá bài 2:</label><input type="text" class="card-input"></div>
    <div class="form-group"><label>Lá bài 3:</label><input type="text" class="card-input"></div>
    <div class="form-group"><label>Lá bài 4:</label><input type="text" class="card-input"></div>

    <div class="button-group">
        <button class="btn-extract" onclick="processData()">TRÍCH XUẤT DỮ LIỆU</button>
        <button class="btn-copy" onclick="copyContent()">SAO CHÉP KẾT QUẢ</button>
    </div>

    <div id="result-area">Kết quả hiển thị tại đây...</div>
</div>

<script>
    // PHẦN THƯ VIỆN: Dán nội dung File 01 của bạn vào giữa hai dấu ` dưới đây
    const DATABASE_TEXT = `
1 : Ý NGHĨA CỦA CÁC LÁ BÀI TỨ SẮC

SĨ XANH N : text aaaaaa
    `;

    function processData() {
        const inputElements = document.querySelectorAll('.card-input');
        const outputBox = document.getElementById('result-area');
        let finalResults = [];

        // Tách thư viện thành từng dòng để duyệt
        const dataLines = DATABASE_TEXT.split('\n');

        inputElements.forEach(input => {
            let rawValue = input.value.trim();
            if (!rawValue) return;

            // Làm sạch input: Bỏ "1 : ", "2 : ",... chuyển thành IN HOA
            let searchKey = rawValue.replace(/^\d+\s*[:.-]\s*/, "").toUpperCase();

            let foundIdx = -1;
            // Tìm dòng chứa từ khóa chính xác (Tên lá bài + Đ/N)
            for (let i = 0; i < dataLines.length; i++) {
                if (dataLines[i].toUpperCase().includes(searchKey + " :")) {
                    foundIdx = i;
                    break;
                }
            }

            if (foundIdx !== -1) {
                let currentResultLines = [];
                currentResultLines.push(dataLines[foundIdx]); // Lấy dòng tiêu đề

                // Lấy các dòng tiếp theo cho đến khi gặp dòng có " : " (lá bài mới)
                for (let j = foundIdx + 1; j < dataLines.length; j++) {
                    let nextLine = dataLines[j].trim();
                    // Nếu dòng chứa dấu " : " và không phải là dòng trống thì dừng
                    if (nextLine.includes(" : ") && nextLine.length > 5) {
                        break;
                    }
                    if (nextLine !== "") {
                        currentResultLines.push(dataLines[j]);
                    }
                }
                finalResults.push(currentResultLines.join('\n').trim());
            } else {
                finalResults.push("❌ Không tìm thấy dữ liệu cho: " + rawValue);
            }
        });

        outputBox.innerText = finalResults.join("\n\n--------------------\n\n");
    }

    function copyContent() {
        const content = document.getElementById('result-area').innerText;
        if (!content || content.includes("Kết quả hiển thị")) return;
        
        const el = document.createElement('textarea');
        el.value = content;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert("Đã sao chép xong!");
    }
</script>

</body>
</html>
