 CÁC LÁ BÀI TƯỚNG
1. TƯỚNG XANH :
Quân bài Tướng chịu ảnh hưởng của Mộc Tinh,vị vua trị vì ở Thượng Đình,và dĩ nhiên vua lúc nào cũng có cả quyền hành trong tay,danh dự và nhất là lòng vị tha nếu là vị minh quân.

Ngoài ra lá TƯỚNG TRẮNG còn tượng trưng cho vị bác sĩ,lương y,nhà tâm lý sẵn sàng can thiệp an ủi,chữa trị cho người xin quẻ khi có việc cần đến,nhất là người xin quẻ đang tìm thầy thuốc chữa trị các chứng bệnh trầm trọng.
Sau cùng là lá TƯỚNG TRẮNG tiêu biểu cho người đàn ông xấu nết,vũ phu,hung bạo,người chồng lỗ mãng,thiếu suy xét,một người bạn xấu,ích kỷ,biển lận,gièm pha,phản phúc.
TƯỚNG TRẮNG N : Lá TƯỚNG TRẮNG Ngược đầu là cứu tinh đáng tin cậy của người xin quẻ.Khi cần thăm hỏi về một vấn đề liên quan đến pháp luật mà lá TƯỚNG TRẮNG Ngược đầu xuất hiện trong quẻ,người xin quẻ nên vững tin rằng mình sẽ thắng,hoặc mọi việc sẽ được dàn xếp êm đẹp và có lợi cho phía mình.
4. TƯỚNG ĐỎ :
Màu đỏ là màu của sợi chỉ hồng,tượng trưng cho những cuộc hôn nhân do ông Tơ bà Nguyệt dẫn đường đưa lối,TƯỚNG ĐỎ trong quẻ bài Tứ Sắc được ví là ông Tơ,một ông lão được xem là người tác hợp những cuộc tình duyên tiến tới hôn nhân.
TƯỚNG ĐỎ Đ : Lá bài TƯỚNG ĐỎ Đứng tiêu biểu 1 người đàn ông đứng tuổi,nhân từ,đức độ,giàu tình cảm,xem hàng thanh niên thiếu nữ như những người con.Ông lão này luôn gần gũi,ngầm giúp đỡ nên duyên chồng vợ,tạo nhiều hạnh phúc.
Lá bài TƯỚNG ĐỎ Đứng cũng là lá bài tượng trưng cho người bạn,người thân,hoặc người yêu luôn thành thật,tốt bụng,tận tâm và trung thành với người xin quẻ trong mọi vấn đề về tình cảm.
Ngoài ra TƯỚNG ĐỎ còn tượng trưng cho người đàn ông đã có tuổi,có uy quyền,có địa vị,có tiền bạc,luôn giúp đỡ người xin quẻ 1 cách thầm lặng trong hôn nhân.
TƯỚNG ĐỎ N : Lá TƯỚNG ĐỎ Ngược là lá bài ngăn cách mọi sự liên hệ về tình cảm,tình ái và cả tình bạn.Lá bài này luôn gây sự gãy đổ,biểu thị cho những bất công,bất nghĩa,bất nhân mà người xin quẻ phải đương đầu 1 cách tuyệt vọng vì kẻ bất nhân ấy là kẻ cầm trong tay hoàn cảnh của người xin quẻ.
CÁC LÁ BÀI SĨ :
1. SĨ XANH :
Lá bài Sĩ trong khoa chiêm tinh tượng trưng cho sao Thái Âm,tức là sao trinh bạch trên Thượng Đình.
Dĩ nhiên 1 nhân vật nhứ thế lúc nào cũng có những ý tưởng êm đềm,thơ mộng và nhất là sự yên tĩnh luôn luôn là điều kiện tối cần cho nhân vật ấy.Tuy nhiên điều khiến chúng ta ngạc nhiên là nhân vật ấy lại có tánh hay ganh tị và ghen tuông.
Đối với trận mạc, Sĩ là vị quan văn có khả năng lãnh đạo tinh thần binh sĩ,vị văn quan này rất nho nhã, mềm mỏng như người phụ nữ.
SĨ XANH Đ : Lá SĨ XANH Đứng tiêu biểu cho người đàn bà nhiều ảnh hưởng rộng,tuy không nắm quyền uy trong tay nhưng vẫn có khả năng chi phối tinh thần của rất nhiều người khác,có thế lực.Lá SĨ XANH Đứng trong quẻ bài là 1 nữ ân nhân,một người đàn bà tận tình giúp đỡ,hay một cô gái si mê theo đuổi.Nhưng dù là người đàn bà hay là cô gái thì đều ghen tuông như nhau.Nên quẻ bài có lá SĨ XANH Đứng là lá bài cực tốt và cũng là cực xấu,tùy thuộc vào lá đi kèm nói lên việc ấy.
SĨ XANH N : Lá SĨ XANH Ngược đầu là mọi cản trở,trở ngại trong tiến thân,thi cử,tiến thủ,khai trương.Không những trở ngại mà còn có thể xảy ra những chuyện não lòng khó tránh.
2. SĨ VÀNG  :
Lá SĨ VÀNG trong quẻ bài Tứ Sắc được tiêu biểu cho 1 quý nhân nho nhã,tánh tình mềm mỏng như phụ nữ.
SĨ VÀNG tượng trưng cho người đàn bà nhiều bản lãnh,nhất là giàu tiền của và nắm trong tay khối thủ đoạn.
SĨ VÀNG Đ : Là lá bài biểu trưng cho người đàn bà đứng tuổi,đứng đắn,giàu có,nhiều ảnh hưởng về mọi mặt.Người này luôn sẵn sàng giúp đỡ người xin quẻ về mặt tiền tài và nâng đỡ trong việc tạo dựng sự nghiệp.
Trong quẻ có SĨ VÀNG Đứng thì người xin quẻ chắc chắn sẽ thành công trong mọi tính toán về tiền bạc,nhờ nữ quý nhân âm thầm giúp đỡ.
Ngoài ra còn là điềm may mắn trong công việc và trong bất cứ toan tính khuếch trương hay cầu cạnh về tiền nong.
SĨ VÀNG N: Lá SĨ VÀNG Ngược đầu  tượng trưng cho người đàn bà đứng tuổi,có gia đình,hoặc đã góa chồng đang theo đuổi người xin quẻ ( nếu người xin quẻ là nam ) dù người xin quẻ là 1 thanh niên hay đàn ông đã có vợ cũng mặc,người đàn bà này theo đuổi đến độ làm hỏng cả địa vị và tiêu tan tài sản của người xin quẻ.
Nếu người xin quẻ là thiếu nữ hay thiếu phụ sẽ ngược lại,sẽ được người bạn gái là người đàn bà này tận tình giúp đỡ về tiền bạc.

3. SĨ TRẮNG  :
SĨ TRẮNG tượng trưng cho 1 thiếu phụ đứng tuổi nham hiểm,đanh đá,sống trong sự lừa dối,xảo trá,buôn danh bán lợi,mẹ mìn,mai mối,có bản chất bất nhân bất nghĩa.
SĨ TRẮNG Đ : tiêu biểu cho người đàn bà vặn nài bẻ ống,lộn sòng,chuyên nghề mối lái vô nhân,sống trên mồ hôi nước mắt của kẻ khác.Người xin quẻ được lá SĨ TRẮNG là người đang trong hoàn cảnh đứng trên bờ vực thẳm,nếu không dè dặt cẩn thận khôn khéo chắc chắn sẽ không tránh khỏi rơi xuống hố sâu.
Lá SĨ TRẮNG Đứng cũng là lá bài tượng trưng cho hoàn cảnh u tối trong gia đình,cảnh chồng 1 vợ 2 hoặc vợ 1 chồng 2,gây sự bất hòa có thể đưa đến cảnh đổ vỡ tan nát.
Ngoài ra lá SĨ TRẮNG còn báo hiệu điều tang khó,tai nạn ngặt nghèo,gây cảnh góa bụa trong gia đình
SĨ TRẮNG N : Là lá bài giải quyết mọi tình huống bi đát nêu trên,cũng như dàn xếp ổn thỏa gầy dựng lại niềm vui cho gia đình sau cơn giông tố.
Lá SĨ TRẮNG Ngược đầu còn báo hiệu sự trở về,hối lỗi của người gây xáo trộn trong gia đình lâu ngày ly tán,bỗng nhiên quay lại đoàn tụ bất ngờ.
4. SĨ ĐỎ :
SĨ ĐỎ trong lá bài tứ sắc tượng trưng cho người đàn bà đứng tuổi có duyên ngầm quen gọi là bà Nguyệt.
Trong các cuộc hôn nhân nếu ông Tơ là người đưa đường dẫn lối thì bà Nguyệt là người se duyên chặt chẽ,luôn luôn nuôi mỹ ý làm đẹp cho cuộc sống lứa đôi.
SĨ ĐỎ Đ : lá SĨ ĐỎ Đứng tiêu biểu cho người đàn bà đứng tuổi đứng đắn,dạt dào tình thương,nhiều đức độ lúc nào cũng gần gũi với người xin quẻ để ngầm tác hợp nâng đỡ,xây dựng hạnh phúc cho người xin quẻ,dù người xin quẻ là thanh niên hay thiếu nữ.
Lá SĨ ĐỎ Đứng cũng là lá bài tràn đầy hy vọng về phương diện tình cảm,còn nếu người xin quẻ đã lập gia đình lá SĨ ĐỎ Đứng sẽ là lá bài tuyệt vời hạnh phúc.Những thiếu thốn về bất kì phương diện nào : tiền tài,sự nghiệp,đằm ấm,sức khỏe …v…v đều được bù đắp thật đầy đủ ngoài sự mong ước của người xin quẻ.
SĨ ĐỎ N : Lá SĨ ĐỎ Ngược đầu được xem là lá bài phản phúc trong tình bạn,gian trá trong tình yêu,bất nghĩa trong tình cảm gia đình,lừa đảo trong công việc,bất tín trong hôn nhân,dù người xin quẻ trải qua nhiều đắng cay thử thách rốt cuộc cũng đành ôm hận.
Ngoài ra lá SĨ ĐỎ Ngược đầu còn tượng trưng cho thiếu nữ xinh đẹp nhưng vô duyên,luôn theo đuổi quấy rầy người xin quẻ nếu người xin quẻ là thanh niên.Còn người xin quẻ là thiếu nữ thì cô gái vô duyên đó sẽ gây ngờ vực làm trở ngại cuộc tình duyên đang gắn bó.
    CÁC LÁ BÀI TƯỢNG :

1. TƯỢNG XANH :
Lá bài Tượng là biểu tượng của sức mạnh vô địch,Tượng chịu ảnh hưởng của vì sao Thái Dương trên Thượng Đình.
Sao Thái Dương là vì sao nhiều đức độ,giàu nhân ái,thích ban bố,tánh tình hào hiệp,nhất là ưa nâng đỡ nhân tài.
Giữa chiến trận,Tượng tiêu biểu cho võ quan có khả năng bách chiến bách thắng,người lãnh dạo có thực tài,nhiều đức độ dễ thuyết phục ba quân cũng như dễ hòa mình với thuộc hạ bằng tình thương cao quý.
TƯỢNG XANH Đ : Lá TƯỢNG XANH Đứng tiêu biểu cho người có tánh tình hào phóng,can trường,đức độ,yêu đời,thương người,nhất là rất thành thật nâng người dưới,hỗ trợ kẻ trên.
Lá TƯỢNG XANH Đứng cũng là lá bài kết dây liên lạc,là người bạn thân tình,thanh niên tốt bụng,và có nhiều uy tín tận tâm giúp đỡ.
Ngoài ra lá TƯỢNG XANH Đứng cũng tiêu biểu cho một thanh niên thuộc hàng ngũ trong quân đội,người mang tin vui cho người xin quẻ.
TƯỢNG XANH N : Lá TƯỢNG XANH Ngược đầu tiêu biểu cho người thanh niên xấu bụng,đạo đức giả,tư cách hèn hạ,phỉnh nịnh,lừa dối luôn nuôi trong lòng sự phản bội.
Lá TƯỢNG XANH Ngược đầu cũng tượng trưng cho người bạn quỷ quyệt,một nhân tình ghen bóng ghen gió,ngầm theo đuổi phá hỏng công danh của mình.

2. TƯỢNG VÀNG :
Tượng là voi,từ xa xưa voi lãnh phần khá quan trọng trong chiến trận,voi xông pha trận mạc,yểm trợ đắc lực và hữu hiệu cho cuộc tiến quân.
Trong quẻ bài tứ sắc,Tượng tượng trưng cho thanh niên khỏe mạnh,có khả năng vật chất cũng như tinh thần,sẵn sàng bảo vệ người xin quẻ.
TƯỢNG VÀNG Đ : Lá TƯỢNG VÀNG Đứng tiêu biểu cho 1 thanh niên đẹp trai,hào hoa phong nhã,có khả năng vật chất cũng như tinh thần,tánh tình rộng rãi luôn luôn nuôi hoài bão giúp đời,giúp người.
TƯỢNG VÀNG Đứng cũng tiêu biểu cho 1 người bạn tốt,giàu có,thực tâm,nhân hậu,lúc nào cũng tận tình giúp đỡ người xin quẻ,đây chính là vị cứu tinh.
Nếu người xin quẻ là thiếu nữ,TƯỢNG VÀNG Đứng tiên đoán 1 cuộc hôn nhân giàu có,địa vị.
Nếu người xin quẻ là thanh niên,TƯỢNG VÀNG sẽ mang lại cuộc tình duyên thật đẹp và nhờ tình duyên này mà người thanh niên sẽ làm nên sự nghiệp.
TƯỢNG VÀNG N : Lá TƯỢNG VÀNG Ngược đầu tiêu biểu cho sự phản trắc,lừa dối,gãy đổ vì tánh tình thiếu thành thực của người tình,ý trung nhân,hoặc bạn bè,hoặc là vị hôn thê , hôn phu.
Lá TƯỢNG VÀNG Ngược đầu cũng báo hiệu nhiều xáo trộn xảy ra trong công việc,xí nghiệp,cũng như về tài sản.Cần dè dặt lắm mới tránh được hậu quả bi đát,nhất là khi lá TƯỢNG VÀNG Ngược đầu xuất hiện trong quẻ thì người xin quẻ đừng nghĩ đến việc tiến thân.
3. TƯỢNG TRẮNG :
TƯỢNG TRẮNG trong quẻ bài tứ sắc tượng trưng cho 1 thanh niên du đãng,phóng túng,đàng điếm,nghiện ngập,thành phần tứ đổ tường,chuyên sống về nghề ma cô,qua cầu rút ván.
TƯỢNG TRẮNG Đ : Lá TƯỢNG TRẮNG Đứng tiêu biểu cho mọi quyến rũ về vật chất,lung lạc tinh thần,cạm bẫy đam mê,đưa người xin quẻ sa vào tình trạng bị thu hút không lối thoát.Nếu sa chân vào vũng lầy này thì càng cựa quậy càng lún sâu thêm.
Lá TƯỢNG TRẮNG Đứng cũng tượng trưng cho 1 thanh niên lạ có mã đẹp trai ăn nói lưu loát,nhưng là 1 thanh niên mất nết,thiếu nhân phẩm,giỏi tán tỉnh mê hoặc người xin quẻ.Nếu người xin quẻ là thiếu nữ thì cần hết sức giữ gìn kẻo bị lôi cuốn vào vòng sa ngã .Nếu người xin quẻ là thanh niên thì người thanh niên xấu tính sẽ theo quấy rầy,ngầm phá hỏng mọi công trình của mình hoặc dựng mồi câu nhử đến tán gia bại sản.
TƯỢNG TRẮNG N : TƯỢNG TRẮNG Ngược đầu là lá bài không những nhiều hy vọng mà còn thực hiện được ý định của mình,nhất là trong vấn đề tình ái.
Lá TƯỢNG TRẮNG Ngược đầu cũng tiêu biểu cho những thắng lợi về các cuộc tranh chấp,hoặc báo hiệu sắp có cuộc đi du lịch nơi xa, việc hôn nhân hay công việc đều thuận lợi.
4. TƯỢNG ĐỎ :
TƯỢNG ĐỎ là lá bài trẻ trung nhất trong các lá bài thuộc phạm vi tình cảm ( 28 lá màu đỏ ).
Người xin quẻ dù là thanh niên hay thiếu nữ một khi xin quẻ tình duyên gặp lá bài TƯỢNG ĐỎ Đứng trong quẻ chắc chắn sẽ thành công mặc dù trước đó có sự ngang trái bẽ bàng trong tình duyên.
TƯỢNG ĐỎ Đ : Lá TƯỢNG ĐỎ Đứng tượng trưng cho 1 thanh niên đẹp trai,phong lưu tao nhã,luôn luôn có tư tưởng cao đẹp,là người bạn tốt đối với người xin quẻ.Còn nếu người xin quẻ là thiếu nữ thì người thanh niên tốt này tương lai sẽ là vị hôn phu của người thiếu nữ ấy.
Lá TƯỢNG ĐỎ Đứng cũng tượng trưng cho 1 thiếu nữ duyên dáng,cao thượng,là người bạn tình cờ gặp gỡ của người xin quẻ nếu người xin quẻ là thanh niên,từ tình bạn đến tình duyên chỉ là 1 bước ngắn đầy dẫy hạnh phúc.
Lá TƯỢNG ĐỎ Đứng là lá bài cầu duyên,những cuộc tình duyên lỡ làng,những trở ngại trong hôn nhân,những hiểu lầm không đáng có trong mối tình đầu thì người xin quẻ dù là thanh niên hay thiếu nữ nếu gặp TƯỢNG ĐỎ Đứng xuất hiện trong quẻ cuộc tình duyên sẽ thành tựu chắc chắn,tiến đến hôn nhân rỡ ràng.
TƯỢNG ĐỎ N : Lá TƯỢNG ĐỎ Ngược đầu tiêu biểu cho tất cả những gì phũ phàng trong tình yêu.
Nếu người xin quẻ đã lập gia đình, lá TƯỢNG ĐỎ Ngược đầu là lá bài báo hiệu sự đảo lộn hoàn cảnh của gia đình ấy một cách bi đát.

    CÁC LÁ BÀI XE :

Lá XE XANH Đứng còn tiêu biểu cho sự bê tha,đồi trụy,lãng mạn nhưng gây bất mãn cho mọi người.

2. XE VÀNG :

XE VÀNG Đứng cũng tiêu biểu cho sự thịnh vượng gần kề của gia đình,sự thành công chắc chắn trong công việc môi giới mua bán hoặc sự thành tựu trong ý định khuếch trương và sau cùng là sự thắng lợi bất ngờ trong vụ kiện dai dẳng lâu ngày chưa giải quyết xong.

3. XE TRẮNG :
XE TRẮNG trong quẻ bài tứ sắc tiêu biểu cho xe tang,mang đến hoàn cảnh não nề,buồn bã,sầu đau,những cảnh ly tán không phương hàn gắn.

XE TRẮNG N : XE TRẮNG Ngược đầu là lá bài biến đổi hẳn những tình trạng của lá XE TRẮNG Đứng, mang lại niềm tin,hàn gắn mọi não nề,hoặc chặn đứng những việc xấu trước khi xảy ra.
Nếu gặp cơn bệnh tật ngặt nghèo,gặp XE TRẮNG Ngược đầu sẽ gặp thầy thuốc giỏi,thuốc lành chữa trị lành căn bệnh.

Hơn thế nữa XE ĐỎ Ngược đầu còn là lá bài báo động sự phản bội ân tình trong gia đình của người đàn ông hay đàn bà,nếu 1 trong 2 người có sự mơ ước viễn vông.

    function extractFromLibrary() {
        const inputs = document.querySelectorAll('.card-input');
        const resultArea = document.getElementById('result-area');
        let finalResults = [];

        // Giữ nguyên format thư viện để dò tìm chính xác
        const lib = THU_VIEN_DATA;

        inputs.forEach(input => {
            let userText = input.value.trim();
            if (!userText) return;

            // Làm sạch input (bỏ "1 : ", chuyển hoa)
            let searchKey = userText.replace(/^\d+\s*:\s*/, "").toUpperCase();

            // Tìm vị trí của Key trong thư viện
            let startPos = lib.toUpperCase().indexOf(searchKey);

            if (startPos !== -1) {
                // Cắt từ vị trí tìm thấy
                let remainText = lib.substring(startPos);
                
                // Tìm điểm kết thúc bằng cách tìm lá bài tiếp theo (thường có dấu " : ")
                // Ta bỏ qua dấu ":" của chính lá bài đang xét
                let endPos = remainText.indexOf(" : ", searchKey.length + 2);
                
                let foundText = "";
                if (endPos !== -1) {
                    // Tìm ngược lại tên lá bài phía trước dấu ":" để ngắt dòng
                    let segment = remainText.substring(0, endPos);
                    let lastNewline = segment.lastIndexOf("\n");
                    foundText = (lastNewline !== -1) ? segment.substring(0, lastNewline) : segment;
                } else {
                    foundText = remainText; // Lá cuối cùng
                }
                finalResults.push(foundText.trim());
            } else {
                finalResults.push("❌ Không tìm thấy: " + userText);
            }
        });

        resultArea.innerText = finalResults.join("\n\n------------------\n\n");
    }

    function copyResult() {
        const text = document.getElementById('result-area').innerText;
        if (!text || text.includes("Dữ liệu sẽ hiện")) return;
        
        navigator.clipboard.writeText(text).then(() => {
            alert("Đã sao chép!");
        });
    }
</script>
