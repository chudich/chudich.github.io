<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRUY XUẤT CHUẨN ĐÚNG</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f0f0f0; }
        .container { max-width: 100%; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #b71c1c; font-size: 24px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; font-size: 20px; margin-bottom: 5px; color: #333; }
        input { 
            width: 100%; padding: 16px; border: 3px solid #333; border-radius: 10px; 
            font-size: 22px; font-weight: bold; box-sizing: border-box; background: #fffde7; 
        }
        #result-area { 
            margin-top: 20px; padding: 15px; border: 4px solid #b71c1c; border-radius: 10px; 
            min-height: 250px; white-space: pre-wrap; background: #fff; 
            font-size: 22px; line-height: 1.6; font-weight: bold; color: #000;
        }
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        button { 
            padding: 20px; font-size: 22px; font-weight: bold; border: none; 
            border-radius: 10px; color: #fff; text-transform: uppercase;
        }
        .btn-run { background: #b71c1c; }
        .btn-copy { background: #1565c0; }
    </style>
</head>
<body>

<div class="container">
    <h2>TRA CỨU THỐNG NHẤT</h2>
    
    <div class="form-group"><label>Lá 1:</label><input type="text" class="card-input"></div>
    <div class="form-group"><label>Lá 2:</label><input type="text" class="card-input"></div>
    <div class="form-group"><label>Lá 3:</label><input type="text" class="card-input"></div>
    <div class="form-group"><label>Lá 4:</label><input type="text" class="card-input"></div>

    <div class="btn-group">
        <button class="btn-run" onclick="extractData()">TRÍCH XUẤT DATA</button>
        <button class="btn-copy" onclick="copyData()">SAO CHÉP KẾT QUẢ</button>
    </div>

    <div id="result-area"></div>
</div>

<script>
    // DÁN DATA FILE 01 VÀO ĐÂY (GIỮA HAI DẤU ` )
    const DATABASE = `
NGỰA VÀNG Đ : Lá bài này báo hiệu sự vững vàng trong những bước đầu tiên...
NGỰA VÀNG N : Lá NGỰA VÀNG Ngược đầu đem đến tất cả sự não nề cho người xin quẻ...
PHÁO TRẮNG N : PHÁO TRẮNG Ngược đầu là sự phát giác đúng lúc mọi vấn đề...
4. PHÁO ĐỎ : PHÁO ĐỎ là lá bài phản ảnh một màu sắc đặc biệt...
    `;

    function extractData() {
        const inputs = document.querySelectorAll('.card-input');
        const resultArea = document.getElementById('result-area');
        let finalResults = [];
        const lines = DATABASE.split('\n');

        inputs.forEach(input => {
            let val = input.value.trim();
            if (!val) return;

            // Quy tắc: Lấy Tên + Màu + Ký hiệu (Ví dụ: NGỰA VÀNG Đ)
            let searchKey = val.replace(/^\d+\s*[:.-]\s*/, "").trim().toUpperCase();
            
            let foundIdx = -1;
            for (let i = 0; i < lines.length; i++) {
                // Phải khớp 100% cụm từ tìm kiếm trước dấu hai chấm
                if (lines[i].toUpperCase().includes(searchKey + " :")) {
                    foundIdx = i;
                    break;
                }
            }

            if (foundIdx !== -1) {
                let segment = [];
                segment.push(lines[foundIdx]); // Lấy dòng gốc

                for (let j = foundIdx + 1; j < lines.length; j++) {
                    let lineText = lines[j].trim();
                    if (lineText === "") continue;

                    // QUY TẮC BẮT BUỘC: 
                    // Nếu dòng này chứa dấu " : " mang ý nghĩa là một lá bài khác
                    if (lineText.includes(" : ")) {
                        let potentialKey = lineText.split(" : ")[0].trim().toUpperCase();
                        
                        // Nếu Tên lá bài ở dòng này KHÁC 100% với searchKey -> DỪNG NGAY
                        if (potentialKey !== searchKey) {
                            break;
                        }
                    }
                    
                    // Nếu gặp dòng tiêu đề nhóm (ví dụ: 4. PHÁO ĐỎ) -> DỪNG NGAY
                    if (/^\d+\./.test(lineText)) {
                        break;
                    }

                    segment.push(lines[j]);
                }
                finalResults.push(segment.join('\n').trim());
            } else {
                finalResults.push("❌ KHÔNG KHỚP DỮ LIỆU: " + val);
            }
        });

        resultArea.innerText = finalResults.join("\n\n--------------------\n\n");
    }

    function copyData() {
        const text = document.getElementById('result-area').innerText;
        if (!text) return;
        const el = document.createElement('textarea');
        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert("Đã sao chép!");
    }
</script>

</body>
</html>
