<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRUY XUẤT TỨ SẮC 03 - BẢN CHUẨN CUỐI</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #e8f5e9; }
        .app { max-width: 100%; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        h2 { text-align: center; color: #1b5e20; font-size: 24px; margin-bottom: 20px; }
        .input-item { margin-bottom: 12px; }
        label { display: block; font-weight: bold; font-size: 18px; margin-bottom: 5px; color: #222; }
        input { 
            width: 100%; padding: 16px; border: 3px solid #666; border-radius: 10px; 
            font-size: 22px; font-weight: bold; box-sizing: border-box; background: #fffde7; 
        }
        #ket-qua { 
            margin-top: 20px; padding: 15px; border: 4px solid #1b5e20; border-radius: 10px; 
            min-height: 250px; white-space: pre-wrap; background: #fff; 
            font-size: 22px; line-height: 1.6; font-weight: bold; color: #000;
        }
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        button { 
            padding: 20px; font-size: 22px; font-weight: bold; border: none; 
            border-radius: 12px; color: #fff; text-transform: uppercase;
        }
        .btn-find { background: #1b5e20; }
        .btn-copy { background: #0d47a1; }
    </style>
</head>
<body>

<div class="app">
    <h2>HỆ THỐNG TRÍCH XUẤT 03</h2>
    
    <div class="input-item"><label>Lá 1:</label><input type="text" id="v1" class="in"></div>
    <div class="input-item"><label>Lá 2:</label><input type="text" id="v2" class="in"></div>
    <div class="input-item"><label>Lá 3:</label><input type="text" id="v3" class="in"></div>
    <div class="input-item"><label>Lá 4:</label><input type="text" id="v4" class="in"></div>

    <div class="btn-group">
        <button class="btn-find" onclick="run()">TÌM Ý NGHĨA</button>
        <button class="btn-copy" onclick="copy()">SAO CHÉP KẾT QUẢ</button>
    </div>

    <div id="ket-qua"></div>
</div>

<script>
    // Dán DATA FILE 03 vào đây
    const THU_VIEN_DATA = `
TƯỚNG ĐỎ Đ :
Gặp CHỐT ĐỎ Đ : Bạn cũ lâu ngày thăm viếng,cuộc hội ngộ mang nhiều e ấp | Có tin bất ngờ gây rạo rực trong tâm hồn
NGỰA TRẮNG Đ :
Gặp CHỐT TRẮNG Đ : Ý nghĩa Ngựa bên trái Chốt | Ý nghĩa Ngựa bên phải Chốt
    `;

    function timKiem(chu, gap, layBenPhai) {
        // Chuẩn hóa input: bỏ dấu cách, viết hoa
        let cleanChu = chu.trim().toUpperCase();
        let cleanGap = gap.trim().toUpperCase();
        
        let lines = THU_VIEN_DATA.split('\n');
        let indexNhom = -1;

        // BƯỚC 1: Tìm dòng tiêu đề nhóm (Chứa tên lá và có dấu :)
        for (let i = 0; i < lines.length; i++) {
            let row = lines[i].trim().toUpperCase();
            if (row.includes(cleanChu) && row.includes(":")) {
                // Kiểm tra kỹ hơn để không nhầm sang dòng "Gặp"
                if (!row.startsWith("GẶP")) {
                    indexNhom = i;
                    break;
                }
            }
        }

        if (indexNhom === -1) return null;

        // BƯỚC 2: Tìm dòng "Gặp" trong nhóm đó
        for (let j = indexNhom + 1; j < lines.length; j++) {
            let row = lines[j].trim().toUpperCase();
            
            // Nếu đụng nhóm khác thì dừng lại ngay
            if (row.includes(":") && !row.startsWith("GẶP")) break;

            if (row.startsWith("GẶP") && row.includes(cleanGap)) {
                let textSauDauHaiCham = lines[j].split(":")[1] || "";
                let haiVe = textSauDauHaiCham.split("|");
                
                if (haiVe.length >= 2) {
                    return layBenPhai ? haiVe[1].trim() : haiVe[0].trim();
                } else if (haiVe.length === 1) {
                    return haiVe[0].trim(); // Trường hợp không có dấu |
                }
            }
        }
        return null;
    }

    function run() {
        const inp = [
            document.getElementById('v1').value,
            document.getElementById('v2').value,
            document.getElementById('v3').value,
            document.getElementById('v4').value
        ];

        let ketquaFinal = [];
        for (let i = 0; i < 3; i++) {
            let L = inp[i]; 
            let R = inp[i+1];
            if (!L || !R) continue;

            // 1. Thử tìm L là Chủ (R bên phải)
            let result = timKiem(L, R, true);

            // 2. Nếu không thấy, thử R là Chủ (L bên trái)
            if (!result) {
                result = timKiem(R, L, false);
            }

            if (result) {
                ketquaFinal.push(`Cặp ${i+1} (${L}-${R}):\n=> ${result}`);
            } else {
                ketquaFinal.push(`Cặp ${i+1} (${L}-${R}):\n=> (Không tìm thấy dữ liệu phối hợp)`);
            }
        }
        document.getElementById('ket-qua').innerText = ketquaFinal.join("\n\n------------------\n\n");
    }

    function copy() {
        const text = document.getElementById('ket-qua').innerText;
        if (!text) return;
        const tmp = document.createElement('textarea');
        tmp.value = text;
        document.body.appendChild(tmp);
        tmp.select();
        document.execCommand('copy');
        document.body.removeChild(tmp);
        alert("Đã sao chép!");
    }
</script>
</body>
</html>
