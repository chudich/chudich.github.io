<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHỤC VỤ TỐI THƯỢNG - FILE 03</title>
    <style>
        :root { --p: #1b5e20; --bg: #f5f5f5; }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: var(--bg); }
        .main-app { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        h2 { text-align: center; color: var(--p); font-size: 26px; margin-bottom: 25px; }
        .f-box { margin-bottom: 15px; }
        label { display: block; font-weight: bold; font-size: 20px; margin-bottom: 8px; color: #333; }
        input { 
            width: 100%; padding: 20px; border: 4px solid #555; border-radius: 12px; 
            font-size: 24px; font-weight: bold; box-sizing: border-box; background: #fffde7; 
        }
        #ket-qua { 
            margin-top: 25px; padding: 20px; border: 5px double var(--p); border-radius: 12px; 
            min-height: 300px; white-space: pre-wrap; background: #fff; 
            font-size: 24px; line-height: 1.6; font-weight: bold; color: #000;
        }
        .btn-zone { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        button { 
            padding: 22px; font-size: 24px; font-weight: bold; border: none; 
            border-radius: 12px; color: #fff; text-transform: uppercase;
        }
        .b-run { background: var(--p); }
        .b-copy { background: #0d47a1; }
    </style>
</head>
<body>

<div class="main-app">
    <h2>TRUY XUẤT PHẨM HÀM 03</h2>
    
    <div class="f-box"><label>Form 1 (Trái):</label><input type="text" id="i1" class="in-card"></div>
    <div class="f-box"><label>Form 2:</label><input type="text" id="i2" class="in-card"></div>
    <div class="f-box"><label>Form 3:</label><input type="text" id="i3" class="in-card"></div>
    <div class="f-box"><label>Form 4 (Phải):</label><input type="text" id="i4" class="in-card"></div>

    <div class="btn-zone">
        <button class="b-run" onclick="xuLyData()">TÌM Ý NGHĨA</button>
        <button class="b-copy" onclick="saoChep()">SAO CHÉP KẾT QUẢ</button>
    </div>

    <div id="ket-qua"></div>
</div>

<script>
    // DÁN THƯ VIỆN FILE 03 VÀO ĐÂY
    const THU_VIEN = `
TƯỚNG ĐỎ Đ :
Gặp CHỐT ĐỎ Đ : Bạn cũ lâu ngày thăm viếng,cuộc hội ngộ mang nhiều e ấp | Có tin bất ngờ gây rạo rực trong tâm hồn
NGỰA TRẮNG Đ :
Gặp CHỐT TRẮNG Đ : Ngựa bên trái Chốt | Ngựa bên phải Chốt
text aaaaaaaaaaa
    `;

    function timTrongNhom(tenChu, tenGap, layPhai) {
        let lines = THU_VIEN.split('\n');
        let indexChu = -1;
        
        // 1. Tìm dòng Tiêu đề nhóm (Khớp chính xác tên)
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim().toUpperCase();
            if (line === tenChu.toUpperCase() + " :") {
                indexChu = i;
                break;
            }
        }

        if (indexChu === -1) return null;

        // 2. Từ dòng Tiêu đề, tìm dòng "Gặp..." ngay bên dưới
        for (let j = indexChu + 1; j < lines.length; j++) {
            let line = lines[j].trim().toUpperCase();
            
            // Nếu đụng nhóm khác thì dừng
            if (line.includes(":") && !line.startsWith("GẶP")) break;

            if (line.startsWith("GẶP " + tenGap.toUpperCase())) {
                let noiDung = lines[j].split(":")[1];
                if (!noiDung) return null;
                let phan = noiDung.split("|");
                return layPhai ? phan[1].trim() : phan[0].trim();
            }
        }
        return null;
    }

    function xuLyData() {
        const v = [
            document.getElementById('i1').value.trim(),
            document.getElementById('i2').value.trim(),
            document.getElementById('i3').value.trim(),
            document.getElementById('i4').value.trim()
        ];

        let final = [];
        for (let i = 0; i < 3; i++) {
            let L = v[i]; let R = v[i+1];
            if (!L || !R) continue;

            // Ưu tiên 1: L làm chủ, R bên Phải
            let res = timTrongNhom(L, R, true);
            
            // Ưu tiên 2: R làm chủ, L bên Trái (Quyền biến)
            if (!res) {
                res = timTrongNhom(R, L, false);
            }

            if (res) {
                final.push(`Cặp ${i+1} (${L}-${R}):\n=> ${res}`);
            } else {
                final.push(`Cặp ${i+1} (${L}-${R}):\n=> (Không tìm thấy data phối hợp)`);
            }
        }
        document.getElementById('ket-qua').innerText = final.join("\n\n------------------\n\n");
    }

    function saoChep() {
        const t = document.getElementById('ket-qua').innerText;
        if (!t) return;
        const el = document.createElement('textarea');
        el.value = t;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert("Đã sao chép!");
    }
</script>

</body>
</html>
