<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRUY XUẤT TỨ SẮC 03 - CHUẨN XÁC</title>
    <style>
        :root { --green-tâm: #1b5e20; --vàng-nhạt: #fffde7; }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #eceff1; }
        .container { max-width: 100%; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        h2 { text-align: center; color: var(--green-tâm); font-size: 24px; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; font-size: 20px; margin-bottom: 5px; color: #333; }
        input { 
            width: 100%; padding: 18px; border: 3px solid #777; border-radius: 10px; 
            font-size: 24px; font-weight: bold; box-sizing: border-box; background: var(--vàng-nhạt); 
        }
        
        #result-box { 
            margin-top: 25px; padding: 15px; border: 4px solid var(--green-tâm); border-radius: 10px; 
            min-height: 300px; white-space: pre-wrap; background: #fff; 
            font-size: 22px; line-height: 1.6; font-weight: bold; color: #000;
        }

        .btn-zone { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        button { 
            padding: 22px; font-size: 22px; font-weight: bold; border: none; 
            border-radius: 12px; color: #fff; text-transform: uppercase; cursor: pointer;
        }
        .btn-find { background: var(--green-tâm); }
        .btn-copy { background: #0d47a1; }
    </style>
</head>
<body>

<div class="container">
    <h2>TRA CỨU PHẨM HÀM 03</h2>
    
    <div class="form-group"><label>Lá 1 (Trái):</label><input type="text" id="input1" class="in"></div>
    <div class="form-group"><label>Lá 2:</label><input type="text" id="input2" class="in"></div>
    <div class="form-group"><label>Lá 3:</label><input type="text" id="input3" class="in"></div>
    <div class="form-group"><label>Lá 4 (Phải):</label><input type="text" id="input4" class="in"></div>

    <div class="btn-zone">
        <button class="btn-find" onclick="processAnalysis()">TÌM Ý NGHĨA</button>
        <button class="btn-copy" onclick="copyToClipboard()">SAO CHÉP KẾT QUẢ</button>
    </div>

    <div id="result-box"></div>
</div>

<script>
    // THƯ VIỆN DATA FILE 03 (Bạn dán dữ liệu thật vào giữa hai dấu ` bên dưới)
    const FILE_03_DATABASE = `
TƯỚNG ĐỎ Đ :
Gặp CHỐT ĐỎ Đ : Bạn cũ lâu ngày thăm viếng,cuộc hội ngộ mang nhiều e ấp | Có tin bất ngờ gây rạo rực trong tâm hồn
NGỰA TRẮNG Đ :
Gặp CHỐT TRẮNG Đ : Ý nghĩa Ngựa bên trái Chốt | Ý nghĩa Ngựa bên phải Chốt
text aaaaaaa
    `;

    function findExactMeaning(chu, gap, gapIsOnRight) {
        const lines = FILE_03_DATABASE.split('\n');
        let currentGroupHead = "";
        let targetChu = chu.toUpperCase().trim();
        let targetGap = "GẶP " + gap.toUpperCase().trim();

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim().toUpperCase();
            
            // Tìm tiêu đề nhóm (Ví dụ: "TƯỚNG ĐỎ Đ :")
            if (line === targetChu + " :") {
                currentGroupHead = targetChu;
                continue;
            }

            // Nếu đang nằm trong nhóm tiêu đề đúng
            if (currentGroupHead === targetChu) {
                // Nếu chạm tới tiêu đề nhóm khác thì dừng ngay
                if (line.includes(" :") && !line.startsWith("GẶP")) {
                    currentGroupHead = "";
                    continue;
                }

                // Nếu tìm thấy dòng "Gặp [Lá đi kèm]"
                if (line.startsWith(targetGap)) {
                    let fullContent = lines[i].substring(lines[i].indexOf(":") + 1);
                    let splitParts = fullContent.split("|");
                    if (splitParts.length < 2) return null;
                    return gapIsOnRight ? splitParts[1].trim() : splitParts[0].trim();
                }
            }
        }
        return null;
    }

    function processAnalysis() {
        const cards = [
            document.getElementById('input1').value.trim(),
            document.getElementById('input2').value.trim(),
            document.getElementById('input3').value.trim(),
            document.getElementById('input4').value.trim()
        ];

        let results = [];
        // Xét 3 cặp bài cạnh nhau
        for (let i = 0; i < 3; i++) {
            let L = cards[i]; 
            let R = cards[i+1];
            if (!L || !R) continue;

            let finalMeaning = "";

            // BƯỚC 1: Tìm L làm Chủ, R làm Lá Gặp (R nằm bên Phải L)
            finalMeaning = findExactMeaning(L, R, true);

            // BƯỚC 2: Quyền biến - Tìm R làm Chủ, L làm Lá Gặp (L nằm bên Trái R)
            if (!finalMeaning) {
                finalMeaning = findExactMeaning(R, L, false);
            }

            if (finalMeaning) {
                results.push(`Cặp ${i+1} (${L} - ${R}):\n=> ${finalMeaning}`);
            } else {
                results.push(`Cặp ${i+1} (${L} - ${R}):\n=> (Không tìm thấy phối hợp)`);
            }
        }

        document.getElementById('result-box').innerText = results.join("\n\n--------------------\n\n");
    }

    function copyToClipboard() {
        const text = document.getElementById('result-box').innerText;
        if (!text) return;
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        alert("Đã sao chép kết quả!");
    }
</script>

</body>
</html>
