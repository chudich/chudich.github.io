<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Liên Hoa Độn v3.2 - Checklist Lục Thân</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; }
        .card { max-width: 800px; margin: auto; background: #1e293b; padding: 25px; border-radius: 15px; border: 1px solid #334155; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        h2 { text-align: center; color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }
        .flex-container { display: flex; gap: 20px; flex-wrap: wrap; }
        .input-section { flex: 1; min-width: 300px; }
        .checklist-section { flex: 1; min-width: 300px; background: #0f172a; padding: 15px; border-radius: 10px; border: 1px solid #1e293b; }
        label { font-weight: bold; color: #94a3b8; display: block; margin-top: 15px; }
        select { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: none; background: #334155; color: white; font-size: 16px; }
        #res { margin-top: 25px; padding: 20px; background: #0f172a; border-left: 5px solid #38bdf8; border-radius: 10px; line-height: 1.8; }
        .tag { display: inline-block; background: #0369a1; color: white; padding: 3px 12px; border-radius: 6px; margin: 4px; font-weight: 600; font-size: 0.85em; }
        .category { color: #38bdf8; font-weight: bold; margin-top: 15px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .check-item { display: flex; align-items: center; margin-bottom: 8px; cursor: pointer; }
        .check-item input { margin-right: 10px; width: 18px; height: 18px; }
        #analysis { margin-top: 15px; padding: 10px; background: #1e293b; border-radius: 8px; color: #fbbf24; font-style: italic; font-size: 0.9em; border: 1px dashed #fbbf24; }
    </style>
</head>
<body>

<div class="card">
    <h2>Liên Hoa Độn v3.2 - Luận Giải Tương Tác</h2>

    <div class="flex-container">
        <div class="input-section">
            <label>Giới tính TA:</label>
            <select id="gender" onchange="run()"><option value="nam">Nam</option><option value="nu">Nữ</option></select>

            <label>Quẻ đơn của TA:</label>
            <select id="queTA" onchange="run()">
                <option value="Kiền">Kiền (Kim)</option><option value="Đoài">Đoài (Kim)</option>
                <option value="Ly">Ly (Hỏa)</option><option value="Chấn">Chấn (Mộc)</option>
                <option value="Tốn">Tốn (Mộc)</option><option value="Khảm">Khảm (Thủy)</option>
                <option value="Khôn">Khôn (Thổ)</option><option value="Cấn">Cấn (Thổ)</option>
            </select>

            <label>Quẻ đối ứng xuất hiện trong quẻ Độn:</label>
            <select id="queDU" onchange="run()">
                <option value="Kim">Kiền / Đoài (Kim)</option><option value="Hoa">Ly (Hỏa)</option>
                <option value="Moc">Chấn / Tốn (Mộc)</option><option value="Thuy">Khảm (Thủy)</option>
                <option value="Tho">Khôn / Cấn (Thổ)</option>
            </select>
        </div>

        <div class="checklist-section">
            <h4 style="color: #38bdf8; margin-top: 0;">Checklist Lục Thân xuất hiện:</h4>
            <div id="checklist-content">
                </div>
            <div id="analysis">Chọn đối tượng xuất hiện trong quẻ để xem tương tác...</div>
        </div>
    </div>

    <div id="res">Kết quả tra cứu sẽ hiển thị tại đây...</div>
</div>

<script>
const HMap = { 'Kiền':'Kim','Đoài':'Kim','Ly':'Hoa','Chấn':'Moc','Tốn':'Moc','Khảm':'Thuy','Khôn':'Tho','Cấn':'Tho' };
const HLogic = {
    Kim: { khac: 'Moc', biKhac: 'Hoa', sinh: 'Thuy', biSinh: 'Tho' },
    Thuy: { khac: 'Hoa', biKhac: 'Tho', sinh: 'Moc', biSinh: 'Kim' },
    Moc: { khac: 'Tho', biKhac: 'Kim', sinh: 'Hoa', biSinh: 'Thuy' },
    Hoa: { khac: 'Kim', biKhac: 'Thuy', sinh: 'Tho', biSinh: 'Moc' },
    Tho: { khac: 'Thuy', biKhac: 'Moc', sinh: 'Kim', biSinh: 'Hoa' }
};

function run() {
    const gender = document.getElementById('gender').value;
    const qTA = document.getElementById('queTA').value;
    const hTA = HMap[qTA];
    const hDU = document.getElementById('queDU').value;
    const box = document.getElementById('res');
    
    const hP = HLogic[hTA].biSinh, hH = hTA, hC = HLogic[hTA].sinh, hT = HLogic[hTA].khac, hQ = HLogic[hTA].biKhac;
    
    // Lưu thông tin lục thân hiện tại vào biến toàn cục để checklist sử dụng
    window.currentLT = { hP, hH, hC, hT, hQ, hDU };

    let cat = { H: [], P: [], Q: [], C: [], T: [] };

    if(hDU === hH) cat.H = ["TA", "Huynh đệ", "Bà Cố (Mẹ Bà Nội)", "Dượng (Chồng Cô)", "Ông Cố Ngoại (Cha Bà Ngoại)", "Mẹ Ông Ngoại"];
    if(hDU === hP) cat.P = ["Mẹ ruột", "Ông Nội", "Cháu Ngoại", "Bác gái/Thím", "Cậu/Dì"];
    if(hDU === hQ) {
        if(gender === 'nam') cat.Q.push("Con cái"); else cat.Q.push("Chồng");
        cat.Q.push("Ông Cố (Cha Bà Nội)", "Bà Ngoại", "Cha của Ông Ngoại", "Anh rể/Em rể", "Con của Cô");
    }
    if(hDU === hC) {
        if(gender === 'nu') cat.C.push("Con cái");
        cat.C.push("Bà Nội", "Ông Ngoại", "Mợ (Vợ Cậu)", "Con chị/em gái");
    }
    if(hDU === hT) {
        if(gender === 'nam') cat.T.push("Vợ");
        cat.T.push("Cha ruột", "Cô ruột", "Chú/Bác trai", "Bà Cố Ngoại (Mẹ Bà Ngoại)", "Chị dâu/Em dâu");
    }

    // Hiển thị kết quả chính
    let html = "";
    const labels = { H: "Huynh đệ (H)", P: "Phụ mẫu (P)", Q: "Quan quỷ (Q)", C: "Chi hao (C)", T: "Thê tài (T)" };
    for (let k in cat) if (cat[k].length > 0) {
        html += `<div class="category">${labels[k]}</div><div>${cat[k].map(i => `<span class="tag">${i}</span>`).join('')}</div>`;
    }
    box.innerHTML = html || "Không tìm thấy thông tin.";

    updateChecklist(cat);
}

function updateChecklist(cat) {
    const listDiv = document.getElementById('checklist-content');
    listDiv.innerHTML = "";
    
    // Tạo checklist từ các lục thân quan trọng nhất trong câu hỏi
    const commonLT = [
        {id: 'H', name: 'TA / Người hỏi'},
        {id: 'Q', name: 'Con cái / Đối tượng khắc TA'},
        {id: 'P', name: 'Cháu ngoại / Đối tượng sinh TA'},
        {id: 'T', name: 'Cha / Vợ / Vật chất'},
        {id: 'C', name: 'Ông bà / Đối tượng TA sinh'}
    ];

    commonLT.forEach(item => {
        const div = document.createElement('div');
        div.className = 'check-item';
        div.innerHTML = `<input type="checkbox" value="${item.id}" onchange="analyze()"> ${item.name}`;
        listDiv.appendChild(div);
    });
}

function analyze() {
    const checks = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(i => i.value);
    const anaDiv = document.getElementById('analysis');
    
    if (checks.length === 0) {
        anaDiv.innerHTML = "Chọn đối tượng để xem tương tác...";
        return;
    }

    let msg = "Phân tích: ";
    if (checks.includes('Q') && checks.includes('H')) {
        msg += "Có tương tác KHẮC (Con cái/Áp lực đè lên TA). ";
    }
    if (checks.includes('P') && checks.includes('H')) {
        msg += "Có tương tác SINH (Có nguồn hỗ trợ/Cháu mang lại phúc cho TA). ";
    }
    if (checks.includes('Q') && checks.includes('P') && checks.includes('H')) {
        msg += "=> Mạch năng lượng thông suốt: Q sinh P, P sinh TA. Cháu là cầu nối hóa giải áp lực từ con cái.";
    }
    if (checks.length === 1) {
        msg += "Đối tượng này xuất hiện đơn lẻ, cần xem thêm các không thời gian khác để thấy sự liên kết.";
    }

    anaDiv.innerHTML = msg;
}

run();
</script>
</body>
</html>
