<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>NguyenK - Kinh Dịch Toàn Năng (Fix Input Error)</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #993300; --secondary: #007aff; --bg: #f4f5f7; }
        body { background: var(--bg); font-family: 'Lexend', sans-serif; margin: 0; padding: 10px; color: #2d3436; }
        .container { max-width: 850px; margin: 0 auto; background: #fff; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; }

        .tabs { display: flex; background: #f1f2f6; padding: 5px; overflow-x: auto; white-space: nowrap; }
        .tab-item { flex: 1; min-width: 80px; padding: 12px 5px; text-align: center; cursor: pointer; border-radius: 12px; font-size: 11px; font-weight: 600; color: #636e72; }
        .tab-item.active { background: #fff; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .input-section { padding: 20px; }
        .input-panel { display: none; }
        .input-panel.active { display: block; }
        
        /* FIX LỖI GÕ CHỮ: Tăng width và đảm bảo hiển thị đủ nội dung */
        .input-group { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        input { 
            width: 95px; /* Tăng từ 75px lên 95px */
            padding: 12px 8px; 
            border: 1.5px solid #dfe6e9; 
            border-radius: 12px; 
            text-align: center; 
            font-size: 16px; 
            outline: none; 
            box-sizing: border-box; /* Đảm bảo padding không lấn át chiều rộng */
        }
        input::placeholder { color: #ccc; font-size: 13px; font-style: italic; }
        
        .btn-main { background: var(--primary); color: white; width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: 600; cursor: pointer; }

        .question-box { padding: 15px 20px; background: #fdfdfd; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        textarea { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 12px; font-family: inherit; font-size: 14px; resize: none; box-sizing: border-box; outline: none; }
        
        .dl-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
        .dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid #fff; outline: 1px solid #ccc; }
        .dot.active { outline: 2px solid #000; transform: scale(1.1); }
        .btn-dl { background: var(--secondary); color: white; padding: 12px 24px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }

        .canvas-wrapper { width: 100%; background: #fff; overflow-x: auto; padding: 25px 0; text-align: center; }
        #canvas { display: inline-block; }

        #ketQua { background: #fafafa; padding: 20px; border-radius: 18px; font-size: 14px; border: 1px solid #eee; white-space: pre-wrap; line-height: 1.8; color: #34495e; }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://sophiemeisam.github.io/raphael.js"></script>
    <script src="https://sophiemeisam.github.io/khiet.js"></script>
</head>
<body>

<div class="container">
    <div class="tabs">
        <div class="tab-item active" onclick="switchTab(event, 'tab-auto')">CẢM ỨNG</div>
        <div class="tab-item" onclick="switchTab(event, 'tab-don')">ĐỘN</div>
        <div class="tab-item" onclick="switchTab(event, 'tab-mai')">MAI HOA</div>
        <div class="tab-item" onclick="switchTab(event, 'tab-time')">THỜI</div>
        <div class="tab-item" onclick="switchTab(event, 'tab-tim')">TÌM</div>
    </div>

    <div class="input-section">
        <div id="tab-auto" class="input-panel active"><button class="btn-main" id="btn-auto">GIEO QUẺ CẢM ỨNG</button></div>
        
        <div id="tab-don" class="input-panel">
            <div class="input-group">
                <input type="text" id="dp" placeholder="Thượng">
                <input type="text" id="dt" placeholder="Hạ">
            </div>
            <button class="btn-main" id="btn-don">ĐỘN QUẺ</button>
        </div>

        <div id="tab-mai" class="input-panel">
            <div class="input-group">
                <input type="text" id="mn" placeholder="Năm">
                <input type="text" id="mth" placeholder="Tháng">
                <input type="text" id="mng" placeholder="Ngày">
            </div>
            <button class="btn-main" id="btn-mai">LẬP MAI HOA</button>
        </div>

        <div id="tab-time" class="input-panel">
            <div class="input-group">
                <input type="text" id="tn" placeholder="Năm">
                <input type="text" id="tth" placeholder="Tháng">
                <input type="text" id="tng" placeholder="Ngày">
                <input type="text" id="tg" placeholder="Giờ">
            </div>
            <button class="btn-main" id="btn-time">TÍNH THỜI QUÁI</button>
        </div>

        <div id="tab-tim" class="input-panel">
            <div class="input-group">
                <input type="text" id="tp" placeholder="Thượng">
                <input type="text" id="tt" placeholder="Hạ">
                <input type="text" id="td" placeholder="Động">
            </div>
            <button class="btn-main" id="btn-tim">TÌM QUẺ</button>
        </div>
    </div>

    <div class="question-box">
        <textarea id="qTxt" rows="2" placeholder="Nhập câu hỏi (Max 18 ký tự - Tự ngắt 9-9)..." maxlength="18"></textarea>
        <div class="dl-bar">
            <div style="display:flex; gap:10px;">
                <div class="dot active" style="background:#007aff" data-c="#007aff"></div>
                <div class="dot" style="background:#dc3545" data-c="#dc3545"></div>
                <div class="dot" style="background:#28a745" data-c="#28a745"></div>
            </div>
            <button class="btn-dl" id="btn-dl">💾 TẢI ẢNH</button>
        </div>
    </div>

    <div class="canvas-wrapper"><div id="canvas"></div></div>
    <div id="ketQua" style="margin: 20px;">Lập quẻ để xem kết quả...</div>
</div>

<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script>
$(document).ready(function() {
    let qData = [], selColor = "#007aff";
    
    window.switchTab = (e, id) => { 
        $('.tab-item').removeClass('active'); 
        $(e.target).addClass('active'); 
        $('.input-panel').removeClass('active'); 
        $('#'+id).addClass('active'); 
    };

    $('.dot').click(function() { 
        $('.dot').removeClass('active'); 
        $(this).addClass('active'); 
        selColor = $(this).data('c'); 
    });

    // --- CÁC NÚT LẬP QUẺ ---
    $('#btn-auto').click(() => { let n=Date.now(), p=n%1000, t=(n/7)%1000, d=n%6+1; Khiet.drawKhongThoi('canvas',p,t,d,180); });
    $('#btn-don').click(() => { Khiet.drawKhongThoi('canvas',$('#dp').val(),$('#dt').val(),null,180); });
    $('#btn-mai').click(() => { let p=parseFloat($('#mn').val()||0)+parseFloat($('#mth').val()||0)+parseFloat($('#mng').val()||0); Khiet.drawKhongThoiMaiHoa('canvas',p,180); });
    $('#btn-time').click(() => { 
        let p=parseFloat($('#tn').val()||0)+parseFloat($('#tth').val()||0)+parseFloat($('#tng').val()||0); 
        let t=p+parseFloat($('#tg').val()||0); 
        Khiet.drawKhongThoi('canvas',p,t,t,180); 
    });
    $('#btn-tim').click(() => { Khiet.drawKhongThoi('canvas',$('#tp').val(),$('#tt').val(),$('#td').val(),180); });

    // --- XUẤT ẢNH CHIA DÒNG 9-9 ---
    $('#btn-dl').click(function() {
        const svg = document.querySelector('#canvas svg');
        if(!svg) return alert("Chưa có quẻ!");
        
        let rawText = $.trim($('#qTxt').val()) || "KHÔNG CÓ CÂU HỎI";
        const line1 = rawText.substring(0, 9);
        const line2 = rawText.substring(9, 18);

        const svgData = new XMLSerializer().serializeToString(svg);
        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        const url = URL.createObjectURL(new Blob([svgData], {type:'image/svg+xml;charset=utf-8'}));

        img.onload = function() {
            const sc = 2, extraH = 140; 
            canvas.width = img.width * sc;
            canvas.height = (img.height + extraH) * sc;
            
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, img.width * sc, img.height * sc);
            
            ctx.fillStyle = selColor;
            ctx.font = `bold ${28 * sc}px Arial`;
            ctx.textAlign = "center";
            
            ctx.fillText(line1, canvas.width/2, (img.height + 50) * sc);
            if(line2) ctx.fillText(line2, canvas.width/2, (img.height + 95) * sc);

            const a = document.createElement("a");
            a.href = canvas.toDataURL("image/png");
            a.download = `QueDich_${Date.now()}.png`;
            a.click();
            URL.revokeObjectURL(url);
        };
        img.src = url;
    });
});
</script>
</body>
</html>
