<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>NguyenK - Kinh Dịch Pro (Dán Chữ 100%)</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #993300; --bg: #f4f5f7; }
        body { background: var(--bg); font-family: 'Lexend', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        
        .tabs { display: flex; background: #eee; padding: 5px; overflow-x: auto; }
        .tab-item { flex: 1; min-width: 80px; padding: 10px; text-align: center; cursor: pointer; border-radius: 10px; font-size: 11px; font-weight: 600; color: #636e72; }
        .tab-item.active { background: #fff; color: var(--primary); }

        .input-section { padding: 15px; }
        .input-panel { display: none; }
        .input-panel.active { display: block; }
        .input-group { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
        input { width: 55px; padding: 10px; border: 1.5px solid #ddd; border-radius: 10px; text-align: center; }
        .btn-main { background: var(--primary); color: #fff; width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }

        /* Question Box */
        .question-box { padding: 15px; border-top: 1px solid #eee; background: #fafafa; }
        textarea { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 10px; font-family: inherit; resize: none; box-sizing: border-box; }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; outline: 1px solid #ddd; }
        .dot.active { outline: 2px solid #000; }
        .btn-dl { background: #007aff; color: #fff; padding: 10px 20px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }

        .canvas-wrapper { width: 100%; overflow-x: auto; background: #fff; padding: 15px 0; border-top: 1px solid #eee; }
        #canvas { display: inline-block; min-width: 100%; text-align: center; }

        .luan-doan { padding: 15px; border-top: 8px solid #f4f5f7; }
        select { width: 100%; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        #ketQua { font-size: 14px; line-height: 1.6; white-space: pre-wrap; background: #f9f9f9; padding: 15px; border-radius: 15px; border: 1px solid #eee; }
    </style>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://sophiemeisam.github.io/saveSvgAsPng.js"></script>
    <script src="https://sophiemeisam.github.io/raphael.js"></script>
    <script src="https://sophiemeisam.github.io/khiet.js"></script>
</head>
<body>

<div class="container">
    <div class="tabs">
        <div class="tab-item active" onclick="switchTab(event, 'tab-auto')">CẢM ỨNG</div>
        <div class="tab-item" onclick="switchTab(event, 'tab-don')">ĐỘN</div>
        <div class="tab-item" onclick="switchTab(event, 'tab-mai')">MAI HOA</div>
        <div class="tab-item" onclick="switchTab(event, 'tab-time')">THỜI</div>
    </div>

    <div class="input-section">
        <div id="tab-auto" class="input-panel active"><button class="btn-main" id="btn-auto">GIEO CẢM ỨNG</button></div>
        <div id="tab-don" class="input-panel">
            <div class="input-group"><input type="text" id="dp" placeholder="P"><input type="text" id="dt" placeholder="T"></div>
            <button class="btn-main" id="btn-don">ĐỘN QUẺ</button>
        </div>
        <div id="tab-mai" class="input-panel">
            <div class="input-group"><input type="text" id="mn" placeholder="Năm"><input type="text" id="mth" placeholder="Tháng"><input type="text" id="mng" placeholder="Ngày"></div>
            <button class="btn-main" id="btn-mai">LẬP QUẺ MAI HOA</button>
        </div>
        <div id="tab-time" class="input-panel">
            <div class="input-group"><input type="text" id="tn"><input type="text" id="tth"><input type="text" id="tng"><input type="text" id="tg"></div>
            <button class="btn-main" id="btn-time">THỜI QUÁI</button>
        </div>
    </div>

    <div class="question-box">
        <textarea id="qText" rows="2" placeholder="Dán câu hỏi vào đây để đính lên ảnh..."></textarea>
        <div class="controls">
            <div style="display:flex; gap:10px;">
                <div class="dot active" style="background:#007aff" data-c="#007aff"></div>
                <div class="dot" style="background:#28a745" data-c="#28a745"></div>
                <div class="dot" style="background:#dc3545" data-c="#dc3545"></div>
            </div>
            <button class="btn-dl" id="btn-dl">💾 TẢI ẢNH</button>
        </div>
    </div>

    <div class="canvas-wrapper"><div id="canvas"></div></div>

    <div class="luan-doan">
        <select id="gSelect">
            <option value="">-- Luận Đoán Lực Quẻ --</option>
            <option value="1">Kiền</option><option value="2">Đoài</option><option value="3">Ly</option>
            <option value="4">Chấn</option><option value="5">Tốn</option><option value="6">Khảm</option>
            <option value="7">Cấn</option><option value="8">Khôn</option>
        </select>
        <div id="ketQua">Hãy lập quẻ để xem phân tích.</div>
    </div>
</div>

<script>
$(document).ready(function() {
    let qData = [], selColor = "#007aff";
    const hG = {1:'Kim',2:'Kim',3:'Hoả',4:'Mộc',5:'Mộc',6:'Thủy',7:'Thổ',8:'Thổ'};
    const nG = {1:'Kiền',2:'Đoài',3:'Ly',4:'Chấn',5:'Tốn',6:'Khảm',7:'Cấn',8:'Khôn'};

    window.switchTab = (e, id) => { $('.tab-item').removeClass('active'); $(e.target).addClass('active'); $('.input-panel').removeClass('active'); $('#'+id).addClass('active'); };
    $('.dot').click(function(){ $('.dot').removeClass('active'); $(this).addClass('active'); selColor = $(this).data('c'); });

    function upData(p,t,d) {
        if(typeof Khiet === 'undefined') return;
        const kt = Khiet.computeKhongThoi(p,t,d,true);
        qData = kt.map(x => ({ct:Khiet.getQuaiNumber(x.pChanh),ch:Khiet.getQuaiNumber(x.tChanh),ht:Khiet.getQuaiNumber(x.pHo),hh:Khiet.getQuaiNumber(x.tHo),bt:Khiet.getQuaiNumber(x.pBien),bh:Khiet.getQuaiNumber(x.tBien)}));
    }

    function fixDisplay() {
        const s = $('#canvas svg');
        if(s.length) {
            s.css({'min-width':'1150px','display':'block','margin':'0 auto'});
            $('.canvas-wrapper').scrollLeft(($('.canvas-wrapper')[0].scrollWidth - $('.canvas-wrapper').width())/2);
        }
    }

    // Các nút gieo quẻ
    $('#btn-auto').click(() => { let n=Date.now(), p=Math.floor(n%1000), t=Math.floor((n/7)%1000), d=Math.floor(n%6)+1; Khiet.drawKhongThoi('canvas',p,t,d,180); fixDisplay(); upData(p,t,d); });
    $('#btn-don').click(() => { let p=$('#dp').val(), t=$('#dt').val(); Khiet.drawKhongThoi('canvas',p,t,null,180); fixDisplay(); upData(p,t,null); });
    $('#btn-mai').click(() => { let n=parseFloat($('#mn').val())||0, th=parseFloat($('#mth').val())||0, ng=parseFloat($('#mng').val())||0; let p=n+th+ng; Khiet.drawKhongThoiMaiHoa('canvas',p,180); fixDisplay(); upData(p,null,null); });

    // HÀM TẢI ẢNH SIÊU CẤP (KHÔNG DÙNG CLONE)
    $('#btn-dl').click(function() {
        const svg = document.querySelector('#canvas svg');
        if(!svg) return alert("Hãy lập quẻ trước!");

        const qText = $.trim($('#qText').val());
        const filename = `QueDich_${Date.now()}.png`;

        // Gọi hàm từ thư viện nhưng xử lý callback cực kỳ cẩn thận
        saveSvgAsPng(svg, filename, {
            scale: 2,
            backgroundColor: "#ffffff",
            prepareSvg: function(svgCopy) {
                if (qText) {
                    const vb = svg.getAttribute('viewBox').split(' ');
                    const width = parseFloat(vb[2]);
                    const height = parseFloat(vb[3]);

                    // Nới rộng vùng nhìn của bản copy
                    svgCopy.setAttribute('viewBox', `${vb[0]} ${vb[1]} ${width} ${height + 100}`);
                    svgCopy.setAttribute('height', (height + 100) * 2);

                    // Tạo thẻ text đè lên ảnh
                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", width / 2);
                    text.setAttribute("y", height + 60);
                    text.setAttribute("text-anchor", "middle");
                    text.setAttribute("font-size", "32px");
                    text.setAttribute("font-weight", "bold");
                    text.setAttribute("font-family", "Arial, sans-serif");
                    text.setAttribute("fill", selColor);
                    text.textContent = "Hỏi: " + qText;
                    svgCopy.appendChild(text);
                }
            }
        });
    });

    // LUẬN ĐOÁN LỰC QUẺ (KHÔI PHỤC HOÀN TOÀN)
    $('#gSelect').change(function(){
        const sG = parseInt($(this).val());
        if(!sG || qData.length === 0) return;
        
        let benefit = 0, harm = 0;
        const sH = hG[sG];
        
        // Vòng lặp tính toán sinh khắc cho từng Không thời
        qData.forEach(d => {
            const positions = [d.ct, d.ch, d.ht, d.hh, d.bt, d.bh];
            positions.forEach(target => {
                if(target === sG) benefit += 10; // Trợ lực
                else if(hG[target] === sH) benefit += 5; // Cùng hành
            });
        });

        const total = benefit + 100; // Tránh chia cho 0
        const pB = ((benefit / total) * 100).toFixed(1);
        const pH = (100 - pB);

        $('#ketQua').html(`
            <b>Phân tích Quẻ ${nG[sG]} (${sH}):</b><br>
            - Sức mạnh nội tại: ${benefit} điểm.<br>
            - Tỷ lệ có lợi: <span style="color:green">${pB}%</span><br>
            - Tỷ lệ hao tổn: <span style="color:red">${pH}%</span><br>
            <div style="margin-top:10px; font-weight:bold; color:${pB > 50 ? 'green' : 'orange'}">
                => Kết luận: ${pB > 50 ? 'Quẻ đang đắc thế, rất tốt.' : 'Quẻ bình hòa, cần chờ thời.'}
            </div>
        `);
    });
});
</script>
</body>
</html>
