<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Kinh Dịch Pro - Fix Text 100%</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #993300; --bg: #f4f5f7; }
        body { background: var(--bg); font-family: 'Lexend', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .tabs { display: flex; background: #eee; padding: 5px; }
        .tab-item { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 10px; font-size: 12px; font-weight: 600; color: #636e72; }
        .tab-item.active { background: #fff; color: var(--primary); }
        .input-section { padding: 20px; }
        .input-panel { display: none; }
        .input-panel.active { display: block; }
        .btn-main { background: var(--primary); color: #fff; width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .question-box { padding: 15px 20px; background: #fafafa; border-top: 1px solid #eee; }
        textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-family: inherit; resize: none; box-sizing: border-box; }
        .dl-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; outline: 1px solid #ddd; }
        .dot.active { outline: 2px solid #000; }
        .btn-dl { background: #007aff; color: #fff; padding: 10px 20px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
        .canvas-wrapper { width: 100%; overflow-x: auto; background: #fff; padding: 20px 0; border-top: 1px solid #eee; }
        #canvas { display: inline-block; min-width: 100%; text-align: center; }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://sophiemeisam.github.io/saveSvgAsPng.js"></script>
    <script src="https://sophiemeisam.github.io/raphael.js"></script>
    <script src="https://sophiemeisam.github.io/khiet.js"></script>
</head>
<body>

<div class="container">
    <div class="tabs">
        <div class="tab-item active" onclick="switchTab(event, 'tab-auto')">CẢM ỨNG</div>
        <div class="tab-item" onclick="switchTab(event, 'tab-don')">ĐỘN</div>
    </div>
    <div class="input-section">
        <div id="tab-auto" class="input-panel active"><button class="btn-main" id="btn-auto">GIEO QUẺ</button></div>
        <div id="tab-don" class="input-panel">
            <div style="display:flex; gap:10px; margin-bottom:10px;"><input type="text" id="dp" style="width:50%; padding:10px;" placeholder="P"><input type="text" id="dt" style="width:50%; padding:10px;" placeholder="T"></div>
            <button class="btn-main" id="btn-don">ĐỘN QUẺ</button>
        </div>
    </div>
    <div class="question-box">
        <textarea id="qTxt" rows="2" placeholder="Nhập câu hỏi..."></textarea>
        <div class="dl-bar">
            <div style="display:flex; gap:10px;">
                <div class="dot active" style="background:#007aff" data-c="#007aff"></div>
                <div class="dot" style="background:#dc3545" data-c="#dc3545"></div>
            </div>
            <button class="btn-dl" id="btn-download">💾 TẢI ẢNH</button>
        </div>
    </div>
    <div class="canvas-wrapper"><div id="canvas"></div></div>
</div>

<script>
$(document).ready(function() {
    let selColor = "#007aff";
    window.switchTab = (e, id) => { $('.tab-item').removeClass('active'); $(e.target).addClass('active'); $('.input-panel').removeClass('active'); $('#'+id).addClass('active'); };
    $('.dot').click(function() { $('.dot').removeClass('active'); $(this).addClass('active'); selColor = $(this).data('c'); });

    // Gieo quẻ
    $('#btn-auto').click(() => { let n=Date.now(), p=n%1000, t=(n/7)%1000, d=n%6+1; Khiet.drawKhongThoi('canvas',p,t,d,180); });
    $('#btn-don').click(() => { let p=$('#dp').val(), t=$('#dt').val(); Khiet.drawKhongThoi('canvas',p,t,null,180); });

    // HÀM TẢI ẢNH QUAN TRỌNG NHẤT
    $('#btn-download').click(function() {
        const svg = document.querySelector('#canvas svg');
        if(!svg) return alert("Chưa có quẻ!");
        
        const qText = $.trim($('#qTxt').val());
        const filename = `QueDich_${Date.now()}.png`;

        saveSvgAsPng(svg, filename, {
            scale: 2,
            backgroundColor: "#ffffff",
            prepareSvg: function(svgCopy) {
                if (qText) {
                    // Lấy BBox để xác định tọa độ thực của hình vẽ
                    const bbox = svg.getBBox();
                    const extra = 120; // Khoảng trống cho chữ

                    // Ép lại ViewBox dựa trên nội dung thực tế để chữ không bị nằm ngoài
                    // Chúng ta lấy bbox.y (điểm cao nhất) đến bbox.height (độ dài nội dung) + extra
                    svgCopy.setAttribute('viewBox', `${bbox.x} ${bbox.y} ${bbox.width} ${bbox.height + extra}`);
                    svgCopy.setAttribute('width', bbox.width);
                    svgCopy.setAttribute('height', bbox.height + extra);

                    // Vẽ một hình chữ nhật trắng làm nền cho câu hỏi (tránh trùng lặp toạ độ)
                    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                    rect.setAttribute("x", bbox.x);
                    rect.setAttribute("y", bbox.y + bbox.height);
                    rect.setAttribute("width", bbox.width);
                    rect.setAttribute("height", extra);
                    rect.setAttribute("fill", "#ffffff");
                    svgCopy.appendChild(rect);

                    // Vẽ Text câu hỏi ngay dưới đáy của BBox
                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", bbox.x + (bbox.width / 2));
                    text.setAttribute("y", bbox.y + bbox.height + 70); // Cách đáy 70 đơn vị
                    text.setAttribute("text-anchor", "middle");
                    text.setAttribute("font-family", "Arial, sans-serif");
                    text.setAttribute("font-size", "36px");
                    text.setAttribute("font-weight", "bold");
                    text.setAttribute("fill", selColor);
                    text.textContent = "HỎI: " + qText;
                    svgCopy.appendChild(text);
                }
            }
        });
    });
});
</script>
</body>
</html>
