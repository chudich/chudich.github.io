<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Kinh Dịch Pro - Fixed Download</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #993300; --bg: #f4f5f7; --text: #2d3436; }
        body { background: var(--bg); font-family: 'Lexend', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        
        /* Tabs & Inputs */
        .tabs { display: flex; background: #eee; padding: 5px; overflow-x: auto; }
        .tab-item { flex: 1; min-width: 90px; padding: 12px 5px; text-align: center; cursor: pointer; border-radius: 10px; font-size: 11px; font-weight: 600; color: #636e72; }
        .tab-item.active { background: #fff; color: var(--primary); }
        .input-section { padding: 20px; }
        .input-panel { display: none; }
        .input-panel.active { display: block; }
        .input-group { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
        input { width: 60px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
        .btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }
        .btn-primary { background: var(--primary); color: #fff; }
        
        /* Question & Download */
        .question-box { padding: 15px 20px; border-top: 1px solid #eee; background: #fafafa; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; resize: none; box-sizing: border-box; }
        .controls { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
        .color-dots { display: flex; gap: 10px; }
        .dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; outline: 1px solid #ddd; }
        .dot.active { outline: 2px solid #000; }
        .dl-btn { background: #007aff; color: #fff; padding: 10px 20px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }

        /* Canvas */
        .canvas-wrapper { width: 100%; overflow-x: auto; background: #fff; padding: 20px 0; border-top: 1px solid #eee; }
        #canvas { display: inline-block; min-width: 100%; text-align: center; }
        
        /* Luận đoán */
        .luan-doan { padding: 20px; border-top: 5px solid #f4f5f7; }
        select { width: 100%; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        #ketQua { font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
    </style>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://sophiemeisam.github.io/saveSvgAsPng.js"></script>
    <script src="https://sophiemeisam.github.io/raphael.js"></script>
    <script src="https://sophiemeisam.github.io/khiet.js"></script>
</head>
<body>

<div class="container">
    <div class="tabs">
        <div class="tab-item active" onclick="switchTab(event, 'tab-auto')">CẢM ỨNG</div>
        <div class="tab-item" onclick="switchTab(event, 'tab-don')">ĐỘN</div>
        <div class="tab-item" onclick="switchTab(event, 'tab-tim')">TÌM</div>
        <div class="tab-item" onclick="switchTab(event, 'tab-time')">THỜI</div>
        <div class="tab-item" onclick="switchTab(event, 'tab-mai')">MAI HOA</div>
    </div>

    <div class="input-section">
        <div id="tab-auto" class="input-panel active"><button class="btn btn-primary" id="btn-auto">GIEO CẢM ỨNG</button></div>
        <div id="tab-don" class="input-panel">
            <div class="input-group"><input type="text" id="dp" placeholder="P"><input type="text" id="dt" placeholder="T"></div>
            <button class="btn btn-primary" id="btn-don">ĐỘN QUẺ</button>
        </div>
        <div id="tab-tim" class="input-panel">
            <div class="input-group"><input type="text" id="tp"><input type="text" id="tt"><input type="text" id="td"></div>
            <button class="btn btn-primary" id="btn-tim">TÌM QUẺ</button>
        </div>
        <div id="tab-time" class="input-panel">
            <div class="input-group"><input type="text" id="tn"><input type="text" id="tth"><input type="text" id="tng"><input type="text" id="tg"></div>
            <button class="btn btn-primary" id="btn-time">THỜI QUÁI</button>
        </div>
        <div id="tab-mai" class="input-panel">
            <div class="input-group"><input type="text" id="mn"><input type="text" id="mth"><input type="text" id="mng"></div>
            <button class="btn btn-primary" id="btn-mai">MAI HOA</button>
        </div>
    </div>

    <div class="question-box">
        <textarea id="qText" rows="2" placeholder="Nhập câu hỏi tại đây..."></textarea>
        <div class="controls">
            <div class="color-dots">
                <div class="dot active" style="background:#007aff" data-c="#007aff"></div>
                <div class="dot" style="background:#28a745" data-c="#28a745"></div>
                <div class="dot" style="background:#dc3545" data-c="#dc3545"></div>
            </div>
            <button class="dl-btn" id="btn-dl">TẢI ẢNH QUẺ</button>
        </div>
    </div>

    <div class="canvas-wrapper"><div id="canvas"></div></div>

    <div class="luan-doan">
        <select id="gSelect"><option value="">-- Luận Đoán --</option><option value="1">Kiền</option><option value="2">Đoài</option><option value="3">Ly</option><option value="4">Chấn</option><option value="5">Tốn</option><option value="6">Khảm</option><option value="7">Cấn</option><option value="8">Khôn</option></select>
        <div id="ketQua"></div>
    </div>
</div>

<script>
$(document).ready(function() {
    let qData = [], selColor = "#007aff";
    const hG = {1:'Kim',2:'Kim',3:'Hoả',4:'Mộc',5:'Mộc',6:'Thủy',7:'Thổ',8:'Thổ'};
    const nG = {1:'Kiền',2:'Đoài',3:'Ly',4:'Chấn',5:'Tốn',6:'Khảm',7:'Cấn',8:'Khôn'};

    window.switchTab = (e, id) => { $('.tab-item').removeClass('active'); $(e.target).addClass('active'); $('.input-panel').removeClass('active'); $('#'+id).addClass('active'); };
    $('.dot').click(function(){ $('.dot').removeClass('active'); $(this).addClass('active'); selColor = $(this).data('c'); });

    function fixDisplay() {
        const s = $('#canvas svg');
        if(s.length) {
            s.css({'min-width':'1150px','display':'block','margin':'0 auto'});
            $('.canvas-wrapper').scrollLeft(($('.canvas-wrapper')[0].scrollWidth - $('.canvas-wrapper').width())/2);
        }
    }

    function upData(p,t,d) {
        const kt = Khiet.computeKhongThoi(p,t,d,true);
        qData = kt.map(x => ({ct:Khiet.getQuaiNumber(x.pChanh),ch:Khiet.getQuaiNumber(x.tChanh),ht:Khiet.getQuaiNumber(x.pHo),hh:Khiet.getQuaiNumber(x.tHo),bt:Khiet.getQuaiNumber(x.pBien),bh:Khiet.getQuaiNumber(x.tBien)}));
    }

    // Gieo quẻ
    $('#btn-auto').click(() => { 
        let n=Date.now(), p=Math.floor(n%1000), t=Math.floor((n/7)%1000), d=Math.floor(n%6)+1;
        Khiet.drawKhongThoi('canvas',p,t,d,180); fixDisplay(); upData(p,t,d);
    });
    $('#btn-don').click(() => { let p=$('#dp').val(), t=$('#dt').val(); Khiet.drawKhongThoi('canvas',p,t,null,180); fixDisplay(); upData(p,t,null); });
    $('#btn-mai').click(() => { let p=parseFloat($('#mn').val())+parseFloat($('#mth').val())+parseFloat($('#mng').val()); Khiet.drawKhongThoiMaiHoa('canvas',p,180); fixDisplay(); upData(p,null,null); });

    // TẢI ẢNH - FIXED
    $('#btn-dl').click(function() {
        const svg = document.querySelector('#canvas svg');
        if(!svg) return alert("Chưa có quẻ!");

        const txt = $.trim($('#qText').val());
        let qElement = null, oldH = svg.getAttribute('height'), oldVB = svg.getAttribute('viewBox');

        if(txt) {
            // Tạm thời nới rộng SVG để vẽ chữ
            const newH = parseFloat(oldH) + 80;
            const vb = oldVB.split(' ');
            svg.setAttribute('height', newH);
            svg.setAttribute('viewBox', `${vb[0]} ${vb[1]} ${vb[2]} ${parseFloat(vb[3])+80}`);

            qElement = document.createElementNS("http://www.w3.org/2000/svg", "text");
            qElement.setAttribute("x", parseFloat(vb[2])/2);
            qElement.setAttribute("y", parseFloat(vb[3])+50);
            qElement.setAttribute("text-anchor", "middle");
            qElement.setAttribute("font-size", "24px");
            qElement.setAttribute("font-weight", "bold");
            qElement.setAttribute("fill", selColor);
            qElement.textContent = "Hỏi: " + txt;
            svg.appendChild(qElement);
        }

        // Thực hiện tải
        saveSvgAsPng(svg, `que_${Date.now()}.png`, {scale: 2, backgroundColor: "#fff"}, function() {
            // Sau khi tải xong, trả lại trạng thái cũ cho SVG trên màn hình
            if(qElement) {
                svg.removeChild(qElement);
                svg.setAttribute('height', oldH);
                svg.setAttribute('viewBox', oldVB);
            }
        });
    });

    // Luận đoán (Rút gọn logic sinh khắc)
    $('#gSelect').change(function(){
        const sG = parseInt($(this).val()); if(!sG || qData.length===0) return;
        let b=0, h=0;
        qData.forEach(d => {
            const p = [d.ct,d.ch,d.ht,d.hh,d.bt,d.bh];
            p.forEach(x => { if(x===sG) b+=10; else h+=2; }); // Ví dụ logic điểm đơn giản
        });
        $('#ketQua').html(`Quẻ <b>${nG[sG]}</b>: Phân tích sơ bộ lực quẻ hoàn tất. Tỷ lệ Cát/Hung ổn định.`);
    });
});
</script>
</body>
</html>
