<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>NguyenK - Kinh Dịch Pro (Câu Hỏi)</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #993300; --secondary: #28a745; --accent: #ff8000;
            --bg: #f4f5f7; --card-bg: #ffffff; --text: #2d3436;
        }
        body { background: var(--bg); font-family: 'Lexend', sans-serif; margin: 0; padding: 10px; color: var(--text); }
        .container { max-width: 800px; margin: 0 auto; background: var(--card-bg); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        
        /* Banner & Tabs */
        .banner { position: relative; }
        .banner img { width: 100%; height: auto; display: block; }
        .home-btn { position: absolute; top: 15px; left: 15px; background: rgba(255,128,0,0.9); color: #fff; text-decoration: none; padding: 8px 16px; border-radius: 50px; font-size: 12px; font-weight: 600; backdrop-filter: blur(4px); }
        
        .tabs { display: flex; background: #eee; padding: 5px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .tab-item { flex: 1; min-width: 90px; padding: 12px 5px; text-align: center; cursor: pointer; border-radius: 12px; font-size: 11px; font-weight: 600; color: #636e72; transition: 0.3s; white-space: nowrap; }
        .tab-item.active { background: #fff; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* Input Area */
        .input-section { padding: 20px; }
        .input-panel { display: none; animation: fadeIn 0.4s ease; }
        .input-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .input-group { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        input[type="text"] { width: 65px; padding: 12px 5px; border: 1.5px solid #dfe6e9; border-radius: 10px; text-align: center; font-size: 16px; outline: none; }
        .btn { border: none; padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; width: 100%; margin-top: 5px; }
        .btn-cam-ung { width: 100%; padding: 20px; font-size: 18px; background: linear-gradient(135deg, #28a745, #1e7e34); color: white; border-radius: 15px; border: none; box-shadow: 0 8px 20px rgba(40,167,69,0.2); }

        /* KHU VỰC CÂU HỎI & TẢI ẢNH (NEW) */
        .question-section { padding: 15px 20px; background: #fdfdfd; border-top: 1px solid #eee; }
        #txtQuestion { width: 100%; padding: 12px; border: 1.5px solid #dfe6e9; border-radius: 10px; font-family: inherit; font-size: 14px; resize: none; box-sizing: border-box; }
        
        .color-picker { display: flex; gap: 10px; margin: 10px 0; justify-content: center; align-items: center; font-size: 13px;}
        .color-dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: #000; transform: scale(1.1); }
        
        .download-btn { background: #007aff; color: white; padding: 12px 25px; border-radius: 50px; font-size: 14px; font-weight: bold; cursor: pointer; border: none; margin: 0 auto; display: block; box-shadow: 0 4px 10px rgba(0,122,255,0.3); }

        /* Canvas - Hiển thị Quẻ */
        .canvas-wrapper { width: 100%; background: #fff; border-top: 1px solid #eee; overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 20px 0; }
        #canvas { display: inline-block; min-width: 100%; text-align: center; }
        #canvas svg { display: block; margin: 0 auto; }

        /* Luận Đoán */
        .luan-doan-section { padding: 20px; border-top: 8px solid #f4f5f7; }
        #guaSelect { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid #dfe6e9; margin-bottom: 15px; font-size: 15px; }
        #ketQua { background: #fcfcfc; padding: 18px; border-radius: 15px; font-size: 14px; border: 1px solid #eee; white-space: pre-wrap; line-height: 1.8; }
        .ket-luan-highlight { display: block; margin-top: 15px; padding: 12px; background: #e1f5fe; color: #0288d1; border-radius: 10px; font-weight: bold; text-align: center; font-size: 16px; border: 1px dashed #0288d1; }
        
        .history-list { display: flex; gap: 8px; overflow-x: auto; padding: 15px; list-style: none; margin: 0; border-top: 1px solid #eee; }
        .history-list li { flex: 0 0 auto; background: #f1f2f6; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; }
    </style>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://sophiemeisam.github.io/saveSvgAsPng.js"></script>
    <script src="https://sophiemeisam.github.io/raphael.js"></script>
    <script src="https://sophiemeisam.github.io/khiet.js"></script>
</head>
<body>

<div class="container">
    <div class="banner">
        <img src="https://sophiemeisam.github.io/bannerlienhoa.jpg" alt="Banner">
        <a href="https://chudich.github.io/IChing.html" class="home-btn">← Trang Chủ</a>
    </div>

    <div class="tabs">
        <div class="tab-item active" onclick="switchTab(event, 'tab-auto')">CẢM ỨNG</div>
        <div class="tab-item" onclick="switchTab(event, 'tab-don')">ĐỘN QUÁI</div>
        <div class="tab-item" onclick="switchTab(event, 'tab-tim')">TÌM QUÁI</div>
        <div class="tab-item" onclick="switchTab(event, 'tab-time')">THỜI QUÁI</div>
        <div class="tab-item" onclick="switchTab(event, 'tab-maihoa')">MAI HOA</div>
    </div>

    <div class="input-section">
        <div id="tab-auto" class="input-panel active" style="text-align:center">
            <button class="btn-cam-ung" id="btn-auto-gieo">GIEO QUẺ CẢM ỨNG</button>
        </div>
        <div id="tab-don" class="input-panel">
            <div class="input-group">
                <input type="text" id="don-phai" placeholder="PHẢI">
                <input type="text" id="don-trai" placeholder="TRÁI">
            </div>
            <button class="btn btn-primary" id="btn-don-exec">ĐỘN QUẺ</button>
        </div>
        <div id="tab-tim" class="input-panel">
            <div class="input-group">
                <input type="text" id="tim-phai" placeholder="THƯỢNG">
                <input type="text" id="tim-trai" placeholder="HẠ">
                <input type="text" id="tim-dong" placeholder="ĐỘNG">
            </div>
            <button class="btn btn-primary" id="btn-tim-exec">TÌM QUẺ</button>
        </div>
        <div id="tab-time" class="input-panel">
            <div class="input-group">
                <input type="text" id="t-nam" placeholder="NĂM">
                <input type="text" id="t-thang" placeholder="THÁNG">
                <input type="text" id="t-ngay" placeholder="NGÀY">
                <input type="text" id="t-gio" placeholder="GIỜ">
            </div>
            <button class="btn btn-primary" id="btn-time-exec">TÍNH THỜI QUÁI</button>
        </div>
        <div id="tab-maihoa" class="input-panel">
            <div class="input-group">
                <input type="text" id="m-nam" placeholder="NĂM">
                <input type="text" id="m-thang" placeholder="THÁNG">
                <input type="text" id="m-ngay" placeholder="NGÀY">
            </div>
            <button class="btn btn-primary" id="btn-maihoa-exec">LẬP QUẺ MAI HOA</button>
        </div>
    </div>

    <div class="question-section">
        <textarea id="txtQuestion" rows="2" placeholder="Nhập câu hỏi khi xin quẻ tại đây (nội dung này sẽ đính vào ảnh tải về)..."></textarea>
        
        <div class="color-picker">
            <span>Màu chữ câu hỏi: </span>
            <div class="color-dot active" style="background:#007aff" data-color="#007aff"></div> <div class="color-dot" style="background:#28a745" data-color="#28a745"></div> <div class="color-dot" style="background:#dc3545" data-color="#dc3545"></div> </div>

        <button class="download-btn" id="btn-download">💾 TẢI ẢNH QUẺ CÓ CÂU HỎI</button>
    </div>

    <div class="canvas-wrapper">
        <div id="canvas"></div>
    </div>

    <div class="luan-doan-section">
        <h4 style="margin:0 0 10px 0">Luận Đoán Lực Quẻ</h4>
        <select id="guaSelect">
            <option value="">-- Chọn Quẻ Đơn Để Luận --</option>
            <option value="1">Kiền (Kim)</option><option value="2">Đoài (Kim)</option>
            <option value="3">Ly (Hoả)</option><option value="4">Chấn (Mộc)</option>
            <option value="5">Tốn (Mộc)</option><option value="6">Khảm (Thủy)</option>
            <option value="7">Cấn (Thổ)</option><option value="8">Khôn (Thổ)</option>
        </select>
        <div id="ketQua">Chọn quẻ đơn để xem phân tích % lợi hại...</div>
    </div>

    <ul id="history-list" class="history-list"></ul>
</div>

<script>
$(document).ready(function() {
    // --- DATA & RULE (Giữ nguyên thuật toán của bạn) ---
    const hanhOfGua = { 1: 'Kim', 2: 'Kim', 3: 'Hoả', 4: 'Mộc', 5: 'Mộc', 6: 'Thủy', 7: 'Thổ', 8: 'Thổ' };
    const guaName = { 1: 'Kiền', 2: 'Đoài', 3: 'Ly', 4: 'Chấn', 5: 'Tốn', 6: 'Khảm', 7: 'Cấn', 8: 'Khôn' };
    const sinhRule = { 'Kim': 'Thủy', 'Hoả': 'Thổ', 'Mộc': 'Hoả', 'Thủy': 'Mộc', 'Thổ': 'Kim' };
    const khacRule = { 'Kim': 'Mộc', 'Hoả': 'Kim', 'Mộc': 'Thổ', 'Thủy': 'Hoả', 'Thổ': 'Thủy' };
    let queData = [], currentNumKhongThoi = 13;
    let selectedQuestionColor = "#007aff"; // Mặc định xanh dương

    function isSinh(src,tgt){ return sinhRule[src]===tgt; }
    function isKhac(src,tgt){ return khacRule[src]===tgt; }

    // --- UI FUNCTIONS ---
    window.switchTab = function(e, tabId) {
        $('.tab-item').removeClass('active');
        $(e.target).addClass('active');
        $('.input-panel').removeClass('active');
        $('#' + tabId).addClass('active');
    };

    function fixSvgDisplay() {
        const $svg = $('#canvas svg');
        if ($svg.length) {
            $svg.css({'min-width': '1150px', 'display': 'block', 'margin': '0 auto'});
            const scrollPos = ($('.canvas-wrapper')[0].scrollWidth - $('.canvas-wrapper').width()) / 2;
            $('.canvas-wrapper').scrollLeft(scrollPos);
        }
    }

    function updateQueData(phai, trai, dong) {
        phai = parseFloat(phai); trai = parseFloat(trai) || phai; dong = parseFloat(dong) || (phai + trai);
        if (typeof Khiet === 'undefined') return;
        const ktArray = Khiet.computeKhongThoi(phai, trai, dong, true);
        queData = ktArray.map(kt => ({
            chuThuong: Khiet.getQuaiNumber(kt.pChanh), chuHa: Khiet.getQuaiNumber(kt.tChanh),
            hoThuong: Khiet.getQuaiNumber(kt.pHo), hoHa: Khiet.getQuaiNumber(kt.tHo),
            bienThuong: Khiet.getQuaiNumber(kt.pBien), bienHa: Khiet.getQuaiNumber(kt.tBien)
        }));
        currentNumKhongThoi = ktArray.length;
    }

    // --- XỬ LÝ MÀU SẮC (NEW) ---
    $('.color-dot').click(function() {
        $('.color-dot').removeClass('active');
        $(this).addClass('active');
        selectedQuestionColor = $(this).data('color');
    });

    // --- XỬ LÝ TẢI ẢNH CÓ ĐÍNH CÂU HỎI (NEW - IMPORTANT) ---
    $('#btn-download').click(function() {
        const $svgElement = $('#canvas svg');
        if (!$svgElement.length) return alert("Chưa có quẻ để tải!");

        // 1. Tạo bản sao của SVG để không làm hỏng hiển thị gốc
        const $svgCopy = $svgElement.clone();
        const svgDom = $svgCopy[0];
        
        // 2. Lấy nội dung câu hỏi
        const questionText = $.trim($('#txtQuestion').val());
        if (!questionText) {
            // Nếu không có câu hỏi, tải ảnh bình thường
            saveSvgAsPng($svgElement[0], `que_${Date.now()}.png`, { scale: 2, backgroundColor: '#fff' });
            return;
        }

        // 3. LOGIC NỐI DÀI SVG VÀ VẼ CÂU HỎI
        const currentWidth = parseFloat(svgDom.getAttribute('width'));
        const currentHeight = parseFloat(svgDom.getAttribute('height'));
        const paddingBottom = 80; // Khoảng trống thêm vào phía dưới (pixel)
        
        // Mở rộng ViewBox và Height
        svgDom.setAttribute('height', currentHeight + paddingBottom);
        const viewBox = svgDom.getAttribute('viewBox').split(' ');
        const vbWidth = parseFloat(viewBox[2]);
        const vbHeight = parseFloat(viewBox[3]);
        svgDom.setAttribute('viewBox', `${viewBox[0]} ${viewBox[1]} ${vbWidth} ${vbHeight + paddingBottom}`);

        // Vẽ nền trắng cho phần mở rộng
        const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.setAttribute("x", viewBox[0]);
        rect.setAttribute("y", vbHeight); // Bắt đầu từ đáy cũ
        rect.setAttribute("width", vbWidth);
        rect.setAttribute("height", paddingBottom);
        rect.setAttribute("fill", "#ffffff");
        svgDom.prepend(rect); // Đưa xuống dưới cùng

        // Vẽ thẻ Text chứa câu hỏi
        const textElement = document.createElementNS("http://www.w3.org/2000/svg", "text");
        textElement.setAttribute("x", vbWidth / 2); // Căn giữa theo chiều ngang
        textElement.setAttribute("y", vbHeight + (paddingBottom / 2) + 10); // Đặt giữa khoảng trống mới
        textElement.setAttribute("text-anchor", "middle"); // Căn giữa chữ
        textElement.setAttribute("font-family", "'Lexend', sans-serif");
        textElement.setAttribute("font-size", "28px"); // Chữ to, đậm dễ nhìn trên ảnh scale x2
        textElement.setAttribute("font-weight", "bold");
        textElement.setAttribute("fill", selectedQuestionColor);
        textElement.textContent = "Hỏi: " + questionText;
        
        svgDom.appendChild(textElement);

        // 4. Tải bản sao SVG đã được chỉnh sửa
        saveSvgAsPng(svgDom, `que_cauhoi_${Date.now()}.png`, { scale: 2, backgroundColor: '#fff' });
    });

    // --- XỬ LÝ SỰ KIỆN GIEO QUẺ ---
    $('#btn-auto-gieo').click(function() {
        const now = Date.now(), seed = Math.random() * 500;
        const phai = Math.floor((now % 1000) + seed);
        const trai = Math.floor(((now / 7) % 1000));
        const dong = Math.floor((now % 6) + 1);
        Khiet.drawKhongThoi('canvas', phai, trai, dong, 180);
        fixSvgDisplay(); updateQueData(phai, trai, dong);
    });

    $('#btn-don-exec').click(function() {
        const p = $('#don-phai').val(), t = $('#don-trai').val();
        Khiet.drawKhongThoi('canvas', p, t, null, 180);
        fixSvgDisplay(); updateQueData(p, t, null);
    });

    $('#btn-tim-exec').click(function() {
        const p = $('#tim-phai').val(), t = $('#tim-trai').val(), d = $('#tim-dong').val();
        Khiet.drawKhongThoi('canvas', p, t, d, 180);
        fixSvgDisplay(); updateQueData(p, t, d);
    });

    $('#btn-time-exec').click(function() {
        const n = parseFloat($('#t-nam').val()), th = parseFloat($('#t-thang').val()), ng = parseFloat($('#t-ngay').val()), g = parseFloat($('#t-gio').val());
        const phai = n + th + ng, trai = phai + g, dong = trai;
        Khiet.drawKhongThoi('canvas', phai, trai, dong, 180);
        fixSvgDisplay(); updateQueData(phai, trai, dong);
    });

    $('#btn-maihoa-exec').click(function() {
        const n = parseFloat($('#m-nam').val()), th = parseFloat($('#m-thang').val()), ng = parseFloat($('#m-ngay').val());
        const phai = n + th + ng;
        Khiet.drawKhongThoiMaiHoa('canvas', phai, 180);
        fixSvgDisplay(); updateQueData(phai, null, null);
    });

    // --- THUẬT TOÁN LUẬN ĐOÁN (Giữ nguyên) ---
    $('#guaSelect').change(function() {
        const selectedGua = parseInt($(this).val());
        if (!selectedGua || queData.length === 0) { $('#ketQua').text('Chưa có quẻ.'); return; }
        const selectedHanh = hanhOfGua[selectedGua];
        const sinhCounts = {1:0}, khacCounts = {1:0}, troCounts = {1:0}, tieuCounts = {1:0}, haoCounts = {1:0};

        for (let kt = 0; kt < currentNumKhongThoi; kt++) {
            const kd = queData[kt];
            const posGua = {1: kd.chuThuong, 2: kd.chuHa, 3: kd.hoThuong, 4: kd.hoHa, 5: kd.bienThuong, 6: kd.bienHa};
            for (let pos = 1; pos <= 6; pos++) {
                const tgtGua = posGua[pos];
                for (let src = 1; src <= 6; src++) {
                    if (src === pos) continue;
                    const srcGua = posGua[src]; if (!srcGua || !tgtGua) continue;
                    const srcHanh = hanhOfGua[srcGua], tgtHanh = hanhOfGua[tgtGua];
                    if (tgtGua === selectedGua) {
                        if (isSinh(srcHanh, tgtHanh)) sinhCounts[1]++;
                        if (isKhac(srcHanh, tgtHanh)) khacCounts[1]++;
                        if (srcHanh === tgtHanh) troCounts[1]++;
                    }
                    if (srcGua === selectedGua) {
                        if (isSinh(srcHanh, tgtHanh)) tieuCounts[1]++;
                        if (isKhac(srcHanh, tgtHanh)) haoCounts[1]++;
                    }
                }
            }
        }
        let benefitScore = (sinhCounts[1]*5) + (troCounts[1]*7.5), harmScore = (khacCounts[1]*5) + (tieuCounts[1]*3) + (haoCounts[1]*2);
        const total = benefitScore + harmScore;
        const pctB = total > 0 ? (benefitScore/total*100).toFixed(2) : 0, pctH = total > 0 ? (harmScore/total*100).toFixed(2) : 0;
        let html = `<b>Luận cho: ${guaName[selectedGua]} (${selectedHanh})</b>\nTổng hợp qua ${currentNumKhongThoi} Không thời:\n- Lợi thế (Sinh/Trợ): ${benefitScore.toFixed(1)} điểm\n- Bất lợi (Khắc/Hao): ${harmScore.toFixed(1)} điểm\n\nTỷ lệ: <span style="color:green">Có lợi ${pctB}%</span> - <span style="color:red">Có hại ${pctH}%</span>`;
        let kl = benefitScore > harmScore * 1.05 ? "Kết luận: Cát (Lợi chiếm ưu thế)." : (harmScore > benefitScore * 1.05 ? "Kết luận: Hung (Cần thận trọng)." : "Kết luận: Bình hòa.");
        $('#ketQua').html(html + `<span class="ket-luan-highlight">${kl}</span>`);
    });
});
</script>
</body>
</html>
