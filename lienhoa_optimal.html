<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Kinh Dịch Pro - Bản Xuất Ảnh Canvas</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #993300; --bg: #f4f5f7; }
        body { background: var(--bg); font-family: 'Lexend', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .tabs { display: flex; background: #eee; padding: 5px; }
        .tab-item { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 10px; font-size: 12px; font-weight: 600; color: #636e72; }
        .tab-item.active { background: #fff; color: var(--primary); }
        .input-section { padding: 20px; }
        .input-panel { display: none; }
        .input-panel.active { display: block; }
        .btn-main { background: var(--primary); color: #fff; width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .question-box { padding: 15px 20px; background: #fafafa; border-top: 1px solid #eee; }
        textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-family: inherit; resize: none; box-sizing: border-box; font-size: 15px; }
        .dl-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid #fff; outline: 1px solid #ddd; }
        .dot.active { outline: 2px solid #000; }
        .btn-dl { background: #007aff; color: #fff; padding: 12px 25px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
        .canvas-wrapper { width: 100%; overflow-x: auto; background: #fff; padding: 20px 0; border-top: 1px solid #eee; }
        #canvas { display: inline-block; min-width: 100%; text-align: center; }
        canvas#hiddenCanvas { display: none; } /* Canvas ẩn để xử lý ảnh */
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://sophiemeisam.github.io/raphael.js"></script>
    <script src="https://sophiemeisam.github.io/khiet.js"></script>
</head>
<body>

<div class="container">
    <div class="tabs">
        <div class="tab-item active" onclick="switchTab(event, 'tab-auto')">CẢM ỨNG</div>
        <div class="tab-item" onclick="switchTab(event, 'tab-don')">ĐỘN</div>
    </div>
    <div class="input-section">
        <div id="tab-auto" class="input-panel active"><button class="btn-main" id="btn-auto">GIEO QUẺ</button></div>
        <div id="tab-don" class="input-panel">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <input type="text" id="dp" style="width:50%; padding:10px; border-radius:8px; border:1px solid #ddd;" placeholder="Phải">
                <input type="text" id="dt" style="width:50%; padding:10px; border-radius:8px; border:1px solid #ddd;" placeholder="Trái">
            </div>
            <button class="btn-main" id="btn-don">ĐỘN QUẺ</button>
        </div>
    </div>
    <div class="question-box">
        <textarea id="qTxt" rows="2" placeholder="Nhập câu hỏi tại đây..."></textarea>
        <div class="dl-bar">
            <div style="display:flex; gap:12px;">
                <div class="dot active" style="background:#007aff" data-c="#007aff"></div>
                <div class="dot" style="background:#dc3545" data-c="#dc3545"></div>
                <div class="dot" style="background:#28a745" data-c="#28a745"></div>
            </div>
            <button class="btn-dl" id="btn-download">💾 TẢI ẢNH</button>
        </div>
    </div>
    <div class="canvas-wrapper"><div id="canvas"></div></div>
</div>

<canvas id="hiddenCanvas"></canvas>

<script>
$(document).ready(function() {
    let selColor = "#007aff";
    window.switchTab = (e, id) => { 
        $('.tab-item').removeClass('active'); $(e.target).addClass('active'); 
        $('.input-panel').removeClass('active'); $('#'+id).addClass('active'); 
    };
    $('.dot').click(function() { 
        $('.dot').removeClass('active'); $(this).addClass('active'); 
        selColor = $(this).data('c'); 
    });

    $('#btn-auto').click(() => { 
        let n=Date.now(), p=n%1000, t=(n/7)%1000, d=n%6+1; 
        Khiet.drawKhongThoi('canvas',p,t,d,180); 
    });
    $('#btn-don').click(() => { 
        let p=$('#dp').val(), t=$('#dt').val(); 
        Khiet.drawKhongThoi('canvas',p,t,null,180); 
    });

    // HÀM TẢI ẢNH BẰNG CANVAS THUẦN (100% HIỆN CHỮ)
    $('#btn-download').click(function() {
        const svgElement = document.querySelector('#canvas svg');
        if(!svgElement) return alert("Chưa có quẻ!");
        
        const qText = "HỎI: " + $.trim($('#qTxt').val());
        const svgData = new XMLSerializer().serializeToString(svgElement);
        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d');
        
        const img = new Image();
        const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
        const url = URL.createObjectURL(svgBlob);

        img.onload = function() {
            // 1. Tính toán kích thước
            const scale = 2; // Tăng độ nét
            const extraH = 100; // Khoảng trống cho chữ
            canvas.width = img.width * scale;
            canvas.height = (img.height + extraH) * scale;

            // 2. Vẽ nền trắng
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 3. Vẽ bảng quẻ
            ctx.drawImage(img, 0, 0, img.width * scale, img.height * scale);

            // 4. Vẽ chữ câu hỏi (Dùng Canvas Text)
            ctx.fillStyle = selColor;
            ctx.font = `bold ${32 * scale}px Lexend, Arial`;
            ctx.textAlign = "center";
            ctx.fillText(qText, canvas.width / 2, (img.height + 60) * scale);

            // 5. Xuất ảnh
            const pngUrl = canvas.toDataURL("image/png");
            const downloadLink = document.createElement("a");
            downloadLink.href = pngUrl;
            downloadLink.download = `QueDich_${Date.now()}.png`;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            
            URL.revokeObjectURL(url);
        };
        img.src = url;
    });
});
</script>
</body>
</html>
