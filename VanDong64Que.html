<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>64 Xu Hướng Vận Động - Khoa Học Dịch Lý</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 40px 0;
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            color: white;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .search-box {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-bottom: 30px;
            outline: none;
            transition: 0.3s;
        }
        .search-box:focus { border-color: var(--accent); }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            border-left: 5px solid var(--primary);
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .card h3 {
            margin: 0 0 10px 0;
            color: var(--accent);
            font-size: 1.1rem;
        }
        .card .trend-text {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 8px;
            display: block;
        }
        .card .desc {
            font-size: 0.85rem;
            color: #666;
        }
        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            font-size: 0.9rem;
            color: #888;
        }
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

        </div>

    const grid = document.getElementById('mainGrid');
    const searchInput = document.getElementById('searchInput');

    function displayData(filter = "") {
        grid.innerHTML = "";
        const filtered = data.filter(item => 
            item.name.toLowerCase().includes(filter.toLowerCase()) || 
            item.trend.toLowerCase().includes(filter.toLowerCase()) ||
            item.desc.toLowerCase().includes(filter.toLowerCase())
        );

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h3>${item.id}. ${item.name}</h3>
                <span class="trend-text">Xu hướng: ${item.trend}</span>
                <p class="desc">${item.desc}</p>
            `;
            grid.appendChild(card);
        });
    }

    searchInput.addEventListener('input', (e) => displayData(e.target.value));
    displayData();
