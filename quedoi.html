<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm Quẻ Đối - Kinh Dịch</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; }
        h2 { color: #333; margin-bottom: 1.5rem; }
        .select-group { display: flex; gap: 20px; margin-bottom: 20px; justify-content: center; }
        .menu-item { flex: 1; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 16px; cursor: pointer; }
        #result-box { margin-top: 20px; padding: 20px; border: 2px dashed #3498db; border-radius: 8px; background-color: #ebf5fb; min-height: 80px; }
        .res-title { font-size: 14px; color: #7f8c8d; margin: 0; }
        .res-value { font-size: 24px; font-weight: bold; color: #2c3e50; margin-top: 10px; }
        .highlight { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h2>Tra Cứu Quẻ Đối</h2>
    
    <div class="select-group">
        <div class="menu-item">
            <label for="thuong">Quẻ Thượng</label>
            <select id="thuong" onchange="timQueDoi()">
                <option value="">-- Chọn --</option>
                <option value="Kiền">Kiền (Trời)</option>
                <option value="Đoài">Đoài (Đầm)</option>
                <option value="Ly">Ly (Lửa)</option>
                <option value="Chấn">Chấn (Sấm)</option>
                <option value="Tốn">Tốn (Gió)</option>
                <option value="Khảm">Khảm (Nước)</option>
                <option value="Cấn">Cấn (Núi)</option>
                <option value="Khôn">Khôn (Đất)</option>
            </select>
        </div>

        <div class="menu-item">
            <label for="ha">Quẻ Hạ</label>
            <select id="ha" onchange="timQueDoi()">
                <option value="">-- Chọn --</option>
                <option value="Kiền">Kiền (Trời)</option>
                <option value="Đoài">Đoài (Đầm)</option>
                <option value="Ly">Ly (Lửa)</option>
                <option value="Chấn">Chấn (Sấm)</option>
                <option value="Tốn">Tốn (Gió)</option>
                <option value="Khảm">Khảm (Nước)</option>
                <option value="Cấn">Cấn (Núi)</option>
                <option value="Khôn">Khôn (Đất)</option>
            </select>
        </div>
    </div>

    <div id="result-box">
        <p class="res-title">Cặp quẻ đối tương ứng:</p>
        <div id="result" class="res-value">Hãy chọn đủ 2 quẻ</div>
    </div>
</div>

<script>
    // Định nghĩa bảng tra cứu cặp đối
    const capDoi = {
        "Kiền": "Khôn",
        "Khôn": "Kiền",
        "Đoài": "Cấn",
        "Cấn": "Đoài",
        "Ly": "Khảm",
        "Khảm": "Ly",
        "Chấn": "Tốn",
        "Tốn": "Chấn"
    };

    function timQueDoi() {
        const thuong = document.getElementById("thuong").value;
        const ha = document.getElementById("ha").value;
        const resultDiv = document.getElementById("result");

        if (thuong && ha) {
            const doiThuong = capDoi[thuong];
            const doiHa = capDoi[ha];
            
            resultDiv.innerHTML = `
                <span class="highlight">${doiThuong}</span> trên 
                <span class="highlight">${doiHa}</span>
            `;
        } else {
            resultDiv.innerText = "Hãy chọn đủ 2 quẻ";
        }
    }
</script>

</body>
</html>
