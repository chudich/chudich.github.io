<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STM - TẬP QUẺ & TẢI ẢNH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --dark-blue: #004a99; --accent: #ff3b30; --bg: #f0f2f5; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        
        .input-group { width: 95%; max-width: 500px; margin-top: 15px; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1rem; }

        .main-btn { 
            width: 95%; max-width: 500px; padding: 18px; background: var(--dark-blue); color: white; 
            border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; margin: 15px 0;
            box-shadow: 0 5px 15px rgba(0,74,153,0.3); cursor: pointer;
        }

        .download-btn {
            width: 95%; max-width: 500px; padding: 12px; background: #28a745; color: white;
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 20px; display: none;
        }

        /* Vùng sẽ chụp ảnh */
        #capture-area { 
            width: 95%; max-width: 550px; display: none; flex-direction: column; gap: 15px; 
            background: var(--bg); padding: 15px; border-radius: 10px;
        }
        
        .que-display { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        
        .que-name { font-size: 1.2rem; font-weight: 800; color: var(--dark-blue); margin: 10px 0; height: 2.5em; display: flex; align-items: center; justify-content: center; }
        .bin-info { font-family: monospace; font-size: 0.8rem; background: #eee; padding: 4px; border-radius: 5px; }

        .hexagram { display: flex; flex-direction: column; gap: 8px; align-items: center; margin: 15px 0; }
        .line { width: 90px; height: 10px; background-color: var(--dark-blue); border-radius: 2px; position: relative; }
        .line.broken { 
            background: linear-gradient(to right, var(--dark-blue) 43%, transparent 43%, transparent 57%, var(--dark-blue) 57%);
        }
        
        .line.moving::after { 
            content: "●"; position: absolute; right: -18px; color: var(--accent); font-size: 14px; top: 50%; transform: translateY(-50%);
        }

        .summary-card { background: white; padding: 15px; border-radius: 15px; border-left: 5px solid var(--accent); }
        .moving-list { color: var(--accent); font-weight: bold; }
        .q-text { font-style: italic; color: #333; margin-bottom: 10px; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
        .label { font-size: 0.75rem; font-weight: bold; color: #888; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="input-group">
        <label style="font-size: 0.8rem; font-weight: bold;">CÂU HỎI CỦA BẠN:</label>
        <input type="text" id="userQuestion" placeholder="Ví dụ: Công việc tháng này thế nào?">
    </div>

    <button class="main-btn" onclick="lapQueSTM()">CHẠM LẬP QUẺ & PHÂN TÍCH</button>
    <button id="btnDownload" class="download-btn" onclick="downloadImg()">TẢI ẢNH QUẺ VỀ MÁY</button>

    <div id="capture-area">
        <div class="summary-card">
            <span class="label">Câu hỏi:</span>
            <div id="show-question" class="q-text">Chưa nhập câu hỏi</div>
            <div style="font-size: 0.9rem;">Hào bị biến đổi: <span id="moving-res" class="moving-list">---</span></div>
            <div id="timestamp" style="font-size: 0.75rem; color: #aaa; margin-top: 5px;"></div>
        </div>

        <div class="que-display">
            <div class="card">
                <span class="label">Quẻ Chính</span>
                <div id="name-chinh" class="que-name">---</div>
                <div id="visual-chinh" class="hexagram"></div>
                <div id="bin-chinh" class="bin-info">---</div>
            </div>
            <div class="card">
                <span class="label">Quẻ Biến</span>
                <div id="name-bien" class="que-name">---</div>
                <div id="visual-bien" class="hexagram"></div>
                <div id="bin-bien" class="bin-info">---</div>
            </div>
        </div>
        <div style="text-align: center; font-size: 0.6rem; color: #ccc;">STM - Tân Thời Dịch Học System</div>
    </div>

<script>
    const batQuai = { "1":"111", "2":"011", "3":"101", "4":"001", "5":"110", "6":"010", "7":"100", "0":"000" };
    const data64Que = {
        "111111": "Thuần Càn", "000000": "Thuần Khôn", "010001": "Thủy Lôi Truân", "100010": "Sơn Thủy Mông",
        "010111": "Thủy Thiên Nhu", "111010": "Thiên Thủy Tụng", "000010": "Địa Thủy Sư", "010000": "Thủy Địa Tỷ",
        "110111": "Phong Thiên Tiểu Súc", "111011": "Thiên Trạch Lý", "000111": "Địa Thiên Thái", "111000": "Thiên Địa Bĩ",
        "111101": "Thiên Hỏa Đồng Nhân", "101111": "Hỏa Thiên Đại Hữu", "000100": "Địa Sơn Khiêm", "001000": "Lôi Địa Dự",
        "011001": "Trạch Lôi Tùy", "100110": "Sơn Phong Cổ", "000011": "Địa Trạch Lâm", "110000": "Phong Địa Quán",
        "101001": "Hỏa Lôi Phệ Hạp", "100101": "Sơn Hỏa Bí", "100000": "Sơn Địa Bác", "000001": "Địa Lôi Phục",
        "111001": "Thiên Lôi Vô Vọng", "100111": "Sơn Thiên Đại Súc", "100001": "Sơn Lôi Di", "011110": "Trạch Phong Đại Quá",
        "010010": "Thuần Khảm", "101101": "Thuần Ly", "011100": "Trạch Sơn Hàm", "001110": "Lôi Phong Hằng",
        "111100": "Thiên Sơn Độn", "001111": "Lôi Thiên Đại Tráng", "101000": "Hỏa Địa Tấn", "000101": "Địa Hỏa Minh Di",
        "110101": "Phong Hỏa Gia Nhân", "101011": "Hỏa Trạch Khuê", "010100": "Thủy Sơn Kiển", "001010": "Lôi Thủy Giải",
        "100011": "Sơn Trạch Tổn", "110001": "Phong Lôi Ích", "011111": "Trạch Thiên Quải", "111110": "Thiên Phong Cấu",
        "011000": "Trạch Địa Tụy", "000110": "Địa Phong Thăng", "011010": "Trạch Thủy Khốn", "010110": "Thủy Phong Tỉnh",
        "011101": "Trạch Hỏa Cách", "101110": "Hỏa Phong Đỉnh", "001001": "Thuần Chấn", "100100": "Thuần Cấn",
        "110100": "Phong Sơn Tiệm", "001011": "Lôi Trạch Quy Muội", "001101": "Lôi Hỏa Phong", "101100": "Hỏa Sơn Lữ",
        "110110": "Thuần Tốn", "011011": "Thuần Đoài", "110010": "Phong Thủy Hoán", "010011": "Thủy Trạch Tiết",
        "110011": "Phong Trạch Trung Phu", "001100": "Lôi Sơn Tiểu Quá", "010101": "Thủy Hỏa Ký Tế", "101010": "Hỏa Thủy Vị Tế"
    };

    function lapQueSTM() {
        const now = new Date();
        const hh = now.getHours().toString().padStart(2, '0');
        const mm = now.getMinutes().toString().padStart(2, '0');
        const ss = now.getSeconds().toString().padStart(2, '0');
        const d = (hh + mm + ss).split('').map(Number);

        const upChinh = (d[0] + d[1]) % 8;
        const lowChinh = (d[2] + d[3]) % 8;
        const binUpChinh = batQuai[upChinh];
        const binLowChinh = batQuai[lowChinh];
        const fullBinChinh = binUpChinh + binLowChinh;

        const upBien = (d[2] + d[3]) % 8;
        const lowBien = (d[4] + d[5]) % 8;
        const binUpBien = batQuai[upBien];
        const binLowBien = batQuai[lowBien];
        const fullBinBien = binUpBien + binLowBien;

        let dong = [];
        for (let i = 0; i < 6; i++) {
            if (fullBinChinh[i] !== fullBinBien[i]) {
                dong.push(6 - i);
            }
        }

        const ques = document.getElementById('userQuestion').value;
        document.getElementById('show-question').innerText = ques || "Không có câu hỏi cụ thể";
        document.getElementById('name-chinh').innerText = data64Que[fullBinChinh];
        document.getElementById('name-bien').innerText = data64Que[fullBinBien];
        document.getElementById('bin-chinh').innerText = `${binUpChinh} ${binLowChinh}`;
        document.getElementById('bin-bien').innerText = `${binUpBien} ${binLowBien}`;
        document.getElementById('moving-res').innerText = dong.length > 0 ? "Hào " + dong.sort((a,b)=>b-a).join(", ") : "Quẻ Tĩnh";
        document.getElementById('timestamp').innerText = `Thời gian lập: ${hh}:${mm}:${ss} - Ngày: ${now.toLocaleDateString('vi-VN')}`;

        renderHex('visual-chinh', fullBinChinh, dong);
        renderHex('visual-bien', fullBinBien, []);

        document.getElementById('capture-area').style.display = 'flex';
        document.getElementById('btnDownload').style.display = 'block';
    }

    function renderHex(containerId, bin, moving) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        for (let i = 0; i < 6; i++) {
            const line = document.createElement('div');
            const isYang = bin[i] === '1';
            const haoLevel = 6 - i;
            line.className = isYang ? "line" : "line broken";
            if (moving.includes(haoLevel)) line.classList.add('moving');
            container.appendChild(line);
        }
    }

    function downloadImg() {
        const area = document.getElementById('capture-area');
        html2canvas(area, { backgroundColor: "#f0f2f5", scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `QueDich_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
