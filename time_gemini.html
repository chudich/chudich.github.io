<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STM - TÂN THỜI DỊCH SỐ</title>
    <style>
        :root { 
            --primary-blue: #007bff; 
            --dark-blue: #004a99; 
            --bg-gray: #f0f2f5; 
            --accent: #ff3b30; /* Màu đỏ của hào động */
            --white: #ffffff;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 15px; 
            margin: 0; 
            background: var(--bg-gray); 
            color: #1c1e21; 
        }

        h2 { font-size: 1.5rem; margin: 20px 0; color: #333; font-weight: 800; letter-spacing: 1px; }

        /* Nút bấm chính */
        .btn-container { width: 100%; max-width: 450px; margin-bottom: 25px; }
        .main-btn { 
            width: 100%; 
            padding: 20px; 
            background: var(--dark-blue); 
            color: white; 
            border: none; 
            border-radius: 18px; 
            font-size: 1.25rem; 
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0,74,153,0.3); 
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .main-btn:active { transform: scale(0.96); background: #003366; }

        /* Khu vực hiển thị kết quả */
        .result-wrapper { width: 100%; max-width: 450px; display: none; flex-direction: column; animation: fadeIn 0.4s ease; }
        
        .card { 
            background: var(--white); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            text-align: center; 
            border-top: 6px solid var(--dark-blue); 
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .label-tag { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; color: #999; margin-bottom: 8px; display: block; }
        .time-stamp { font-family: "Courier New", monospace; font-size: 1.3rem; font-weight: bold; color: #555; margin-bottom: 5px; }
        .que-name { font-size: 32px; font-weight: 900; color: var(--dark-blue); margin: 15px 0; letter-spacing: -0.5px; }

        /* VẼ VẠCH QUẺ - KHÔNG XÔ LỆCH */
        .hexagram { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            align-items: center; 
            margin: 30px 0; 
        }

        .line { 
            width: 180px; 
            height: 15px; 
            background-color: var(--dark-blue); 
            border-radius: 2px; 
            position: relative; 
        }

        /* Vạch Âm (Broken Line) dùng Linear Gradient để đảm bảo thẳng hàng tuyệt đối */
        .line.broken { 
            background: linear-gradient(to right, 
                var(--dark-blue) 0%, var(--dark-blue) 43%, 
                transparent 43%, transparent 57%, 
                var(--dark-blue) 57%, var(--dark-blue) 100%);
        }

        /* Dấu chấm đỏ hào động */
        .line.moving::after { 
            content: "●"; 
            position: absolute; 
            right: -35px; 
            color: var(--accent); 
            font-size: 18px; 
            top: 50%;
            transform: translateY(-50%);
        }

        /* Thông tin phụ trợ */
        .info-panel { 
            background: #fdfdfd; 
            padding: 15px; 
            border-radius: 12px; 
            margin-top: 15px; 
            font-size: 0.95rem; 
            text-align: left; 
            border: 1px solid #eee;
        }
        .moving-lines { color: var(--accent); font-weight: 700; }
        .bin-code { font-family: monospace; background: #ececec; padding: 3px 8px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>STM - TÂN THỜI DỊCH</h2>

    <div class="btn-container">
        <button class="main-btn" onclick="lapQueSTM()">CHẠM ĐỂ LẬP QUẺ</button>
    </div>

    <div id="resultArea" class="result-wrapper">
        <div class="card">
            <span class="label-tag">Thời gian hiển thị giây ẩn</span>
            <div id="res-time" class="time-stamp">00:00:00</div>
            <div id="res-name" class="que-name">---</div>
            
            <div id="visual-que" class="hexagram"></div>
            
            <div class="info-panel">
                <div>Nhị phân: <span id="res-bin" class="bin-code">---</span></div>
                <div style="margin-top:8px;">Biến động: <span id="res-moving" class="moving-lines">Không có</span></div>
            </div>
        </div>
    </div>

    <script>
        // Bát quái hệ thống (0=8=Khôn)
        const batQuai = {
            "1": { name: "Kiền", code: "111" },
            "2": { name: "Đoài", code: "011" },
            "3": { name: "Ly",   code: "101" },
            "4": { name: "Chấn", code: "001" },
            "5": { name: "Tốn",  code: "110" },
            "6": { name: "Khảm", code: "010" },
            "7": { name: "Cấn",  code: "100" },
            "0": { name: "Khôn", code: "000" }
        };

        const data64Que = {
            "111111": "Thuần Càn", "000000": "Thuần Khôn", "010001": "Thủy Lôi Truân", "100010": "Sơn Thủy Mông",
            "010111": "Thủy Thiên Nhu", "111010": "Thiên Thủy Tụng", "000010": "Địa Thủy Sư", "010000": "Thủy Địa Tỷ",
            "110111": "Phong Thiên Tiểu Súc", "111011": "Thiên Trạch Lý", "000111": "Địa Thiên Thái", "111000": "Thiên Địa Bĩ",
            "111101": "Thiên Hỏa Đồng Nhân", "101111": "Hỏa Thiên Đại Hữu", "000100": "Địa Sơn Khiêm", "001000": "Lôi Địa Dự",
            "011001": "Trạch Lôi Tùy", "100110": "Sơn Phong Cổ", "000011": "Địa Trạch Lâm", "110000": "Phong Địa Quán",
            "101001": "Hỏa Lôi Phệ Hạp", "100101": "Sơn Hỏa Bí", "100000": "Sơn Địa Bác", "000001": "Địa Lôi Phục",
            "111001": "Thiên Lôi Vô Vọng", "100111": "Sơn Thiên Đại Súc", "100001": "Sơn Lôi Di", "011110": "Trạch Phong Đại Quá",
            "010010": "Thuần Khảm", "101101": "Thuần Ly", "011100": "Trạch Sơn Hàm", "001110": "Lôi Phong Hằng",
            "111100": "Thiên Sơn Độn", "001111": "Lôi Thiên Đại Tráng", "101000": "Hỏa Địa Tấn", "000101": "Địa Hỏa Minh Di",
            "110101": "Phong Hỏa Gia Nhân", "101011": "Hỏa Trạch Khuê", "010100": "Thủy Sơn Kiển", "001010": "Lôi Thủy Giải",
            "100011": "Sơn Trạch Tổn", "110001": "Phong Lôi Ích", "011111": "Trạch Thiên Quải", "111110": "Thiên Phong Cấu",
            "011000": "Trạch Địa Tụy", "000110": "Địa Phong Thăng", "011010": "Trạch Thủy Khốn", "010110": "Thủy Phong Tỉnh",
            "011101": "Trạch Hỏa Cách", "101110": "Hỏa Phong Đỉnh", "001001": "Thuần Chấn", "100100": "Thuần Cấn",
            "110100": "Phong Sơn Tiệm", "001011": "Lôi Trạch Quy Muội", "001101": "Lôi Hỏa Phong", "101100": "Hỏa Sơn Lữ",
            "110110": "Thuần Tốn", "011011": "Thuần Đoài", "110010": "Phong Thủy Hoán", "010011": "Thủy Trạch Tiết",
            "110011": "Phong Trạch Trung Phu", "001100": "Lôi Sơn Tiểu Quá", "010101": "Thủy Hỏa Ký Tế", "101010": "Hỏa Thủy Vị Tế"
        };

        function lapQueSTM() {
            // Rung phản hồi (nếu thiết bị hỗ trợ)
            if (window.navigator.vibrate) window.navigator.vibrate(50);

            const now = new Date();
            const hh = now.getHours().toString().padStart(2, '0');
            const mm = now.getMinutes().toString().padStart(2, '0');
            const ss = now.getSeconds().toString().padStart(2, '0');
            
            // Lấy 6 chữ số: H1 H2 M1 M2 S1 S2
            const d = (hh + mm + ss).split('').map(Number);
            
            // Logic lập quẻ chính (Dựa trên tổng các cặp số chia 8)
            const sumUp = (d[0] + d[1]) % 8;
            const sumLow = (d[2] + d[3]) % 8;
            
            const binUp = batQuai[sumUp].code; 
            const binLow = batQuai[sumLow].code;
            const finalBin = binUp + binLow;

            // Xác định hào động: Chữ số lẻ = Động
            let moving = [];
            d.forEach((val, idx) => {
                if (val % 2 !== 0) moving.push(idx + 1);
            });

            // Cập nhật giao diện
            document.getElementById('res-time').innerText = `${hh}:${mm}:${ss}`;
            document.getElementById('res-name').innerText = data64Que[finalBin] || "Quẻ Lạ";
            document.getElementById('res-bin').innerText = `${binUp} ${binLow}`;
            document.getElementById('res-moving').innerText = moving.length > 0 ? "Hào " + moving.join(', ') : "Quẻ Tĩnh";
            
            renderHexagram(finalBin, moving);
            document.getElementById('resultArea').style.display = 'flex';
        }

        function renderHexagram(bin, moving) {
            const container = document.getElementById('visual-que');
            container.innerHTML = "";
            
            // Vẽ từ trên xuống (Hào 6 ở trên cùng - tương ứng bit đầu tiên)
            for (let i = 0; i < 6; i++) {
                const line = document.createElement('div');
                const isYang = bin[i] === '1';
                
                line.className = isYang ? "line" : "line broken";
                
                // Đánh dấu hào động (Dựa trên vị trí số lẻ trong 6 chữ số thời gian)
                if (moving.includes(i + 1)) {
                    line.classList.add('moving');
                }
                
                container.appendChild(line);
            }
        }
    </script>
</body>
</html>
