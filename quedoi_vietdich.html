<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Việt Dịch Chánh Tông - Ngang</title>
    <style>
        :root {
            --primary: #2980b9;
            --vach-color: #3498db;
            --bg: #f0f4f8;
        }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg); 
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .container { 
            background: #fff; padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 600px; width: 100%; text-align: center;
        }
        h2 { color: var(--primary); margin-bottom: 25px; font-size: 1.2rem; }
        
        select { 
            width: 80%; padding: 12px; border-radius: 10px; border: 2px solid #dce4ec; 
            font-size: 16px; margin-bottom: 40px; outline: none;
        }

        /* Khung chứa quẻ */
        .que-box { margin-bottom: 40px; display: inline-block; }
        .label-text { font-size: 12px; font-weight: bold; color: #95a5a6; margin-bottom: 10px; text-transform: uppercase; }
        
        /* Hiển thị ngang: Thượng bên trái - Hạ bên phải */
        .que-visual { display: flex; gap: 20px; justify-content: center; align-items: center; }
        .quai-don { display: flex; flex-direction: column; gap: 8px; width: 80px; }
        
        /* Vạch quẻ */
        .vach { height: 12px; border-radius: 2px; transition: 0.3s; }
        .vach.duong { background-color: var(--vach-color); width: 100%; }
        .vach.am { display: flex; justify-content: space-between; }
        .vach.am::before, .vach.am::after { 
            content: ''; background-color: var(--vach-color); width: 42%; height: 100%; border-radius: 2px; 
        }

        /* --- PHẦN EDIT THEO YÊU CẦU --- */
        .que-name { 
            margin-top: 15px; 
            font-weight: bold; /* Làm đậm chữ */
            color: var(--primary); 
            font-size: 2.2rem; /* Phóng to 200% (gấp đôi size 1.1rem cũ) */
        }
        /* --------------------------------- */

        .divider { color: var(--primary); font-size: 24px; margin: 20px 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>VIỆT DỊCH CHÁNH TÔNG</h2>
    
    <div class="label-text">Chọn Quẻ Để Tra Cứu</div>
    <select id="selectQue" onchange="update()"></select>

    <div class="que-box">
        <div class="label-text">QUẺ GỐC (Thượng - Hạ)</div>
        <div class="que-visual">
            <div id="gocThuong" class="quai-don"></div>
            <div id="gocHa" class="quai-don"></div>
        </div>
        <div id="nameGoc" class="que-name"></div>
    </div>

    <div class="divider">⇅ ĐỐI QUẺ ⇅</div>

    <div class="que-box">
        <div class="que-visual">
            <div id="doiThuong" class="quai-don"></div>
            <div id="doiHa" class="quai-don"></div>
        </div>
        <div id="nameDoi" class="que-name"></div>
    </div>
</div>

<script>
/**
 * QUY ƯỚC: [vạch 1, vạch 2, vạch 3] đọc từ TRÊN XUỐNG DƯỚI
 * 1: Dương, 0: Âm
 */
const QUAI = {
    "Kiền": [1,1,1], "Khôn": [0,0,0], "Chấn": [0,0,1], "Tốn": [1,1,0],
    "Khảm": [0,1,0], "Ly": [1,0,1], "Cấn": [1,0,0], "Đoài": [0,1,1]
};

const dataDich = {
    "Lôi Địa Dự": { thuong: "Chấn", ha: "Khôn", doi: "Địa Sơn Khiêm" },
    "Địa Sơn Khiêm": { thuong: "Khôn", ha: "Cấn", doi: "Lôi Địa Dự" },
    "Trạch Hoả Cách": { thuong: "Đoài", ha: "Ly", doi: "Hoả Phong Đỉnh" },
    "Hoả Phong Đỉnh": { thuong: "Ly", ha: "Tốn", doi: "Trạch Hoả Cách" },
    "Phong Lôi Ích": { thuong: "Tốn", ha: "Chấn", doi: "Sơn Trạch Tổn" },
    "Sơn Trạch Tổn": { thuong: "Cấn", ha: "Đoài", doi: "Phong Lôi Ích" },
    "Lôi Phong Hằng": { thuong: "Chấn", ha: "Tốn", doi: "Trạch Sơn Hàm" },
    "Trạch Sơn Hàm": { thuong: "Đoài", ha: "Cấn", doi: "Lôi Phong Hằng" },
    "Thiên Trạch Lý": { thuong: "Kiền", ha: "Đoài", doi: "Phong Thiên Tiểu Súc" },
    "Phong Thiên Tiểu Súc": { thuong: "Tốn", ha: "Kiền", doi: "Thiên Trạch Lý" },
    "Thiên Hoả Đồng Nhân": { thuong: "Kiền", ha: "Ly", doi: "Hoả Thiên Đại Hữu" },
    "Hoả Thiên Đại Hữu": { thuong: "Ly", ha: "Kiền", doi: "Thiên Hoả Đồng Nhân" },
    "Thiên Lôi Vô Vọng": { thuong: "Kiền", ha: "Chấn", doi: "Sơn Thiên Đại Súc" },
    "Sơn Thiên Đại Súc": { thuong: "Cấn", ha: "Kiền", doi: "Thiên Lôi Vô Vọng" },
    "Thiên Phong Cấu": { thuong: "Kiền", ha: "Tốn", doi: "Trạch Thiên Quải" },
    "Trạch Thiên Quải": { thuong: "Đoài", ha: "Kiền", doi: "Thiên Phong Cấu" },
    "Thiên Thủy Tụng": { thuong: "Kiền", ha: "Khảm", doi: "Thủy Thiên Nhu" },
    "Thủy Thiên Nhu": { thuong: "Khảm", ha: "Kiền", doi: "Thiên Thủy Tụng" },
    "Thiên Sơn Độn": { thuong: "Kiền", ha: "Cấn", doi: "Lôi Thiên Đại Tráng" },
    "Lôi Thiên Đại Tráng": { thuong: "Chấn", ha: "Kiền", doi: "Thiên Sơn Độn" },
    "Thiên Địa Bĩ": { thuong: "Kiền", ha: "Khôn", doi: "Địa Thiên Thái" },
    "Địa Thiên Thái": { thuong: "Khôn", ha: "Kiền", doi: "Thiên Địa Bĩ" },
    "Thuần Kiền": { thuong: "Kiền", ha: "Kiền", doi: "Thuần Khôn" },
    "Thuần Khôn": { thuong: "Khôn", ha: "Khôn", doi: "Thuần Kiền" },
    "Trạch Lôi Tùy": { thuong: "Đoài", ha: "Chấn", doi: "Sơn Phong Cổ" },
    "Sơn Phong Cổ": { thuong: "Cấn", ha: "Tốn", doi: "Trạch Lôi Tùy" },
    "Trạch Phong Đại Quá": { thuong: "Đoài", ha: "Tốn", doi: "Sơn Lôi Di" },
    "Sơn Lôi Di": { thuong: "Cấn", ha: "Chấn", doi: "Trạch Phong Đại Quá" },
    "Trạch Thủy Khốn": { thuong: "Đoài", ha: "Khảm", doi: "Thủy Phong Tĩnh" },
    "Thủy Phong Tĩnh": { thuong: "Khảm", ha: "Tốn", doi: "Trạch Thủy Khốn" },
    "Trạch Địa Tụy": { thuong: "Đoài", ha: "Khôn", doi: "Địa Phong Thăng" },
    "Địa Phong Thăng": { thuong: "Khôn", ha: "Tốn", doi: "Trạch Địa Tụy" },
    "Thuần Đoài": { thuong: "Đoài", ha: "Đoài", doi: "Thuần Tốn" },
    "Thuần Tốn": { thuong: "Tốn", ha: "Tốn", doi: "Thuần Đoài" },
    "Hoả Lôi Phệ Hạp": { thuong: "Ly", ha: "Chấn", doi: "Sơn Hoả Bí" },
    "Sơn Hoả Bí": { thuong: "Cấn", ha: "Ly", doi: "Hoả Lôi Phệ Hạp" },
    "Hoả Thủy Vị Tế": { thuong: "Ly", ha: "Khảm", doi: "Thủy Hoả Ký Tế" },
    "Thủy Hoả Ký Tế": { thuong: "Khảm", ha: "Ly", doi: "Hoả Thủy Vị Tế" },
    "Hoả Sơn Lữ": { thuong: "Ly", ha: "Cấn", doi: "Lôi Hoả Phong" },
    "Lôi Hoả Phong": { thuong: "Chấn", ha: "Ly", doi: "Hoả Sơn Lữ" },
    "Hoả Địa Tấn": { thuong: "Ly", ha: "Khôn", doi: "Địa Hoả Minh Di" },
    "Địa Hoả Minh Di": { thuong: "Khôn", ha: "Ly", doi: "Hoả Địa Tấn" },
    "Hoả Trạch Khuê": { thuong: "Ly", ha: "Đoài", doi: "Phong Hoả Gia Nhân" },
    "Phong Hoả Gia Nhân": { thuong: "Tốn", ha: "Ly", doi: "Hoả Trạch Khuê" },
    "Thuần Ly": { thuong: "Ly", ha: "Ly", doi: "Thuần Khảm" },
    "Thuần Khảm": { thuong: "Khảm", ha: "Khảm", doi: "Thuần Ly" },
    "Lôi Thủy Giải": { thuong: "Chấn", ha: "Khảm", doi: "Thủy Sơn Kiển" },
    "Thủy Sơn Kiển": { thuong: "Khảm", ha: "Cấn", doi: "Lôi Thủy Giải" },
    "Lôi Sơn Tiểu Quá": { thuong: "Chấn", ha: "Cấn", doi: "Phong Trạch Trung Phu" },
    "Phong Trạch Trung Phu": { thuong: "Tốn", ha: "Đoài", doi: "Lôi Sơn Tiểu Quá" },
    "Lôi Trạch Quy Muội": { thuong: "Chấn", ha: "Đoài", doi: "Phong Sơn Tiệm" },
    "Phong Sơn Tiệm": { thuong: "Tốn", ha: "Cấn", doi: "Lôi Trạch Quy Muội" },
    "Thuần Chấn": { thuong: "Chấn", ha: "Chấn", doi: "Thuần Cấn" },
    "Thuần Cấn": { thuong: "Cấn", ha: "Cấn", doi: "Thuần Chấn" },
    "Phong Thủy Hoán": { thuong: "Tốn", ha: "Khảm", doi: "Thủy Trạch Tiết" },
    "Thủy Trạch Tiết": { thuong: "Khảm", ha: "Đoài", doi: "Phong Thủy Hoán" },
    "Phong Địa Quán": { thuong: "Tốn", ha: "Khôn", doi: "Địa Trạch Lâm" },
    "Địa Trạch Lâm": { thuong: "Khôn", ha: "Đoài", doi: "Phong Địa Quán" },
    "Thủy Địa Tỷ": { thuong: "Khảm", ha: "Khôn", doi: "Địa Thủy Sư" },
    "Địa Thủy Sư": { thuong: "Khôn", ha: "Khảm", doi: "Thủy Địa Tỷ" },
    "Thủy Lôi Truân": { thuong: "Khảm", ha: "Chấn", doi: "Sơn Thủy Mông" },
    "Sơn Thủy Mông": { thuong: "Cấn", ha: "Khảm", doi: "Thủy Lôi Truân" },
    "Sơn Địa Bác": { thuong: "Cấn", ha: "Khôn", doi: "Địa Lôi Phục" },
    "Địa Lôi Phục": { thuong: "Khôn", ha: "Chấn", doi: "Sơn Địa Bác" }
};

const select = document.getElementById('selectQue');
Object.keys(dataDich).sort().forEach(n => {
    let opt = document.createElement('option');
    opt.value = n; opt.text = n;
    select.appendChild(opt);
});

function drawQuai(quaiName, elementId) {
    const container = document.getElementById(elementId);
    container.innerHTML = '';
    const vachs = QUAI[quaiName];
    vachs.forEach(v => {
        const d = document.createElement('div');
        d.className = v === 1 ? 'vach duong' : 'vach am';
        container.appendChild(d);
    });
}

function update() {
    const nameGoc = select.value;
    const itemGoc = dataDich[nameGoc];
    const nameDoi = itemGoc.doi;
    const itemDoi = dataDich[nameDoi];

    // Vẽ Gốc
    document.getElementById('nameGoc').innerText = nameGoc;
    drawQuai(itemGoc.thuong, 'gocThuong');
    drawQuai(itemGoc.ha, 'gocHa');

    // Vẽ Đối
    document.getElementById('nameDoi').innerText = nameDoi;
    drawQuai(itemDoi.thuong, 'doiThuong');
    drawQuai(itemDoi.ha, 'doiHa');
}

update();
</script>
</body>
</html>
