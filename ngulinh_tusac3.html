<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngũ Linh - Bản Siêu Tĩnh</title>
    <style>
        body { font-family: sans-serif; padding: 10px; text-align: center; background: #fff; }
        .box { border: 2px solid #000; padding: 10px; margin-bottom: 10px; display: none; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .card { border: 1px solid #333; padding: 10px 0; font-weight: bold; font-size: 12px; }
        .goc { background: #ff0; border: 2px solid #f00; }
        .lh { background: #faa; }
        .btn { width: 100%; padding: 20px; background: #d35400; color: #fff; border: none; font-weight: bold; }
        .Xanh { color: green; } .Vang { color: orange; } .Trang { color: gray; } .Do { color: red; }
    </style>
</head>
<body>

    <button class="btn" onclick="document.getElementById('kq').style.display='block';this.style.display='none'">BẤM ĐỂ HIỆN QUẺ TỨ SẮC</button>

    <div id="kq" class="box">
        <h3 style="font-size:14px;">1. TRẬN PHÁP (GỐC TẠI 7)</h3>
        <div class="grid">
            <div class="card Xanh">12<br>TƯỚNG Đ</div>
            <div class="card Xanh">11<br>SĨ N</div>
            <div class="card Xanh">10<br>XE Đ</div>
            <div class="card Xanh">9<br>PHÁO N</div>
            <div class="card Xanh">8<br>NGỰA Đ</div>
            <div class="card Xanh goc">7<br>TƯỢNG N</div>
            <div class="card Xanh">6<br>CHỐT Đ</div>
            <div class="card Xanh">5<br>TƯỚNG N</div>
            <div class="card Xanh">4<br>SĨ Đ</div>
            <div class="card Xanh">3<br>XE N</div>
            <div class="card Xanh">2<br>PHÁO Đ</div>
            <div class="card Xanh">1<br>CHỐT N</div>
        </div>

        <h3 style="font-size:14px;">2. 5 LÁ LINH HỒN</h3>
        <div class="grid">
            <div class="card Xanh lh">L1<br>XE Đ</div>
            <div class="card Xanh lh">L2<br>PHÁO N</div>
            <div class="card Xanh lh">L3<br>TƯỢNG Đ</div>
            <div class="card Xanh lh">L4<br>SĨ N</div>
            <div class="card Xanh lh">L5<br>CHỐT Đ</div>
        </div>

        <h3 style="font-size:14px;">3. 3 KHÓM THỜI GIAN</h3>
        <div class="grid">
            <div class="card Xanh">TƯỚNG N</div><div class="card Xanh">SĨ Đ</div><div class="card Xanh">XE N</div><div class="card Xanh">PHÁO Đ</div>
            <div class="card Xanh">NGỰA N</div><div class="card Xanh">TƯỢNG Đ</div><div class="card Xanh">CHỐT N</div><div class="card Xanh">TƯỚNG Đ</div>
            <div class="card Xanh">SĨ N</div><div class="card Xanh">XE Đ</div><div class="card Xanh">PHÁO N</div><div class="card Xanh">NGỰA Đ</div>
        </div>
    </div>

</body>
</html>
