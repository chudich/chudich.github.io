<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngũ Linh - Bản Một Chạm</title>
    <style>
        body { font-family: sans-serif; background: #fff; padding: 10px; margin: 0; }
        .menu { display: flex; gap: 5px; margin-bottom: 15px; }
        select, button { padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; flex: 1; }
        button { background: #d35400; color: #fff; font-weight: bold; border: none; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .card { 
            border: 1px solid #ddd; border-radius: 4px; min-height: 55px; 
            display: flex; align-items: center; justify-content: center; 
            text-align: center; font-size: 12px; font-weight: bold; position: relative;
        }
        .num { position: absolute; top: 1px; right: 3px; font-size: 8px; color: #999; }
        
        /* Màu hệ */
        .Xanh { color: green; } .Vang { color: orange; } .Trang { color: #666; } .Do { color: red; }
        .goc { border: 2px solid #f1c40f !important; background: #fffde7; }
        .lh { border: 2px solid #d35400 !important; background: #fff5ee; }
        
        h4 { font-size: 11px; color: #888; text-transform: uppercase; margin: 15px 0 5px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="menu">
        <select id="mauChon">
            <option value="Xanh">CÔNG DANH (XANH)</option>
            <option value="Vang">TÀI LỘC (VÀNG)</option>
            <option value="Trang">GIA ĐẠO (XÁM)</option>
            <option value="Do">TÌNH DUYÊN (ĐỎ)</option>
        </select>
        <button onclick="xemQue()">KHAI QUẺ</button>
    </div>

    <div id="vungKQ" style="display:none;">
        <h4>TRẬN PHÁP & GỐC</h4>
        <div id="o13" style="display:flex; justify-content:center; margin-bottom:5px;"></div>
        <div id="o12" class="grid"></div>

        <h4>5 LÁ LINH HỒN</h4>
        <div id="oLH" class="grid"></div>

        <h4>3 KHÓM THỜI GIAN</h4>
        <div id="oKH" class="grid"></div>
    </div>

<script>
function xemQue() {
    var mau = document.getElementById('mauChon').value;
    var t = ['TƯỚNG','SĨ','TƯỢNG','XE','PHÁO','NGỰA','CHỐT'];
    var d = [];
    for(var i=0; i<7; i++) {
        d.push({n:t[i], f:'Đ'}, {n:t[i], f:'Đ'}, {n:t[i], f:'N'}, {n:t[i], f:'N'});
    }
    d.sort(function() { return 0.5 - Math.random() });

    var m = []; var tmp = d.slice();
    for(var i=0; i<12; i++) { tmp.splice(0,3); m.push(tmp.shift()); }
    var la13 = tmp[0];

    var goc = -1;
    for(var i=11; i>=0; i--) { if(m[i].n == la13.n) { goc = i+1; break; } }
    var full = m.slice(); if(goc == -1) { full.push(la13); goc = 13; }

    var lhs = []; var p = goc;
    for(var s=0; s<5; s++) {
        var c = p; for(var j=0; j<4; j++) { c--; if(c<1) c=full.length; }
        lhs.push(full[c-1]); p = c-1; if(p<1) p=full.length;
    }

    // HIỂN THỊ TỨC THÌ
    document.getElementById('vungKQ').style.display = 'block';
    
    // 12 lá
    var h12 = "";
    for(var i=12; i>=1; i--) {
        var cls = "card " + mau + (i == goc ? " goc" : "");
        h12 += '<div class="'+cls+'"><span class="num">'+i+'</span>'+m[i-1].n+'<br>'+m[i-1].f+'</div>';
    }
    document.getElementById('o12').innerHTML = h12;

    // Lá 13
    document.getElementById('o13').innerHTML = (goc == 13) ? '<div class="card '+mau+' goc" style="width:23%"><span class="num">13</span>'+la13.n+'<br>'+la13.f+'</div>' : "";

    // 5 Linh hồn
    var hLH = "";
    for(var i=0; i<5; i++) {
        hLH += '<div class="card '+mau+' lh"><span class="num">L'+(i+1)+'</span>'+lhs[i].n+'<br>'+lhs[i].f+'</div>';
    }
    document.getElementById('oLH').innerHTML = hLH;

    // 3 Khóm
    var hKH = ""; var sh = m.slice().sort(function() { return 0.5 - Math.random() });
    for(var i=0; i<12; i++) {
        hKH += '<div class="card '+mau+'">'+sh[i].n+'<br>'+sh[i].f+'</div>';
    }
    document.getElementById('oKH').innerHTML = hKH;
}
</script>
</body>
</html>
