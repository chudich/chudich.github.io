<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ngũ Linh - Bản Sửa Lỗi Lá 8</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f4; padding: 10px; margin: 0; }
        .container { max-width: 400px; margin: auto; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .menu { display: flex; gap: 5px; margin-bottom: 15px; }
        select, button { padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
        button { background: #e67e22; color: #fff; font-weight: bold; flex: 1; border: none; }
        .stt { text-align: center; font-weight: bold; color: #e67e22; margin: 10px 0; height: 25px; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .slot { 
            background: #fff; border: 1px solid #ddd; border-radius: 8px; 
            min-height: 65px; display: flex; align-items: center; justify-content: center; 
            text-align: center; font-size: 13px; font-weight: bold; position: relative;
            visibility: hidden; opacity: 0; transition: opacity 0.3s;
        }
        .num { position: absolute; top: 2px; right: 4px; font-size: 10px; color: #bbb; }
        
        .Xanh { color: #27ae60; } .Vang { color: #d35400; } .Trang { color: #7f8c8d; } .Do { color: #c0392b; }
        .is-goc { border: 2.5px solid #f1c40f !important; background: #fffde7; }
        .is-scan { background: #f1c40f !important; transform: scale(1.1); z-index: 10; }
        .is-picked { border: 2.5px solid #e67e22 !important; box-shadow: 0 0 8px rgba(230,126,34,0.5); }
    </style>
</head>
<body>

<div class="container">
    <div class="menu">
        <select id="selMau">
            <option value="Xanh">CÔNG DANH</option>
            <option value="Vang">TÀI LỘC</option>
            <option value="Trang">GIA ĐẠO</option>
            <option value="Do">TÌNH DUYÊN</option>
        </select>
        <button onclick="batDau()">KHAI QUẺ</button>
    </div>

    <div id="status" class="stt">Sẵn sàng...</div>

    <div style="display:flex; justify-content:center; margin-bottom:10px;">
        <div id="slot-13" class="slot" style="width:23.5%;"><span class="num">13</span></div>
    </div>

    <div class="grid" id="mainGrid">
        <div id="slot-12" class="slot"><span class="num">12</span></div>
        <div id="slot-11" class="slot"><span class="num">11</span></div>
        <div id="slot-10" class="slot"><span class="num">10</span></div>
        <div id="slot-9" class="slot"><span class="num">9</span></div>
        <div id="slot-8" class="slot"><span class="num">8</span></div>
        <div id="slot-7" class="slot"><span class="num">7</span></div>
        <div id="slot-6" class="slot"><span class="num">6</span></div>
        <div id="slot-5" class="slot"><span class="num">5</span></div>
        <div id="slot-4" class="slot"><span class="num">4</span></div>
        <div id="slot-3" class="slot"><span class="num">3</span></div>
        <div id="slot-2" class="slot"><span class="num">2</span></div>
        <div id="slot-1" class="slot"><span class="num">1</span></div>
    </div>
</div>

<script>
const ngu = ms => new Promise(r => setTimeout(r, ms));

async function batDau() {
    const stt = document.getElementById('status');
    const mau = document.getElementById('selMau').value;
    
    // 1. Dọn dẹp an toàn
    for(let i=1; i<=13; i++) {
        let s = document.getElementById('slot-'+i);
        if(s) {
            s.style.visibility = 'hidden';
            s.style.opacity = '0';
            s.className = 'slot';
            s.innerHTML = '<span class="num">'+i+'</span>';
        }
    }

    // 2. Tạo dữ liệu bài (Cố định cấu trúc để không lỗi lá 8)
    const ten = ['TƯỚNG','SĨ','TƯỢNG','XE','PHÁO','NGỰA','CHỐT'];
    let fullDeck = [];
    for(let t of ten) {
        fullDeck.push({n:t, f:'Đ'}, {n:t, f:'Đ'}, {n:t, f:'N'}, {n:t, f:'N'});
    }
    fullDeck.sort(() => Math.random() - 0.5);

    // Lấy 12 lá chuẩn xác
    let m = [];
    let temp = [...fullDeck];
    try {
        for(let i=0; i<12; i++) {
            temp.splice(0,3); // Bỏ 3
            if(temp.length > 0) m.push(temp.shift()); // Lấy 1
        }
    } catch(e) { console.error("Lỗi chia bài"); }
    
    let laTT = (temp.length > 0) ? temp[0] : {n:'XE', f:'Đ'};

    // 3. Trải bài lên màn hình (Từng lá một)
    stt.innerText = "Đang trải 12 lá...";
    for(let i=1; i<=12; i++) {
        await ngu(150);
        let el = document.getElementById('slot-'+i);
        if(el && m[i-1]) {
            el.classList.add(mau);
            el.innerHTML += m[i-1].n + '<br>' + m[i-1].f;
            el.style.visibility = 'visible';
            el.style.opacity = '1';
        }
    }

    // 4. Tìm Gốc & Lá 13
    await ngu(500);
    let gocPos = -1;
    for(let i=11; i>=0; i--) { if(m[i] && m[i].n === laTT.n) { gocPos = i+1; break; } }
    
    let deckCuoi = [...m];
    if(gocPos === -1) {
        stt.innerText = "Lập lá 13...";
        deckCuoi.push(laTT);
        gocPos = 13;
        let s13 = document.getElementById('slot-13');
        s13.classList.add(mau, 'is-goc');
        s13.innerHTML += laTT.n + '<br>' + laTT.f;
        s13.style.visibility = 'visible';
        s13.style.opacity = '1';
    } else {
        document.getElementById('slot-'+gocPos).classList.add('is-goc');
        stt.innerText = "Gốc tại vị trí " + gocPos;
    }

    // 5. Nhảy nhịp (Logic nhịp đếm tách rời hoàn toàn)
    await ngu(800);
    let ptr = gocPos;
    let N = deckCuoi.length;
    
    for(let s=1; s<=5; s++) {
        stt.innerText = "Đang nhảy nhịp " + s + "...";
        let cur = ptr;
        for(let j=0; j<5; j++) {
            let scanEl = document.getElementById('slot-'+cur);
            if(scanEl) {
                scanEl.classList.add('is-scan');
                await ngu(150);
                scanEl.classList.remove('is-scan');
            }
            if(j < 4) {
                cur--;
                if(cur < 1) cur = N;
            }
        }
        // Sau khi nhảy 5 nhịp, chốt lá Linh Hồn
        let finalEl = document.getElementById('slot-'+cur);
        if(finalEl) finalEl.classList.add('is-picked');
        await ngu(600);
        ptr = cur - 1; 
        if(ptr < 1) ptr = N;
    }

    stt.innerText = "Hoàn tất quẻ Ngũ Linh!";
}
</script>
</body>
</html>
