<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NGŨ LINH TỨ SẮC</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #eee; }
        .khung { max-width: 380px; margin: auto; background: #fff; padding: 10px; border: 2px solid #000; }
        .o { border: 1px solid #333; height: 55px; margin: 2px; display: inline-block; width: 22%; vertical-align: top; font-size: 11px; font-weight: bold; background: #fff; padding-top: 5px; }
        .goc { background: #ff0 !important; border: 2px solid #f00 !important; }
        .lh { background: #faa !important; }
        button { width: 100%; padding: 15px; font-weight: bold; background: #d35400; color: #fff; border: none; font-size: 16px; margin-bottom: 10px; }
        h3 { font-size: 14px; margin: 10px 0 5px; background: #333; color: #fff; padding: 5px; }
        .Xanh { color: green; } .Vang { color: orange; } .Trang { color: #555; } .Do { color: red; }
    </style>
</head>
<body>

<div class="khung">
    <select id="mau_chon" style="width:100%; padding: 10px; margin-bottom: 10px;">
        <option value="Xanh">CÔNG DANH (XANH)</option>
        <option value="Vang">TÀI LỘC (VÀNG)</option>
        <option value="Trang">GIA ĐẠO (TRẮNG)</option>
        <option value="Do">TÌNH DUYÊN (ĐỎ)</option>
    </select>

    <button onclick="bat_dau()">BẤM ĐỂ HIỆN QUẺ</button>

    <div id="ket_qua" style="display:none; text-align: left;">
        <h3>1. TRẬN PHÁP (LÁ 13 Ở TRÊN)</h3>
        <div id="vung_13" style="text-align:center"></div>
        <div id="vung_12" style="text-align:center"></div>

        <h3>2. 5 LÁ LINH HỒN</h3>
        <div id="vung_lh" style="text-align:center"></div>

        <h3>3. 3 KHÓM (Q.KHỨ - H.TẠI - T.LAI)</h3>
        <div id="vung_khom" style="text-align:center"></div>
    </div>
</div>

<script>
function bat_dau() {
    var mau = document.getElementById('mau_chon').value;
    var ten = ['TƯỚNG','SĨ','TƯỢNG','XE','PHÁO','NGỰA','CHỐT'];
    var d = [];
    // Tạo bộ bài
    for(var i=0; i<ten.length; i++) {
        d.push({n:ten[i], f:'Đ'}, {n:ten[i], f:'Đ'}, {n:n=ten[i], f:'N'}, {n:n=ten[i], f:'N'});
    }
    d.sort(function(){ return 0.5 - Math.random() });

    // Rút 12 lá
    var m = []; var tmp = d.slice();
    for(var i=0; i<12; i++) { tmp.splice(0,3); m.push(tmp.shift()); }
    var la13 = tmp[0];

    // Tìm Gốc
    var goc = -1;
    for(var i=11; i>=0; i--) { if(m[i].n == la13.n) { goc = i+1; break; } }
    var full = m.slice(); if(goc == -1) { full.push(la13); goc = 13; }

    // Tìm Linh hồn
    var lhs = []; var p = goc;
    for(var s=0; s<5; s++) {
        var c = p; for(var j=0; j<4; j++) { c--; if(c<1) c=full.length; }
        lhs.push(full[c-1]); p = c-1; if(p<1) p=full.length;
    }

    // HIỂN THỊ
    document.getElementById('ket_qua').style.display = 'block';
    
    // In 12 lá
    var h12 = "";
    for(var i=12; i>=1; i--) {
        var cls = "o " + mau + (goc == i ? " goc" : "");
        h12 += "<div class='"+cls+"'><b>"+i+"</b><br>"+m[i-1].n+"<br>"+m[i-1].f+"</div>";
    }
    document.getElementById('vung_12').innerHTML = h12;

    // In lá 13
    if(goc == 13) {
        document.getElementById('vung_13').innerHTML = "<div class='o "+mau+" goc'><b>13</b><br>"+la13.n+"<br>"+la13.f+"</div>";
    } else { document.getElementById('vung_13').innerHTML = "(Lá 13 ẩn)"; }

    // In Linh hồn
    var hlh = "";
    for(var i=0; i<5; i++) {
        hlh += "<div class='o lh "+mau+"'>L"+(i+1)+"<br>"+lhs[i].n+"<br>"+lhs[i].f+"</div>";
    }
    document.getElementById('vung_lh').innerHTML = hlh;

    // In Khóm
    var hk = ""; var sh = m.slice().sort(function(){ return 0.5 - Math.random() });
    for(var i=0; i<12; i++) {
        hk += "<div class='o "+mau+"'>"+sh[i].n+"<br>"+sh[i].f+"</div>";
    }
    document.getElementById('vung_khom').innerHTML = hk;
}
</script>
</body>
</html>
