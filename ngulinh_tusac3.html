<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trận Pháp Ngũ Linh - Nghệ Thuật Trải Bài</title>
    <style>
        :root { --bg: #f0f2f5; --accent: #d35400; --gold: #f1c40f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        
        .menu-bar { display: flex; gap: 10px; margin-bottom: 20px; background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 10px; }
        select { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; outline: none; }
        button { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* Animation cho lá bài */
        @keyframes dealIn {
            from { transform: translateY(-50px) rotateY(90deg); opacity: 0; }
            to { transform: translateY(0) rotateY(0deg); opacity: 1; }
        }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; min-height: 100px; }
        .card { 
            background: #fff; border: 1px solid #ccc; border-radius: 6px; 
            padding: 15px 2px; text-align: center; font-weight: bold; 
            font-size: 14px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            animation: dealIn 0.5s ease forwards; opacity: 0;
        }
        .card.back { background: linear-gradient(45deg, #2c3e50, #34495e); color: transparent !important; border-color: #1a252f; }
        .card.active { border: 2px solid var(--gold); background: #fffde7; box-shadow: 0 0 15px rgba(241, 196, 15, 0.5); }
        
        .num { position: absolute; top: 2px; right: 4px; font-size: 10px; color: #aaa; }
        .c-Xanh { color: #27ae60; } .c-Vang { color: #e67e22; } .c-Trang { color: #555; } .c-Do { color: #c0392b; }

        .status-msg { text-align: center; font-style: italic; color: var(--accent); margin: 10px 0; font-weight: bold; height: 20px; }
        
        .console { background: #1a1a1a; color: #00ff00; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 12px; white-space: pre-wrap; line-height: 1.6; display: none; transition: 1s; border-left: 5px solid var(--gold); }
        
        .khom-title { font-size: 13px; font-weight: bold; color: #2c3e50; margin: 15px 0 5px; text-transform: uppercase; border-left: 3px solid var(--accent); padding-left: 8px; }
        
        /* Hiệu ứng rung khi chọn lá Linh hồn */
        .picking { animation: shake 0.3s infinite; border-color: var(--gold) !important; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, 1px); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>TRẬN PHÁP NGŨ LINH</h2>
    
    <div class="menu-bar">
        <select id="colorSelect">
            <option value="Xanh">CÔNG DANH (XANH)</option>
            <option value="Vang">TÀI LỘC (VÀNG CAM)</option>
            <option value="Trang">GIA ĐẠO (XÁM)</option>
            <option value="Do">TÌNH DUYÊN (ĐỎ)</option>
        </select>
        <button id="mainBtn" onclick="startRitual()">KHAI QUẺ</button>
    </div>

    <div id="status" class="status-msg"></div>

    <div id="matrixGrid" class="grid"></div>
    
    <div id="khomArea" style="display:none;">
        <div class="khom-title">Khóm 1: Quá khứ</div>
        <div id="khom1" class="grid"></div>
        <div class="khom-title">Khóm 2: Hiện tại</div>
        <div id="khom2" class="grid"></div>
        <div class="khom-title">Khóm 3: Tương lai</div>
        <div id="khom3" class="grid"></div>
    </div>

    <div id="finalLog" class="console"></div>
    <button id="copyBtn" style="display:none; width:100%; padding:12px; background:#27ae60; color:white; border:none; border-radius:8px; font-weight:bold; margin-top:10px;" onclick="copyOutput()">SAO CHÉP KẾT QUẢ</button>
</div>

<script>
const sleep = ms => new Promise(res => setTimeout(res, ms));

const Engine = {
    initDeck: (col) => {
        const names = ['TƯỚNG', 'SĨ', 'TƯỢNG', 'XE', 'PHÁO', 'NGỰA', 'CHỐT'];
        const faces = ['Đ', 'N'];
        let d = [];
        names.forEach(n => faces.forEach(f => { d.push({n, f, col}, {n, f, col}); }));
        return d.sort(() => Math.random() - 0.5);
    },

    dealMatrix: (deck) => {
        let m = [], disc = [], tmp = [...deck];
        while (m.length < 12) {
            disc.push(tmp.shift(), tmp.shift(), tmp.shift());
            m.push(tmp.shift());
        }
        return { m, laTT: tmp.length > 0 ? tmp[0] : disc[0] };
    }
};

async function startRitual() {
    const btn = document.getElementById('mainBtn');
    const status = document.getElementById('status');
    const color = document.getElementById('colorSelect').value;
    const cClass = `c-${color}`;
    
    // Reset
    btn.disabled = true;
    document.getElementById('matrixGrid').innerHTML = "";
    document.getElementById('khomArea').style.display = "none";
    document.getElementById('finalLog').style.display = "none";
    document.getElementById('copyBtn').style.display = "none";

    // 1. Giai đoạn: Chia bài vào Ma trận
    status.innerText = "Đang bỏ 3 lấy 1 để lập Ma trận...";
    const { m, laTT } = Engine.dealMatrix(Engine.initDeck(color));
    
    for (let i = 0; i < 12; i++) {
        await sleep(400); // Chậm lại để tạo cảm giác chia bài
        const cardDiv = document.createElement('div');
        cardDiv.className = `card ${cClass}`;
        cardDiv.id = `card-${i+1}`;
        cardDiv.innerHTML = `<span class="num">${i+1}</span>${m[i].n}<br>${m[i].f}`;
        // Render từ 12 về 1 để đúng sơ đồ
        document.getElementById('matrixGrid').prepend(cardDiv);
    }

    // 2. Giai đoạn: Xác định điểm Gốc
    await sleep(800);
    status.innerText = "Đang tìm lá Tượng Trưng...";
    let startPos = -1;
    for (let i = 11; i >= 0; i--) { if (m[i].n === laTT.n) { startPos = i + 1; break; } }
    
    let finalM = [...m];
    if (startPos !== -1) {
        document.getElementById(`card-${startPos}`).classList.add('active');
        status.innerText = `Tìm thấy ${laTT.n} tại vị trí ${startPos}`;
    } else {
        status.innerText = "Không tìm thấy lá trùng, hạ lá 13 xuống...";
        await sleep(1000);
        finalM.push(laTT);
        const card13 = document.createElement('div');
        card13.className = `card ${cClass} active`;
        card13.id = `card-13`;
        card13.innerHTML = `<span class="num">13</span>${laTT.n}<br>${laTT.f}`;
        document.getElementById('matrixGrid').prepend(card13);
        startPos = 13;
    }

    await sleep(1500);

    // 3. Giai đoạn: Nhảy 5 nhịp Linh Hồn
    status.innerText = "Bắt đầu nhảy 5 nhịp Linh hồn...";
    let steps = [];
    let N = finalM.length;
    let pointer = startPos;

    for (let s = 0; s < 5; s++) {
        let current = pointer;
        for (let j = 0; j < 5; j++) {
            // Hiệu ứng quét qua từng lá
            const el = document.getElementById(`card-${current}`);
            if(el) el.style.background = "var(--gold)";
            await sleep(150);
            if(el) el.style.background = (current === startPos) ? "#fffde7" : "#fff";
            
            if (j < 4) {
                current--;
                if (current < 1) current = N;
            }
        }
        steps.push({ pos: current, card: finalM[current - 1] });
        const finalEl = document.getElementById(`card-${current}`);
        if(finalEl) finalEl.classList.add('picking');
        status.innerText = `Lần ${s+1}: Dừng tại lá vị trí ${current}`;
        await sleep(800);
        if(finalEl) finalEl.classList.remove('picking');
        
        pointer = current - 1;
        if (pointer < 1) pointer = N;
    }

    // 4. Giai đoạn: Chia 3 Khóm
    await sleep(1000);
    status.innerText = "Gom bài, xào trộn và chia 3 khóm Quá khứ - Hiện tại - Tương lai...";
    document.getElementById('khomArea').style.display = "block";
    const deckKhom = [...m].sort(() => Math.random() - 0.5);
    
    for (let k = 1; k <= 3; k++) {
        const gridK = document.getElementById(`khom${k}`);
        gridK.innerHTML = "";
        const subData = deckKhom.slice((k-1)*4, k*4);
        for (let j = 0; j < 4; j++) {
            await sleep(300);
            const c = document.createElement('div');
            c.className = `card back`; // Ban đầu úp bài
            c.innerHTML = `<span class="num">${j+1}</span>?`;
            gridK.appendChild(c);
            
            // Sau đó lật ngửa
            setTimeout(() => {
                c.classList.remove('back');
                c.classList.add(cClass);
                c.innerHTML = `<span class="num">${j+1}</span>${subData[j].n}<br>${subData[j].f}`;
            }, 1000 + (j*200));
        }
    }

    // Kết thúc
    await sleep(2000);
    status.innerText = "Quẻ đã hoàn tất. Mời xem chi tiết lời giải.";
    
    let logText = `--- KẾT QUẢ NGŨ LINH ---\nBắt đầu: Vị trí ${startPos}\n`;
    steps.forEach((s, i) => logText += `Lần ${i+1}: Vị trí ${s.pos} -> ${s.card.n} ${s.card.f}\n`);
    
    document.getElementById('finalLog').innerText = logText;
    document.getElementById('finalLog').style.display = "block";
    document.getElementById('copyBtn').style.display = "block";
    btn.disabled = false;
}

function copyOutput() {
    const t = document.createElement('textarea');
    t.value = document.getElementById('finalLog').innerText;
    document.body.appendChild(t); t.select();
    document.execCommand('copy'); document.body.removeChild(t);
    alert("Đã sao chép quẻ!");
}
</script>
</body>
</html>
