<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngũ Linh Tứ Sắc - Bản Fix Lỗi Vĩnh Viễn</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .menu { display: flex; gap: 10px; margin-bottom: 20px; }
        select, button { padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; flex: 1; }
        button { background: #d35400; color: #fff; font-weight: bold; border: none; cursor: pointer; }
        
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 20px; }
        .btn-step { padding: 10px 0; font-size: 11px; font-weight: bold; background: #eee; border: 1px solid #bbb; border-radius: 4px; cursor: pointer; }
        .btn-step:disabled { background: #ddd; color: #999; border: 1px dashed #ccc; }
        .btn-step.active { background: #fffde7; border: 2px solid #f1c40f; box-shadow: 0 0 5px rgba(241,196,15,0.5); }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .card { 
            background: #fff; border: 1px solid #ddd; border-radius: 6px; min-height: 70px; 
            display: none; align-items: center; justify-content: center; text-align: center; 
            font-size: 13px; font-weight: bold; position: relative; flex-direction: column;
        }
        .num { position: absolute; top: 2px; right: 4px; font-size: 9px; color: #aaa; }
        .Xanh { color: #27ae60; } .Vang { color: #e67e22; } .Trang { color: #555; } .Do { color: #c0392b; }
        .goc { border: 2.5px solid #f1c40f !important; background: #fffde7; box-shadow: 0 0 10px rgba(241,196,15,0.4); }
        .lh { border: 2px solid #d35400 !important; }
        h4 { font-size: 12px; color: #888; border-bottom: 1px solid #eee; margin: 20px 0 10px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div class="menu">
        <select id="selMau">
            <option value="Xanh">CÔNG DANH</option>
            <option value="Vang">TÀI LỘC</option>
            <option value="Trang">GIA ĐẠO</option>
            <option value="Do">TÌNH DUYÊN</option>
        </select>
        <button onclick="khoiTaoGame()">XÀO BÀI</button>
    </div>

    <div id="gameArea" style="display:none;">
        <div class="btn-grid">
            <script>
                for(let i=1; i<=12; i++) document.write(`<button id="b${i}" class="btn-step" onclick="lat(${i})" disabled>Lần ${i}</button>`);
            </script>
            <button id="b13" class="btn-step" onclick="lat(13)" disabled style="grid-column: span 4; background:#333; color:#fff;">Lần 13: LÁ TƯỢNG TRƯNG</button>
        </div>

        <h4>TRẬN PHÁP NGŨ LINH</h4>
        <div id="v13" style="display:flex; justify-content:center; margin-bottom:8px;"></div>
        <div class="grid" id="mainGrid">
            <script>
                for(let i=12; i>=1; i--) document.write(`<div id="c${i}" class="card"><span class="num">${i}</span><div class="t"></div></div>`);
            </script>
        </div>

        <div id="finalPart" style="display:none;">
            <h4>5 LÁ LINH HỒN</h4>
            <div id="lhGrid" class="grid"></div>
            <h4>3 KHÓM THỜI GIAN</h4>
            <div id="khomGrid" class="grid"></div>
        </div>
    </div>
</div>

<script>
var state = { m:[], la13:null, mau:'' };

function khoiTaoGame() {
    state.mau = document.getElementById('selMau').value;
    
    // BỘ BÀI TỨ SẮC CHUẨN (112 LÁ)
    const names = ['TƯỚNG','SĨ','TƯỢNG','XE','PHÁO','NGỰA','CHỐT'];
    let deck = [];
    // Tạo 4 màu (Xanh, Vàng, Trắng, Đỏ), mỗi màu 4 lá cho mỗi loại quân
    ['X','V','T','D'].forEach(c => {
        names.forEach(n => {
            for(let i=0; i<4; i++) deck.push({n, f: Math.random() > 0.5 ? 'Đ' : 'N'});
        });
    });
    
    // Xào bài thật kỹ
    for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
    }

    // Chia bài theo đúng logic: Bỏ 3 lấy 1
    state.m = [];
    let p = 0;
    for(let i=0; i<12; i++) {
        p += 3; // Bỏ 3 lá
        state.m.push(deck[p]); // Lấy lá thứ 4
        p += 1;
    }
    state.la13 = deck[p + 3]; // Lá thứ 13 sau khi bỏ tiếp 3 lá

    // Reset giao diện
    document.getElementById('gameArea').style.display = 'block';
    document.getElementById('finalPart').style.display = 'none';
    document.getElementById('v13').innerHTML = "";
    
    for(let i=1; i<=13; i++) {
        let btn = document.getElementById('b'+i);
        btn.disabled = (i !== 1);
        btn.className = 'btn-step' + (i === 1 ? ' active' : '');
        if(i <= 12) {
            let card = document.getElementById('c'+i);
            card.style.display = 'none';
            card.className = 'card ' + state.mau;
            card.querySelector('.t').innerHTML = "";
        }
    }
}

function lat(n) {
    let btn = document.getElementById('b'+n);
    btn.disabled = true;
    btn.className = 'btn-step';

    if(n <= 12) {
        let card = document.getElementById('c'+n);
        card.querySelector('.t').innerHTML = state.m[n-1].n + '<br>' + state.m[n-1].f;
        card.style.display = 'flex';
        
        let nextBtn = document.getElementById('b'+(n+1));
        if(nextBtn) {
            nextBtn.disabled = false;
            nextBtn.className = 'btn-step active';
        }
    } else {
        tinhToanKetThuc();
    }
}

function tinhToanKetThuc() {
    // 1. Tìm Gốc
    let gocIdx = -1;
    for(let i=11; i>=0; i--) {
        if(state.m[i].n === state.la13.n) { gocIdx = i; break; }
    }

    let arrayLinhHon = [...state.m];
    let startPos = gocIdx + 1;

    if(gocIdx === -1) {
        arrayLinhHon.push(state.la13);
        startPos = 13;
        document.getElementById('v13').innerHTML = `<div class="card ${state.mau} goc" style="display:flex; width:23.5%"><span class="num">13</span>${state.la13.n}<br>${state.la13.f}</div>`;
    } else {
        document.getElementById('c'+startPos).classList.add('goc');
    }

    // 2. Tính 5 Linh Hồn (Nhảy 4 bước ngược)
    let lhs = [];
    let currentPtr = startPos;
    let N = arrayLinhHon.length;

    for(let i=0; i<5; i++) {
        let target = currentPtr;
        for(let j=0; j<4; j++) {
            target--;
            if(target < 1) target = N;
        }
        lhs.push(arrayLinhHon[target - 1]);
        currentPtr = target - 1;
        if(currentPtr < 1) currentPtr = N;
    }

    // Hiển thị 5 Linh hồn
    let lhH = "";
    lhs.forEach((x, i) => {
        lhH += `<div class="card ${state.mau} lh" style="display:flex"><span class="num">L${i+1}</span>${x.n}<br>${x.f}</div>`;
    });
    document.getElementById('lhGrid').innerHTML = lhH;

    // Hiển thị 3 Khóm (Xào lại 12 lá bài gốc)
    let khomDeck = [...state.m].sort(() => Math.random() - 0.5);
    let khH = "";
    khomDeck.forEach(x => {
        khH += `<div class="card ${state.mau}" style="display:flex">${x.n}<br>${x.f}</div>`;
    });
    document.getElementById('khomGrid').innerHTML = khH;

    document.getElementById('finalPart').style.display = 'block';
}
</script>
</body>
</html>
