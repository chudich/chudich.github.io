<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ngũ Linh Tứ Sắc - Nghệ Thuật Trải Bài</title>
    <style>
        :root { --bg: #fdfdfd; --accent: #d35400; --gold: #f1c40f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; font-size: 1.2rem; margin: 10px 0; }
        
        .menu-bar { display: flex; gap: 8px; margin-bottom: 15px; }
        select { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; outline: none; }
        button { padding: 10px 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }

        .status { text-align: center; color: var(--accent); font-weight: bold; min-height: 24px; margin-bottom: 10px; font-size: 14px; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 15px; }
        .card { 
            background: #fff; border: 1.5px solid #eee; border-radius: 8px; 
            padding: 12px 2px; text-align: center; font-weight: bold; font-size: 13px;
            position: relative; min-height: 50px; opacity: 0; transform: translateY(10px);
            transition: all 0.3s ease; display: flex; flex-direction: column; justify-content: center;
        }
        .card.visible { opacity: 1; transform: translateY(0); }
        .card.active { border-color: var(--gold); background: #fffde7; box-shadow: 0 0 10px rgba(241,196,15,0.4); }
        .card.scan { background: var(--gold) !important; transform: scale(1.05); }
        .card.picked { border-color: var(--accent); border-width: 2px; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .num { position: absolute; top: 2px; right: 4px; font-size: 9px; color: #bbb; }
        .c-Xanh { color: #27ae60; } .c-Vang { color: #e67e22; } .c-Trang { color: #555; } .c-Do { color: #c0392b; }

        .khom-wrap { margin-top: 20px; border-top: 2px dashed #eee; padding-top: 15px; display: none; }
        .khom-name { font-size: 12px; font-weight: bold; color: #7f8c8d; margin: 10px 0 5px; text-transform: uppercase; }
        .card.back { background: #2c3e50 !important; color: transparent !important; }

        .log-box { background: #1a1a1a; color: #00ff00; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 12px; white-space: pre-wrap; display: none; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>TRẬN PHÁP NGŨ LINH</h2>
    
    <div class="menu-bar">
        <select id="colorSel">
            <option value="Xanh">CÔNG DANH (XANH)</option>
            <option value="Vang">TÀI LỘC (VÀNG CAM)</option>
            <option value="Trang">GIA ĐẠO (XÁM)</option>
            <option value="Do">TÌNH DUYÊN (ĐỎ)</option>
        </select>
        <button id="runBtn" onclick="process()">KHAI QUẺ</button>
    </div>

    <div id="status" class="status"></div>
    <div id="matrix" class="grid"></div>
    
    <div id="khomArea" class="khom-wrap">
        <div class="khom-name">Quá khứ</div><div id="k1" class="grid"></div>
        <div class="khom-name">Hiện tại</div><div id="k2" class="grid"></div>
        <div class="khom-name">Tương lai</div><div id="k3" class="grid"></div>
    </div>

    <div id="finalLog" class="log-box"></div>
    <button id="copyBtn" style="display:none; width:100%; padding:12px; background:#27ae60; color:white; border:none; border-radius:8px; margin-top:10px;" onclick="copy()">SAO CHÉP KẾT QUẢ</button>
</div>

<script>
const wait = ms => new Promise(r => setTimeout(r, ms));

const App = {
    deck: (c) => {
        const n = ['TƯỚNG', 'SĨ', 'TƯỢNG', 'XE', 'PHÁO', 'NGỰA', 'CHỐT'];
        const f = ['Đ', 'N'];
        let d = [];
        n.forEach(v => f.forEach(x => { d.push({v, x, c}, {v, x, c}); }));
        return d.sort(() => Math.random() - 0.5);
    },
    deal: (d) => {
        let m = [], disc = [], tmp = [...d];
        while (m.length < 12) {
            disc.push(tmp.shift(), tmp.shift(), tmp.shift());
            m.push(tmp.shift());
        }
        return { m, laTT: tmp.length > 0 ? tmp[0] : disc[0] };
    }
};

async function process() {
    const btn = document.getElementById('runBtn');
    const stt = document.getElementById('status');
    const color = document.getElementById('colorSel').value;
    const cls = `c-${color}`;
    
    btn.disabled = true;
    document.getElementById('matrix').innerHTML = "";
    document.getElementById('khomArea').style.display = "none";
    document.getElementById('finalLog').style.display = "none";
    document.getElementById('copyBtn').style.display = "none";

    // 1. Chia bài Matrix
    stt.innerText = "Đang bỏ 3 lấy 1...";
    const { m, laTT } = App.deal(App.deck(color));
    for (let i = 0; i < 12; i++) {
        await wait(250);
        const card = document.createElement('div');
        card.className = `card visible ${cls}`;
        card.id = `m-${i+1}`;
        card.innerHTML = `<span class="num">${i+1}</span>${m[i].v}<br>${m[i].x}`;
        document.getElementById('matrix').prepend(card);
    }

    // 2. Tìm điểm Gốc
    await wait(600);
    let start = -1;
    for (let i = 11; i >= 0; i--) { if (m[i].v === laTT.v) { start = i + 1; break; } }
    
    let finalM = [...m];
    if (start !== -1) {
        document.getElementById(`m-${start}`).classList.add('active');
        stt.innerText = `Điểm Gốc tại vị trí ${start}`;
    } else {
        stt.innerText = "Hạ lá 13 xuống bên trái lá 12...";
        await wait(800);
        finalM.push(laTT);
        const c13 = document.createElement('div');
        c13.className = `card visible active ${cls}`;
        c13.id = `m-13`;
        c13.innerHTML = `<span class="num">13</span>${laTT.v}<br>${laTT.x}`;
        document.getElementById('matrix').prepend(c13);
        start = 13;
    }

    // 3. Nhảy Linh Hồn
    await wait(1000);
    let steps = [], N = finalM.length, ptr = start;
    for (let s = 0; s < 5; s++) {
        stt.innerText = `Lần ${s+1}: Đang đếm nhịp...`;
        let cur = ptr;
        for (let j = 0; j < 5; j++) {
            const el = document.getElementById(`m-${cur}`);
            if (el) el.classList.add('scan');
            await wait(150);
            if (el) el.classList.remove('scan');
            if (j < 4) { cur--; if (cur < 1) cur = N; }
        }
        steps.push({ p: cur, c: finalM[cur-1] });
        const pEl = document.getElementById(`m-${cur}`);
        if (pEl) pEl.classList.add('picked');
        await wait(600);
        ptr = cur - 1; if (ptr < 1) ptr = N;
    }

    // 4. 3 Khóm
    stt.innerText = "Đang xào bài chia 3 khóm...";
    document.getElementById('khomArea').style.display = "block";
    const dkK = [...m].sort(() => Math.random() - 0.5);
    for (let k = 1; k <= 3; k++) {
        const g = document.getElementById(`k${k}`);
        g.innerHTML = "";
        const sub = dkK.slice((k-1)*4, k*4);
        for (let j = 0; j < 4; j++) {
            await wait(200);
            const c = document.createElement('div');
            c.className = `card visible back`;
            c.innerHTML = `?`;
            g.appendChild(c);
            setTimeout(() => {
                c.classList.remove('back');
                c.classList.add(cls);
                c.innerHTML = `<span class="num">${j+1}</span>${sub[j].v}<br>${sub[j].x}`;
            }, 800 + (j*150));
        }
    }

    await wait(1500);
    stt.innerText = "Hoàn tất quẻ Ngũ Linh.";
    let log = `--- QUẺ NGŨ LINH ---\nGốc: Vị trí ${start}\n`;
    steps.forEach((s, i) => log += `Lần ${i+1}: Vị trí ${s.p} (${s.c.v} ${s.c.x})\n`);
    document.getElementById('finalLog').innerText = log;
    document.getElementById('finalLog').style.display = "block";
    document.getElementById('copyBtn').style.display = "block";
    btn.disabled = false;
}

function copy() {
    const t = document.createElement('textarea');
    t.value = document.getElementById('finalLog').innerText;
    document.body.appendChild(t); t.select();
    document.execCommand('copy'); document.body.removeChild(t);
    alert("Đã sao chép!");
}
</script>
</body>
</html>
