<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ngũ Linh - Bản Fix Tuyệt Đối</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 10px; margin: 0; }
        .box { max-width: 400px; margin: auto; background: #fff; padding: 15px; border-radius: 10px; }
        .stt { text-align: center; font-weight: bold; color: #d35400; margin: 10px 0; height: 20px; font-size: 14px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        
        /* Các ô bài cố định - Quan trọng để không bị trắng */
        .s { 
            background: #fff; border: 1px solid #ddd; border-radius: 5px; 
            min-height: 60px; display: flex; align-items: center; justify-content: center; 
            text-align: center; font-size: 12px; font-weight: bold; position: relative;
            visibility: hidden; opacity: 0; transition: 0.3s;
        }
        .n { position: absolute; top: 2px; right: 3px; font-size: 9px; color: #999; }
        
        /* Màu sắc & Hiệu ứng */
        .Xanh { color: #27ae60; } .Vang { color: #e67e22; } .Trang { color: #555; } .Do { color: #c0392b; }
        .goc { border: 2px solid #f1c40f !important; background: #fffde7; }
        .scan { background: #f1c40f !important; transform: scale(1.1); }
        .pick { border: 2px solid #d35400 !important; box-shadow: 0 0 8px rgba(211,84,0,0.5); }
        .back { background: #2c3e50 !important; color: transparent !important; }
    </style>
</head>
<body>

<div class="box">
    <div style="display:flex; gap:5px; margin-bottom:10px;">
        <select id="m" style="flex:1; padding:10px; border-radius:5px;">
            <option value="Xanh">CÔNG DANH</option>
            <option value="Vang">TÀI LỘC</option>
            <option value="Trang">GIA ĐẠO</option>
            <option value="Do">TÌNH DUYÊN</option>
        </select>
        <button onclick="chay()" style="padding:10px 20px; background:#d35400; color:#fff; border:none; border-radius:5px; font-weight:bold;">KHAI QUẺ</button>
    </div>

    <div id="txt" class="stt">Chào mừng bạn!</div>

    <div style="display:flex; justify-content:center; margin-bottom:5px;">
        <div id="o13" class="s"><span class="n">13</span><div class="d"></div></div>
    </div>

    <div class="grid">
        <div id="o12" class="s"><span class="n">12</span><div class="d"></div></div>
        <div id="o11" class="s"><span class="n">11</span><div class="d"></div></div>
        <div id="o10" class="s"><span class="n">10</span><div class="d"></div></div>
        <div id="o9" class="s"><span class="n">9</span><div class="d"></div></div>
        <div id="o8" class="s"><span class="n">8</span><div class="d"></div></div>
        <div id="o7" class="s"><span class="n">7</span><div class="d"></div></div>
        <div id="o6" class="s"><span class="n">6</span><div class="d"></div></div>
        <div id="o5" class="s"><span class="n">5</span><div class="d"></div></div>
        <div id="o4" class="s"><span class="n">4</span><div class="d"></div></div>
        <div id="o3" class="s"><span class="n">3</span><div class="d"></div></div>
        <div id="o2" class="s"><span class="n">2</span><div class="d"></div></div>
        <div id="o1" class="s"><span class="n">1</span><div class="d"></div></div>
    </div>

    <div id="areaK" style="display:none; margin-top:15px; border-top:1px dashed #ccc; padding-top:10px;">
        <div class="grid" id="khomGrid"></div>
    </div>
</div>

<script>
const wait = ms => new Promise(r => setTimeout(r, ms));

async function chay() {
    const txt = document.getElementById('txt');
    const mau = document.getElementById('m').value;
    
    // 1. Reset sạch sẽ
    for(let i=1; i<=13; i++) {
        let el = document.getElementById('o'+i);
        el.className = 's';
        el.style.visibility = 'hidden';
        el.style.opacity = '0';
        el.querySelector('.d').innerText = '';
    }
    document.getElementById('areaK').style.display = 'none';

    // 2. Tạo bài
    const ten = ['TƯỚNG','SĨ','TƯỢNG','XE','PHÁO','NGỰA','CHỐT'];
    let d = [];
    ten.forEach(n => d.push({n, f:'Đ'}, {n, f:'Đ'}, {n, f:'N'}, {n, f:'N'}));
    d.sort(() => Math.random() - 0.5);

    let m = [];
    let tmp = [...d];
    for(let i=0; i<12; i++) { tmp.splice(0,3); m.push(tmp.shift()); }
    let la13 = tmp[0];

    // 3. Trải bài (SỬA LỖI TREO LÁ 7)
    txt.innerText = "Đang trải trận pháp...";
    for(let i=1; i<=12; i++) {
        await wait(100);
        let el = document.getElementById('o'+i);
        if(el) {
            el.classList.add(mau);
            el.querySelector('.d').innerHTML = m[i-1].n + '<br>' + m[i-1].f;
            el.style.visibility = 'visible';
            el.style.opacity = '1';
        }
    }

    // 4. Tìm Gốc
    await wait(400);
    let goc = -1;
    for(let i=11; i>=0; i--) { if(m[i].n === la13.n) { goc = i+1; break; } }
    
    let finalDeck = [...m];
    if(goc === -1) {
        finalDeck.push(la13);
        goc = 13;
        let o13 = document.getElementById('o13');
        o13.classList.add(mau, 'goc');
        o13.querySelector('.d').innerHTML = la13.n + '<br>' + la13.f;
        o13.style.visibility = 'visible';
        o13.style.opacity = '1';
    } else {
        document.getElementById('o'+goc).classList.add('goc');
    }
    txt.innerText = "Gốc tại vị trí " + goc;

    // 5. Tìm 5 Linh hồn (FIXED)
    await wait(600);
    let ptr = goc;
    let N = finalDeck.length;
    for(let s=1; s<=5; s++) {
        txt.innerText = "Linh hồn lần " + s + "...";
        let cur = ptr;
        for(let j=0; j<5; j++) {
            let el = document.getElementById('o'+cur);
            if(el) el.classList.add('scan');
            await wait(120);
            if(el) el.classList.remove('scan');
            if(j<4) { cur--; if(cur<1) cur = N; }
        }
        document.getElementById('o'+cur).classList.add('pick');
        await wait(500);
        ptr = cur - 1; if(ptr < 1) ptr = N;
    }

    // 6. 3 Khóm (FIXED)
    txt.innerText = "Chia 3 khóm thời gian...";
    const kGrid = document.getElementById('khomGrid');
    kGrid.innerHTML = "";
    document.getElementById('areaK').style.display = 'block';
    let shuf = [...m].sort(() => Math.random() - 0.5);
    for(let i=0; i<12; i++) {
        let c = document.createElement('div');
        c.className = 's visible back';
        c.innerHTML = '?';
        kGrid.appendChild(c);
        setTimeout(() => {
            c.className = 's visible ' + mau;
            c.innerHTML = shuf[i].n + '<br>' + shuf[i].f;
        }, 1000 + (i*80));
    }
    await wait(2000);
    txt.innerText = "Quẻ Ngũ Linh đã sẵn sàng!";
}
</script>
</body>
</html>
