<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ngũ Linh Tứ Sắc - Ổn Định Tuyệt Đối</title>
    <style>
        :root { --bg: #f4f4f9; --accent: #d35400; --gold: #f1c40f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .menu { display: flex; gap: 8px; margin-bottom: 15px; background: #eee; padding: 10px; border-radius: 10px; }
        select { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        button { padding: 10px 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.5; }

        .status { text-align: center; color: var(--accent); font-weight: bold; min-height: 30px; margin: 10px 0; font-size: 14px; }
        
        /* Grid 4 cột cố định */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .slot { 
            background: #fff; border: 1px solid #ddd; border-radius: 8px; 
            min-height: 60px; display: flex; align-items: center; justify-content: center; 
            text-align: center; font-weight: bold; font-size: 13px; position: relative;
            transition: all 0.2s; visibility: hidden; /* Ẩn khi chưa có bài */
        }
        .slot.has-card { visibility: visible; border: 1.5px solid #ccc; }
        .num { position: absolute; top: 2px; right: 4px; font-size: 9px; color: #aaa; }
        
        .c-Xanh { color: #27ae60; } .c-Vang { color: #e67e22; } .c-Trang { color: #555; } .c-Do { color: #c0392b; }
        
        /* Hiệu ứng */
        .active-tt { border: 2.5px solid var(--gold) !important; background: #fffde7 !important; }
        .scanning { background: var(--gold) !important; transform: scale(1.1); z-index: 5; }
        .picked { border: 2.5px solid var(--accent) !important; box-shadow: 0 0 8px rgba(211,84,0,0.4); }
        .card-back { background: #2c3e50 !important; color: transparent !important; }

        .log { background: #1a1a1a; color: #00ff00; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 12px; white-space: pre-wrap; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; font-size:1.1rem;">TRẬN PHÁP NGŨ LINH</h2>
    
    <div class="menu">
        <select id="colorSelect">
            <option value="Xanh">CÔNG DANH (XANH)</option>
            <option value="Vang">TÀI LỘC (VÀNG CAM)</option>
            <option value="Trang">GIA ĐẠO (XÁM)</option>
            <option value="Do">TÌNH DUYÊN (ĐỎ)</option>
        </select>
        <button id="btnRun" onclick="start()">KHAI QUẺ</button>
    </div>

    <div id="stt" class="status">Sẵn sàng...</div>

    <div id="slot-13" class="slot" style="margin: 0 auto 10px; width: 23%;"></div>
    <div id="mainGrid" class="grid">
        </div>
    
    <div id="khomArea" style="display:none; border-top:1px solid #ddd; padding-top:10px;">
        <div style="font-size:11px; font-weight:bold; color:#888;">QUÁ KHỨ - HIỆN TẠI - TƯƠNG LAI</div>
        <div id="k1" class="grid"></div>
        <div id="k2" class="grid"></div>
        <div id="k3" class="grid"></div>
    </div>

    <div id="finalLog" class="log"></div>
</div>

<script>
const wait = ms => new Promise(r => setTimeout(r, ms));

// Khởi tạo khung lưới cố định
function initSlots() {
    const grid = document.getElementById('mainGrid');
    grid.innerHTML = "";
    for (let i = 12; i >= 1; i--) {
        grid.innerHTML += `<div id="slot-${i}" class="slot"><span class="num">${i}</span></div>`;
    }
}
initSlots();

async function start() {
    const btn = document.getElementById('btnRun');
    const stt = document.getElementById('stt');
    const color = document.getElementById('colorSelect').value;
    const cls = `c-${color}`;
    
    btn.disabled = true;
    // Reset toàn bộ slot
    document.querySelectorAll('.slot').forEach(s => {
        s.className = 'slot';
        const num = s.querySelector('.num');
        s.innerHTML = num ? num.outerHTML : `<span class="num">13</span>`;
    });
    document.getElementById('khomArea').style.display = "none";
    document.getElementById('finalLog').style.display = "none";

    // 1. Lấy dữ liệu
    const names = ['TƯỚNG', 'SĨ', 'TƯỢNG', 'XE', 'PHÁO', 'NGỰA', 'CHỐT'];
    const faces = ['Đ', 'N'];
    let deck = [];
    names.forEach(n => faces.forEach(f => { deck.push({n, f}, {n, f}); }));
    deck.sort(() => Math.random() - 0.5);

    let m = [], tmp = [...deck], disc = [];
    while (m.length < 12) {
        disc.push(tmp.shift(), tmp.shift(), tmp.shift());
        m.push(tmp.shift());
    }
    let laTT = tmp[0];

    // 2. Chia bài vào slot
    stt.innerText = "Đang trải 12 lá bài...";
    for (let i = 0; i < 12; i++) {
        await wait(150);
        const el = document.getElementById(`slot-${i+1}`);
        el.classList.add('has-card', cls);
        el.innerHTML += `${m[i].n}<br>${m[i].f}`;
    }

    // 3. Tìm Gốc
    await wait(500);
    let startPos = -1;
    for (let i = 11; i >= 0; i--) { if (m[i].n === laTT.n) { startPos = i + 1; break; } }
    
    let finalDeck = [...m];
    if (startPos !== -1) {
        document.getElementById(`slot-${startPos}`).classList.add('active-tt');
        stt.innerText = `Gốc tại vị trí ${startPos}`;
    } else {
        stt.innerText = "Hạ lá 13 xuống...";
        await wait(600);
        finalDeck.push(laTT);
        const el13 = document.getElementById('slot-13');
        el13.classList.add('has-card', cls, 'active-tt');
        el13.innerHTML += `${laTT.n}<br>${laTT.f}`;
        startPos = 13;
    }

    // 4. Nhảy 5 Linh Hồn (QUAN TRỌNG: FIX LỖI TREO)
    await wait(800);
    let steps = [], N = finalDeck.length, ptr = startPos;

    for (let s = 1; s <= 5; s++) {
        stt.innerText = `Lần ${s}: Đang đếm nhịp...`;
        let cur = ptr;
        for (let j = 0; j < 5; j++) {
            const el = document.getElementById(`slot-${cur}`);
            if (el) el.classList.add('scanning');
            await wait(150);
            if (el) el.classList.remove('scanning');
            
            if (j < 4) {
                cur--;
                if (cur < 1) cur = N;
            }
        }
        steps.push({ p: cur, c: finalDeck[cur-1] });
        document.getElementById(`slot-${cur}`).classList.add('picked');
        await wait(600);
        ptr = cur - 1; if (ptr < 1) ptr = N;
    }

    // 5. 3 Khóm
    stt.innerText = "Chia 3 khóm thời gian...";
    document.getElementById('khomArea').style.display = "block";
    let shuf = [...m].sort(() => Math.random() - 0.5);
    for (let k = 1; k <= 3; k++) {
        const g = document.getElementById(`k${k}`);
        g.innerHTML = "";
        let sub = shuf.slice((k-1)*4, k*4);
        for (let j = 0; j < 4; j++) {
            const c = document.createElement('div');
            c.className = `slot has-card card-back`;
            c.innerHTML = `?`;
            g.appendChild(c);
            setTimeout(() => {
                c.className = `slot has-card ${cls}`;
                c.innerHTML = `<span class="num">${j+1}</span>${sub[j].n}<br>${sub[j].f}`;
            }, 1000 + (j*200));
        }
    }

    await wait(2000);
    stt.innerText = "Hoàn tất quẻ.";
    let log = `--- KẾT QUẢ NGŨ LINH ---\nGốc: ${startPos}\n`;
    steps.forEach((v, i) => log += `Lần ${i+1}: Vị trí ${v.p} (${v.c.n} ${v.c.f})\n`);
    document.getElementById('finalLog').innerText = log;
    document.getElementById('finalLog').style.display = "block";
    btn.disabled = false;
}
</script>
</body>
</html>
