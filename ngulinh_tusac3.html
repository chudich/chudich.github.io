<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ngũ Linh Tứ Sắc - Bản Chuẩn 100%</title>
    <style>
        :root { --bg: #f8f9fa; --accent: #d35400; --gold: #f1c40f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; font-size: 1.1rem; margin-bottom: 15px; }
        
        .menu-bar { display: flex; gap: 8px; margin-bottom: 15px; background: #eee; padding: 8px; border-radius: 10px; }
        select { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
        button { padding: 10px 15px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .status { text-align: center; color: var(--accent); font-weight: bold; min-height: 24px; margin-bottom: 10px; font-size: 14px; }

        /* Matrix 4 cột */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .card { 
            background: #fff; border: 1.5px solid #ddd; border-radius: 8px; 
            padding: 12px 2px; text-align: center; font-weight: bold; font-size: 13px;
            position: relative; min-height: 55px; display: flex; align-items: center; justify-content: center; flex-direction: column;
            transition: all 0.2s ease;
        }
        .num { position: absolute; top: 2px; right: 4px; font-size: 9px; color: #999; }
        
        /* Màu quân bài */
        .c-Xanh { color: #27ae60; } .c-Vang { color: #e67e22; } .c-Trang { color: #555; } .c-Do { color: #c0392b; }

        /* Trạng thái đặc biệt */
        .active-tt { border: 2.5px solid var(--gold) !important; background: #fffde7 !important; }
        .scanning { background: var(--gold) !important; transform: scale(1.1); z-index: 10; }
        .final-pick { border: 2.5px solid var(--accent) !important; box-shadow: 0 0 10px rgba(211, 84, 0, 0.5); transform: scale(1.05); }
        .card-back { background: #2c3e50 !important; color: transparent !important; }

        .log-box { background: #1a1a1a; color: #00ff00; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 12px; white-space: pre-wrap; line-height: 1.6; margin-top: 15px; display: none; }
        .copy-btn { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 8px; margin-top: 10px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>TRẬN PHÁP NGŨ LINH</h2>
    
    <div class="menu-bar">
        <select id="colorSel">
            <option value="Xanh">CÔNG DANH (XANH)</option>
            <option value="Vang">TÀI LỘC (VÀNG CAM)</option>
            <option value="Trang">GIA ĐẠO (XÁM)</option>
            <option value="Do">TÌNH DUYÊN (ĐỎ)</option>
        </select>
        <button id="runBtn" onclick="runApp()">KHAI QUẺ</button>
    </div>

    <div id="status" class="status">Sẵn sàng khai trận...</div>
    <div id="matrix" class="grid"></div>
    
    <div id="khomSection" style="display:none; border-top: 2px dashed #ddd; padding-top: 15px;">
        <div style="font-size:12px; font-weight:bold; color:#7f8c8d; margin:5px 0;">QUÁ KHỨ</div>
        <div id="k1" class="grid"></div>
        <div style="font-size:12px; font-weight:bold; color:#7f8c8d; margin:5px 0;">HIỆN TẠI</div>
        <div id="k2" class="grid"></div>
        <div style="font-size:12px; font-weight:bold; color:#7f8c8d; margin:5px 0;">TƯƠNG LAI</div>
        <div id="k3" class="grid"></div>
    </div>

    <div id="finalLog" class="log-box"></div>
    <button id="copyBtn" class="copy-btn" onclick="copyResult()">SAO CHÉP KẾT QUẢ</button>
</div>

<script>
const wait = ms => new Promise(r => setTimeout(r, ms));

const Core = {
    // Tạo bộ bài
    getDeck: (col) => {
        const names = ['TƯỚNG', 'SĨ', 'TƯỢNG', 'XE', 'PHÁO', 'NGỰA', 'CHỐT'];
        const faces = ['Đ', 'N'];
        let d = [];
        names.forEach(n => faces.forEach(f => { d.push({n, f, col}, {n, f, col}); }));
        return d.sort(() => Math.random() - 0.5);
    },
    // Rút 12 lá (bỏ 3 lấy 1)
    getMatrix: (deck) => {
        let m = [], disc = [], tmp = [...deck];
        while (m.length < 12) {
            disc.push(tmp.shift(), tmp.shift(), tmp.shift());
            m.push(tmp.shift());
        }
        return { m, laTT: tmp.length > 0 ? tmp[0] : disc[0] };
    }
};

async function runApp() {
    const btn = document.getElementById('runBtn');
    const stt = document.getElementById('status');
    const color = document.getElementById('colorSel').value;
    const cls = `c-${color}`;
    
    // Khởi tạo
    btn.disabled = true;
    document.getElementById('matrix').innerHTML = "";
    document.getElementById('khomSection').style.display = "none";
    document.getElementById('finalLog').style.display = "none";
    document.getElementById('copyBtn').style.display = "none";

    // 1. Giai đoạn: Chia 12 lá
    stt.innerText = "Đang bỏ 3 lấy 1 lập Ma trận...";
    const { m, laTT } = Core.getMatrix(Core.getDeck(color));
    for (let i = 0; i < 12; i++) {
        await wait(200);
        const cardEl = document.createElement('div');
        cardEl.className = `card ${cls}`;
        cardEl.id = `pos-${i+1}`;
        cardEl.innerHTML = `<span class="num">${i+1}</span>${m[i].n}<br>${m[i].f}`;
        // Đưa vào grid theo thứ tự từ 12 về 1 để hiển thị đúng sơ đồ
        document.getElementById('matrix').prepend(cardEl);
    }

    // 2. Giai đoạn: Tìm điểm Gốc
    await wait(500);
    let start = -1;
    // Tìm quân bài Tượng trưng (XE) từ trái qua (12 -> 1)
    for (let i = 11; i >= 0; i--) { if (m[i].n === laTT.n) { start = i + 1; break; } }
    
    let currentDeck = [...m];
    if (start !== -1) {
        document.getElementById(`pos-${start}`).classList.add('active-tt');
        stt.innerText = `Lá Tượng Trưng tại vị trí: ${start}`;
    } else {
        stt.innerText = "Không thấy quân XE, đặt lá thứ 13 xuống...";
        await wait(600);
        currentDeck.push(laTT);
        const c13 = document.createElement('div');
        c13.className = `card active-tt ${cls}`;
        c13.id = `pos-13`;
        c13.innerHTML = `<span class="num">13</span>${laTT.n}<br>${laTT.f}`;
        document.getElementById('matrix').prepend(c13);
        start = 13;
    }

    // 3. Giai đoạn: Nhảy 5 Linh hồn (Logic Gối Đầu)
    await wait(800);
    let steps = [], N = currentDeck.length, pointer = start;

    for (let step = 1; step <= 5; step++) {
        stt.innerText = `Lần ${step}: Đang nhảy tìm Linh hồn...`;
        let curAt = pointer;
        
        // Di chuyển 5 nhịp
        for (let j = 0; j < 5; j++) {
            const el = document.getElementById(`pos-${curAt}`);
            if (el) el.classList.add('scanning');
            await wait(150);
            if (el) el.classList.remove('scanning');
            
            if (j < 4) { // Nhịp 1, 2, 3, 4 -> Di chuyển nhịp tiếp theo
                curAt--; 
                if (curAt < 1) curAt = N;
            }
        }
        
        // Lưu lá bài tại nhịp 5
        steps.push({ p: curAt, c: currentDeck[curAt-1] });
        const finalEl = document.getElementById(`pos-${curAt}`);
        if (finalEl) finalEl.classList.add('final-pick');
        await wait(800);

        // Chuẩn bị nhịp 1 cho lần sau (là lá đứng sau lá vừa dừng)
        pointer = curAt - 1;
        if (pointer < 1) pointer = N;
    }

    // 4. Giai đoạn: 3 Khóm Thời Gian
    stt.innerText = "Đang gom bài chia 3 khóm...";
    await wait(1000);
    document.getElementById('khomSection').style.display = "block";
    const shuffleKhom = [...m].sort(() => Math.random() - 0.5);
    
    for (let k = 1; k <= 3; k++) {
        const gridK = document.getElementById(`k${k}`);
        gridK.innerHTML = "";
        const dataK = shuffleKhom.slice((k-1)*4, k*4);
        for (let j = 0; j < 4; j++) {
            await wait(150);
            const cardK = document.createElement('div');
            cardK.className = `card card-back`;
            cardK.innerHTML = `?`;
            gridK.appendChild(cardK);
            
            // Hiệu ứng lật ngửa
            setTimeout(() => {
                cardK.classList.remove('card-back');
                cardK.classList.add(cls);
                cardK.innerHTML = `<span class="num">${j+1}</span>${dataK[j].n}<br>${dataK[j].f}`;
            }, 800 + (j*150));
        }
    }

    // Kết quả cuối
    await wait(1000);
    stt.innerText = "Quẻ Ngũ Linh đã xong!";
    let log = `--- KẾT QUẢ QUẺ NGŨ LINH ---\nĐiểm Gốc: Vị trí ${start}\n`;
    steps.forEach((s, idx) => {
        log += `Lần ${idx+1}: Vị trí ${s.p} -> ${s.c.n} ${s.c.f}\n`;
    });
    
    const logEl = document.getElementById('finalLog');
    logEl.innerText = log;
    logEl.style.display = "block";
    document.getElementById('copyBtn').style.display = "block";
    btn.disabled = false;
}

function copyResult() {
    const t = document.createElement('textarea');
    t.value = document.getElementById('finalLog').innerText;
    document.body.appendChild(t); t.select();
    document.execCommand('copy'); document.body.removeChild(t);
    alert("Đã sao chép thành công!");
}
</script>
</body>
</html>
