<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ngũ Linh Tứ Sắc - Thấu Chân Kinh</title>
    <style>
        :root { --accent: #26a69a; --card-bg: #fff; }
        body { font-family: -apple-system, sans-serif; background: #e0e0e0; margin: 0; padding: 10px; }
        .app-container { max-width: 500px; margin: auto; background: #fdfdfd; padding: 15px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

        /* MÀU SẮC 4 HỆ */
        .c-Xanh { color: #1b5e20; background: #e8f5e9; border: 2px solid #2e7d32; }
        .c-Vang { color: #000; background: #FFD700; border: 2px solid #DAA520; font-weight: 800 !important; } 
        .c-Trang { color: #455a64; background: #fafafa; border: 2px solid #b0bec5; font-weight: 800 !important; }
        .c-Do { color: #b71c1c; background: #ffebee; border: 2px solid #c62828; font-weight: 800 !important; }

        .header-menu { display: flex; gap: 8px; margin-bottom: 15px; }
        select { flex: 2; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; background: white; }
        
        /* Button XÀO BÀI: Màu Xanh Ngọc dịu tâm trí, nổi bật */
        .btn-start { 
            flex: 1; padding: 12px; 
            background: linear-gradient(135deg, #26a69a, #00897b); 
            color: white; border: none; border-radius: 8px; 
            font-weight: bold; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(38, 166, 154, 0.3);
            transition: all 0.3s ease;
        }
        .btn-start:active { transform: scale(0.95); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 20px; }
        .btn-step { padding: 10px 0; font-size: 11px; font-weight: bold; background: #fff; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; }
        .btn-step:disabled { background: #eee; color: #aaa; border: 1px dashed #ccc; }
        .btn-step.active { background: #fff9c4; border: 2px solid #fbc02d; box-shadow: 0 0 8px rgba(251,192,45,0.4); }

        .card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .card { 
            display: none; height: 80px; align-items: center; justify-content: center; 
            text-align: center; font-size: 14px; font-weight: bold; border-radius: 8px; 
            position: relative; flex-direction: column; transition: all 0.3s;
        }
        .num-tag { position: absolute; top: 2px; right: 4px; font-size: 10px; opacity: 0.6; font-weight: bold; }
        .goc-highlight { outline: 4px solid #fbc02d; outline-offset: -4px; background: #fffde7 !important; transform: scale(1.05); z-index: 10; }

        h4 { font-size: 13px; color: #666; text-transform: uppercase; margin: 25px 0 10px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        
        .btn-copy { width: 100%; padding: 15px; background: #5d4037; color: #fff; border: none; border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .interpretation-box { font-size: 13px; color: #444; background: #fff3e0; padding: 12px; border-radius: 8px; margin-top: 8px; border-left: 4px solid #ff9800; line-height: 1.5; font-style: italic; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-menu">
        <select id="userChoice">
            <option value="Xanh">CÔNG DANH (XANH LÁ)</option>
            <option value="Vàng">TÀI LỘC (VÀNG/NÂU ĐẤT)</option>
            <option value="Trắng">GIA ĐẠO (TRẮNG/XÁM)</option>
            <option value="Đỏ">TÌNH DUYÊN (ĐỎ)</option>
        </select>
        <button class="btn-start" onclick="setupNgulinh()">XÀO BÀI</button>
    </div>

    <div id="gamePlay" style="display:none;">
        <div class="btn-grid" id="buttonArea"></div>

        <h4>TRẬN PHÁP 12 LÁ</h4>
        <div id="symbol13" style="display:flex; justify-content:center; margin-bottom:12px;"></div>
        <div class="card-grid" id="mainMatrix"></div>

        <div id="finalReport" style="display:none;">
            <h4>5 LÁ LINH HỒN</h4>
            <div id="soulGrid" class="card-grid"></div>
            <div id="khomSection"></div>
            <button class="btn-copy" onclick="copyToClipboard()">📑 SAO CHÉP TRẬN PHÁP</button>
        </div>
    </div>
</div>

<script>
let state = { matrix:[], tượng:null, css:'', colorName: '', souls: [], khoms: [] };

// Hàm chuẩn hóa CSS class vì value bây giờ có dấu
function getCssClass(val) {
    if(val === "Xanh") return "c-Xanh";
    if(val === "Vàng") return "c-Vang";
    if(val === "Trắng") return "c-Trang";
    if(val === "Đỏ") return "c-Do";
    return "";
}

function setupNgulinh() {
    const select = document.getElementById('userChoice');
    const col = select.value;
    state.colorName = col.toUpperCase(); 
    state.css = getCssClass(col);

    const NAMES = ['TƯỚNG','SĨ','TƯỢNG','XE','PHÁO','NGỰA','CHỐT'];
    let mainDeck = [];
    NAMES.forEach(n => {
        for(let i=0; i<4; i++) mainDeck.push({ n, f: Math.random() > 0.5 ? 'Đ' : 'N' });
    });
    mainDeck.sort(() => Math.random() - 0.5);

    state.matrix = [];
    let hand = [...mainDeck]; 
    let discarded = []; 

    for(let i=0; i<12; i++) {
        for(let j=0; j<3; j++) {
            if(hand.length === 0) { hand = discarded.sort(() => Math.random() - 0.5); discarded = []; }
            discarded.push(hand.shift());
        }
        if(hand.length === 0) { hand = discarded.sort(() => Math.random() - 0.5); discarded = []; }
        state.matrix.push(hand.shift());
    }

    if(hand.length === 0) hand = discarded.sort(() => Math.random() - 0.5);
    state.tượng = hand.shift();

    document.getElementById('gamePlay').style.display = 'block';
    document.getElementById('finalReport').style.display = 'none';
    document.getElementById('symbol13').innerHTML = "";

    let btnH = "";
    for(let i=1; i<=12; i++) btnH += `<button id="btn${i}" class="btn-step ${i==1?'active':''}" onclick="flipCard(${i})" ${i!=1?'disabled':''}>Lần ${i}</button>`;
    btnH += `<button id="btn13" class="btn-step" onclick="flipCard(13)" disabled style="grid-column: span 4; background:#2c3e50; color:#fff;">Lần 13: LÁ TƯỢNG TRƯNG</button>`;
    document.getElementById('buttonArea').innerHTML = btnH;

    let gridH = "";
    for(let i=12; i>=1; i--) gridH += `<div id="card${i}" class="card ${state.css}"><span class="num-tag">${i}</span><div class="content"></div></div>`;
    document.getElementById('mainMatrix').innerHTML = gridH;
}

function flipCard(n) {
    document.getElementById('btn'+n).disabled = true;
    document.getElementById('btn'+n).classList.remove('active');

    if(n <= 12) {
        let c = document.getElementById('card'+n);
        c.querySelector('.content').innerHTML = `<strong>${state.matrix[n-1].n}</strong><br><strong>${state.matrix[n-1].f}</strong>`;
        c.style.display = 'flex';
        let next = document.getElementById('btn'+(n+1));
        if(next) { next.disabled = false; next.classList.add('active'); }
    } else {
        processResults();
    }
}

function processResults() {
    let gIdx = -1;
    for(let i=11; i>=0; i--) if(state.matrix[i].n === state.tượng.n) { gIdx = i; break; }

    let fullArr = [...state.matrix];
    if(gIdx === -1) { 
        fullArr.push(state.tượng); gIdx = 12; 
        document.getElementById('symbol13').innerHTML = `<div class="card ${state.css} goc-highlight" style="display:flex; width:24%"><span class="num-tag">13</span><strong>${state.tượng.n}</strong><br><strong>${state.tượng.f}</strong></div>`;
    } else {
        document.getElementById('card'+(gIdx+1)).classList.add('goc-highlight');
    }

    state.souls = []; 
    let current = gIdx + 1;
    for(let i=0; i<5; i++) {
        let target = current;
        for(let j=0; j<4; j++) { target--; if(target < 1) target = fullArr.length; }
        state.souls.push(fullArr[target - 1]);
        current = target - 1; if(current < 1) current = fullArr.length;
    }

    let soulH = "";
    state.souls.forEach((s, i) => soulH += `<div class="card ${state.css}" style="display:flex; border:2px solid #d35400"><span class="num-tag">L${i+1}</span><strong>${s.n}</strong><br><strong>${s.f}</strong></div>`);
    document.getElementById('soulGrid').innerHTML = soulH;

    let shuffle12 = [...state.matrix].sort(() => Math.random() - 0.5);
    state.khoms = [];
    const labels = ["QUÁ KHỨ", "HIỆN TẠI", "TƯƠNG LAI"];
    let khomH = "";
    for(let i=0; i<3; i++) {
        let currentKhom = [];
        khomH += `<h4>KHÓM ${i+1}: ${labels[i]}</h4><div class="card-grid">`;
        for(let j=0; j<4; j++) {
            let item = shuffle12[i*4 + j];
            currentKhom.push(item);
            khomH += `<div class="card ${state.css}" style="display:flex"><span class="num-tag">${j+1}</span><strong>${item.n}</strong><br><strong>${item.f}</strong></div>`;
        }
        state.khoms.push(currentKhom);
        khomH += `</div><div class="interpretation-box">Đang đợi nạp dữ liệu...</div>`;
    }
    document.getElementById('khomSection').innerHTML = khomH;
    document.getElementById('finalReport').style.display = 'block';
}

function copyToClipboard() {
    let text = `5 LÁ LINH HỒN:\n`;
    state.souls.forEach((s, i) => {
        text += `${i+1}. ${s.n} ${state.colorName} ${s.f}\n`;
    });

    state.khoms.forEach((k, idx) => {
        text += `\nKHÓM ${idx + 1}:\n`;
        text += `1. ${k[0].n} ${state.colorName} ${k[0].f} - 2. ${k[1].n} ${state.colorName} ${k[1].f}\n`;
        text += `3. ${k[2].n} ${state.colorName} ${k[2].f} - 4. ${k[3].n} ${state.colorName} ${k[3].f}\n`;
    });

    navigator.clipboard.writeText(text).then(() => {
        alert("Đã sao chép trận pháp có dấu đầy đủ!");
    }).catch(err => {
        alert("Lỗi khi sao chép: " + err);
    });
}
</script>
</body>
</html>
