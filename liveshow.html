<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>LiveShow Ảnh</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
}

#viewer {
    width: 100%;
    height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

#viewer img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 10px;
}

.controls {
    margin-top: 10px;
}
</style>
</head>
<body>

<h2>LiveShow Ảnh (0.5s / ảnh)</h2>

<div class="controls">
    <input type="file" id="fileInput" multiple accept="image/*">
</div>

<div id="viewer">
    <img id="image" src="">
</div>

<script>
let images = [];
let index = 0;
let interval = null;
let isPlaying = true;

const imgTag = document.getElementById("image");

// Load ảnh
document.getElementById("fileInput").addEventListener("change", function(e) {
    const files = Array.from(e.target.files);
    images = files.map(file => URL.createObjectURL(file));
    index = 0;

    if (images.length > 0) {
        imgTag.src = images[0];
        startSlideshow();
    }
});

// Start slideshow
function startSlideshow() {
    clearInterval(interval);
    isPlaying = true;

    interval = setInterval(() => {
        index++;
        if (index >= images.length) index = 0;
        imgTag.src = images[index];
    }, 500); // 0.5 giây
}

// Pause
function stopSlideshow() {
    clearInterval(interval);
    isPlaying = false;
}

// Tap để pause / play
document.getElementById("viewer").addEventListener("click", () => {
    if (isPlaying) {
        stopSlideshow();
    } else {
        startSlideshow();
    }
});
</script>

</body>
</html>
