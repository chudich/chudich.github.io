<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>LiveShow Ảnh + Nhạc</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: white;
    text-align: center;
}

/* Viewer */
#viewer {
    width: 100%;
    height: 75vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
}

#viewer img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 12px;
}

/* Controls */
.controls {
    padding: 15px;
}

.big-btn {
    display: block;
    width: 90%;
    margin: 10px auto;
    padding: 18px;
    font-size: 20px;
    border-radius: 12px;
    border: none;
    background: #2196F3;
    color: white;
}

.big-btn:active {
    background: #0b7dda;
}

.hidden-input {
    display: none;
}

</style>
</head>

<body>

<h2>LiveShow Ảnh + Nhạc</h2>

<div class="controls">
    <button class="big-btn" onclick="document.getElementById('imgInput').click()">
        📷 CHỌN ẢNH
    </button>

    <input type="file" id="imgInput" class="hidden-input" multiple accept="image/*">

    <button class="big-btn" onclick="document.getElementById('audioInput').click()">
        🎵 CHỌN NHẠC (mp3 / wav)
    </button>

    <input type="file" id="audioInput" class="hidden-input" accept="audio/*">
</div>

<div id="viewer">
    <img id="image" src="">
</div>

<audio id="audio" loop></audio>

<script>
let images = [];
let index = 0;
let interval = null;
let isPlaying = false;

const imgTag = document.getElementById("image");
const audio = document.getElementById("audio");

/* Load ảnh */
document.getElementById("imgInput").addEventListener("change", function(e) {
    const files = Array.from(e.target.files);
    images = files.map(file => URL.createObjectURL(file));
    index = 0;

    if (images.length > 0) {
        imgTag.src = images[0];
        tryStart();
    }
});

/* Load nhạc */
document.getElementById("audioInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (file) {
        audio.src = URL.createObjectURL(file);
        audio.loop = true;
        tryStart();
    }
});

/* Start nếu đủ điều kiện */
function tryStart() {
    if (images.length > 0 && audio.src) {
        startAll();
    }
}

/* Start slideshow + nhạc */
function startAll() {
    stopAll();
    isPlaying = true;

    // Play nhạc
    audio.play().catch(() => {});

    interval = setInterval(() => {
        index++;
        if (index >= images.length) index = 0;
        imgTag.src = images[index];
    }, 1868);
}

/* Stop */
function stopAll() {
    clearInterval(interval);
    audio.pause();
    isPlaying = false;
}

/* Tap màn hình */
document.getElementById("viewer").addEventListener("click", () => {
    if (isPlaying) {
        stopAll();
    } else {
        startAll();
    }
});
</script>

</body>
</html>
