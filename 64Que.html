        content: `<b>Sự Vô Tư : Vô tư, thật thà, giản dị, ngẫu nhiên</b>\n\nThiên tai dã. Xâm lấn. Tai vạ, lỗi bậy bạ, không lề lối, không quy củ, càn đại, chống đối, hứng chịu. \nCương tự ngoại lai chi tượng: tượng kẻ mạnh từ ngoài đến.\nVô vọng nghĩa là thuận theo một cách tự nhiên, không mang chút cưỡng cầu hay bắt buộc nào. \nCàn, đơn quái trên, tượng trưng cho trời, còn đơn quái dưới, Chấn, tiêu biểu cho sấm. Càn cũng có ý chỉ tác động, lực đẩy. Vô vọng tiêu biểu cho sự vận động trong quỹ đạo theo con đường của trời, tức các qui luật của tự nhiên; do đó mà có bốn mùa rõ rệt và vạn vật tăng trưởng cũng như phát dục một cách tự nhiên. Trong đoán quẻ, Vô vọng có nghĩa rằng đây là lúc hãy dể mọi vật đi theo chiều hướng tự nhiên của chúng – hãy buông bỏ. Đừng hành động tích cực, nhưng cũng không né tránh, lười nhác mà không làm những gì tất phải làm, vẫn phải hoàn thành các trách nhiệm.\n\n<span class='red'>Vô Vọng : là Quẻ Trầm Tĩnh Mà Nhận Xét Biến Hóa</span>\n\nThiên tai dã. Xâm lấn. Tai vạ, lỗi bậy bạ, không lề lối, không quy củ, càn đại, chống đối, hứng chịu. Cương tự ngoại lai chi tượng: tượng kẻ mạnh từ ngoài đến. Tai vạ, lỗi bậy bạ, không lề lối, không quy củ, càn đại, chống đối, hứng chịu\n\nThiên tai dã là tai nạn tự nhiên.\nTa bị xâm lấn. Ta được xâm phạm.\nTa chịu sự xâm nhập. Ta xâm phạm kẻ khác.`

    {
        title: "26. <span class='red'>SƠN THIÊN ĐẠI SÚC</span> : Quẻ Số 26",
        content: `<b>Tích Lũy Tài Đức : Tích lũy tài năng, phát triển cá nhân</b>\n\nTụ dã. Tích tụ. Chứa tụ, súc tích, lắng tụ một chỗ, dự trữ, đựng, để dành. Đồng loại hoan hội chi tượng: đồng loại hội họp vui vẻ, cục bộ.\nĐại súc nghĩa là tích chứa, tiết kiệm hay cất trữ. Nó cũng có nghĩa là sự tràn đầy, phong phú hay dồi dào. Quẻ cũng hàm ý sự ngưng nghỉ và chờ đợi cho đến khi đầy đủ trước khi chính thức hành động. Đơn quái trên, Cấn, mang ý nghĩa bất động, đứng yên hay nghỉ ngơi. Đơn quái dưới, Càn, hàm chỉ sức mạnh và sự tiến về phía.\nTượng quẻ là sức bành trướng của Càn đang tàn ẩn trong quái Cấn là núi, khí trời là dương lực còn tích trữ, nun nén trong núi. Tượng trưng cho người tích được nội lực, tài trí để gây dựng sự nghiệp hiển hách.\n\n<span class='red'>Sơn Thiên Đại Súc : là Quẻ Tích Thóc Lúa Vào Trong Vựa</span>\n\nTụ dã. Tích tụ. Chứa tụ, súc tích, lắng tụ một chỗ, dự trữ, đựng, để dành. Đồng loại hoan hội chỉ tượng: đông loại hội họp vui vẻ, cục bộ.\nChứa tụ, súc tích, lắng tụ một chỗ, dự trữ, đựng, để dành\n\nTụ dã : là chứa lớn.\nTa bị tích tụ. Ta được tích tụ.\nTa nuôi chứa kẻ khác. Ta dồn tụ kẻ khác.`

    {
        title: "27. <span class='red'>SƠN LÔI DI</span> : Quẻ Số 27",
        content: `<b>Thực Phẩm : Thực phẩm, cái miệng, tư cách, lời nói</b>\n\nDưỡng dã. Dung dưỡng. Chăm lo, tu bổ, thêm, ăn uống, bổ dưỡng, bồi dưỡng, ví như trời nuôi muôn vật, thánh nhân nuôi người. Phi long nhập uyên chi tượng: rồng vào vực nghỉ ngơi.\nDi có nghĩa là đôi má và cũng có nghĩa là sự nuôi dưỡng. Nuôi dưỡng đến dưới hình thức sự bổ dưỡng của thức ăn, sự hấp thu kiến thức và học hỏi, sự phát triển của tư tưởng, và sự vun bồi.\nCác hào nằm dưới cùng và trên cùng là những hào dương, giống như môi trên và môi dưới. Bốn hào âm ở giữa tượng trưng cho răng. Thức ăn tốt sẽ nuôi dưỡng cho cơ thể, nhưng thức ăn thiếu bổ dưỡng hay hư thối sẽ làm hại cơ thể. Tương tự như vậy đối với học vấn và tư tưởng, những gì được thu nhận phải chính đáng.\nTrong đoán quẻ, nó có nghĩa rằng nếu người ta thận trọng và ý tứ trong ngôn từ, biết điều độ trong ăn uống, biết vun bồi bản thân, và đối xử với người khác cũng như xử lý công việc theo con đường chính đáng, khi đó vận may sẽ mở rộng. Bằng không, thất bại sẽ đến.\n\n<span class='red'>Di : là Quẻ Đi Săn Mồi</span>\n\nKinh Dịch giảng Sơn Lôi Di rằng: Quan dĩnh tự cầu khẩu thực. Ý nói hãy đo miệng mà nuốt mồi. Lực lượng chính trị đã đủ để phát huy, nhưng coi chừng phải tính sức mà tung hoành.\nKinh Dịch lại giảng thêm: Hỗ thị trầm trầm, kỳ dục trục trục, nghĩa là con hổ đăm đăm nhìn vào con mồi, cái thèm cuồn cuộn nỗi đậy. Ý nói đã đành nên lượng sức, nhưng cũng phải say mê tìm chiến thắng.\nChăm lo, tu bổ, thêm, ăn uống, bổ dưỡng, bồi dưỡng, ví như trời nuôi muôn vật, thánh nhân nuôi người\n\nDưỡng dã là chăm lo, nuôi nấng.\nTa bị an nghỉ. Ta được bồi dưỡng.\nTa bổ dưỡng cho kẻ khác. Ta an nghỉ kẻ khác.`
    },
    {
        title: "28. <span class='red'>TRẠCH PHONG ĐẠI QUÁ</span> : Quẻ Số 28",
        content: `<b>Có Trau Dồi Tài Đức Sau Này Mới Có Thể Làm Việc Phi Thường : Trau dồi tài đức để làm việc phi thường</b>\n\nHọa dã. Cả quá. Cả quá ắt tai họa, quá mực thường, quá nhiều, giàu cương nghị ở trong. Nộn thảo kinh sương chi tượng: tượng cỏ non bị sương tuyết.\nĐại Quá nghĩa là sự quá độ hay sức mạnh thái quá. Đơn quái trên là Đoài, tượng trưng cho ao chum hay đầm lầy, còn đơn quái dưới là Tốn, tiêu biểu cho cây cối. Cây bị ngập quá nhiều nước sẽ bị chết úng.\nTrong đoán quẻ, có nghĩa rằng những trách nhiệm và gánh nặng của bạn rất nặng nề. Sức mạnh không cân xứng với ý chí — một tình huống quá sức gieo neo.\n\n<span class='red'>Trạch Phong Đại Quá : là Quẻ Vai Mang Quá Nặng</span>\n\nCon trăn quấn được heo rừng. Con heo rừng lớn, trăn nuốt vào bụng chưa tiêu. Lúc ấy Quẻ chính là lúc con trăn yếu nhất. Chung quanh chiến thắng là những nguy biến rình rập. Cả quá ắt tai họa, quá mực thường, quá nhiều, giàu cương nghị ở trong\n\nQuá dã : là nhiều quá, thái quá. \nTa bị quá đỗi. Ta được tích cực.\nTa tích cực cho kẻ khác. Ta quá độ với kẻ khác.`
    },
    {
        title: "29. <span class='red'>THUẦN KHẢM</span> : Quẻ Số 29",
        content: `<b>Sự Nguy Hiểm : Nguy hiểm, bí mật, vực thẳm, trộm cướp...</b>\n\nHãm dã. Hãm hiểm. Hãm vào ở trong, xuyên sâu vào trong, đóng cửa lại, gập ghềnh, trắc trở, bắt buộc, kìm hãm, thắng. Khổ tận cam lai chi tượng: tượng hết khổ mới đến sướng.\nKhảm nghĩa là khó khăn và nguy hiểm, đồng thời cũng tượng trưng cho nước. Nước ở trên lẫn ở dưới, điều đó muốn nói lên rằng không thể nào dò được độ nông sâu của nước. Mênh mông và chảy mãi không ngừng, hòa vào nhau rồi lại chảy đi — hình ảnh này nói lên sự nguy hiểm trùng điệp. Bị chết đuối là điều có thể xảy ra.\nTrong đoán quẻ, Khảm hàm ý vận hội của bạn đang cực kỳ xấu, như thể đang bị lôi vào cảnh rối bù, tiến hay lui cũng đều gặp nguy hiểm.\n\n<span class='red'>Thủy Vi Khảm hay Thuần Khảm : là Quẻ Thác Lũ Đổ Về</span>\nHoàn cảnh đen tối nhất cho người làm chính trị mênh mông sóng nước ngút trời. Đây là lúc mà người chính trị cần hơn lúc nào hết lòng gan dạ, nhẫn nại chiến đầu với sóng nước trùng trùng, lúc nào cũng giữ cho đầu nhô khỏi nước không bị chìm.\nHãm vào ở trong, xuyên sâu vào trong, đóng cửa lại, gập ghềnh, trắc trở, bắt buộc, kìm hãm, thắng\n\nHãm dã là hiểm nguy, bắt buộc.\nTa bị hãm hiểm. Ta được kìm hãm.\nTa chịu sự kìm hãm cho kẻ khác. Ta đóng khung kẻ khác.`
    },
    {
        title: "30. <span class='red'>THUẦN LY</span> : Quẻ Số 30",
        content: `<b>Lửa Bám Vào Vật Khác Mà Được Sáng : Găn bố, trong sáng, lý tưởng, chiếu rọi</b>\n\nLệ dã. Sáng chói. Sáng sủa, trống trải, trống trơn, tỏa ra, bám vào, phụ bám, phô trương ra ngoài. Môn hộ bất ninh chi tượng: tượng nhà cửa không yên. Ly nghĩa là tươi sáng, rực rỡ, đẹp đẽ, tượng trưng cho mặt trời và lửa. Tượng của quẻ có ý nói một mặt trời vừa mọc và một mặt trời khác lập tức hiện ra chiếu sáng khắp vạn vật, giúp mọi vật sinh sôi, nảy nở và sum sê, cũng như khiến cảnh sắc đẹp đẽ xuất hiện. Trong đoán quẻ, nó có nghĩa là mặt trời đang mọc lên cao, mọi việc sẽ diễn ra êm đẹp đôi với người thành thật và cương trực. Nhưng đối với kẻ ương bướng và những người thiếu thành thật, thiếu công chính, thất bại là điều chắc chắn.\n\n<span class='red'>Thuần Ly : là Quẻ Nắng Đầu Mùa :</span>\n\nNắng đầu mùa hạ, đem ánh sáng diệp lục tố xuống cho có cây xanh tốt. Khí thế của một lực lượng đang lên thay thê cho những gì đã lỗi thời như vị Hoàng thái tử lên nôi ngôi vua, lòng tràn ngập bao lý tưởng tốt đẹp hãng hái. Tuy nhiên phải coi chừng vì Ly là lửa, lửa rất cần nhưng nếu quá lạm sẽ thành hóa tai. Ánh nắng đem nguồn sống cho cỏ cây; nhưng nếu nắng gắt sẽ làm sự sống héo hon\n\nSáng sủa, trống trải, trống trơn, tỏa ra, bám vào, phụ bám, phô trương ra ngoài\n\nLệ dã là sáng sủa, bám vào, phụ vào.\nTa bị tranh sáng. Ta được sáng sủa.\nTa sáng tỏ cho kẻ khác. Ta tranh sáng với kẻ khác.`
    },
    {
        title: "31. <span class='red'>TRẠCH SƠN HÀM</span> : Quẻ Số 31",
        content: `<b>Hòa Hợp : Hòa hợp, đám cưới, hiệp định, liên minh</b>\n\nCảm dã. Thụ cảm. Cảm xúc, thọ nhận, cảm ứng, nghĩ đến, nghe thấy, xúc động. Nam nữ giao cảm chi tượng: tượng nam nữ có tình ý, tình yêu Hàm nghĩa là cảm nhận và phản ứng – ảnh hưởng hỗ tương. Vạn sự vạn vật trên đời này đều có những cảm xúc hỗ tương hoặc những xung động đồng cảm với nhau, phản ứng hỗ tương về mặt cảm xúc mà hiển hiện nhất chính là giữa nam và nữ. Đơn quái trên, Đoài, tượng trưng cho thiếu nữ, còn đơn quái dưới, Cấn, tượng trưng cho thanh thiếu niên. Người nam trẻ ở bên dưới người nữ trẻ — có sự tiếp xúc và phản ứng. Đoài cũng tiêu biểu cho niềm vui và hạnh phúc, trong khi cấn tượng trưng cho ngừng nghỉ và yên tĩnh. Do đó, toàn quẻ tượng trưng cho bình an và yên tịnh xuất phát từ sự hài lòng, kết quả của hạnh phúc hay vui vẻ. \n\n<span class='red'>Trạch Sơn Hàm : là Quẻ Tân Hôn Chí Hỷ</span>\nThời thế mới mẻ, lòng người quá rung động bồng bột. Đó là lúc mau mau chớp ngay nhân tâm chớ đề lỡ cơ hội, cảm tình lúc ban sơ thật quan trọng, nên việc hay-dở là do vấn đề xử sự lúc đầu. \n\nCảm xúc, thọ nhận, cảm ứng, nghĩ đến, nghe thấy, xúc động\n\nCảm dã là cảm xúc.\nTa bị cảm động. Ta được cảm tương.\nTa tương cảm đến kẻ khác. Ta làm xúc động kẻ khác.`
    },
    {
        title: "32. <span class='red'>LÔI PHONG HẰNG</span> : Quẻ Số 32",
        content: `<b>Trường Cửu (Lâu Dài : Trường cửu, kiên tâm, lòng trung thành</b>\nCửu dã. Trường cửu. Lâu dài, chậm chạp, đạo lâu bền như vợ chồng, kéo dài câu chuyện, thâm giao, nghĩa cố tri, xưa, cũ.\nHằng nghĩa là lâu bền và bất biến. Đơn quái trên là Chấn, tượng trưng cho con trai trưởng, trong khi đơn quái dưới là Tốn, tượng trưng cho con gái trưởng. Nam đang trong vị trí bên trên nữ, có nghĩa là hôn nhân, hòa hiệp. Đối với các đôi vợ chồng, có nghĩa rằng con đường hôn nhân đó bền chặt đến răng long đầu bạc. Nên duy trì tình trạng hiện tại và tránh các kế hoạch mới. Nhờ vậy, có thể đạt được vận may lâu dài và thoát khỏi ưu phiền.\n\n<span class='red'>Lôi Phong Hằng : là Quẻ Nắm Vững Lẽ Thường</span>\nLôi Phong Hằng theo Dịch lý tìm được cái tĩnh trong sự động. Tâm vững như bàn thạch mà tung đòn ra đánh người.\nTôn Tử nói: "Trước hết phải lập được cái thế không bại rồi sau mới nói tới chuyện thắng"\nLâu dài, chậm chạp, đạo lâu bền như vợ chồng, kéo dài câu chuyện, thâm giao, nghĩa cố tri, xưa, cũ.\n\nCửu dã là lâu, bền vững.\nTa bị kéo dài. Ta được bền vững.\nTa bền chặt với kẻ khác. Ta đeo theo kẻ khác.`
    },
    {
        title: "33. <span class='red'>THIÊN SƠN ĐỘN</span> : Quẻ Số 33",
        content: `<b>Sự Trốn Chạy : Trốn chạy, rút lui, rời chỗ cũ đến chỗ mới</b>\n\nThoái dã. Ẩn trá. Lui, ẩn khuất, tránh đời, lừa dối, trá hình, có ý trốn tránh, trốn cái mặt thấy cái lưng. Báo ẩn nam sơn chi tượng: tượng con báo ẩn ở núi nam. Độn có nghĩa là thoái bộ, rút lui, thoái ẩn hay bỏ trốn. Hai hào dưới cùng là các hào âm, còn bốn hào bên trẽn là các hào dương, có nghĩa rằng lực âm đang dần dần đi lên, trong khi lực dương đang dần dần nhường bước. Trong đoán quẻ, điều đó có nghĩa rằng cơ đồ, gia sản đang bắt đầu sa sút, suy vi, và sự thoái ẩn cũng như việc không tiến tới trước nữa sẽ mang đến tốt lành. \n\n<span class='red'>Thiên Sơn Độn : Quẻ Chạy Là Thượng Sách</span>\n\nVận khí suy thoái, không thể gắng mà đương đầu, phải chạy để bảo toàn thân mạng.\n\nLui, ẩn khuất, tránh đời, lừa dối, trá hình, có ý trốn tránh, trốn cái mặt thấy cái lưng\n\nThoái dã là lui ẩn, trốn đi.\nTa bị ẩn trốn. Ta được ẩn trốn.\nTa che dấu cho kẻ khác. Ta ẩn trốn kẻ khác.`

    {
        title: "34. <span class='red'>LÔI THIÊN ĐẠI TRÁNG</span> : Quẻ Số 34",
        content: `<b>Quyền Lực Lớn Mạnh : Quyền lực lớn mạnh, tài năng, năng lực</b>\n\nChí dã. Tự cường. Ý chí riêng, bụng nghĩ, hướng thượng, ý định, vượng sức, thịnh đại, trên cao, chót vót, lên trên, chí khí, có lập trường. Phượng tập đăng sơn chi tượng: tượng phượng đậu trên núi. Đại tráng có nghĩa là lực dương đặc biệt đang mạnh mẽ, sung thịnh, hùng mạnh, cường tráng và oai nghiêm. Bôn hào dương dưới cùng đang đi lên, khiến hai hào âm trên cùng phải rút lui. Do đó, nó tượng trưng rằng người ta không thể ngăn chặn hay phong tỏa ảnh hưởng, sức mạnh và thanh thế được.\nĐơn quái trên là Chấn, tượng trưng cho sấm, còn đơn quái dưới là Càn, tượng trưng cho trời. Sấm trên trời đang rền vang với sức mạnh, uy vũ và oai nghiêm không gì sánh nổi.\nTrong đoán quẻ, điều này có nghĩa rằng giàu sang và thịnh vượng đang ở ngay đây. Nhưng sự thái quá hay thái độ cứng nhắc hoặc ngoan cố trong bất kỳ công việc nào cũng đều sẽ mang đến bất hạnh. Phải biết cẩn thận\n\n<span class='red'>Đại Tráng : là Quẻ Con Ngựa Phi Nước Đại</span>\n\nThừa thắng nhuệ khí như con ngựa đua vừa nghe hiệu lệnh khởi hành. Nhưng mới vài vòng đã có nhiều con vì không biết dưỡng lực vì tưởng mình đủ sức, nên yếu dần, có nhiều con chạy bừa bãi nên vấp ngã. Ý chí riêng, bụng nghĩ, hướng thượng, ý định, vượng sức, thịnh đại, trên cao, chót vót, lên trên, chí khí, có lập trường\n\nChí dã : là chí khí bền.\nTa bị lập nên. Ta có được chí khí.\nTa chí chính cho kẻ khác. Ta hùng tráng với kẻ khác.`

    {
        title: "35. <span class='red'>HỎA ĐỊA TẤN</span> : Quẻ Số 35",
        content: `<b>Sự Tiến Bộ : Tiến bộ, thăng chức, thành đạt rực rỡ</b>\n\nTiến dã. Hiển hiện. Đi hoặc tới, tiến tới gần, theo mực thường, lửa đã hiện trên đất, trưng bày. Long kiến trình tường chi tượng: tượng rồng hiện điềm lành. Tấn nghĩa là tiến bước, tấn tới, tiến bộ, đi lên. Đơn quái trên là Ly, tượng trưng cho mặt trời, và đơn quái dưới là Khôn, tượng trưng cho đất. Mặt trời ở trên mặt đất như vào buổi sáng, lúc mặt trời mọc, tỏa ánh nắng rực rỡ của nó lên khắp thế giới. Lúc mặt trời mọc cũng là lúc bắt đầu một ngày mới và hàm ý sự bắt đầu của vận động và hành động. Ly cũng có nghĩa là tươi sáng, còn Khôn hàm ý sự nhượng bộ, phục tùng, tuân theo hay vâng lời. Như vậy, bằng việc qui phục sự tươi nhuận, sự phát triển hay tiến bộ rõ ràng là đạt được. Trong chiêm quái, quẻ này có nghĩa rằng, giống như mặt trời mọc ở phương đông và vạn vật đang bắt đầu phát triển, vận hội của bạn đang mở ra, và tất cả sẽ diễn ra đúng như mong đợi.\n\n<span class='red'>Hỏa Địa Tấn : là Quẻ Ánh Nắng Ban Mai</span>\n\nNắng sớm đầy tia sáng hy vọng cho một ngày đẹp trời. Vạn sự khởi đầu nan, ánh nắng ban mai tượng trưng cho lực lượng chính trị mới xuất hiện nên cần động viên khí sức để gây ấn tượng cho mọi người.\n\nĐi hoặc tới, tiến tới gần, theo mực thường, lửa đã hiện trên đất, trưng bày \n\nTiến dã là đến hay đi, tiến tới.\nTa bị đi.  Ta được đến.\nTa hiện diện cho kẻ khác. Ta xuồng sả đến kẻ khác.`

    {
        title: "36. <span class='red'>ĐỊA HỎA MINH DI</span> : Quẻ Số 36",
        content: `<b>Ánh Sáng Bị Che Lấp :  Ánh sáng bị che lấp, buồn thảm, đau lòng</b>\n\nThương dã. Hại đau. Thương tích, bệnh hoạn, buồn lo, đau lòng, ánh sáng bị tổn thương , gai góc đầy đường.\nMinh Di có nghĩa là sự tắt ngấm của ánh sáng hay vẻ rực rỡ. Đơn quái trên là Khôn tức đất, còn đơn quái dưới là Ly tức mặt trời. Mặt trời đã lặn xuống đất, tạo nên bóng tối.\nLy cũng tượng trưng cho lửa. Lửa từ xa đang tỏa ánh sáng của nó ra xa và rộng. Nhưng, trong trường hợp này, ý nghĩa ngược lại. Lửa đang ở dưới đất và do đó gợi ý sự chìm vào bóng tối.\nTrong chiêm quái, quẻ có nghĩa rằng, giống như đêm tối, tương lai thật mù mờ, do đó phải nên hết sức cẩn thận cho đến khi bầu trời sáng tỏ vào buổi sáng. Hãy chờ đợi nhẫn nại cho đến khi ánh sáng trở lại trước khi hành động hay tiến bước.\n\n<span class='red'>Minh Di : là Quẻ Vầng Thái Dương Rơi Xuống Đất</span>\n\nMinh Di, Kinh Dịch giải là ánh sáng bị tiêu diệt. \nTrời đất tối hù, càng bước càng hụt. Tốt hơn là ẩn một nơi đợi trời sáng. Vầng thái dương rơi xuống đất ví như người chính trị tài ba, nhưng bị bao vây bởi nhiều kẻ thù ganh ghét, thế tất phải lẩn trốn cho mau không thì họa đến sau lưng\nThương tích, bệnh hoạn, buồn lo, đau lòng, ánh sáng bị tổn thương\n\nThương dã : là bị thương.\nTa bị thương. Ta được thương hại.\nTa đau thương vì kẻ khác. Ta gây tang thương cho kẻ khác.`

    {
        title: "37. <span class='red'>PHONG HỎA GIA NHÂN</span> : Quẻ Số 37",
        content: `<b>Gia Đình : Gia đình, quần thể xã hội, tập hợp lại</b>\nĐồng dã. Nảy nở. Người nhà, gia đinh, cùng gia đình, đồng chủng, đồng nghiệp, cùng xóm, sinh sôi, khai thác mở mang thêm. Khai hoa kết tử chi tượng: trổ bông sinh trái, nẩy mầm.\nGia nhân nghĩa là gia đình hay những người trong gia đình. Cũng có thể hiểu đó là sinh kế và tài sản của gia đình.\nĐiều bất biến của xã hội và con người là người nam thì ra ngoài làm việc hoặc chiến đấu, còn phụ nữ thì quán xuyến việc nhà.\nTrong quẻ này, hào thứ năm (hào thứ hai tính từ trên xuống), là hào dương, chiếm vị trí trung tâm của đơn quái trên. Hào thứ hai tính từ dưới lên là hào âm và cũng chiếm vị trí chính giữa của đơn quái dưới. Bởi cả hai đều đắc vị (ở đúng vị trí của mình), nên quẻ có nghĩa là sự bền chặt, vững chãi của gia đình – người chồng thì làm việc bên ngoài, còn người vợ ở trong nhà quán xuyến việc gia đình.\nĐơn quái trên Tốn tiêu biểu cho người con gái trưởng, trong khi đơn quái dưới là Ly tượng trưng cho người con gái thứ. Người lớn tuổi hơn đi trước người nhỏ tuổi, duy trì chuỗi trình tự thích hợp giữa người nhiều tuổi hơn và người nhỏ tuổi hơn.\nTrong đoán quẻ, quẻ này có nghĩa là gia đình đang đi trên con đường thích hợp và thịnh vượng\n\n<span class='red'>Phong Hỏa Gia Nhân : là Quẻ Ngọn Lửa Bếp</span>\n\nĐồng dã. Nảy nở. Người nhà, gia đỉnh, cùng gia đình, đồng chủng, đồng nghiệp, cùng xóm, sinh sôi, khai thác mở mang thêm. Khai hoa kết Tử chỉ tượng: trổ bông sinh trái, nẩy mầm.\nNgười nhà, gia đinh, cùng gia đình, đồng chủng, đồng nghiệp, cùng xóm, sinh sôi, khai thác mở mang thêm\n\nĐồng dã là cùng nhau.\nTa bị thêm người. Ta được sinh sôi nảy nở.\nTa sinh sôi cho kẻ khác. Ta đồng hóa kẻ khác làm gia đinh.`

    {
        title: "38. <span class='red'>HỎA TRẠCH KHUÊ</span> : Quẻ Số 38",
        content: `<b>Tương Khắc : Tương khắc, đối đầu, lợi dụng lẫn nhau</b>\n\nQuai dã. Hỗ trợ. Trái lìa, lìa xa, hai bên lợi dụng lẫn nhau, cơ biến quai xảo, như cung tên. Hồ giả hổ oai chi tượng: con hồ (cáo) nhờ oai con hổ.\nKhuê tượng trưng cho sự bất hòa, chia rẽ, và kình chống nhau. Đơn quái Ly ở trên là lửa, đơn quái Đoài ở dưới là ao chum. Lửa thì cháy bốc lên và nước của ao chuôm thì chảy xuống dưới. Hai đơn quái này do đó đối lập và bất hòa nhau.\nTrong đoán quẻ, quẻ này mang ý nghĩa các ý kiến không đạt được sự đồng tình với nhau và không dễ gì hoàn thành được bất cứ điều gì.\n\n<span class='red'>Hỏa Trạch Khuê : là Quẻ Hết Thời Kỳ Chịu Đựng</span>\n\nNước với lửa xung đột nhau, xung đột bùng nổ, hết thỏa hiệp. Sự chịu đựng nhau trong chính trị chỉ có tính cách tạm thời, đấu tranh mới là hiện tượng thường xuyên. Người chính trị không lúc nào được quên cảnh giác điều ấy, luôn luôn đề phòng và đoán biết trước lúc nào là lúc hết thời kỳ chịu đựng. Trái lìa, lìa xa, hai bên lợi dụng lẫn nhau, cơ biến quai xảo, như cung tên\n\nQuai dã : là trái lìa, nhờ vã lẫn nhau.\nTa bị hỗ trợ. Ta được hỗ trợ.\nTa hỗ trợ cho kẻ khác. Ta được thế lực hùng hổ với kẻ khác.`

        title: "39. <span class='red'>THỦY SƠN KIỂN</span> : Quẻ Số 39",
        content: `<b>Chướng Ngại : Chướng ngại, trắc trở, bế tắc, nguy khốn</b>\n\nNạn dã. Trở ngại. Cản ngăn, chặn lại, chậm chạp, què, khó khăn. Bất năng tiến giả chi tượng: không năng đi. Kiển tượng trưng cho sự khó khăn trong hành động và sự ngăn cản, ức chế. Nó cũng có nghĩa là hết sức gian nan, khốn khó, rắc rối, truân chuyên. Đơn quái Khảm ở trên tượng trưng cho sự nguy hiểm, trong khi đơn quái cấn ở dưới tượng trưng cho sự ngừng chuyển động. Toàn quẻ do đó có nghĩa là sự bị đình lại trong nguy hiểm, chẳng có lối thoát. Khảm cũng tượng trưng cho nước và Cấn tượng trưng cho núi, có ý nói lên rằng đường đi đã bị bí lối với một bên là mặt nước hiểm nghèo, còn một bên là núi cao sừng sững. Trong đoán quẻ, điều này có nghĩa rằng đang gặp phải tình trạng lưỡng nan, tiến không được mà lui cũng không xong. Trong trường hợp này, muôn vượt qua được thời điểm gian nan này phải nên cẩn thận. \n\n<span class='red'>Thủy Sơn Kiển : là Quẻ Băng Giá Làm Tê Cóng Chân Tay</span>\n\nKinh Dịch viết: \"Kiển ! nan dã : Kiển! Lúc khó khăn nguy hiểm ở trước mặt. Thấy nguy mà dừng được. Thế mới gọi là biết.\n\nCản ngăn, chặn lại, chậm chạp, què, khó khăn\n\nNạn dã là hoạn nạn, khó khăn.\nTa bị trở ngại. Ta được sự ngăn trở.\nTa ngăn ngừa cho kẻ khác. Ta chướng ngại kẻ khác.`

        content: `<b>Giải Phóng : Giải phóng, chấm dứt khó khăn, ân xá, hóa giải.</b>\n\nTán dã. Nơi nơi. Làm cho tan đi, như làm tan sự nguy hiểm, giải phóng, giải tán, loan truyền, tuyên truyền, phân phát, lưu thông, ban rải, ân xá. Lôi vũ tác giải chi tượng: tượng sấm động mưa bay. Giải nghĩa là tháo tung, phóng thích, xua tan, làm vơi bớt sự gian nan và khó khăn.\nĐơn quái trên Chấn tượng trứng cho sấm, còn đơn quái dưới Khảm tượng trưng cho mưa. Do đó, toàn quẻ có ý nói đến các cảm xúc bị dồn nén, chất chứa trong lòng đang bị mưa và sấm giũ sạch và xóa tan. Khảm tượng trưng cho mùa đông, còn Chấn tượng trưng cho mùa xuân. Cả hai cộng lại gợi ý cảnh đông tàn và xuân sang. Cái lạnh cắt da đang tan biến và mưa xuân bắt đầu rơi. Sự ấm áp đang lan tỏa khắp mặt đất và vạn vật vui tươi, được ban cho sức sống, được làm cho màu mỡ và phấn khởi.\nTrong đoán quẻ, nó có nghĩa rằng những gian khổ đang tan dần; sự vận động mới có thể bắt đầu.\n\n<span class='red'>Lôi Thủy Giải : là Quẻ Tuyết Tan Dưới Ánh Dương Xuân</span>\n\nCái thế bị dồn cục qua rồi, nay sự trói buộc đã hết, phải cướp cho mau những chỗ tốt trong thế mới, nếu không thì có kẻ khác tranh cướp mất\nLàm cho tan đi, như làm tan sự nguy hiểm, giải phóng, giải tán, loan truyền, tuyên truyền, phân phát, lưu thông, ban rải, ân xá\n\nThuận dã là phân tán, cởi mở, giải đãi.\nTa bị phân tán. Ta được phóng thích.\nTa phóng thích cho kẻ khác.`

        content: `<b>Thua Thiệt Tổn Hại : Thua thiệt, tổn hại, rút lui, suy thoái</b>\n\nThất dã. Tổn hại. Hao mất, thua thiệt, bớt kém, bớt phần dưới cho phần trên là tổn hại. Phòng nhân ám toán chi tượng: tượng đề phòng sự ngầm hại, hao tổn.\nTổn nghĩa là hy sinh, giảm bớt, buông, làm yếu, thu nhỏ và thua, mất. Các hào ba, bốn và năm tính từ dưới lên là các hào âm. Các hào âm nằm ở giữa các hào dương và có một hào chiếm ngôi vị thứ năm, ngôi vị chủ đạo, khiến cho lực dương phải suy yếu.\nTrong quẻ Tổn, lực quay trở về này có ý muốn nói lên rằng tuy sự hy sinh là một loại tổn thất, nhưng sẽ giành được lợi ích hay tốt đẹp nào đó một khi phục hồi.\nTrong đoán quẻ, điều này có nghĩa rằng tuy hiện thời đang có sự tổn thất hay thiệt hại, nhưng chẳng bao lâu tình hình sẽ được cân bằng trở lại và hanh thông.\n\n<span class='red'>Sơn Trạch Tổn : là Quẻ Biết Tự Hi Sinh</span>\n\nTổn ở đây không phải là tổn thất, tổn hại, mà là cắt ra một khoản tiền để đặt vốn vào công cuộc làm ăn tương lai. Biết tự hy sinh là kết quả của sự trông xa thấy rộng. Hao mất, thua thiệt, bớt kém, bớt phần dưới cho phần trên là tổn hại\n\nThất dã, hao tổn, thất bác.\nTa bị hao tổn. Ta được ban bố.\nTa ban bố cho kẻ khác. Ta tổn hại kẻ khác.`

        content: `<b>Tăng Trưởng : Tăng trưởng, vượt lên, phát triển thêm</b>\n\nÍch dã. Tiến ích. Thêm được lợi, giúp dùm, tiếng dội xa, vượt lên, phóng mình tới. Hồng hộc xung tiêu chi tượng: chim hồng, chim hộc bay qua mây mù.\nÍch có nghĩa là tăng, thêm, được lợi. Đơn quái Tốn ở trên tượng trưng cho gió, trong khi đơn quái Chấn ở dưới tượng trưng cho sấm. Sấm do lực dương sinh ra, trong khi lực âm làm chuyển động gió. Cả hai đều rất quan trọng và giúp cho vạn vật sinh sôi, nảy nở, phát triển, do đó quẻ mang ý nghĩa sự tăng thêm. Ý tưởng cơ bản của quẻ là sự tăng trường của mọi vật, đồng thời hàm ý cái tốt chung là ưu tiên, chứ không phải những quan tâm cá nhân. Giống như trong quẻ với gió chuyển động ở bên trên và sấm động ở bên dưới, vạn vật có thể hành động tích cực và hanh thông.\nTrong đoán quẻ, điều này có nghĩa rằng với sự hăng hái hoàn toàn, bạn có thể mở ra con đường, do đó gặt hái được cái gì đó hữu lợi.\n\n<span class='red'>Ích : là Quẻ Biết Ăn Trong Lợi Ích Chung</span>\n\nTổ mà bị phá vỡ thì trứng tranh giành cái chi? Cái lợi trong chính trị, trước hết phải đặt nó vào thế chung, không thể nhìn điều lợi hại như người nhìn da con báo qua một cái ống, hoặc chỉ thấy toàn màu đen hoặc thấy toàn màu vàng. Thêm được lợi, giúp dùm, tiếng dội xa, vượt lên, phóng mình tới\n\nÍch dã là tăng thêm, ích lợi.\nTa bị lợi dụng. Ta được lợi ích.\nTa ban lộc cho người. Ta lợi dụng kẻ khác.`

        content: `<b>Sấm Sét : Sấm sét, chuyển động, bản năng sinh tồn</b>\n\nĐộng dã. Động dụng. Rung động, sợ hãi do chấn động, phấn phát, nổ vang, phấn khởi, chấn kinh. Trùng trùng chấn kinh chi tượng: khắp cùng dấy động.\nChấn nghĩa là gây phản ứng, gợi hứng, gây náo động và dấy động. Đơn quái Chấn tượng trưng cho sấm. Bởi cả hai đơn quái đều là Chấn, nên tượng của quẻ là sấm đang ở khắp nơi, dấy sinh và chuyển động. Trong đoán quẻ, điều này có nghĩa rằng giờ đây đã đến lúc để dấy động, khắc phục các khó khăn, và hoàn thành các ước nguyện hay tham vọng.\n\n<span class='red'>Thuần Chấn : là Quẻ Sấm Sét Ầm Ầm</span>\n\nCả một khoảng trời bao la, bỗng đâu mây đen kéo đến rồi sấm sét vang rền. Sấm sét tiếng lớn nhưng tác hại nhỏ. Không nên lấy kết quả gần nhất để mà phán đoán cả tương lai. Vạc là một đồ dùng quan trọng trong nhà, làm chủ giữ nó không ai bằng con trai trưởng, cho nên sau quẻ Ðỉnh tới quẻ Chấn.\n\nĐộng dã là chấn động, dấy khởi. \nTa bị kinh động. Ta được dấy động.\nTa hoạt động cho kẻ khác. Ta gây kinh động cho kẻ khác.`

const body = document.getElementById('mainBody');

function showAll() {
    body.innerHTML = fullData.map(q => `<div class="que-block"><h2>${q.title}</h2>${q.content}</div>`).join('');
}

function searchQue() {
    const txt = document.getElementById('findInput').value.toLowerCase();
    const filtered = fullData.filter(q => q.title.toLowerCase().includes(txt) || q.content.toLowerCase().includes(txt));
    body.innerHTML = filtered.length > 0 ? filtered.map(q => `<div class="que-block"><h2>${q.title}</h2>${q.content}</div>`).join('') : '<p style="text-align:center">Không tìm thấy kết quả</p>';
}

showAll();
</script>
