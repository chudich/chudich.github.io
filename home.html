<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinh Dịch Utilities</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-title {
            text-align: center;
            font-size: 28px; 
            font-weight: bold;
            margin-top: 20px;
            margin-bottom: 40px;
            color: #222;
        }

        .utility-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Giữ nguyên 3 cột như ảnh mẫu */
            gap: 25px 15px; /* Khoảng cách dọc 25px, ngang 15px */
            max-width: 500px;
            width: 100%;
        }

        .utility-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #666;
        }

        .icon-wrapper {
            width: 85px;
            height: 85px;
            background-color: #f8f8f8; /* Màu nền nhẹ cho ô icon */
            border-radius: 22px; 
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            /* Đổ bóng nhẹ để nổi bật trên nền trắng */
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .icon-wrapper img {
            width: 55%; 
            height: auto;
            object-fit: contain;
        }

        .utility-name {
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            line-height: 1.2;
        }

        /* Tối ưu cho màn hình điện thoại nhỏ */
        @media (max-width: 380px) {
            .icon-wrapper {
                width: 70px;
                height: 70px;
            }
            .utility-name {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <h1 class="header-title">Kinh Dịch Utilities</h1>

    <div class="utility-grid">
        <a href="#" class="utility-item">

        </a>
