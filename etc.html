<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trích Xuất Ý Nghĩa Lá Bài - File 06</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    
    .container {
      max-width: 680px;
      width: 100%;
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    
    header {
      background: linear-gradient(90deg, #2c4a7c, #4a6fa5);
      color: white;
      padding: 25px;
      text-align: center;
    }
    
    h1 { margin: 0; font-size: 26px; font-weight: 700; }
    .subtitle { opacity: 0.95; margin-top: 8px; font-size: 15px; }
    
    .form-area {
      padding: 30px 25px;
    }
    
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      color: #2c4a7c;
      font-size: 17px;
    }
    
    input[type="text"] {
      width: 100%;
      padding: 16px 18px;
      font-size: 19px;
      border: 2px solid #c8d4e6;
      border-radius: 12px;
      background: #f8fafd;
      transition: all 0.3s;
    }
    
    input[type="text"]:focus {
      border-color: #4a6fa5;
      box-shadow: 0 0 0 4px rgba(74,111,165,0.15);
      outline: none;
    }
    
    .btn-container {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }
    
    button {
      flex: 1;
      padding: 16px;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    #btnFind {
      background: #2c4a7c;
      color: white;
    }
    
    #btnFind:hover { background: #1e3559; }
    
    #btnCopy {
      background: #e6f0ff;
      color: #2c4a7c;
    }
    
    #btnCopy:hover { background: #c7d9ff; }
    
    .result {
      margin-top: 25px;
      padding: 25px;
      background: #f8fafd;
      border-radius: 12px;
      border-left: 6px solid #2c4a7c;
      font-size: 18.5px;
      line-height: 1.7;
      white-space: pre-wrap;
      display: none;
    }
    
    .error {
      border-left-color: #d32f2f;
      background: #fff0f0;
      color: #c62828;
    }
    
    .info {
      font-size: 15px;
      color: #666;
      margin-top: 12px;
      font-style: italic;
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>TRÍCH XUẤT Ý NGHĨA LÁ BÀI</h1>
    <p class="subtitle">File 06 - Tổ hợp đồng giá trị cùng màu</p>
  </header>

  <div class="form-area">
    <div style="margin-bottom: 20px;">
      <label for="form1">Form 1 (chính):</label>
      <input type="text" id="form1" placeholder="Ví dụ: 3 TƯỚNG XANH Đ" autocomplete="off">
    </div>

    <div>
      <label for="form2">Form 2 (có thể để trống):</label>
      <input type="text" id="form2" placeholder="Ví dụ: 1 TƯỚNG XANH N" autocomplete="off">
    </div>

    <div class="btn-container">
      <button id="btnFind">🔍 TÌM Ý NGHĨA</button>
      <button id="btnCopy">📋 SAO CHÉP KẾT QUẢ</button>
    </div>

    <div id="result" class="result"></div>
  </div>
</div>

<script>
// ==================== THƯ VIỆN DATA ====================
const LIBRARY_DATA = `... (giữ nguyên toàn bộ data bạn cung cấp, tôi rút gọn ở đây để tiết kiệm chỗ, bạn giữ nguyên phần data như bản trước) ...`;
// ===================================================================================

function normalizeInput(str) {
  if (!str || !str.trim()) return null;
  let s = str.trim().toUpperCase().replace(/\s+/g, ' ');
  
  const match = s.match(/^(\d+)\s+(.+?)\s+(XANH|VÀNG|TRẮNG|ĐỎ)\s+(Đ|N)$/);
  if (!match) return null;

  return {
    count: parseInt(match[1]),
    fullName: match[2].trim() + " " + match[3],   // ví dụ: "TƯỚNG XANH"
    name: match[2].trim(),
    color: match[3],
    position: match[4]
  };
}

function findMeaning(section, key, useLeft) {
  const regex = new RegExp(`(?:^|\\n)${key}\\s*:\\s*([^\\n|]*?)(?:\\s*\\|\\s*([^\\n]*?))?(?=\\n|$)`, 'i');
  const match = LIBRARY_DATA.match(regex);
  
  if (!match || !match[1]) return `Không tìm thấy dữ liệu cho "${key}".\nKiểm tra lại tên lá và màu trong thư viện.`;
  
  return useLeft ? match[1].trim() : (match[2] ? match[2].trim() : match[1].trim());
}

function processInput(form1Str, form2Str) {
  const f1 = normalizeInput(form1Str);
  if (!f1) return { error: "Form 1 nhập sai định dạng!\n\nĐúng chuẩn: SỐ TÊN_LÁ MÀU VỊ_TRÍ\nVí dụ: 3 TƯỚNG XANH Đ" };

  const f2 = form2Str ? normalizeInput(form2Str) : null;

  if (f2) {
    if (f1.fullName !== f2.fullName) {
      return { error: "Hai form phải có cùng TÊN LÁ và cùng MÀU!\nVí dụ: TƯỚNG XANH" };
    }
  }

  const f1Count = f1.count;
  const f2Count = f2 ? f2.count : 0;
  const total = f1Count + f2Count;

  if (![2, 3, 4].includes(total)) {
    return { error: "Tổng số lá chỉ được 2, 3 hoặc 4!" };
  }

  let section, key, useLeft;

  // === 5 TÌNH HUỐNG ĐƯỢC VIẾT RÕ RÀNG ===
  if (f1Count === 4 && f2Count === 0) {                    // 4 - 0 → SECTION=1
    section = 1;
    key = `4 ${f1.fullName}`;
    useLeft = (f1.position === "Đ");
  }
  else if (f1Count === 3 && f2Count === 1) {               // 3 - 1 → SECTION=2
    section = 2;
    key = `4 ${f1.fullName}`;
    useLeft = (f1.position === "Đ");     // 3 Đ → lấy trái
  }
  else if (f1Count === 3 && f2Count === 0) {               // 3 - 0 → SECTION=3
    section = 3;
    key = `3 ${f1.fullName}`;
    useLeft = (f1.position === "Đ");
  }
  else if (f1Count === 2 && f2Count === 1) {               // 2 - 1 → SECTION=4
    section = 4;
    key = `3 ${f1.fullName}`;
    useLeft = (f1.position === "Đ");     // 2 Đ → lấy trái
  }
  else if (f1Count === 2 && f2Count === 0) {               // 2 - 0 → SECTION=5
    section = 5;
    key = `2 ${f1.fullName}`;
    useLeft = (f1.position === "Đ");
  }
  else {
    return { error: "Tổng số lá không hợp lệ!" };
  }

  const meaning = findMeaning(section, key, useLeft);

  return {
    success: true,
    section,
    key,
    meaning
  };
}

// ====================== NÚT ======================
document.getElementById("btnFind").addEventListener("click", () => {
  const input1 = document.getElementById("form1").value;
  const input2 = document.getElementById("form2").value;
  
  const resultDiv = document.getElementById("result");
  resultDiv.style.display = "block";

  const processed = processInput(input1, input2);

  if (processed.error) {
    resultDiv.className = "result error";
    resultDiv.textContent = processed.error;
  } else {
    resultDiv.className = "result";
    resultDiv.innerHTML = `
      <strong>Kết quả:</strong><br><br>
      ${processed.meaning}<br><br>
      <span class="info">Section ${processed.section} — ${processed.key}</span>
    `;
  }
});

document.getElementById("btnCopy").addEventListener("click", () => {
  const resultDiv = document.getElementById("result");
  if (resultDiv.style.display === "none") {
    alert("Chưa có kết quả để sao chép!");
    return;
  }
  
  const text = resultDiv.textContent.split("Section")[0].trim();
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById("btnCopy");
    const old = btn.textContent;
    btn.textContent = "✅ ĐÃ SAO CHÉP";
    setTimeout(() => btn.textContent = old, 1800);
  });
});
</script>
</body>
</html>
