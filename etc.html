<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tứ Sắc</title>

<style>
body { font-family: Arial; padding: 15px; background: #f2f2f2; }
.container { max-width: 500px; margin: auto; }
input, button {
  width: 100%; padding: 14px; margin: 8px 0; font-size: 18px;
}
button { background: #007bff; color: white; border: none; border-radius: 8px; }
.result { margin-top: 20px; background: white; padding: 15px; border-radius: 10px; }
</style>
</head>

<body>

<div class="container">
<h2>Tứ Sắc</h2>

<input id="f1" placeholder="VD: 3 NGỰA XANH Đ">
<input id="f2" placeholder="VD: 1 NGỰA XANH N">

<button onclick="run()">XỬ LÝ</button>

<div id="out" class="result">Chưa có kết quả</div>
</div>

<script>

// ===== DÁN THƯ VIỆN THẬT CỦA BẠN VÀO ĐÂY =====
const DATA = {
  // GIỮ NGUYÊN FORMAT CỦA BẠN
};

// ===== PARSE INPUT =====
function parse(str){
  if(!str || !str.trim()) return null;

  str = str.toUpperCase().trim();

  let m = str.match(/(\d+)\s+(.+)\s+(Đ|N)/);
  if(!m) return null;

  return {
    count: parseInt(m[1]),
    name: m[2],
    pos: m[3]
  };
}

// ===== TÁCH TEXT THEO ":" VÀ "|" =====
function extractMeaning(raw){
  if(!raw) return {l:"❌ Không có data", r:"❌ Không có data"};

  let afterColon = raw.split(":")[1] || raw;
  let parts = afterColon.split("|");

  return {
    l: (parts[0] || "").trim(),
    r: (parts[1] || "").trim()
  };
}

// ===== TÌM DATA THEO KEY =====
function findData(section, key){
  if(!DATA[section]) return null;

  // tìm dòng chứa key (không cần match 100%)
  let entries = Object.entries(DATA[section]);

  for(let [k, v] of entries){
    if(k.includes(key)) return v;
  }

  return null;
}

// ===== DETECT SECTION =====
function detectSection(f1, f2){
  if(f1.count === 4 && !f2) return 1;
  if(f1.count === 3 && f2 && f2.count === 1) return 2;
  if(f1.count === 3 && !f2) return 3;
  if(f1.count === 2 && f2 && f2.count === 1) return 4;
  if(f1.count === 2 && !f2) return 5;
  return 0;
}

// ===== SECTION 1 =====
function section1(f1){
  let key = "4 " + f1.name;
  let raw = findData(1, key);
  let t = extractMeaning(raw);
  return f1.pos === "Đ" ? t.l : t.r;
}

// ===== SECTION 2 =====
function section2(f1, f2){
  let key = "4 " + f1.name;
  let raw = findData(2, key);
  let t = extractMeaning(raw);

  let d = 0, n = 0;

  if(f1.pos === "Đ") d += f1.count;
  else n += f1.count;

  if(f2){
    if(f2.pos === "Đ") d += f2.count;
    else n += f2.count;
  }

  return d > n ? t.l : t.r;
}

// ===== SECTION 3 =====
function section3(f1){
  let key = "3 " + f1.name;
  let raw = findData(3, key);
  let t = extractMeaning(raw);
  return f1.pos === "Đ" ? t.l : t.r;
}

// ===== SECTION 4 =====
function section4(f1, f2){
  let key = "3 " + f1.name;
  let raw = findData(4, key);
  let t = extractMeaning(raw);

  let d = 0, n = 0;

  if(f1.pos === "Đ") d += f1.count;
  else n += f1.count;

  if(f2){
    if(f2.pos === "Đ") d += f2.count;
    else n += f2.count;
  }

  return d > n ? t.l : t.r;
}

// ===== SECTION 5 =====
function section5(f1){
  let key = "2 " + f1.name;
  let raw = findData(5, key);
  let t = extractMeaning(raw);
  return f1.pos === "Đ" ? t.l : t.r;
}

// ===== MAIN =====
function run(){

  let out = document.getElementById("out");

  try{

    let f1 = parse(document.getElementById("f1").value);
    let f2 = parse(document.getElementById("f2").value);

    if(!f1){
      out.innerHTML = "❌ Form 1 sai";
      return;
    }

    let s = detectSection(f1, f2);
    let result = "";

    if(s===1) result = section1(f1);
    else if(s===2) result = section2(f1,f2);
    else if(s===3) result = section3(f1);
    else if(s===4) result = section4(f1,f2);
    else if(s===5) result = section5(f1);
    else result = "❌ Không xác định";

    out.innerHTML = `<b>SECTION:</b> ${s}<br><br>${result}`;

  }catch(e){
    out.innerHTML = "❌ Lỗi: " + e.message;
  }
}

</script>

</body>
</html>
