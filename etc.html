<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tứ Sắc</title>

<style>
body { font-family: Arial; padding:10px; background:#f2f2f2; }
.box { background:#fff; padding:12px; margin-bottom:10px; border-radius:10px; }
input { width:100%; padding:12px; font-size:18px; }
button { width:100%; padding:15px; font-size:20px; background:#2196F3; color:#fff; border:none; border-radius:10px; }
.result { font-size:20px; font-weight:bold; }
textarea { width:100%; height:150px; font-size:14px; }
</style>
</head>

<body>

<div class="box">
<h3>Form 1</h3>
<input id="form1" placeholder="3 NGỰA XANH Đ">
</div>

<div class="box">
<h3>Form 2</h3>
<input id="form2" placeholder="1 NGỰA XANH N">
</div>

<div class="box">
<h3>DATA THƯ VIỆN (DÁN VÀO ĐÂY)</h3>
<textarea id="data">
4 PHÁO VÀNG : Thắng một vụ tranh chấp tiền bạc | Gia tài lớn sẽ vào tay.
4 NGỰA XANH : Được tin về địa vị | Phòng ác ý của kẻ tiểu nhân.
3 TƯỢNG VÀNG : Tiền bạc vào tay nhờ xê dịch | Đừng mơ nhiều, khi việc chưa thành.
3 TƯỚNG VÀNG : Vận may đã đến | Mất của không đáng kể.
2 CHỐT VÀNG : Lợi lộc đáng kể | Thất bại nhưng vẫn cứu kịp.
</textarea>
</div>

<button onclick="run()">XỬ LÝ</button>

<div class="box result" id="output"></div>

<script>

function parse(str){
    if(!str) return null;
    let p = str.trim().split(" ");
    return {
        count: parseInt(p[0]),
        name: p[1],
        color: p[2],
        type: p[3]
    };
}

// tìm dòng trong data
function findLine(keyword){
    let data = document.getElementById("data").value.split("\n");
    for(let line of data){
        if(line.includes(keyword)){
            return line;
        }
    }
    return null;
}

// tách trái phải
function splitText(line, side){
    let part = line.split(":")[1].trim();
    let [left, right] = part.split("|");
    return side=="LEFT" ? left.trim() : right.trim();
}

function run(){

    let f1 = parse(form1.value);
    let f2 = parse(form2.value);

    let out = "";

    if(!f1){
        output.innerText = "Nhập Form 1";
        return;
    }

    let total = f1.count + (f2 ? f2.count : 0);

    // ===== SECTION 1 =====
    if(total==4 && !f2){
        let key = "4 " + f1.name + " " + f1.color;
        let line = findLine(key);

        if(line){
            out = splitText(line, f1.type=="Đ" ? "LEFT" : "RIGHT");
        }
    }

    // ===== SECTION 2 =====
    else if(total==4 && f2){

        if(f1.name==f2.name && f1.color==f2.color){

            let key = "4 " + f1.name + " " + f1.color;
            let line = findLine(key);

            let countD=0, countN=0;

            if(f1.type=="Đ") countD+=f1.count; else countN+=f1.count;
            if(f2.type=="Đ") countD+=f2.count; else countN+=f2.count;

            if(line){
                if(countD>countN){
                    out = splitText(line,"LEFT");
                }else{
                    out = splitText(line,"RIGHT");
                }
            }
        }
    }

    // ===== SECTION 3 =====
    else if(total==3 && !f2){

        let key = "3 " + f1.name + " " + f1.color;
        let line = findLine(key);

        if(line){
            out = splitText(line, f1.type=="Đ" ? "LEFT" : "RIGHT");
        }
    }

    // ===== SECTION 4 =====
    else if(total==3 && f2){

        if(f1.name==f2.name && f1.color==f2.color){

            let key = "3 " + f1.name + " " + f1.color;
            let line = findLine(key);

            let countD=0, countN=0;

            if(f1.type=="Đ") countD+=f1.count; else countN+=f1.count;
            if(f2.type=="Đ") countD+=f2.count; else countN+=f2.count;

            if(line){
                if(countD>countN){
                    out = splitText(line,"LEFT");
                }else{
                    out = splitText(line,"RIGHT");
                }
            }
        }
    }

    // ===== SECTION 5 =====
    else if(total==2 && !f2){

        let key = "2 " + f1.name + " " + f1.color;
        let line = findLine(key);

        if(line){
            out = splitText(line, f1.type=="Đ" ? "LEFT" : "RIGHT");
        }
    }

    if(out=="") out = "Không khớp";

    output.innerText = out;
}

</script>

</body>
</html>
