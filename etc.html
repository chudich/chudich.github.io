<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trích Xuất Ý Nghĩa Lá Bài - File 06</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    body {font-family: 'Roboto', sans-serif; background: #f0f4f8; margin:0; padding:20px; line-height:1.6;}
    .section {margin-bottom:40px; background:white; border-radius:15px; box-shadow:0 8px 25px rgba(0,0,0,0.08); overflow:hidden;}
    .section-header {background:#2c4a7c; color:white; padding:18px 25px; font-size:20px; font-weight:700;}
    .form-area {padding:25px;}
    label {display:block; margin-bottom:8px; font-weight:500; color:#2c4a7c;}
    input {width:100%; padding:14px; font-size:18px; border:2px solid #c8d4e6; border-radius:10px; margin-bottom:20px;}
    button {padding:14px 24px; font-size:17px; font-weight:600; border:none; border-radius:10px; cursor:pointer; margin-right:12px;}
    .btn-find {background:#2c4a7c; color:white;}
    .btn-copy {background:#e0e7ff; color:#2c4a7c;}
    .result {margin-top:20px; padding:20px; background:#f8fafd; border-left:6px solid #2c4a7c; font-size:18px; border-radius:8px; min-height:60px; white-space:pre-wrap;}
    .error {border-left-color:#d32f2f; background:#ffebee; color:#c62828;}
  </style>
</head>
<body>

<div style="max-width:800px; margin:auto;">

  <!-- ==================== SECTION 1 ==================== -->
  <div class="section">
    <div class="section-header">SECTION 1 - 4 lá cùng vị trí (4-0)</div>
    <div class="form-area">
      <label>Form 1:</label>
      <input type="text" id="f1_s1" placeholder="Ví dụ: 4 TƯỚNG XANH Đ">

      <label>Form 2 (để trống):</label>
      <input type="text" id="f2_s1" placeholder="Để trống">

      <button class="btn-find" onclick="runSection(1)">TÌM Ý NGHĨA</button>
      <button class="btn-copy" onclick="copyResult(1)">SAO CHÉP</button>
      <div id="result_s1" class="result"></div>
    </div>
  </div>

  <!-- ==================== SECTION 2 ==================== -->
  <div class="section">
    <div class="section-header">SECTION 2 - 3 lá + 1 lá khác vị trí (3-1)</div>
    <div class="form-area">
      <label>Form 1 (3 lá):</label>
      <input type="text" id="f1_s2" placeholder="Ví dụ: 3 TƯỚNG XANH Đ">

      <label>Form 2 (1 lá khác vị trí):</label>
      <input type="text" id="f2_s2" placeholder="Ví dụ: 1 TƯỚNG XANH N">

      <button class="btn-find" onclick="runSection(2)">TÌM Ý NGHĨA</button>
      <button class="btn-copy" onclick="copyResult(2)">SAO CHÉP</button>
      <div id="result_s2" class="result"></div>
    </div>
  </div>

  <!-- ==================== SECTION 3 ==================== -->
  <div class="section">
    <div class="section-header">SECTION 3 - 3 lá cùng vị trí (3-0)</div>
    <div class="form-area">
      <label>Form 1:</label>
      <input type="text" id="f1_s3" placeholder="Ví dụ: 3 TƯỚNG XANH Đ">

      <label>Form 2 (để trống):</label>
      <input type="text" id="f2_s3" placeholder="Để trống">

      <button class="btn-find" onclick="runSection(3)">TÌM Ý NGHĨA</button>
      <button class="btn-copy" onclick="copyResult(3)">SAO CHÉP</button>
      <div id="result_s3" class="result"></div>
    </div>
  </div>

  <!-- ==================== SECTION 4 ==================== -->
  <div class="section">
    <div class="section-header">SECTION 4 - 2 lá + 1 lá khác vị trí (2-1)</div>
    <div class="form-area">
      <label>Form 1 (2 lá):</label>
      <input type="text" id="f1_s4" placeholder="Ví dụ: 2 TƯỚNG XANH Đ">

      <label>Form 2 (1 lá khác vị trí):</label>
      <input type="text" id="f2_s4" placeholder="Ví dụ: 1 TƯỚNG XANH N">

      <button class="btn-find" onclick="runSection(4)">TÌM Ý NGHĨA</button>
      <button class="btn-copy" onclick="copyResult(4)">SAO CHÉP</button>
      <div id="result_s4" class="result"></div>
    </div>
  </div>

  <!-- ==================== SECTION 5 ==================== -->
  <div class="section">
    <div class="section-header">SECTION 5 - 2 lá cùng vị trí (2-0)</div>
    <div class="form-area">
      <label>Form 1:</label>
      <input type="text" id="f1_s5" placeholder="Ví dụ: 2 TƯỚNG XANH Đ">

      <label>Form 2 (để trống):</label>
      <input type="text" id="f2_s5" placeholder="Để trống">

      <button class="btn-find" onclick="runSection(5)">TÌM Ý NGHĨA</button>
      <button class="btn-copy" onclick="copyResult(5)">SAO CHÉP</button>
      <div id="result_s5" class="result"></div>
    </div>
  </div>

</div>

<script>
// ==================== THƯ VIỆN DATA - DÁN TOÀN BỘ DATA VÀO ĐÂY ====================
const LIBRARY_DATA = `
[SECTION=1]
4 TƯỚNG XANH : Cuộc gặp gỡ tuyệt vời. Công danh không hẹn gặp gỡ mà nên | Được sự đỡ đầu đắc lực, danh phân kèm hôn nhân.
... (DÁN HẾT DATA TỪ [SECTION=1] ĐẾN [SECTION=5] VÀO ĐÂY) ...
`;
// ===================================================================

function normalizeInput(str) {
  if (!str || !str.trim()) return null;
  let s = str.trim().toUpperCase().replace(/\s+/g, ' ');
  const match = s.match(/^(\d+)\s+(.+?)\s+(XANH|VÀNG|TRẮNG|ĐỎ)\s+(Đ|N)$/);
  if (!match) return null;
  return {
    count: parseInt(match[1]),
    fullName: (match[2].trim() + " " + match[3]).trim(),
    position: match[4]
  };
}

function findMeaning(key, useLeft) {
  const regex = new RegExp(`(?:^|\\n)${key}\\s*:\\s*([^\\n|]*?)(?:\\s*\\|\\s*([^\\n]*?))?(?=\\n|$)`, 'i');
  const m = LIBRARY_DATA.match(regex);
  if (!m || !m[1]) return `Không tìm thấy "${key}" trong thư viện.`;
  return useLeft ? m[1].trim() : (m[2] ? m[2].trim() : m[1].trim());
}

function runSection(sec) {
  const resultDiv = document.getElementById(`result_s${sec}`);
  resultDiv.style.display = "block";
  resultDiv.className = "result";

  let f1Id = `f1_s${sec}`;
  let f2Id = `f2_s${sec}`;

  const f1 = normalizeInput(document.getElementById(f1Id).value);
  if (!f1) {
    resultDiv.className = "result error";
    resultDiv.textContent = "Form 1 sai định dạng!";
    return;
  }

  const f2 = document.getElementById(f2Id).value ? normalizeInput(document.getElementById(f2Id).value) : null;
  if (f2 && f1.fullName !== f2.fullName) {
    resultDiv.className = "result error";
    resultDiv.textContent = "Hai form phải cùng tên lá và cùng màu!";
    return;
  }

  const c1 = f1.count;
  const c2 = f2 ? f2.count : 0;

  let key = "";
  let useLeft = true;

  if (sec === 1 && c1 === 4 && c2 === 0) {
    key = `4 ${f1.fullName}`;
    useLeft = (f1.position === "Đ");
  } else if (sec === 2 && c1 === 3 && c2 === 1) {
    key = `4 ${f1.fullName}`;
    useLeft = (f1.position === "Đ");
  } else if (sec === 3 && c1 === 3 && c2 === 0) {
    key = `3 ${f1.fullName}`;
    useLeft = (f1.position === "Đ");
  } else if (sec === 4 && c1 === 2 && c2 === 1) {
    key = `3 ${f1.fullName}`;
    useLeft = (f1.position === "Đ");
  } else if (sec === 5 && c1 === 2 && c2 === 0) {
    key = `2 ${f1.fullName}`;
    useLeft = (f1.position === "Đ");
  } else {
    resultDiv.className = "result error";
    resultDiv.textContent = `Không đúng định dạng của SECTION ${sec}. Vui lòng kiểm tra số lượng lá.`;
    return;
  }

  const meaning = findMeaning(key, useLeft);
  resultDiv.innerHTML = `<strong>Kết quả SECTION ${sec}:</strong><br><br>${meaning}`;
}

function copyResult(sec) {
  const resultDiv = document.getElementById(`result_s${sec}`);
  if (resultDiv.style.display === "none" || resultDiv.classList.contains("error")) {
    alert("Chưa có kết quả để sao chép!");
    return;
  }
  const text = resultDiv.textContent.replace("Kết quả SECTION " + sec + ":", "").trim();
  navigator.clipboard.writeText(text);
  alert("Đã sao chép kết quả!");
}
</script>
</body>
</html>
