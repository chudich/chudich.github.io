// ===== PARSE INPUT =====
function parse(str){
  if(!str.trim()) return null;

  str = str.toUpperCase().trim();

  let match = str.match(/(\d+)\s+(.+)\s+(Đ|N)/);

  if(!match) return null;

  return {
    count: parseInt(match[1]),
    name: match[2],
    pos: match[3]
  };
}


// ===== DETECT SECTION =====
function detectSection(f1, f2){

  if(f1.count === 4 && !f2) return 1; // 4-0
  if(f1.count === 3 && f2 && f2.count === 1) return 2; // 3-1
  if(f1.count === 3 && !f2) return 3; // 3-0
  if(f1.count === 2 && f2 && f2.count === 1) return 4; // 2-1
  if(f1.count === 2 && !f2) return 5; // 2-0

  return 0;
}


// ===== SPLIT TEXT =====
function splitText(text){
  let [l, r] = text.split("|").map(s => s.trim());
  return {l, r};
}


// ===== SECTION 1 =====
function section1(f1){
  let key = "4 " + f1.name;
  let text = DATA[1][key];
  let t = splitText(text);
  return f1.pos === "Đ" ? t.l : t.r;
}


// ===== SECTION 2 =====
function section2(f1, f2){
  let key = "4 " + f1.name;
  let text = DATA[2][key];
  let t = splitText(text);

  let d = 0, n = 0;

  if(f1.pos === "Đ") d += f1.count;

function run(){

  if(!f1){

  let section = detectSection(f1, f2);

  let result = "";

  if(section === 1) result = section1(f1);
