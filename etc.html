<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Trích xuất SECTION</title>
<meta name="viewport" content="width=device-width, initial-scale=1.2">
<style>
body { font-family: Arial, sans-serif; padding: 20px; background:#f5f5f5; }
h2 { text-align:center; }
.container { display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin:auto; }
textarea { width:100%; height:100px; font-size:14px; }
input[type="text"] { width:100%; padding:8px; font-size:14px; margin-bottom:5px; }
button { padding:10px; font-size:16px; cursor:pointer; }
.result { background:#fff; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.2); font-size:16px; }
</style>
</head>
<body>

<h2>Trích xuất SECTION theo Form1 & Form2</h2>
<div class="container">
  <label>Form 1 (ví dụ: 2 TƯỚNG VÀNG Đ, mỗi lá một dòng):</label>
  <textarea id="form1"></textarea>

  <label>Form 2 (ví dụ: 1 TƯỚNG VÀNG N, mỗi lá một dòng hoặc trống):</label>
  <textarea id="form2"></textarea>

  <button onclick="processForms()">Xử lý</button>

  <div class="result" id="result"></div>
</div>

<script>
// ====== Data thư viện ======
// Bạn có thể paste nguyên data từ thư viện vào đây
const library = {
  "SECTION1": { "4 PHÁO VÀNG": "Thắng một vụ tranh chấp tiền bạc | Gia tài lớn sẽ vào tay" },
  "SECTION2": { "4 NGỰA XANH": "Được tin về địa vị | Phòng ác ý của kẻ tiểu nhân" },
  "SECTION3": { "3 TƯỢNG VÀNG": "Tiền bạc vào tay nhờ xê dịch | Đừng mơ nhiều, khi việc chưa thành" },
  "SECTION4": { "3 TƯỚNG VÀNG": "Vận may đã đến | Mất của không đáng kể" },
  "SECTION5": { "2 CHỐT VÀNG": "Lợi lộc đáng kể | Thất bại nhưng vẫn cứu kịp" }
};

// ====== Hàm xử lý ======
function processForms(){
  const form1Lines = document.getElementById("form1").value.trim().split("\n").filter(l => l);
  const form2Lines = document.getElementById("form2").value.trim().split("\n").filter(l => l);

  // Tạo map số lượng lá
  const countMap = {};

  function countLines(lines){
    lines.forEach(line => {
      // Ví dụ: "2 TƯỚNG VÀNG Đ"
      let parts = line.trim().split(" ");
      if(parts.length < 4) return; // skip
      let num = parseInt(parts[0]);
      let name = parts[1];
      let color = parts[2];
      let sign = parts[3]; // Đ hoặc N
      let key = `${name} ${color}`;
      if(!countMap[key]) countMap[key] = {D:0, N:0};
      countMap[key][sign] += num;
    });
  }

  countLines(form1Lines);
  countLines(form2Lines);

  let resultText = "";

  // Xác định SECTION theo số lượng
  for(const key in countMap){
    const val = countMap[key];
    let total = val.D + val.N;
    let section="", leftOrRight="";
    // === 4-0 / 0-4 ===
    if(total === 4){
      section="SECTION1";
      leftOrRight = (val.D ===4) ? "LEFT" : "RIGHT";
    }
    // === 3-1 / 1-3 ===
    else if(total ===4 && (val.D===3 || val.N===3)){
      section="SECTION2";
      leftOrRight = (val.D===3) ? "LEFT" : "RIGHT";
    }
    // === 3-0 / 0-3 ===
    else if(total===3){
      section="SECTION3";
      leftOrRight = (val.D===3) ? "LEFT" : "RIGHT";
    }
    // === 2-1 / 1-2 ===
    else if(total===3){
      section="SECTION4";
      leftOrRight = (val.D===2) ? "LEFT" : "RIGHT";
    }
    // === 2-0 / 0-2 ===
    else if(total===2){
      section="SECTION5";
      leftOrRight = (val.D===2) ? "LEFT" : "RIGHT";
    } else {
      section="UNKNOWN";
      leftOrRight="LEFT";
    }

    // Lấy text
    let libKey = Object.keys(library[section])[0];
    let text = library[section][libKey];
    let finalText = (leftOrRight==="LEFT") ? text.split("|")[0].trim() : text.split("|")[1].trim();
    resultText += `${key} (${section}, ${leftOrRight}): ${finalText}\n`;
  }

  document.getElementById("result").innerText = resultText || "Không xác định được SECTION";
}
</script>

</body>
</html>
