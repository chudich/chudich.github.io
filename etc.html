<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tứ Sắc - 5 Khuôn</title>

<style>
body {
  font-family: Arial;
  padding: 15px;
  background: #f2f2f2;
}

.container {
  max-width: 500px;
  margin: auto;
}

input {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  font-size: 18px;
}

button {
  width: 100%;
  padding: 16px;
  font-size: 20px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 8px;
}

.result {
  margin-top: 20px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">

<h2>Nhập Form</h2>

<input id="f1" placeholder="Form 1: vd 3 NGỰA XANH Đ">
<input id="f2" placeholder="Form 2: vd 1 NGỰA XANH N (có thể bỏ trống)">

<button onclick="run()">XỬ LÝ</button>

<div class="result" id="out"></div>

</div>

<script>

// ===== DATA =====
const DATA = {

1: {
"4 PHÁO VÀNG": "Thắng một vụ tranh chấp tiền bạc | Gia tài lớn sẽ vào tay."
},

2: {
"4 NGỰA XANH": "Được tin về địa vị | Phòng ác ý của kẻ tiểu nhân."
},

3: {
"3 TƯỢNG VÀNG": "Tiền bạc vào tay nhờ xê dịch | Đừng mơ nhiều, khi việc chưa thành."
},

4: {
"3 TƯỚNG VÀNG": "Vận may đã đến | Mất của không đáng kể."
},

5: {
"2 CHỐT VÀNG": "Lợi lộc đáng kể | Thất bại nhưng vẫn cứu kịp."
}

};


// ===== PARSE INPUT =====
function parse(str){
  if(!str.trim()) return null;

  str = str.toUpperCase().trim();

  let match = str.match(/(\d+)\s+(.+)\s+(Đ|N)/);

  if(!match) return null;

  return {
    count: parseInt(match[1]),
    name: match[2],
    pos: match[3]
  };
}


// ===== DETECT SECTION =====
function detectSection(f1, f2){

  if(f1.count === 4 && !f2) return 1; // 4-0
  if(f1.count === 3 && f2 && f2.count === 1) return 2; // 3-1
  if(f1.count === 3 && !f2) return 3; // 3-0
  if(f1.count === 2 && f2 && f2.count === 1) return 4; // 2-1
  if(f1.count === 2 && !f2) return 5; // 2-0

  return 0;
}


// ===== SPLIT TEXT =====
function splitText(text){
  let [l, r] = text.split("|").map(s => s.trim());
  return {l, r};
}


// ===== SECTION 1 =====
function section1(f1){
  let key = "4 " + f1.name;
  let text = DATA[1][key];
  let t = splitText(text);
  return f1.pos === "Đ" ? t.l : t.r;
}


// ===== SECTION 2 =====
function section2(f1, f2){
  let key = "4 " + f1.name;
  let text = DATA[2][key];
  let t = splitText(text);

  let d = 0, n = 0;

  if(f1.pos === "Đ") d += f1.count;
  else n += f1.count;

  if(f2.pos === "Đ") d += f2.count;
  else n += f2.count;

  return d > n ? t.l : t.r;
}


// ===== SECTION 3 =====
function section3(f1){
  let key = "3 " + f1.name;
  let text = DATA[3][key];
  let t = splitText(text);

  return f1.pos === "Đ" ? t.l : t.r;
}


// ===== SECTION 4 =====
function section4(f1, f2){
  let key = "3 " + f1.name;
  let text = DATA[4][key];
  let t = splitText(text);

  let d = 0, n = 0;

  if(f1.pos === "Đ") d += f1.count;
  else n += f1.count;

  if(f2.pos === "Đ") d += f2.count;
  else n += f2.count;

  return d > n ? t.l : t.r;
}


// ===== SECTION 5 =====
function section5(f1){
  let key = "2 " + f1.name;
  let text = DATA[5][key];
  let t = splitText(text);

  return f1.pos === "Đ" ? t.l : t.r;
}


// ===== MAIN =====
function run(){

  let raw1 = document.getElementById("f1").value;
  let raw2 = document.getElementById("f2").value;

  let f1 = parse(raw1);
  let f2 = parse(raw2);

  if(!f1){
    out.innerHTML = "❌ Form 1 sai định dạng";
    return;
  }

  let section = detectSection(f1, f2);

  let result = "";

  if(section === 1) result = section1(f1);
  else if(section === 2) result = section2(f1, f2);
  else if(section === 3) result = section3(f1);
  else if(section === 4) result = section4(f1, f2);
  else if(section === 5) result = section5(f1);
  else result = "❌ Không xác định SECTION";

  out.innerHTML = `
    <b>SECTION:</b> ${section}<br><br>
    <b>Kết quả:</b><br>${result}
  `;
}

</script>

</body>
</html>
