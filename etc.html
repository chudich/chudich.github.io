<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trích Xuất Ý Nghĩa Lá Bài - File 06</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    body {font-family: 'Roboto', sans-serif; background: linear-gradient(135deg, #f0f4f8, #d9e2ec); margin:0; padding:20px; min-height:100vh; display:flex; align-items:center; justify-content:center;}
    .container {max-width:720px; width:100%; background:white; border-radius:20px; box-shadow:0 15px 40px rgba(0,0,0,0.1); overflow:hidden;}
    header {background:linear-gradient(90deg,#2c4a7c,#4a6fa5); color:white; padding:25px; text-align:center;}
    h1 {margin:0; font-size:26px; font-weight:700;}
    .form-area {padding:30px 25px;}
    label {display:block; font-weight:500; margin-bottom:8px; color:#2c4a7c; font-size:17px;}
    input[type="text"] {width:100%; padding:16px 18px; font-size:19px; border:2px solid #c8d4e6; border-radius:12px; background:#f8fafd;}
    input:focus {border-color:#4a6fa5; box-shadow:0 0 0 4px rgba(74,111,165,0.15); outline:none;}
    .btn-container {display:flex; gap:15px; margin-top:30px;}
    button {flex:1; padding:16px; font-size:18px; font-weight:600; border:none; border-radius:12px; cursor:pointer;}
    #btnFind {background:#2c4a7c; color:white;}
    #btnFind:hover {background:#1e3559;}
    #btnCopy {background:#e6f0ff; color:#2c4a7c;}
    #btnCopy:hover {background:#c7d9ff;}
    .result {margin-top:25px; padding:25px; background:#f8fafd; border-radius:12px; border-left:6px solid #2c4a7c; font-size:18.5px; line-height:1.7; white-space:pre-wrap; display:none;}
    .error {border-left-color:#d32f2f; background:#fff0f0; color:#c62828;}
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>TRÍCH XUẤT Ý NGHĨA LÁ BÀI</h1>
    <p class="subtitle">File 06 - Tổ hợp đồng giá trị cùng màu</p>
  </header>

  <div class="form-area">
    <div style="margin-bottom:20px;">
      <label for="form1">Form 1 (chính):</label>
      <input type="text" id="form1" placeholder="Ví dụ: 3 TƯỚNG XANH Đ">
    </div>
    <div>
      <label for="form2">Form 2 (có thể để trống):</label>
      <input type="text" id="form2" placeholder="Ví dụ: 1 TƯỚNG XANH N">
    </div>

    <div class="btn-container">
      <button id="btnFind">🔍 TÌM Ý NGHĨA</button>
      <button id="btnCopy">📋 SAO CHÉP KẾT QUẢ</button>
    </div>

    <div id="result" class="result"></div>
  </div>
</div>

<script>
// ==================== THƯ VIỆN DATA ====================
const LIBRARY_DATA = `
[SECTION=1]
4 TƯỚNG XANH : Cuộc gặp gỡ tuyệt vời. Công danh không hẹn gặp gỡ mà nên | Được sự đỡ đầu đắc lực, danh phân kèm hôn nhân.
... (DÁN TOÀN BỘ DATA TỪ [SECTION=1] ĐẾN HẾT [SECTION=5] VÀO ĐÂY) ...
`;
// ===================================================================

function normalizeInput(str) {
  if (!str || !str.trim()) return null;
  let s = str.trim().toUpperCase().replace(/\s+/g, ' ');
  const match = s.match(/^(\d+)\s+(.+?)\s+(XANH|VÀNG|TRẮNG|ĐỎ)\s+(Đ|N)$/);
  if (!match) return null;
  return {
    count: parseInt(match[1]),
    fullName: (match[2].trim() + " " + match[3]).trim(),
    position: match[4]
  };
}

function findMeaning(key, useLeft) {
  const regex = new RegExp(`(?:^|\\n)${key}\\s*:\\s*([^\\n|]*?)(?:\\s*\\|\\s*([^\\n]*?))?(?=\\n|$)`, 'i');
  const m = LIBRARY_DATA.match(regex);
  if (!m || !m[1]) return `Không tìm thấy "${key}"`;
  return useLeft ? m[1].trim() : (m[2] ? m[2].trim() : m[1].trim());
}

function processInput(form1Str, form2Str) {
  const f1 = normalizeInput(form1Str);
  if (!f1) return {error: "Form 1 sai định dạng!\nVí dụ đúng: 3 TƯỚNG XANH Đ"};

  const f2 = form2Str ? normalizeInput(form2Str) : null;
  if (f2 && f1.fullName !== f2.fullName) {
    return {error: "Hai form phải cùng tên lá và cùng màu!"};
  }

  const c1 = f1 ? f1.count : 0;
  const c2 = f2 ? f2.count : 0;

  let section, key, useLeft, situation = "";

  // ==================== 5 IF RIÊNG BIỆT HOÀN TOÀN - KHÔNG CÓ TOTAL ====================

  if (c1 === 4 && c2 === 0) {                    // Tình huống 1: 4 - 0
    situation = "4 - 0";
    section = 1;
    key = `4 ${f1.fullName}`;
    useLeft = (f1.position === "Đ");
  }

  if (c1 === 3 && c2 === 1) {                    // Tình huống 2: 3 - 1
    situation = "3 - 1";
    section = 2;
    key = `4 ${f1.fullName}`;
    useLeft = (f1.position === "Đ");
  }

  if (c1 === 3 && c2 === 0) {                    // Tình huống 3: 3 - 0
    situation = "3 - 0";
    section = 3;
    key = `3 ${f1.fullName}`;
    useLeft = (f1.position === "Đ");
  }

  if (c1 === 2 && c2 === 1) {                    // Tình huống 4: 2 - 1
    situation = "2 - 1";
    section = 4;
    key = `3 ${f1.fullName}`;
    useLeft = (f1.position === "Đ");
  }

  if (c1 === 2 && c2 === 0) {                    // Tình huống 5: 2 - 0
    situation = "2 - 0";
    section = 5;
    key = `2 ${f1.fullName}`;
    useLeft = (f1.position === "Đ");
  }

  if (!situation) {
    return {error: `Không khớp với 5 tình huống.\nForm1: ${c1} lá, Form2: ${c2} lá`};
  }

  const meaning = findMeaning(key, useLeft);

  return {success: true, section, key, meaning, situation, c1, c2};
}

// NÚT
document.getElementById("btnFind").onclick = () => {
  const resultDiv = document.getElementById("result");
  resultDiv.style.display = "block";

  const p = processInput(document.getElementById("form1").value, document.getElementById("form2").value);

  if (p.error) {
    resultDiv.className = "result error";
    resultDiv.textContent = p.error;
  } else {
    resultDiv.className = "result";
    resultDiv.innerHTML = `
      <strong>Kết quả:</strong><br><br>
      ${p.meaning}<br><br>
      <span style="font-size:15px;color:#666;">
        Tình huống: ${p.situation} (Form1: ${p.c1} lá, Form2: ${p.c2} lá)<br>
        Section ${p.section} — ${p.key}
      </span>
    `;
  }
};

document.getElementById("btnCopy").onclick = () => {
  const resultDiv = document.getElementById("result");
  if (resultDiv.style.display === "none") return alert("Chưa có kết quả");
  const text = resultDiv.textContent.split("Tình huống")[0].trim();
  navigator.clipboard.writeText(text);
  const btn = document.getElementById("btnCopy");
  const old = btn.textContent;
  btn.textContent = "✅ ĐÃ SAO CHÉP";
  setTimeout(() => btn.textContent = old, 1500);
};
</script>
</body>
</html>
