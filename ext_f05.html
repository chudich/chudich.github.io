    function findData05(laChu, laGap, gapNamBenPhai) {
        const db = DATA_FILE_05.split('\n');
        let currentChuBlock = "";
        let targetChu = laChu.toUpperCase().trim();
        let targetGap = "GẶP " + laGap.toUpperCase().trim();

        for (let i = 0; i < db.length; i++) {
            let row = db[i].trim().toUpperCase();
            if (!row) continue;

            // 1. Nhận diện tiêu đề nhóm (Lá Đứng :)
            if (row.includes(":") && !row.startsWith("GẶP")) {
                if (row.includes(targetChu)) {
                    currentChuBlock = targetChu;
                    continue;
                } else {
                    currentChuBlock = ""; // Gặp nhóm khác thì thoát
                }
            }

            // 2. Tìm dòng "Gặp" trong nhóm đã xác định
            if (currentChuBlock === targetChu && row.startsWith(targetGap)) {
                let textHau = db[i].split(":")[1] || "";
                let vế = textHau.split("|");
                if (vế.length >= 2) {
                    return gapNamBenPhai ? vế[1].trim() : vế[0].trim();
                } else {
                    return vế[0].trim();
                }
            }
        }
        return null;
    }

    function thucHienTruyVan() {
        const la = [
            document.getElementById('f1').value.trim(),
            document.getElementById('f2').value.trim(),
            document.getElementById('f3').value.trim(),
            document.getElementById('f4').value.trim()
        ];

        let ketQua = [];

        // Duyệt 3 cặp cạnh nhau: (1-2), (2-3), (3-4)
        for (let i = 0; i < 3; i++) {
            let A = la[i];
            let B = la[i+1];
            if (!A || !B) continue;

            let result = "";

            // Kiểm tra A là ĐỨNG (Đ) và B là NGƯỢC (N)
            if (A.toUpperCase().includes("Đ") && B.toUpperCase().includes("N")) {
                result = findData05(A, B, true); // B nằm bên phải A
            } 
            // Hoặc kiểm tra B là ĐỨNG (Đ) và A là NGƯỢC (N)
            else if (B.toUpperCase().includes("Đ") && A.toUpperCase().includes("N")) {
                result = findData05(B, A, false); // A nằm bên trái B
            }

            if (result) {
                ketQua.push(`Cặp ${i+1} (${A} - ${B}):\n=> ${result}`);
            } else {
                ketQua.push(`Cặp ${i+1} (${A} - ${B}):\n=> (Không tìm thấy dữ liệu phù hợp quy ước Đ-N)`);
            }
        }

        document.getElementById('output').innerText = ketQua.join("\n\n--------------------\n\n");
    }

    function copyKetQua() {
        const text = document.getElementById('output').innerText;
        if (!text) return;
        const temp = document.createElement('textarea');
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
        alert("Đã sao chép vào Clipboard!");
    }
