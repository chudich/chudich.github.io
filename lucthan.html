<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Liên Hoa Độn - Full Phả Hệ Sơ Nội</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; }
        .card { max-width: 600px; margin: auto; background: #1e293b; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h2 { text-align: center; color: #38bdf8; margin-bottom: 20px; }
        select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: none; background: #334155; color: white; font-size: 16px; margin-bottom: 15px; }
        #res { margin-top: 20px; padding: 15px; background: #0f172a; border-left: 4px solid #38bdf8; border-radius: 8px; line-height: 1.8; display: none; }
        .tag { display: inline-block; background: #0ea5e9; color: white; padding: 2px 10px; border-radius: 5px; margin: 3px; font-weight: bold; font-size: 0.9em; }
        .desc { font-size: 0.8em; color: #94a3b8; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Liên Hoa Độn Lục Thân</h2>
    
    <label>Giới tính TA:</label>
    <select id="gender" onchange="run()">
        <option value="nam">Nam</option>
        <option value="nu">Nữ</option>
    </select>

    <label>Quẻ đơn của TA:</label>
    <select id="queTA" onchange="run()">
        <option value="Kim">Kiền / Đoài (Kim)</option>
        <option value="Hoa">Ly (Hỏa)</option>
        <option value="Moc">Chấn / Tốn (Mộc)</option>
        <option value="Thuy">Khảm (Thủy)</option>
        <option value="Tho">Khôn / Cấn (Thổ)</option>
    </select>

    <label>Quẻ đối ứng cần tìm:</label>
    <select id="queDU" onchange="run()">
        <option value="Kim">Kiền / Đoài (Kim)</option>
        <option value="Hoa">Ly (Hỏa)</option>
        <option value="Moc">Chấn / Tốn (Mộc)</option>
        <option value="Thuy">Khảm (Thủy)</option>
        <option value="Tho">Khôn / Cấn (Thổ)</option>
    </select>

    <div id="res"></div>
    <div class="desc">Dữ liệu tra cứu dựa trên quy tắc: Con khắc Cha, Chồng khắc Vợ, Mẹ sinh Con.</div>
</div>

<script>
const Hanh = {
    Kim: { khac: 'Moc', biKhac: 'Hoa', sinh: 'Thuy', biSinh: 'Tho' },
    Thuy: { khac: 'Hoa', biKhac: 'Tho', sinh: 'Moc', biSinh: 'Kim' },
    Moc: { khac: 'Tho', biKhac: 'Kim', sinh: 'Hoa', biSinh: 'Thuy' },
    Hoa: { khac: 'Kim', biKhac: 'Thuy', sinh: 'Tho', biSinh: 'Moc' },
    Tho: { khac: 'Thuy', biKhac: 'Moc', sinh: 'Kim', biSinh: 'Hoa' }
};

function run() {
    const gender = document.getElementById('gender').value;
    const TA = document.getElementById('queTA').value;
    const DU = document.getElementById('queDU').value;
    const box = document.getElementById('res');
    let data = [];

    // --- HÀNG TRỰC HỆ ---
    const Cha = Hanh[TA].khac; 
    const Me = Hanh[TA].biSinh;
    if(DU === Cha) data.push("Cha ruột");
    if(DU === Me) data.push("Mẹ ruột");

    // --- HÀNG PHỐI NGẪU & CON ---
    if(gender === 'nam') {
        if(DU === Hanh[TA].khac) data.push("Vợ");
        if(DU === Hanh[TA].biKhac) data.push("Con cái");
    } else {
        if(DU === Hanh[TA].biKhac) data.push("Chồng");
        if(DU === Hanh[TA].sinh) data.push("Con cái");
        // Cha chồng (Đồng quẻ TA)
        const Chong = Hanh[TA].biKhac;
        if(DU === Hanh[Chong].khac) data.push("Cha chồng (Đồng quẻ TA)");
    }

    // --- HÀNG NỘI TỘC ---
    const OngNoi = Hanh[Cha].khac;
    const BaNoi = Hanh[Cha].biSinh;
    if(DU === OngNoi) data.push("Ông Nội");
    if(DU === BaNoi) data.push("Bà Nội");

    const OngCo = Hanh[OngNoi].khac;
    const BaCo = Hanh[OngCo].khac; // Chồng (Ông Cố) khắc Vợ (Bà Cố)
    if(DU === OngCo) data.push("Ông Cố Nội");
    if(DU === BaCo) data.push("Bà Cố Nội");

    const OngSo = Hanh[OngCo].khac; // Con (Ông Cố) khắc Cha (Ông Sơ)
    const BaSo = Hanh[OngSo].khac; // Chồng (Ông Sơ) khắc Vợ (Bà Sơ)
    if(DU === OngSo) data.push("Ông Sơ Nội");
    if(DU === BaSo) data.push("Bà Sơ Nội (Đồng quẻ TA)");

    // --- HÀNG NGOẠI TỘC ---
    const OngNgoai = Hanh[Me].khac;
    const BaNgoai = Hanh[Me].biSinh;
    if(DU === OngNgoai) data.push("Ông Ngoại");
    if(DU === BaNgoai) data.push("Bà Ngoại");

    // Hiển thị kết quả
    box.style.display = 'block';
    if(TA === DU) {
        let out = `<span class="tag">Huynh Đệ</span> (Anh chị em)`;
        // Kiểm tra xem có trùng vai Sơ/Cha chồng không
        let extra = data.filter(v => v.includes("Đồng quẻ TA"));
        if(extra.length > 0) out += `<br>Kiêm vai: <span class="tag">${extra.join('</span> <span class="tag">')}</span>`;
        box.innerHTML = out;
    } else if(data.length > 0) {
        box.innerHTML = `Quẻ này đối ứng vai:<br><span class="tag">${[...new Set(data)].join('</span> <span class="tag">')}</span>`;
    } else {
        box.innerHTML = "Quẻ thuộc đời xa hơn hoặc chưa xác định.";
    }
}
run();
</script>
</body>
</html>
