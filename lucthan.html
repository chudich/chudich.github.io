<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Liên Hoa Độn v2.2 - Fix Bà Cố Nội</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172c; color: #f8fafc; padding: 20px; }
        .card { max-width: 650px; margin: auto; background: #1e293b; padding: 25px; border-radius: 15px; border: 1px solid #334155; }
        h2 { text-align: center; color: #38bdf8; text-transform: uppercase; margin-bottom: 20px; }
        label { font-weight: bold; color: #94a3b8; display: block; margin-top: 10px; }
        select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: none; background: #334155; color: white; font-size: 16px; margin-bottom: 10px; }
        #res { margin-top: 20px; padding: 20px; background: #0f172a; border-left: 4px solid #38bdf8; border-radius: 8px; line-height: 1.8; display: none; }
        .tag { display: inline-block; background: #0ea5e9; color: white; padding: 2px 12px; border-radius: 5px; margin: 4px; font-weight: bold; font-size: 0.9em; }
        .category { color: #38bdf8; font-weight: bold; margin-top: 10px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

<div class="card">
    <h2>Liên Hoa Độn Lục Thân v2.2</h2>

    <label>Giới tính TA:</label>
    <select id="gender" onchange="run()"><option value="nam">Nam</option><option value="nu">Nữ</option></select>

    <label>Quẻ đơn của TA:</label>
    <select id="queTA" onchange="run()">
        <option value="Kiền">Kiền (Kim Dương)</option><option value="Đoài">Đoài (Kim Âm)</option>
        <option value="Ly">Ly (Hỏa)</option><option value="Chấn">Chấn (Mộc Dương)</option>
        <option value="Tốn">Tốn (Mộc Âm)</option><option value="Khảm">Khảm (Thủy)</option>
        <option value="Khôn">Khôn (Thổ Âm)</option><option value="Cấn">Cấn (Thổ Dương)</option>
    </select>

    <label>Quẻ đối ứng:</label>
    <select id="queDU" onchange="run()">
        <option value="Kim">Kiền / Đoài (Kim)</option><option value="Hoa">Ly (Hỏa)</option>
        <option value="Moc">Chấn / Tốn (Mộc)</option><option value="Thuy">Khảm (Thủy)</option>
        <option value="Tho">Khôn / Cấn (Thổ)</option>
    </select>

    <div id="res"></div>
</div>

<script>
const HanhMap = { 'Kiền':'Kim','Đoài':'Kim','Ly':'Hoa','Chấn':'Moc','Tốn':'Moc','Khảm':'Thuy','Khôn':'Tho','Cấn':'Tho' };
const HanhLogic = {
    Kim: { khac: 'Moc', biKhac: 'Hoa', sinh: 'Thuy', biSinh: 'Tho' },
    Thuy: { khac: 'Hoa', biKhac: 'Tho', sinh: 'Moc', biSinh: 'Kim' },
    Moc: { khac: 'Tho', biKhac: 'Kim', sinh: 'Hoa', biSinh: 'Thuy' },
    Hoa: { khac: 'Kim', biKhac: 'Thuy', sinh: 'Tho', biSinh: 'Moc' },
    Tho: { khac: 'Thuy', biKhac: 'Moc', sinh: 'Kim', biSinh: 'Hoa' }
};

function run() {
    const gender = document.getElementById('gender').value;
    const qTA = document.getElementById('queTA').value;
    const hTA = HanhMap[qTA];
    const hDU = document.getElementById('queDU').value;
    const box = document.getElementById('res');
    let cat = { H: [], P: [], Q: [], C: [], T: [] };

    const hP = HanhLogic[hTA].biSinh, hH = hTA, hC = HanhLogic[hTA].sinh, hT = HanhLogic[hTA].khac, hQ = HanhLogic[hTA].biKhac;

    // Phân bổ dựa trên logic bạn đã hiệu đính
    if(hDU === hH) {
        cat.H.push("TA (Bản thể)", "Huynh đệ", "Bà Cố (Mẹ của Bà Nội)", "Ông Cố Ngoại", "Mẹ Ông Ngoại", "Con rể Cậu", "Cháu nội Cậu");
    }
    if(hDU === hP) {
        cat.P.push("Mẹ ruột", "Ông Nội", "Cậu/Dì", "Con dâu Cậu");
    }
    if(hDU === hQ) {
        if(gender === 'nam') cat.Q.push("Con cái"); else cat.Q.push("Chồng");
        cat.Q.push("Bà Ngoại", "Bà Cố (Mẹ của Ông Nội)", "Ông Sơ Nội", "Cha Ông Ngoại", "Cháu ngoại Cậu", "Cháu nội Dì", "Con rể Dì");
    }
    if(hDU === hC) {
        if(gender === 'nu') cat.C.push("Con cái");
        cat.C.push("Bà Nội", "Ông Ngoại", "Mợ (Vợ Cậu)", "Cháu ngoại Dì");
    }
    if(hDU === hT) {
        if(gender === 'nam') cat.T.push("Vợ");
        cat.T.push("Cha ruột", "Bà Cố Ngoại", "Con cái Cậu", "Dượng", "Con dâu Dì");
    }

    box.style.display = 'block';
    let html = "";
    const labels = { H: "Huynh đệ (H)", P: "Phụ mẫu (P)", Q: "Quan quỷ (Q)", C: "Chi hao / Tử tôn (C)", T: "Thê tài (T)" };
    for (let k in cat) if (cat[k].length > 0) {
        html += `<div class="category">${labels[k]}</div><div>${cat[k].map(i => `<span class="tag">${i}</span>`).join('')}</div>`;
    }
    box.innerHTML = html || "Chưa xác định.";
}
run();
</script>
</body>
</html>
