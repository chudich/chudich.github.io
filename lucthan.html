<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Liên Hoa Độn - Hệ Thống Lục Thân Toàn Diện</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #1a1a2e; color: #ffffff; padding: 20px; }
        .container { max-width: 650px; margin: auto; background: #16213e; padding: 30px; border-radius: 20px; border: 1px solid #0f3460; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #4ecca3; text-transform: uppercase; }
        .group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #95a5a6; }
        select { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 16px; background: #e9ecef; color: #2d3436; cursor: pointer; }
        #result { margin-top: 25px; padding: 20px; background: #0f3460; border-radius: 12px; border-left: 6px solid #4ecca3; display: none; line-height: 1.8; }
        .tag { display: inline-block; background: #e94560; color: white; padding: 3px 10px; border-radius: 5px; font-size: 0.9em; margin: 3px; font-weight: bold; }
        .theory { font-size: 0.85em; color: #4ecca3; border-top: 1px solid #0f3460; margin-top: 10px; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Liên Hoa Độn Lục Thân</h2>
    
    <div class="group">
        <label>1. Giới tính của TA:</label>
        <select id="gender" onchange="run()">
            <option value="nam">Nam</option>
            <option value="nu">Nữ</option>
        </select>
    </div>

    <div class="group">
        <label>2. Quẻ đơn của TA:</label>
        <select id="queTA" onchange="run()">
            <option value="Kim">Kiền / Đoài (Kim)</option>
            <option value="Hoa">Ly (Hỏa)</option>
            <option value="Moc">Chấn / Tốn (Mộc)</option>
            <option value="Thuy">Khảm (Thủy)</option>
            <option value="Tho">Khôn / Cấn (Thổ)</option>
        </select>
    </div>

    <div class="group">
        <label>3. Quẻ Đối Ứng (Cần kiểm tra):</label>
        <select id="queDU" onchange="run()">
            <option value="Kim">Kiền / Đoài (Kim)</option>
            <option value="Hoa">Ly (Hỏa)</option>
            <option value="Moc">Chấn / Tốn (Mộc)</option>
            <option value="Thuy">Khảm (Thủy)</option>
            <option value="Tho">Khôn / Cấn (Thổ)</option>
        </select>
    </div>

    <div id="result"></div>
</div>

<script>
const Luat = {
    Kim: { sinh: 'Thuy', khac: 'Moc', biKhac: 'Hoa', biSinh: 'Tho' },
    Thuy: { sinh: 'Moc', khac: 'Hoa', biKhac: 'Tho', biSinh: 'Kim' },
    Moc: { sinh: 'Hoa', khac: 'Tho', biKhac: 'Kim', biSinh: 'Thuy' },
    Hoa: { sinh: 'Tho', khac: 'Kim', biKhac: 'Thuy', biSinh: 'Moc' },
    Tho: { sinh: 'Kim', khac: 'Thuy', biKhac: 'Moc', biSinh: 'Hoa' }
};

function run() {
    const gender = document.getElementById('gender').value;
    const TA = document.getElementById('queTA').value;
    const DU = document.getElementById('queDU').value;
    const box = document.getElementById('result');
    
    let res = [];
    let logicLog = [];

    // --- Hàng Phụ Mẫu (P) & Thê Tài (T) ---
    const Me = Luat[TA].biSinh;
    const Cha = Luat[TA].khac; 
    if (DU === Me) res.push("Mẹ ruột (P)");
    if (DU === Cha) res.push("Cha ruột (T)");

    // --- Hàng Vợ/Chồng & Con ---
    if (gender === 'nam') {
        if (DU === Luat[TA].khac) res.push("Vợ (T)");
        if (DU === Luat[TA].biKhac) res.push("Con cái (Q)");
    } else {
        if (DU === Luat[TA].biKhac) res.push("Chồng (Q)");
        if (DU === Luat[TA].sinh) res.push("Con cái (C)");
    }

    // --- Hàng Ông Bà Nội (Cha của Cha) ---
    const OngNoi = Luat[Cha].khac; // Con (Cha) khắc Cha (Ông Nội)
    const BaNoi = Luat[Cha].biSinh; // Mẹ (Bà Nội) sinh Con (Cha)
    if (DU === OngNoi) res.push("Ông Nội");
    if (DU === BaNoi) res.push("Bà Nội");

    // --- Hàng Ông Bà Ngoại (Cha của Mẹ) ---
    const OngNgoai = Luat[Me].khac; // Con (Mẹ) khắc Cha (Ông Ngoại)
    const BaNgoai = Luat[Me].biSinh; // Mẹ (Bà Ngoại) sinh Con (Mẹ)
    if (DU === OngNgoai) res.push("Ông Ngoại");
    if (DU === BaNgoai) res.push("Bà Ngoại");

    // --- Hàng Cố Nội (Cha của Ông Nội) ---
    const OngCoNoi = Luat[OngNoi].khac; // Con (Ông Nội) khắc Cha (Ông Cố)
    const BaCoNoi = Luat[OngCoNoi].khac; // Chồng (Ông Cố) khắc Vợ (Bà Cố)
    if (DU === OngCoNoi) res.push("Ông Cố Nội");
    if (DU === BaCoNoi) res.push("Bà Cố Nội");

    // --- Hàng Sơ Nội (Mẹ của Ông Cố) ---
    const BaSoNoi = Luat[OngCoNoi].biSinh;
    if (DU === BaSoNoi) res.push("Bà Sơ Nội (Đồng quẻ TA)");

    // --- Trường hợp TA Nữ (Cha chồng) ---
    if (gender === 'nu') {
        const Chong = Luat[TA].biKhac;
        const ChaChong = Luat[Chong].khac;
        if (DU === ChaChong) res.push("Cha Chồng (Đồng quẻ TA)");
    }

    // Hiển thị
    box.style.display = 'block';
    if (res.length > 0) {
        box.innerHTML = `Quẻ này đối ứng vai:<br><span class="tag">${res.join('</span> <span class="tag">')}</span>`;
    } else if (TA === DU) {
        box.innerHTML = `Quẻ <b>Huynh Đệ</b> (Anh chị em ngang vai)`;
    } else {
        box.innerHTML = `Quẻ chưa xác định danh xưng trong vòng 4 đời.`;
    }
}

run();
</script>

</body>
</html>
