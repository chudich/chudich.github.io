<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Liên Hoa Độn - Thuật Toán Chuẩn</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; color: #ecf0f1; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #34495e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #f1c40f; text-transform: uppercase; letter-spacing: 2px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 16px; background: #ecf0f1; color: #2c3e50; }
        #resultBox { margin-top: 25px; padding: 20px; background: #2ecc71; color: #fff; border-radius: 10px; display: none; line-height: 1.7; }
        .tag { display: inline-block; background: #e67e22; padding: 2px 8px; border-radius: 4px; font-weight: bold; margin: 2px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Liên Hoa Độn Lục Thân</h2>
    
    <div class="input-group">
        <label>1. Giới tính của TA:</label>
        <select id="gender" onchange="runLogic()">
            <option value="nam">Nam</option>
            <option value="nu">Nữ</option>
        </select>
    </div>

    <div class="input-group">
        <label>2. Quẻ đơn của TA:</label>
        <select id="queTA" onchange="runLogic()">
            <option value="Kim">Kiền / Đoài (Kim)</option>
            <option value="Hoa">Ly (Hỏa)</option>
            <option value="Moc">Chấn / Tốn (Mộc)</option>
            <option value="Thuy">Khảm (Thủy)</option>
            <option value="Tho">Khôn / Cấn (Thổ)</option>
        </select>
    </div>

    <div class="input-group">
        <label>3. Quẻ Đối Ứng (Quẻ đang xét):</label>
        <select id="queDU" onchange="runLogic()">
            <option value="Kim">Kiền / Đoài (Kim)</option>
            <option value="Hoa">Ly (Hỏa)</option>
            <option value="Moc">Chấn / Tốn (Mộc)</option>
            <option value="Thuy">Khảm (Thủy)</option>
            <option value="Tho">Khôn / Cấn (Thổ)</option>
        </select>
    </div>

    <div id="resultBox"></div>
</div>

<script>
const Hanh = {
    Kim: { sinh: 'Thuy', khac: 'Moc', biKhac: 'Hoa', biSinh: 'Tho' },
    Thuy: { sinh: 'Moc', khac: 'Hoa', biKhac: 'Tho', biSinh: 'Kim' },
    Moc: { sinh: 'Hoa', khac: 'Tho', biKhac: 'Kim', biSinh: 'Thuy' },
    Hoa: { sinh: 'Tho', khac: 'Kim', biKhac: 'Thuy', biSinh: 'Moc' },
    Tho: { sinh: 'Kim', khac: 'Thuy', biKhac: 'Moc', biSinh: 'Hoa' }
};

function runLogic() {
    const gender = document.getElementById('gender').value;
    const TA = document.getElementById('queTA').value;
    const DU = document.getElementById('queDU').value;
    const box = document.getElementById('resultBox');
    
    let members = [];

    // --- LOGIC TRUY HỒI THEO QUY TẮC ---
    
    // 1. Mẹ (P): Mẹ sinh TA
    const Me = Hanh[TA].biSinh;
    if (DU === Me) members.push("Mẹ ruột");

    // 2. Cha (T): Con khắc Cha (TA khắc Cha)
    const Cha = Hanh[TA].khac;
    if (DU === Cha) members.push("Cha ruột");

    // 3. Vợ/Chồng (T/Q): Chồng khắc Vợ
    if (gender === 'nam') {
        const Vo = Hanh[TA].khac; // Nam khắc Vợ
        if (DU === Vo) members.push("Vợ (ngang vai)");
    } else {
        const Chong = Hanh[TA].biKhac; // Chồng khắc Nữ
        if (DU === Chong) members.push("Chồng");
    }

    // 4. Con (C/Q):
    if (gender === 'nam') {
        const ConNam = Hanh[TA].biKhac; // Con khắc Cha (Nam)
        if (DU === ConNam) members.push("Con cái");
    } else {
        const ConNu = Hanh[TA].sinh; // Nữ sinh Con
        if (DU === ConNu) members.push("Con cái");
    }

    // 5. Ông/Bà Nội:
    const BaNoi = Hanh[Cha].biSinh; // Mẹ sinh Cha
    if (DU === BaNoi) members.push("Bà Nội");
    
    const OngNoi = Hanh[Cha].khac; // Con khắc Cha (Cha khắc Ông Nội)
    if (DU === OngNoi) members.push("Ông Nội");

    // 6. Ông/Bà Ngoại:
    const BaNgoai = Hanh[Me].biSinh; // Mẹ sinh Mẹ
    if (DU === BaNgoai) members.push("Bà Ngoại");

    const OngNgoai = Hanh[Me].khac; // Con khắc Cha (Mẹ khắc Ông Ngoại)
    if (DU === OngNgoai) members.push("Ông Ngoại");

    // 7. Cha chồng (Dành cho Nữ):
    if (gender === 'nu') {
        const Chong = Hanh[TA].biKhac;
        const ChaChong = Hanh[Chong].khac; // Chồng khắc Cha chồng
        if (DU === ChaChong) members.push("Cha Chồng (Đồng quẻ TA)");
    }

    // 8. Đời Cố (Cố nội):
    const OngCoNoi = Hanh[OngNoi].khac; // Ông nội khắc Ông cố
    if (DU === OngCoNoi) members.push("Ông Cố Nội");
    
    const BaSoNoi = Hanh[OngCoNoi].biSinh; // Mẹ sinh Ông Cố
    if (DU === BaSoNoi) members.push("Bà Sơ Nội (Đồng quẻ TA)");

    // Hiển thị kết quả
    if (members.length > 0) {
        box.style.display = 'block';
        box.innerHTML = `Quẻ này đối với bạn là:<br><span class="tag">${members.join('</span> <span class="tag">')}</span>`;
    } else if (TA === DU) {
        box.style.display = 'block';
        box.innerHTML = `Quẻ này là <b>Huynh Đệ</b> (Anh chị em, ngang vai)`;
    } else {
        box.style.display = 'block';
        box.innerHTML = "Quẻ này thuộc các đời xa hơn hoặc chưa xác định danh xưng.";
    }
}

// Khởi chạy
runLogic();
</script>
</body>
</html>
