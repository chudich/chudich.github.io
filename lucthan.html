<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Liên Hoa Độn v2 - Hiệu Đính</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; }
        .card { max-width: 650px; margin: auto; background: #1e293b; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h2 { text-align: center; color: #38bdf8; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        label { font-weight: bold; color: #94a3b8; display: block; margin-top: 10px; }
        select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: none; background: #334155; color: white; font-size: 16px; margin-bottom: 10px; cursor: pointer; }
        #res { margin-top: 20px; padding: 20px; background: #0f172a; border-left: 4px solid #38bdf8; border-radius: 8px; line-height: 1.8; display: none; }
        .tag { display: inline-block; background: #0ea5e9; color: white; padding: 2px 12px; border-radius: 5px; margin: 4px; font-weight: bold; font-size: 0.9em; }
        .category { color: #38bdf8; font-weight: bold; margin-top: 10px; border-bottom: 1px solid #334155; }
        .desc { font-size: 0.85em; color: #64748b; margin-top: 20px; text-align: center; border-top: 1px solid #334155; padding-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Liên Hoa Độn Lục Thân v2</h2>

    <label>Giới tính TA:</label>
    <select id="gender" onchange="run()">
        <option value="nam">Nam</option>
        <option value="nu">Nữ</option>
    </select>

    <label>Quẻ đơn của TA (Bản thể):</label>
    <select id="queTA" onchange="run()">
        <option value="Kiền">Kiền (Kim Dương)</option>
        <option value="Đoài">Đoài (Kim Âm)</option>
        <option value="Ly">Ly (Hỏa)</option>
        <option value="Chấn">Chấn (Mộc Dương)</option>
        <option value="Tốn">Tốn (Mộc Âm)</option>
        <option value="Khảm">Khảm (Thủy)</option>
        <option value="Khôn">Khôn (Thổ Âm)</option>
        <option value="Cấn">Cấn (Thổ Dương)</option>
    </select>

    <label>Quẻ đối ứng cần kiểm tra:</label>
    <select id="queDU" onchange="run()">
        <option value="Kim">Kiền / Đoài (Kim)</option>
        <option value="Hoa">Ly (Hỏa)</option>
        <option value="Moc">Chấn / Tốn (Mộc)</option>
        <option value="Thuy">Khảm (Thủy)</option>
        <option value="Tho">Khôn / Cấn (Thổ)</option>
    </select>

    <div id="res"></div>
    <div class="desc">Dựa trên dữ liệu soạn thảo: Con khắc Cha | Chồng khắc Vợ | Mẹ sinh Con</div>
</div>

<script>
const HanhMap = {
    'Kiền': 'Kim', 'Đoài': 'Kim', 'Ly': 'Hoa',
    'Chấn': 'Moc', 'Tốn': 'Moc', 'Khảm': 'Thuy',
    'Khôn': 'Tho', 'Cấn': 'Tho'
};

const HanhLogic = {
    Kim: { khac: 'Moc', biKhac: 'Hoa', sinh: 'Thuy', biSinh: 'Tho' },
    Thuy: { khac: 'Hoa', biKhac: 'Tho', sinh: 'Moc', biSinh: 'Kim' },
    Moc: { khac: 'Tho', biKhac: 'Kim', sinh: 'Hoa', biSinh: 'Thuy' },
    Hoa: { khac: 'Kim', biKhac: 'Thuy', sinh: 'Tho', biSinh: 'Moc' },
    Tho: { khac: 'Thuy', biKhac: 'Moc', sinh: 'Kim', biSinh: 'Hoa' }
};

function run() {
    const gender = document.getElementById('gender').value;
    const qTA = document.getElementById('queTA').value;
    const hTA = HanhMap[qTA];
    const hDU = document.getElementById('queDU').value; // Lấy giá trị hành đối ứng

    const box = document.getElementById('res');
    let categories = { H: [], P: [], Q: [], C: [], T: [] };

    // --- XÁC ĐỊNH HÀNH CỦA LỤC THÂN THEO QUY TẮC ---
    const pHanh = HanhLogic[hTA].biSinh; 
    const hHanh = hTA;                   
    const cHanh = HanhLogic[hTA].sinh;   
    const tHanh = HanhLogic[hTA].khac;   
    const qHanh = HanhLogic[hTA].biKhac; 

    // --- TRUY XUẤT DỮ LIỆU ---

    // 1. NHÓM HUYNH (H)
    if(hDU === hHanh) {
        if(qTA === 'Ly' || qTA === 'Khảm') {
            categories.H.push("TA (Huynh ẩn bên trong)");
        } else {
            const Caps = {'Kiền':'Đoài','Đoài':'Kiền','Chấn':'Tốn','Tốn':'Chấn','Khôn':'Cấn','Cấn':'Khôn'};
            const rawText = document.getElementById('queDU').options[document.getElementById('queDU').selectedIndex].text;
            if(rawText.includes(qTA)) categories.H.push("TA (Bản thể)");
            if(rawText.includes(Caps[qTA])) categories.H.push("Huynh đệ (H - Lộ)");
        }
        categories.H.push("Ông Cố (Cha Bà Ngoại)", "Mẹ của Ông Ngoại", "Anh/Chị/Em họ (Con Dì/Cậu)", "Con rể của Cậu", "Cháu nội của Cậu", "Ông Cố Nội", "Bà Sơ Nội");
    }

    // 2. NHÓM PHỤ MẪU (P)
    if(hDU === pHanh) {
        categories.P.push("Mẹ ruột", "Cậu / Dì ruột", "Con dâu của Cậu", "Bà Nội");
    }

    // 3. NHÓM QUAN QUỶ (Q)
    if(hDU === qHanh) {
        if(gender === 'nam') categories.Q.push("Con cái");
        else categories.Q.push("Chồng");
        categories.Q.push("Bà Ngoại", "Cha của Ông Ngoại", "Cháu ngoại của Cậu", "Cháu nội của Dì", "Con rể của Dì", "Ông Sơ Nội");
    }

    // 4. NHÓM CHI HAO / TỬ TÔN (C)
    if(hDU === cHanh) {
        if(gender === 'nu') categories.C.push("Con cái");
        categories.C.push("Ông Ngoại", "Mợ (Vợ Cậu)", "Cháu ngoại của Dì", "Ông Nội");
    }

    // 5. NHÓM THÊ TÀI (T)
    if(hDU === tHanh) {
        if(gender === 'nam') categories.T.push("Vợ");
        categories.T.push("Bà Cố (Mẹ Bà Ngoại)", "Con cái của Cậu", "Dượng (Chồng Dì)", "Con dâu của Dì", "Cha ruột", "Bà Cố Nội");
    }

    // HIỂN THỊ
    box.style.display = 'block';
    let html = "";
    const labels = { H: "Huynh đệ (H)", P: "Phụ mẫu (P)", Q: "Quan quỷ (Q)", C: "Chi hao / Tử tôn (C)", T: "Thê tài (T)" };
    
    for (let key in categories) {
        if (categories[key].length > 0) {
            html += `<div class="category">${labels[key]}</div>`;
            html += `<div>${categories[key].map(item => `<span class="tag">${item}</span>`).join('')}</div>`;
        }
    }
    box.innerHTML = html || "Quẻ thuộc đời xa hơn hoặc chưa xác định danh xưng.";
}
run();
</script>
</body>
</html>
