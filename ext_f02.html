<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRÍCH XUẤT THƯ VIỆN 2</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #e0e0e0; }
        .box { max-width: 100%; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #1b5e20; font-size: 26px; margin-bottom: 20px; text-transform: uppercase; }
        .f-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; font-size: 22px; margin-bottom: 8px; color: #222; }
        input { 
            width: 100%; padding: 18px; border: 4px solid #444; border-radius: 12px; 
            font-size: 24px; font-weight: bold; box-sizing: border-box; background: #fffdeb; 
        }
        #res { 
            margin-top: 25px; padding: 15px; border: 4px solid #1b5e20; border-radius: 12px; 
            min-height: 250px; white-space: pre-wrap; background: #fff; 
            font-size: 24px; line-height: 1.6; font-weight: bold; color: #000;
        }
        .btns { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        button { 
            padding: 22px; font-size: 24px; font-weight: bold; border: none; 
            border-radius: 12px; color: #fff; text-transform: uppercase;
        }
        .btn-go { background: #1b5e20; }
        .btn-cp { background: #0d47a1; }
    </style>
</head>
<body>

<div class="box">
    <h2>HỆ THỐNG TRÍCH DATA 2</h2>
    
    <div class="f-group"><label>Lá 1:</label><input type="text" class="in-card" placeholder="Vd: TƯỚNG XANH Đ"></div>
    <div class="f-group"><label>Lá 2:</label><input type="text" class="in-card"></div>
    <div class="f-group"><label>Lá 3:</label><input type="text" class="in-card"></div>
    <div class="f-group"><label>Lá 4:</label><input type="text" class="in-card"></div>

    <div class="btns">
        <button class="btn-go" onclick="run()">TRÍCH XUẤT NGAY</button>
        <button class="btn-cp" onclick="copy()">SAO CHÉP KẾT QUẢ</button>
    </div>

    <div id="res"></div>
</div>

<script>
    /**
     * PHẦN THƯ VIỆN DATA:
     * Bạn hãy replace toàn bộ nội dung "text aaaaaaaaaa" bằng data thực tế của bạn.
     */
    const DATA_LIBRARY = `
1. TƯỚNG :
TƯỚNG XANH :
Đứng : Tiến thân,thi cử,mọi khuếch trương khởi sự đều thuận lợi có người đỡ đầu
Ngược : Có xung đột với người trên trước,bất lợi mọi mặt

TƯỚNG VÀNG :
Đứng : Thành công chắc chắn về tiền bạc,có quý nhân là người đàn ông giàu sẵn sang giúp đỡ về mọi mặt
Ngược : Phòng phản phúc trong gia tộc,mọi sự chậm trễ luôn lẩn quẩn bên mình

TƯỚNG TRẮNG :
Đứng : Mọi vấn đề đều không giải quyết êm thắm,phải ra đến pháp luật,bệnh nặng khó tìm thầy
Ngược : Kiện tụng thắng lợi, bệnh hoạn bình phục

TƯỚNG ĐỎ :
Đứng : Có người đàn ông đứng tuổi tận tình giúp đỡ cho hôn nhân thành tựu
Ngược : Mọi liên hệ về tình cảm tình bạn tình yêu đều tuyệt vọng,phòng kẻ vô ơn

2. SĨ :
SĨ XANH :
Đứng : Được người đàn bà hoặc cô gái tận tình tiến cử,nhưng phòng ghen tuông làm hỏng công trình
Ngược : Bị người đàn bà theo đuổi quấy rầy,lừa dối gây xáo trộn

SĨ VÀNG :
Đứng : Người đàn bà giàu tận tình giúp đỡ trong mọi hoàn cảnh khó khan về tiền bạc
Ngược : Đừng ham bóng sắc mà gánh niềm đau,tiêu tiền tan địa vị
SĨ TRẮNG :
Đứng : Phòng ghen tuông gây đổ vỡ trong gia đình,vui không có,buồn tràn ngập
Ngược : Nên yên lòng,mọi việc trước sau gì cũng được dàn xếp êm đẹp

SĨ ĐỎ :
Đứng : Bà Nguyệt se duyên,tác hợp xứng lứa vừa đôi,mọi tạo dựng hạnh phúc đều như ý
Ngược : Phản phúc gian xảo vô duyên đang theo đuổi quấy rầy.Nhiều đắng cay thử thách

3. TƯỢNG :
TƯỢNG XANH :
Đứng : Có người thanh niên tốt bụng,nhiều uy tín tận tình giúp đỡ,được tin vui,gặp bạn bất ngờ 
Ngược : Gặp kẻ xảo trá,nhân tình hay ghen,phòng hỏng việc

TƯỢNG VÀNG :
Đứng : Người bạn tốt một mực trung thành,môi giới,hôn nhân đẹp,có địa vị
Ngược : Mọi xáo trộn trong công việc xảy ra vì phản trắc,nên đề phòng

TƯỢNG TRẮNG :
Đứng : Đừng tin người bằng cái vỏ bên ngoài,có câu hữu nhan sắc hữu ác đức,tự mình giữ mình là thượng sách.
Ngược : Hy vọng thực hiện được sở nguyện,nhất là hôn nhân

TƯỢNG ĐỎ :
Đứng : Tình duyên đẹp,do mình tạo cho mình với người mình yêu và yêu mình
Ngược : Mọi sự phũ phàng đều có thể xảy ra cho gia đình và tình yêu



4. XE :
XE XANH :
Đứng : Nên có thái độ dứt khoát,đừng rụt rè,chậm chạp mà hỏng cơ hội,nếu cơ hội ấy là 1 cuộc xê dịch
Ngược : Mọi trở ngại đang nhen nhúm,phòng thất bại,không nên thay đổi việc làm hay chỗ ở

XE VÀNG :
Đứng : Của bất ngờ đến giữa cơn túng ngặt,mọi bối rối sẽ tiêu tan.
Ngược : Phòng trộm cắp,mất của to,thua lận

XE TRẮNG :
Đứng : Có dấu hiệu sẽ lìa nơi sinh trưởng hoặc có chết chóc,ly thân,ly dị,tan rã gia đình.
Ngược : Sau cơn mưa trời lại sang,nên vui vì ngày mai hơn là buồn hôm nay

XE ĐỎ :
Đứng : Cầu con sẽ được con lành,nhưng cầu duyên nợ sẽ gặp trái đắng nên đừng cầu làm gì.
Ngược : Ân tình phản bội có thể xảy ra bất cứ ở nơi nào

5. PHÁO :
PHÁO XANH :
Đứng : Sắp có thay đổi,hoặc đi xa thắng lợi về mọi mặt.Hoặc gặp ý trung nhân trở thành duyên nợ.Nếu thi cử chắc chắn sẽ đỗ cao
Ngược : Lá bài hung tin,mọi dự kiến tiến thủ đều nên xếp lại,phòng hoen hố danh dự
PHÁO VÀNG :
Đứng : Mọi ý kiến nên thực hiện ngay sẽ thu thập kết quả mỹ mãn
Ngược : Đỗ vỡ,tranh chấp về tiền bạc ảnh hưởng đến hôn nhân
PHÁO TRẮNG :
Đứng : Pháo nổ ngay trong tâm tư,có xáo trộn về địa vị,danh vọng,nếu không cũng bị mẻ trộm to
Ngược : Tự giác hối cải là tâm niệm của kẻ lỡ lầm,nên hiểu nhau để yêu nhau hơn
PHÁO ĐỎ :
Đứng : Đừng nên ngập ngừng e ấp,ngưỡng của tình yêu đang sẵn sàng chờ đón
Ngược : Hiểu lầm đáng tiếc sẽ xảy ra nhưng được hàn gắn

6. NGỰA :
NGỰA XANH :
Đứng : Tương lai huy hoàng đang chờ ngoài ngõ,tình duyên bất ngờ đầy thơ mộng
Ngược : Tương đương với giá trị Ngựa Xanh đứng, nhưng lá ngược đầu Ngựa Xanh này gặp ( đi kèm ) lá Ngựa Trắng ( đứng ) thì mọi việc bất thành 

NGỰA VÀNG :
Đứng : Người bạn gái dí dỏm duyên dáng,đẹp,tốt bụng sẽ xuất hiện bất ngờ,cứu vãn tình thế
Ngược : Trở ngại dồn dập cạm bẫy giăng mắc khắp nơi.

NGỰA TRẮNG :
Đứng : Tình đầu ít suôn sẻ,cay đắng lỡ làng,cạm bẫy đổ vỡ tan nát cõi lòng.
Ngược : Mọi vấn đề về tình yêu sẽ được bàn tay đẹp thắt chặt thêm tươi thắm

NGỰA ĐỎ :
Đứng : Duyên tình cờ cũng là duyên bất ngờ,đưa đến mọi hạnh phúc tốt đẹp như mơ.
Ngược : Phòng tranh giành tình ái mang hậu quả u buồn ray rức

7. CHỐT :

CHỐT XANH :
Đứng : Mọi ý định tiến thủ nên ngừng lại,có xáo trộn trong gia đình,kiện tụng,gièm pha,tranh giành.
Ngược : Lá bài hứa hẹn nhiều bất ngờ đến ngoài sự tưởng tượng.

CHỐT VÀNG :
Đứng : Gặp sự gièm pha bêu xấu,gắt gỏng,ganh tị nhưng cứ lặng yên thực hiện theo ý định của mình sẽ thành công .
 Ngược : Thua lỗ,công nợ lôi cuốn đến tụng đình,hoen ố danh dự.

CHỐT TRẮNG :
Đứng : Mọi việc đều thất bại,nên tự cứu hơn là chờ đến lúc phải gánh trọn hậu quả.
Ngược : Trì hoãn là phương thuốc hay,dùng chạy chữa tình trạng bi đát.

CHỐT ĐỎ :
Đứng : Tin nhạn bay về tràn ngập vui tươi trong hạnh phúc,duyên thắm tươi.
Ngược : Lỡ lầm trong quá khứ sẽ ân hận mãi ở hiện tại và tương lai.
    `;

    function run() {
        const inputs = document.querySelectorAll('.in-card');
        const output = document.getElementById('res');
        let final = [];
        const lines = DATA_LIBRARY.split('\n');

        inputs.forEach(input => {
            let val = input.value.trim();
            if (!val) return;

            // 1. Phân tích Form: Tách lấy Tên+Màu và Ký hiệu Đ/N
            // Ví dụ: "TƯỚNG XANH Đ" -> namePart = "TƯỚNG XANH", typePart = "Đ"
            let namePart = val.substring(0, val.length - 2).trim().toUpperCase();
            let typePart = val.substring(val.length - 1).toUpperCase();

            // Quy ước loại: Đ = Đứng, N = Ngược
            let searchLabel = (typePart === 'Đ') ? "ĐỨNG :" : "NGƯỢC :";

            let foundNameIdx = -1;
            // Bước 1: Tìm dòng chứa đúng Tên Lá + Màu (Ví dụ: TƯỚNG XANH :)
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].toUpperCase().includes(namePart + " :")) {
                    foundNameIdx = i;
                    break;
                }
            }

            if (foundNameIdx !== -1) {
                let targetText = "";
                // Bước 2: Dò các dòng ngay bên dưới cho đến khi gặp đúng dòng Đứng/Ngược
                // Hoặc dừng lại nếu gặp một Tên Lá khác
                for (let j = foundNameIdx + 1; j < lines.length; j++) {
                    let curLine = lines[j].trim().toUpperCase();
                    if (curLine === "") continue;

                    // Nếu dòng bắt đầu bằng nhãn Đứng/Ngược mà mình cần tìm
                    if (curLine.startsWith(searchLabel)) {
                        targetText = lines[j].trim();
                        break; 
                    }

                    // QUY TẮC DỪNG: Nếu gặp một lá bài mới (có dấu :) trước khi thấy nhãn cần tìm
                    // Hoặc gặp tiêu đề số (1. TƯỚNG)
                    if ((curLine.includes(" : ") && !curLine.startsWith("ĐỨNG :") && !curLine.startsWith("NGƯỢC :")) || /^\d+\./.test(curLine)) {
                        break;
                    }
                }

                if (targetText) {
                    final.push(val.toUpperCase() + " => " + targetText);
                } else {
                    final.push("❌ KHÔNG TÌM THẤY TRẠNG THÁI " + typePart + " CHO: " + namePart);
                }
            } else {
                final.push("❌ KHÔNG KHỚP TÊN LÁ: " + namePart);
            }
        });

        output.innerText = final.join("\n\n--------------------\n\n");
    }

    function copy() {
        const text = document.getElementById('res').innerText;
        if (!text) return;
        const tmp = document.createElement('textarea');
        tmp.value = text;
        document.body.appendChild(tmp);
        tmp.select();
        document.execCommand('copy');
        document.body.removeChild(tmp);
        alert("Đã copy xong!");
    }
</script>

</body>
</html>
