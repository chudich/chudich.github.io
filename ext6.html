<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRUY XUẤT 06 - CHUẨN TỈ LỆ Đ/N</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #cfd8dc; }
        .box { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 18px; margin-bottom: 10px; border: 3px solid #90a4ae; border-radius: 10px; font-size: 24px; font-weight: bold; box-sizing: border-box; background: #fffde7; }
        #res { margin-top: 20px; padding: 15px; border: 5px solid #1a237e; border-radius: 12px; min-height: 250px; white-space: pre-wrap; background: #fafafa; font-size: 24px; line-height: 1.5; font-weight: bold; color: #b71c1c; }
        button { width: 100%; padding: 22px; font-size: 22px; font-weight: bold; border: none; border-radius: 12px; color: #fff; cursor: pointer; text-transform: uppercase; background: #1a237e; width: 100%; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center">TRUY XUẤT 06 - PHÂN BIỆT Đ/N</h2>
    <input type="text" id="v1" placeholder="Form 1">
    <input type="text" id="v2" placeholder="Form 2">
    <input type="text" id="v3" placeholder="Form 3">
    <input type="text" id="v4" placeholder="Form 4">
    <button onclick="lenh_truy_xuat()">TRUY XUẤT DATA</button>
    <div id="res"></div>
</div>

<script>
    // THƯ VIỆN DỮ LIỆU
    const DATA_GOC = `
PHẦN 1 : 4 LÁ CÙNG CHIỀU (4-0)
4 TƯỚNG XANH : Ý nghĩa 4 Đứng (Text A) | Ý nghĩa 4 Ngược

PHẦN 2 : 4 LÁ LỆCH CHIỀU (3-1 hoặc 1-3)
4 TƯỚNG XANH : Ý nghĩa 3 Đ - 1 N (Text B) | Ý nghĩa 3 N - 1 Đ

PHẦN 3 : 3 LÁ CÙNG CHIỀU (3-0)
3 TƯỚNG XANH : Ý nghĩa 3 Đ đứng | Ý nghĩa 3 N ngược
    `;

    function lay_data_theo_vung(soPhan, tenLa, layPhai) {
        const segments = DATA_GOC.split(/PHẦN\s+/i);
        let segmentDung = segments.find(s => s.trim().startsWith(soPhan.toString()));
        if (!segmentDung) return null;

        const lines = segmentDung.split('\n');
        for (let row of lines) {
            if (row.toUpperCase().includes(tenLa.toUpperCase()) && row.includes(":")) {
                let parts = row.split(":")[1].split("|");
                return layPhai ? parts[1].trim() : parts[0].trim();
            }
        }
        return null;
    }

    function lenh_truy_xuat() {
        let f = [
            document.getElementById('v1').value.trim(),
            document.getElementById('v2').value.trim(),
            document.getElementById('v3').value.trim(),
            document.getElementById('v4').value.trim()
        ].filter(x => x !== "");

        // 1. ĐẾM TỔNG SỐ LÁ THEO TÊN (KHÔNG QUAN TÂM Đ/N) ĐỂ BIẾT BỘ MẤY LÁ
        let nameMap = {};
        f.forEach(val => {
            let n = val.replace(/ [ĐN]$/i, "").toUpperCase().trim();
            if (!nameMap[n]) nameMap[n] = 0;
            nameMap[n]++;
        });

        let ketQua = [];
        for (let tenChung in nameMap) {
            let tongSoLa = nameMap[tenChung];
            if (tongSoLa < 2) continue;

            // 2. SO SOI KỸ KÝ HIỆU Đ/N CỦA RIÊNG NHÓM NÀY
            let nhomLa = f.filter(val => val.toUpperCase().startsWith(tenChung));
            let soD = nhomLa.filter(val => val.toUpperCase().endsWith(" Đ")).length;
            let soN = nhomLa.filter(val => val.toUpperCase().endsWith(" N")).length;
            
            let finalOutput = "";

            // --- QUY TẮC CỨNG: NHÌN KÝ HIỆU ĐỂ NHẢY PHẦN ---

            if (tongSoLa === 4) {
                // NẾU CÓ CẢ Đ VÀ N (TỈ LỆ 3-1 HOẶC 1-3) -> BẮT BUỘC PHẦN 2
                if (soD > 0 && soN > 0) {
                    if (soD === 3) finalOutput = lay_data_theo_vung(2, "4 " + tenChung, false);
                    else if (soN === 3) finalOutput = lay_data_theo_vung(2, "4 " + tenChung, true);
                } 
                // NẾU CHỈ CÓ 1 LOẠI KÝ HIỆU (4-0) -> PHẦN 1
                else {
                    if (soD === 4) finalOutput = lay_data_theo_vung(1, "4 " + tenChung, false);
                    else if (soN === 4) finalOutput = lay_data_theo_vung(1, "4 " + tenChung, true);
                }
            } 
            else if (tongSoLa === 3) {
                // NẾU CÓ CẢ Đ VÀ N (TỈ LỆ 2-1) -> PHẦN 4
                if (soD > 0 && soN > 0) {
                    if (soD === 2) finalOutput = lay_data_theo_vung(4, "3 " + tenChung, false);
                    else if (soN === 2) finalOutput = lay_data_theo_vung(4, "3 " + tenChung, true);
                }
                // NẾU CHỈ CÓ 1 LOẠI (3-0) -> PHẦN 3
                else {
                    if (soD === 3) finalOutput = lay_data_theo_vung(3, "3 " + tenChung, false);
                    else if (soN === 3) finalOutput = lay_data_theo_vung(3, "3 " + tenChung, true);
                }
            }

            ketQua.push(`NHÓM ${tongSoLa} LÁ ${tenChung}:\n=> ${finalOutput || "KHÔNG TÌM THẤY DỮ LIỆU"}`);
        }
        document.getElementById('res').innerText = ketQua.join("\n\n---\n\n");
    }
</script>
</body>
</html>
