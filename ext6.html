<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRUY XUẤT 06 - CHUẨN LOGIC TỈ LỆ</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #cfd8dc; }
        .box { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 18px; margin-bottom: 10px; border: 3px solid #90a4ae; border-radius: 10px; font-size: 24px; font-weight: bold; box-sizing: border-box; background: #fffde7; }
        #res { margin-top: 20px; padding: 15px; border: 5px solid #1a237e; border-radius: 12px; min-height: 250px; white-space: pre-wrap; background: #fafafa; font-size: 24px; line-height: 1.5; font-weight: bold; color: #b71c1c; }
        button { width: 100%; padding: 22px; font-size: 22px; font-weight: bold; border: none; border-radius: 12px; color: #fff; cursor: pointer; text-transform: uppercase; background: #b71c1c; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center">TRUY XUẤT 06 - FIX 3-1 & 1-3</h2>
    <input type="text" id="v1" placeholder="Form 1">
    <input type="text" id="v2" placeholder="Form 2">
    <input type="text" id="v3" placeholder="Form 3">
    <input type="text" id="v4" placeholder="Form 4">
    <button onclick="bat_dau_truy_xuat()">TRUY XUẤT NGAY</button>
    <div id="res"></div>
</div>

<script>
    // DỮ LIỆU THẬT CỦA BẠN
    const THU_VIEN = `
PHẦN 1 : 
4 TƯỚNG XANH : Text A (4 Đứng) | Text A (4 Ngược)
PHẦN 2 : 
4 TƯỚNG XANH : Text B (3-1 Trái) | Text B (3-1 Phải)
PHẦN 3 : 
3 TƯỚNG XANH : Text C (3-0 Trái) | Text C (3-0 Phải)
    `;

    function quet_trong_khu_vuc(soPhan, tenLa, benPhai) {
        const segments = THU_VIEN.split(/PHẦN\s+/i);
        let segmentDung = segments.find(s => s.trim().startsWith(soPhan.toString()));
        if (!segmentDung) return null;

        const lines = segmentDung.split('\n');
        for (let row of lines) {
            let r = row.toUpperCase();
            if (r.includes(tenLa.toUpperCase()) && r.includes(":")) {
                let text = row.split(":")[1].split("|");
                return benPhai ? text[1].trim() : text[0].trim();
            }
        }
        return null;
    }

    function bat_dau_truy_xuat() {
        let f = [
            document.getElementById('v1').value.trim(),
            document.getElementById('v2').value.trim(),
            document.getElementById('v3').value.trim(),
            document.getElementById('v4').value.trim()
        ].filter(x => x !== "");

        // 1. Phân loại theo tên gốc
        let groups = {};
        f.forEach(val => {
            let name = val.replace(/ [ĐN]$/i, "").toUpperCase().trim();
            if (!groups[name]) groups[name] = [];
            groups[name].push(val.toUpperCase());
        });

        let results = [];
        for (let name in groups) {
            let items = groups[name];
            let n = items.length;
            if (n < 2) continue;

            let countD = items.filter(x => x.endsWith(" Đ")).length;
            let countN = items.filter(x => x.endsWith(" N")).length;
            let finalVal = "";

            // --- QUY TẮC CỨNG: PHÂN BIỆT Đ/N ĐỂ CHỌN PHẦN ---

            if (n === 4) {
                // Tình huống lệch (Phần 2)
                if (countD === 3 && countN === 1) {
                    finalVal = quet_trong_khu_vuc(2, "4 " + name, false);
                } else if (countN === 3 && countD === 1) {
                    finalVal = quet_trong_khu_vuc(2, "4 " + name, true);
                } 
                // Tình huống cùng chiều (Phần 1)
                else if (countD === 4) {
                    finalVal = quet_trong_khu_vuc(1, "4 " + name, false);
                } else if (countN === 4) {
                    finalVal = quet_trong_khu_vuc(1, "4 " + name, true);
                }
            } 
            else if (n === 3) {
                // Tình huống cùng chiều 3 lá (Phần 3)
                if (countD === 3) finalVal = quet_trong_khu_vuc(3, "3 " + name, false);
                else if (countN === 3) finalVal = quet_trong_khu_vuc(3, "3 " + name, true);
                // Tình huống lệch 3 lá (Phần 4)
                else if (countD === 2 && countN === 1) finalVal = quet_trong_khu_vuc(4, "3 " + name, false);
                else if (countN === 2 && countD === 1) finalVal = quet_trong_khu_vuc(4, "3 " + name, true);
            }

            results.push(`NHÓM ${n} LÁ ${name}:\n=> ${finalVal || "KHÔNG CÓ DATA"}`);
        }
        document.getElementById('res').innerText = results.join("\n\n---\n\n");
    }
</script>
</body>
</html>
