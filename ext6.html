<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRUY XUẤT 06 - FIX LỖI NHẢY PHẦN 2</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #cfd8dc; }
        .box { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 18px; margin-bottom: 10px; border: 3px solid #90a4ae; border-radius: 10px; font-size: 24px; font-weight: bold; box-sizing: border-box; background: #fffde7; }
        #res { margin-top: 20px; padding: 15px; border: 5px solid #1a237e; border-radius: 12px; min-height: 250px; white-space: pre-wrap; background: #fafafa; font-size: 24px; line-height: 1.5; font-weight: bold; color: #b71c1c; }
        button { width: 100%; padding: 22px; font-size: 22px; font-weight: bold; border: none; border-radius: 12px; color: #fff; cursor: pointer; text-transform: uppercase; background: #b71c1c; width: 100%; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center">TRUY XUẤT 06 - CHUẨN 3-1 & 1-3</h2>
    <input type="text" id="v1" placeholder="Form 1">
    <input type="text" id="v2" placeholder="Form 2">
    <input type="text" id="v3" placeholder="Form 3">
    <input type="text" id="v4" placeholder="Form 4">
    <button onclick="lenh_truy_xuat()">TRUY XUẤT DATA</button>
    <div id="res"></div>
</div>

<script>
    // THƯ VIỆN DỮ LIỆU CỦA BẠN (GIỮ NGUYÊN CẤU TRÚC NÀY)
    const THU_VIEN = `
PHẦN 1 : 
4 TƯỚNG XANH : Text A (4 Đứng) | Text A (4 Ngược)
PHẦN 2 : 
4 TƯỚNG XANH : Text B (3-1 Trái) | Text B (3-1 Phải)
PHẦN 3 : 
3 TƯỚNG XANH : Text C (3-0 Trái) | Text C (3-0 Phải)
PHẦN 4 : 
3 TƯỚNG XANH : Text D (2-1 Trái) | Text D (2-1 Phải)
    `;

    function tim_data(soPhan, tenLa, layPhai) {
        const lines = THU_VIEN.split('\n');
        let trongPhan = false;
        let ketQua = "";

        for (let line of lines) {
            let row = line.trim().toUpperCase();
            if (!row) continue;

            // KIỂM SOÁT VÙNG PHẦN
            if (row.startsWith("PHẦN") && row.includes(soPhan.toString())) {
                trongPhan = true;
                continue;
            }
            if (trongPhan && row.startsWith("PHẦN") && !row.includes(soPhan.toString())) {
                trongPhan = false;
            }

            // TRÍCH XUẤT TRONG VÙNG
            if (trongPhan) {
                if (row.includes(tenLa.toUpperCase()) && row.includes(":")) {
                    let content = line.split(":")[1] || "";
                    if (content.includes("|")) {
                        let parts = content.split("|");
                        ketQua = layPhai ? parts[1].trim() : parts[0].trim();
                        break; 
                    }
                }
            }
        }
        return ketQua;
    }

    function lenh_truy_xuat() {
        let inputs = [
            document.getElementById('v1').value.trim(),
            document.getElementById('v2').value.trim(),
            document.getElementById('v3').value.trim(),
            document.getElementById('v4').value.trim()
        ].filter(x => x !== "");

        let groups = {};
        inputs.forEach(v => {
            let name = v.replace(/ [ĐN]$/i, "").toUpperCase().trim();
            if (!groups[name]) groups[name] = [];
            groups[name].push(v.toUpperCase());
        });

        let hienThi = [];
        for (let name in groups) {
            let list = groups[name];
            let n = list.length;
            if (n < 2) continue;

            let soD = list.filter(x => x.endsWith(" Đ")).length;
            let soN = list.filter(x => x.endsWith(" N")).length;
            let finalStr = "";

            // --- QUY TẮC CỨNG: NHẢY PHẦN DỰA TRÊN TỈ LỆ ---

            if (n === 4) {
                // TÌNH HUỐNG 3-1 HOẶC 1-3 -> ÉP VÀO PHẦN 2
                if (soD === 3 && soN === 1) {
                    finalStr = tim_data(2, "4 " + name, false);
                } else if (soN === 3 && soD === 1) {
                    finalStr = tim_data(2, "4 " + name, true);
                } 
                // TÌNH HUỐNG 4-0 -> ÉP VÀO PHẦN 1
                else if (soD === 4) {
                    finalStr = tim_data(1, "4 " + name, false);
                } else if (soN === 4) {
                    finalStr = tim_data(1, "4 " + name, true);
                }
            } 
            else if (n === 3) {
                // TÌNH HUỐNG 2-1 -> ÉP VÀO PHẦN 4
                if (soD === 2 && soN === 1) {
                    finalStr = tim_data(4, "3 " + name, false);
                } else if (soN === 2 && soD === 1) {
                    finalStr = tim_data(4, "3 " + name, true);
                }
                // TÌNH HUỐNG 3-0 -> ÉP VÀO PHẦN 3
                else if (soD === 3) {
                    finalStr = tim_data(3, "3 " + name, false);
                } else if (soN === 3) {
                    finalStr = tim_data(3, "3 " + name, true);
                }
            }

            hienThi.push(`NHÓM ${n} LÁ ${name}:\n=> ${finalStr || "KHÔNG CÓ DATA TRONG THƯ VIỆN"}`);
        }
        document.getElementById('res').innerText = hienThi.join("\n\n---\n\n");
    }
</script>
</body>
</html>
