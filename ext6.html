<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRUY XUẤT 06 - FIX TRƯỜNG HỢP 3-1</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #cfd8dc; }
        .box { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 18px; margin-bottom: 10px; border: 3px solid #90a4ae; border-radius: 10px; font-size: 24px; font-weight: bold; box-sizing: border-box; background: #fffde7; }
        #res { margin-top: 20px; padding: 15px; border: 5px solid #1a237e; border-radius: 12px; min-height: 250px; white-space: pre-wrap; background: #fafafa; font-size: 24px; line-height: 1.5; font-weight: bold; color: #b71c1c; }
        button { width: 100%; padding: 22px; font-size: 22px; font-weight: bold; border: none; border-radius: 12px; color: #fff; cursor: pointer; text-transform: uppercase; background: #b71c1c; width: 100%; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center">TRUY XUẤT 06 - CHẶN CỨNG PHẦN 1</h2>
    <input type="text" id="v1" placeholder="Form 1">
    <input type="text" id="v2" placeholder="Form 2">
    <input type="text" id="v3" placeholder="Form 3">
    <input type="text" id="v4" placeholder="Form 4">
    <button onclick="lenh_truy_xuat()">TRUY XUẤT NGAY</button>
    <div id="res"></div>
</div>

<script>
    const THU_VIEN = `
PHẦN 1 : 
4 SĨ XANH : Ý nghĩa 4 Đ đứng | Ý nghĩa 4 N ngược
PHẦN 2 : 
4 SĨ XANH : Ý nghĩa 3-1 Trái | Ý nghĩa 3-1 Phải
PHẦN 3 : 
3 SĨ XANH : Ý nghĩa 3-0 Trái | Ý nghĩa 3-0 Phải
PHẦN 4 : 
3 SĨ XANH : Ý nghĩa 2-1 Trái | Ý nghĩa 2-1 Phải
    `;

    function tim_data_chinh_xac(soPhanTim, tenLaTim, benPhai) {
        const segments = THU_VIEN.split(/PHẦN\s+/i);
        let contentPhan = "";

        // Tìm đúng mẩu dữ liệu của PHẦN đó, ví dụ PHẦN 2
        for (let seg of segments) {
            let s = seg.trim();
            if (s.startsWith(soPhanTim.toString())) {
                contentPhan = s;
                break;
            }
        }

        if (!contentPhan) return null;

        const lines = contentPhan.split('\n');
        for (let line of lines) {
            let r = line.trim().toUpperCase();
            if (r.includes(tenLaTim.toUpperCase()) && r.includes(":")) {
                let parts = line.split(":")[1].split("|");
                return benPhai ? parts[1].trim() : parts[0].trim();
            }
        }
        return null;
    }

    function lenh_truy_xuat() {
        let f = [
            document.getElementById('v1').value.trim(),
            document.getElementById('v2').value.trim(),
            document.getElementById('v3').value.trim(),
            document.getElementById('v4').value.trim()
        ].filter(x => x !== "");

        let groups = {};
        f.forEach(v => {
            let parts = v.split(" ");
            let symbol = parts.pop().toUpperCase(); // Đ hoặc N
            let name = parts.join(" ").toUpperCase().trim();
            if (!groups[name]) groups[name] = [];
            groups[name].push(symbol);
        });

        let finalLog = [];
        for (let name in groups) {
            let syms = groups[name];
            let count = syms.length;
            if (count < 2) continue;

            let d = syms.filter(s => s === "Đ").length;
            let n = syms.filter(s => s === "N").length;
            let result = "";

            // --- QUY TẮC CỨNG: ÉP NHẢY VÙNG ---
            if (count === 4) {
                // Nếu là 3-1 hoặc 1-3 -> CHỈ ĐƯỢC TÌM Ở PHẦN 2
                if (d === 3 && n === 1) result = tim_data_chinh_xac(2, "4 " + name, false);
                else if (n === 3 && d === 1) result = tim_data_chinh_xac(2, "4 " + name, true);
                // Nếu là 4-0 -> CHỈ ĐƯỢC TÌM Ở PHẦN 1
                else if (d === 4) result = tim_data_chinh_xac(1, "4 " + name, false);
                else if (n === 4) result = tim_data_chinh_xac(1, "4 " + name, true);
            } 
            else if (count === 3) {
                if (d === 2 && n === 1) result = tim_data_chinh_xac(4, "3 " + name, false);
                else if (n === 2 && d === 1) result = tim_data_chinh_xac(4, "3 " + name, true);
                else if (d === 3) result = tim_data_chinh_xac(3, "3 " + name, false);
                else if (n === 3) result = tim_data_chinh_xac(3, "3 " + name, true);
            }

            finalLog.push(`NHÓM ${count} LÁ ${name}:\n=> ${result || "KHÔNG CÓ DỮ LIỆU"}`);
        }
        document.getElementById('res').innerText = finalLog.join("\n\n---\n\n");
    }
</script>
</body>
</html>
