<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRUY XUẤT 06 - CHỐT CHẶN CUỐI</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #cfd8dc; }
        .box { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 18px; margin-bottom: 10px; border: 3px solid #90a4ae; border-radius: 10px; font-size: 24px; font-weight: bold; box-sizing: border-box; background: #fffde7; }
        #res { margin-top: 20px; padding: 15px; border: 5px solid #1a237e; border-radius: 12px; min-height: 250px; white-space: pre-wrap; background: #fafafa; font-size: 24px; line-height: 1.5; font-weight: bold; color: #b71c1c; }
        button { width: 100%; padding: 22px; font-size: 22px; font-weight: bold; border: none; border-radius: 12px; color: #fff; cursor: pointer; text-transform: uppercase; background: #b71c1c; width: 100%; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center">TRUY XUẤT 06 - FIX TRUYỆT ĐỂ 3-1</h2>
    <input type="text" id="v1" placeholder="Form 1">
    <input type="text" id="v2" placeholder="Form 2">
    <input type="text" id="v3" placeholder="Form 3">
    <input type="text" id="v4" placeholder="Form 4">
    <button onclick="chay_lenh_truy_xuat()">TRUY XUẤT NGAY</button>
    <div id="res"></div>
</div>

<script>
    // THƯ VIỆN DỮ LIỆU GỐC CỦA BẠN
    const THU_VIEN_GOC = `
PHẦN 1 : 
4 SĨ XANH : Text A (4 Đứng) | Text A (4 Ngược)
PHẦN 2 : 
4 SĨ XANH : Text B (3-1 Trái) | Text B (3-1 Phải)
PHẦN 3 : 
3 SĨ XANH : Text C (3-0 Trái) | Text C (3-0 Phải)
PHẦN 4 : 
3 SĨ XANH : Text D (2-1 Trái) | Text D (2-1 Phải)
    `;

    function lay_data_chuan(soPhan, tenLa, layPhai) {
        // Tách thư viện thành từng đoạn PHẦN để máy không bao giờ lấy nhầm
        const segments = THU_VIEN_GOC.split(/PHẦN\s+/i);
        let segmentTarget = segments.find(s => s.trim().startsWith(soPhan.toString()));
        
        if (!segmentTarget) return "KHÔNG TÌM THẤY PHẦN " + soPhan;

        const lines = segmentTarget.split('\n');
        for (let row of lines) {
            let cleanRow = row.toUpperCase().trim();
            if (cleanRow.includes(tenLa.toUpperCase()) && cleanRow.includes(":")) {
                let parts = row.split(":")[1].split("|");
                return layPhai ? parts[1].trim() : parts[0].trim();
            }
        }
        return "KHÔNG CÓ DỮ LIỆU LÁ TRONG PHẦN " + soPhan;
    }

    function chay_lenh_truy_xuat() {
        let inputs = [
            document.getElementById('v1').value.trim(),
            document.getElementById('v2').value.trim(),
            document.getElementById('v3').value.trim(),
            document.getElementById('v4').value.trim()
        ].filter(x => x !== "");

        let groups = {};
        inputs.forEach(v => {
            let arr = v.split(" ");
            let symbol = arr.pop().toUpperCase(); // Tách Đ/N
            let name = arr.join(" ").toUpperCase().trim(); // Tên lá
            if (!groups[name]) groups[name] = [];
            groups[name].push(symbol);
        });

        let ketQuaHienThi = [];
        for (let name in groups) {
            let list = groups[name];
            let tong = list.length;
            if (tong < 2) continue;

            let soD = list.filter(s => s === "Đ").length;
            let soN = list.filter(s => s === "N").length;
            let finalVal = "";

            // --- ĐIỀU KIỆN CHỐT: PHẢI NHẢY PHẦN TRƯỚC KHI TÌM ---
            if (tong === 4) {
                if (soD === 3 && soN === 1) {
                    finalVal = lay_data_chuan(2, "4 " + name, false); // BẮT BUỘC PHẦN 2 TRÁI
                } else if (soN === 3 && soD === 1) {
                    finalVal = lay_data_chuan(2, "4 " + name, true);  // BẮT BUỘC PHẦN 2 PHẢI
                } else if (soD === 4) {
                    finalVal = lay_data_chuan(1, "4 " + name, false); // PHẦN 1 TRÁI
                } else if (soN === 4) {
                    finalVal = lay_data_chuan(1, "4 " + name, true);  // PHẦN 1 PHẢI
                }
            } 
            else if (tong === 3) {
                if (soD === 2 && soN === 1) finalVal = lay_data_chuan(4, "3 " + name, false);
                else if (soN === 2 && soD === 1) finalVal = lay_data_chuan(4, "3 " + name, true);
                else if (soD === 3) finalVal = lay_data_chuan(3, "3 " + name, false);
                else if (soN === 3) finalVal = lay_data_chuan(3, "3 " + name, true);
            }

            ketQuaHienThi.push(`BỘ ${tong} LÁ ${name}:\n=> ${finalVal}`);
        }
        document.getElementById('res').innerText = ketQuaHienThi.join("\n\n---\n\n");
    }
</script>
</body>
</html>
