<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File 06 - Các Lá Bài Đồng Giá Trị Cùng Màu</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #e8f4f8, #f0f8f0); margin: 0; padding: 15px; }
        .container { max-width: 850px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); padding: 25px; }
        h1 { text-align: center; color: #2c5f9e; }
        label { display: block; font-weight: bold; margin: 12px 0 8px; color: #2c5f9e; font-size: 1.15em; }
        input[type="text"] { width: 100%; padding: 14px; font-size: 1.25em; border: 2px solid #a3c4d4; border-radius: 10px; }
        textarea { width: 100%; height: 220px; padding: 14px; font-size: 1.05em; border: 2px solid #a3c4d4; border-radius: 10px; font-family: monospace; }
        button { padding: 14px 32px; font-size: 1.15em; margin: 10px 8px 10px 0; border: none; border-radius: 10px; cursor: pointer; }
        #btnFind { background: #2c5f9e; color: white; }
        #btnCopy { background: #4caf50; color: white; }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.2); }
        #result { margin-top: 25px; padding: 20px; background: #f8f9fa; border: 2px solid #d1e0f0; border-radius: 12px; font-size: 1.2em; min-height: 100px; white-space: pre-wrap; }
        .error { color: #d32f2f; background: #ffebee; padding: 15px; border-radius: 10px; }
        .success { color: #2e7d32; }
    </style>
</head>
<body>
    <div class="container">
        <h1>File 06 - Các Lá Bài Đồng Giá Trị Cùng Màu</h1>
        
        <div class="form-group">
            <label for="form1">Form 1 (Bắt buộc):</label>
            <input type="text" id="form1" placeholder="Ví dụ: 4 NGỰA XANH Đ">
        </div>
        
        <div class="form-group">
            <label for="form2">Form 2 (Có thể để trống):</label>
            <input type="text" id="form2" placeholder="Ví dụ: 1 NGỰA XANH N">
        </div>
        
        <div class="form-group">
            <label for="library">Thư viện File 06 (Paste toàn bộ 5 PHẦN):</label>
            <textarea id="library" placeholder="Dán toàn bộ nội dung thư viện từ PHẦN 1 đến PHẦN 5..."></textarea>
        </div>
        
        <button id="btnFind">TÌM Ý NGHĨA</button>
        <button id="btnCopy">SAO CHÉP KẾT QUẢ</button>
        
        <div id="result"></div>
    </div>

    <script>
        function normalize(str) {
            return str ? str.trim().toUpperCase().replace(/\s+/g, ' ') : '';
        }

        function parseInput(input) {
            if (!input) return null;
            const parts = input.trim().split(/\s+/);
            if (parts.length < 3) return null;

            const qty = parseInt(parts[0]);
            if (![1,2,3,4].includes(qty)) return null;

            const pos = parts[parts.length - 1];
            if (!['Đ', 'N'].includes(pos)) return null;

            const nameColor = parts.slice(1, -1).join(' ');
            return { quantity: qty, nameColor: nameColor, position: pos };
        }

        function findInLibrary(library, part, nameColor, takeLeft) {
            if (!library || !nameColor) return null;
            const lines = library.split('\n');
            let inSection = false;

            for (let line of lines) {
                const trimmed = line.trim();
                if (!trimmed) continue;

                if (trimmed.includes(`PHẦN ${part}`)) {
                    inSection = true;
                    continue;
                }
                if (inSection && trimmed.match(/PHẦN \d/)) inSection = false;

                if (!inSection) continue;

                // Tìm dòng có số + tên lá + màu (theo đúng data bạn cung cấp)
                const expectedPrefix = `${part === 1 || part === 2 ? 4 : part === 3 || part === 4 ? 3 : 2} ${nameColor}`;
                if (trimmed.startsWith(expectedPrefix) || trimmed.includes(` ${nameColor} :`)) {
                    const pipe = line.indexOf('|');
                    if (pipe !== -1) {
                        const left = line.substring(0, pipe).trim();
                        const right = line.substring(pipe + 1).trim();
                        return takeLeft ? left : right;
                    }
                }
            }
            return null;
        }

        document.getElementById('btnFind').addEventListener('click', () => {
            const f1Text = normalize(document.getElementById('form1').value);
            const f2Text = normalize(document.getElementById('form2').value);
            const library = document.getElementById('library').value;

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '';

            if (!f1Text) {
                resultDiv.innerHTML = '<div class="error">Sai data</div>';
                return;
            }

            const p1 = parseInput(f1Text);
            const p2 = f2Text ? parseInput(f2Text) : null;

            if (!p1) {
                resultDiv.innerHTML = '<div class="error">Sai data</div>';
                return;
            }

            if (p2 && p1.nameColor !== p2.nameColor) {
                resultDiv.innerHTML = '<div class="error">Sai data</div>';
                return;
            }

            let partNum = 0;
            let takeLeft = true;

            // 1. Tổng 4 lá cùng vị trí
            if (p1.quantity === 4 && !p2) {
                partNum = 1;
                takeLeft = p1.position === 'Đ';
            }
            // 2. Tổng 4 lá hỗn hợp (3+1)
            else if (p1.quantity === 3 && p2 && p2.quantity === 1) {
                partNum = 2;
                takeLeft = p1.position === 'Đ';   // 3Đ+1N → Trái | 3N+1Đ → Phải
            }
            // 3. Tổng 3 lá cùng vị trí
            else if (p1.quantity === 3 && !p2) {
                partNum = 3;
                takeLeft = p1.position === 'Đ';
            }
            // 4. Tổng 3 lá hỗn hợp (2+1)
            else if (p1.quantity === 2 && p2 && p2.quantity === 1) {
                partNum = 4;
                takeLeft = p1.position === 'Đ';
            }
            // 5. Tổng 2 lá cùng vị trí
            else if (p1.quantity === 2 && !p2) {
                partNum = 5;
                takeLeft = p1.position === 'Đ';
            }
            else {
                resultDiv.innerHTML = '<div class="error">Sai data</div>';
                return;
            }

            const meaning = findInLibrary(library, partNum, p1.nameColor, takeLeft);

            if (meaning) {
                resultDiv.innerHTML = `<div class="success"><strong>Kết quả (PHẦN \( {partNum}):</strong><br><br> \){meaning}</div>`;
            } else {
                resultDiv.innerHTML = `<div class="error">Sai data (Không tìm thấy dữ liệu cho ${p1.nameColor} trong PHẦN ${partNum})</div>`;
            }
        });

        document.getElementById('btnCopy').addEventListener('click', () => {
            const text = document.getElementById('result').innerText;
            if (!text || text.includes('Sai data')) {
                alert('Không có kết quả để sao chép!');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('btnCopy');
                const old = btn.innerText;
                btn.innerText = 'ĐÃ SAO CHÉP!';
                setTimeout(() => btn.innerText = old, 2000);
            });
        });
    </script>
</body>
</html>
