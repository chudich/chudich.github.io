<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Trắc Tự Phồn Thể</title>
    <style>
        :root {
            --primary-color: #d32f2f;
            --bg-color: #fdf5e6;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        h2 { color: var(--primary-color); text-transform: uppercase; margin-bottom: 10px; }

        .container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
        }

        .slot-box {
            flex: 1;
            background: white;
            border: 4px solid var(--primary-color);
            border-radius: 10px;
            text-align: center;
            padding: 20px 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .char-display {
            font-size: 80px;
            font-weight: bold;
            height: 100px;
            line-height: 100px;
            margin-bottom: 15px;
            color: #333;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: all 0.2s;
            font-weight: bold;
        }

        .btn-stop {
            width: 100%;
            padding: 10px;
            background-color: #555;
            color: white;
            font-size: 16px;
        }
        .btn-stop:disabled { background-color: #ccc; cursor: not-allowed; }
        .btn-stop.active { background-color: var(--primary-color); }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        .main-btn {
            padding: 15px;
            font-size: 20px;
            background-color: #2e7d32;
            color: white;
        }

        .copy-btn {
            padding: 12px;
            background-color: #1976d2;
            color: white;
            display: none; /* Chỉ hiện khi cả 2 đã dừng */
        }

        #status {
            margin-top: 10px;
            font-style: italic;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>Ứng Dụng Xin Chữ</h2>

    <div class="container">
        <div class="slot-box">
            <div id="charL" class="char-display">?</div>
            <button id="stopL" class="btn-stop" onclick="stopSlot('L')" disabled>Dừng Trái</button>
        </div>
        <div class="slot-box">
            <div id="charR" class="char-display">?</div>
            <button id="stopR" class="btn-stop" onclick="stopSlot('R')" disabled>Dừng Phải</button>
        </div>
    </div>

    <div class="controls">
        <button id="startBtn" class="main-btn" onclick="startRolling()">XIN CHỮ</button>
        <button id="copyBtn" class="copy-btn" onclick="copyToClipboard()">SAO CHÉP THÔNG TIN</button>
    </div>

    <p id="status">Bấm "Xin Chữ" để bắt đầu</p>

        // Xử lý dữ liệu thô thành mảng đối tượng
        const hanData = rawData.trim().split('\n').map(line => {
            const parts = line.split(';').map(p => p.trim());
            return {
                id: parts[0],
                char: parts[1],
                radical: parts[2],
                strokes: parts[3],
                meaning: parts[4]
            };
        });

        let timerL, timerR;
        let indexL = 0, indexR = 0;
        let isRollingL = false, isRollingR = false;
        let resultL = null, resultR = null;

        function startRolling() {
            // Reset trạng thái
            resultL = null; resultR = null;
            document.getElementById('copyBtn').style.display = 'none';
            document.getElementById('status').innerText = "Đang quay... Hãy bấm Dừng!";

            // Kích hoạt nút Dừng
            document.getElementById('stopL').disabled = false;
            document.getElementById('stopR').disabled = false;
            document.getElementById('stopL').classList.add('active');
            document.getElementById('stopR').classList.add('active');
            document.getElementById('startBtn').disabled = true;

            // Bắt đầu quay ô Trái
            isRollingL = true;
            timerL = setInterval(() => {
                indexL = Math.floor(Math.random() * hanData.length);
                document.getElementById('charL').innerText = hanData[indexL].char;
            }, 50);

            // Bắt đầu quay ô Phải
            isRollingR = true;
            timerR = setInterval(() => {
                indexR = Math.floor(Math.random() * hanData.length);
                document.getElementById('charR').innerText = hanData[indexR].char;
            }, 50);
        }

        function stopSlot(side) {
            if (side === 'L' && isRollingL) {
                clearInterval(timerL);
                isRollingL = false;
                resultL = hanData[indexL];
                document.getElementById('stopL').disabled = true;
                document.getElementById('stopL').classList.remove('active');
            } else if (side === 'R' && isRollingR) {
                clearInterval(timerR);
                isRollingR = false;
                resultR = hanData[indexR];
                document.getElementById('stopR').disabled = true;
                document.getElementById('stopR').classList.remove('active');
            }

            // Kiểm tra nếu cả 2 đã dừng
            if (!isRollingL && !isRollingR) {
                document.getElementById('startBtn').disabled = false;
                document.getElementById('copyBtn').style.display = 'block';
                document.getElementById('status').innerText = "Đã nhận chữ xong!";
            }
        }

        function copyToClipboard() {
            if (!resultL || !resultR) return;

            const textToCopy = `THÔNG TIN CHỮ HÁN NHẬN ĐƯỢC:
---
Ô TRÁI:
Vị trí: ${resultL.id}
Chữ: ${resultL.char}
Bộ: ${resultL.radical}
Số nét: ${resultL.strokes}
Ý nghĩa: ${resultL.meaning}
---
Ô PHẢI:
Vị trí: ${resultR.id}
Chữ: ${resultR.char}
Bộ: ${resultR.radical}
Số nét: ${resultR.strokes}
Ý nghĩa: ${resultR.meaning}`;

            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("Đã sao chép thông tin 2 chữ vào bộ nhớ tạm!");
            }).catch(err => {
                console.error('Lỗi khi sao chép: ', err);
            });
        }
