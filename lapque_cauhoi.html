<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dịch Học - Nguyên Lý Chủ Vị</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #004a99; --secondary: #28a745; --bg: #f4f7f6; }
        body { font-family: 'Lexend', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 550px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; padding-bottom: 20px; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; font-weight: 600; }
        
        .input-section { padding: 20px; border-bottom: 1px solid #eee; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #555; }
        textarea { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; font-size: 1rem; box-sizing: border-box; resize: vertical; min-height: 100px; }
        textarea:focus { border-color: var(--primary); outline: none; }
        
        .btn-main { background: var(--primary); color: white; width: calc(100% - 40px); margin: 20px; padding: 18px; border: none; border-radius: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        .btn-main:active { transform: scale(0.98); }

        .result-panel { padding: 0 20px; display: none; }
        .analysis-box { background: #eef2f7; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9rem; line-height: 1.6; }
        
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { border: 1px solid #eee; border-radius: 15px; padding: 15px; text-align: center; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .label-tag { font-size: 0.75rem; font-weight: bold; color: #888; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .que-name { font-size: 1.2rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
        
        /* Vẽ vạch quẻ */
        .hexagram { display: flex; flex-direction: column-reverse; gap: 6px; align-items: center; margin: 10px 0; }
        .line { width: 80px; height: 8px; background-color: var(--primary); border-radius: 2px; }
        .line.broken { background-color: transparent; display: flex; justify-content: space-between; }
        .line.broken::before, .line.broken::after { content: ""; width: 42%; height: 100%; background-color: var(--primary); border-radius: 2px; }
        .line.moving { background-color: #ff4757; } /* Màu đỏ cho vạch động */
        .line.broken.moving::before, .line.broken.moving::after { background-color: #ff4757; }

        .binary-tag { font-family: monospace; font-size: 0.8rem; color: #666; background: #f0f0f0; padding: 2px 8px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">LẬP QUẺ THEO NGUYÊN LÝ CHỦ VỊ</div>

    <div class="input-section">
        <label>Nhập câu hỏi của bạn:</label>
        <textarea id="questionInput" placeholder="Ví dụ: Tôi muốn thuê mặt bằng để mở cửa hiệu mini spa , làm đẹp không biết dự định này có thành công hay không ?"></textarea>
    </div>

    <button class="btn-main" onclick="lapQueChuVi()">LẬP QUẺ NGAY</button>

    <div class="result-panel" id="resultPanel">
        <div class="analysis-box" id="analysisText"></div>
        
        <div class="card-grid">
            <div class="card">
                <span class="label-tag">Quẻ Chủ</span>
                <div id="nameChu" class="que-name">---</div>
                <div id="visualChu" class="hexagram"></div>
                <div id="codeChu" class="binary-tag">---</div>
            </div>
            <div class="card">
                <span class="label-tag">Quẻ Biến</span>
                <div id="nameBien" class="que-name">---</div>
                <div id="visualBien" class="hexagram"></div>
                <div id="codeBien" class="binary-tag">---</div>
            </div>
        </div>
    </div>
</div>

<script>
    const batQuai = {
        1: { name: "Kiền", code: "111" }, 2: { name: "Đoài", code: "011" },
        3: { name: "Ly",    code: "101" }, 4: { name: "Chấn",  code: "001" },
        5: { name: "Tốn",   code: "110" }, 6: { name: "Khảm",  code: "010" },
        7: { name: "Cấn",   code: "100" }, 8: { name: "Khôn",  code: "000" }
    };

    const data64Que = {
        "111111": "Thuần Càn", "000000": "Thuần Khôn", "010001": "Thủy Lôi Truân", "100010": "Sơn Thủy Mông",
        "010111": "Thủy Thiên Nhu", "111010": "Thiên Thủy Tụng", "000010": "Địa Thủy Sư", "010000": "Thủy Địa Tỷ",
        "110111": "Phong Thiên Tiểu Súc", "111011": "Thiên Trạch Lý", "000111": "Địa Thiên Thái", "111000": "Thiên Địa Bĩ",
        "111101": "Thiên Hỏa Đồng Nhân", "101111": "Hỏa Thiên Đại Hữu", "000100": "Địa Sơn Khiêm", "001000": "Lôi Địa Dự",
        "011001": "Trạch Lôi Tùy", "100110": "Sơn Phong Cổ", "000011": "Địa Trạch Lâm", "110000": "Phong Địa Quán",
        "101001": "Hỏa Lôi Phệ Hạp", "100101": "Sơn Hỏa Bí", "100000": "Sơn Địa Bác", "000001": "Địa Lôi Phục",
        "111001": "Thiên Lôi Vô Vọng", "100111": "Sơn Thiên Đại Súc", "100001": "Sơn Lôi Di", "011110": "Trạch Phong Đại Quá",
        "010010": "Thuần Khảm", "101101": "Thuần Ly", "011100": "Trạch Sơn Hàm", "001110": "Lôi Phong Hằng",
        "111100": "Thiên Sơn Độn", "001111": "Lôi Thiên Đại Tráng", "101000": "Hỏa Địa Tấn", "000101": "Địa Hỏa Minh Di",
        "110101": "Phong Hỏa Gia Nhân", "101011": "Hỏa Trạch Khuê", "010100": "Thủy Sơn Kiển", "001010": "Lôi Thủy Giải",
        "100011": "Sơn Trạch Tổn", "110001": "Phong Lôi Ích", "011111": "Trạch Thiên Quải", "111110": "Thiên Phong Cấu",
        "011000": "Trạch Địa Tụy", "000110": "Địa Phong Thăng", "011010": "Trạch Thủy Khốn", "010110": "Thủy Phong Tỉnh",
        "011101": "Trạch Hỏa Cách", "101110": "Hỏa Phong Đỉnh", "001001": "Thuần Chấn", "100100": "Thuần Cấn",
        "110100": "Phong Sơn Tiệm", "001011": "Lôi Trạch Quy Muội", "001101": "Lôi Hỏa Phong", "101100": "Hỏa Sơn Lữ",
        "110110": "Thuần Tốn", "011011": "Thuần Đoài", "110010": "Phong Thủy Hoán", "010011": "Thủy Trạch Tiết",
        "110011": "Phong Trạch Trung Phu", "001100": "Lôi Sơn Tiểu Quá", "010101": "Thủy Hỏa Ký Tế", "101010": "Hỏa Thủy Vị Tế"
    };

    function getGioChi() {
        const h = new Date().getHours();
        if (h >= 23 || h < 1) return 1; // Tý
        if (h >= 1 && h < 3) return 2;  // Sửu
        if (h >= 3 && h < 5) return 3;  // Dần
        if (h >= 5 && h < 7) return 4;  // Mão
        if (h >= 7 && h < 9) return 5;  // Thìn
        if (h >= 9 && h < 11) return 6; // Tị
        if (h >= 11 && h < 13) return 7;// Ngọ
        if (h >= 13 && h < 15) return 8;// Mùi
        if (h >= 15 && h < 17) return 9;// Thân
        if (h >= 17 && h < 19) return 10;// Dậu
        if (h >= 19 && h < 21) return 11;// Tuất
        return 12; // Hợi
    }

    function drawHex(containerId, code, movingLine = -1) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        // Vẽ từ trên xuống (Hào 6 ở trên cùng, Hào 1 ở dưới cùng)
        // Lưu ý: Logic nhị phân code là Thượng (1-3) + Hạ (4-6)
        for (let i = 0; i < 6; i++) {
            const line = document.createElement('div');
            const isBroken = code[i] === '0';
            const isMoving = (6 - i) === movingLine;
            
            line.className = isBroken ? "line broken" : "line";
            if (isMoving) line.classList.add("moving");
            container.appendChild(line);
        }
    }

    function lapQueChuVi() {
        const input = document.getElementById('questionInput').value.trim();
        if (!input) { alert("Vui lòng nhập câu hỏi!"); return; }

        // 1. Đếm thành tố (tách từ và dấu câu)
        const components = input.match(/[\wà-ỹĐđ]+|[^\w\s]/gi) || [];
        const total = components.length;

        // 2. Chia Chủ Vị
        let trai, phai;
        if (total % 2 === 0) {
            trai = total / 2;
            phai = total / 2;
        } else {
            trai = (total - 1) / 2;
            phai = trai + 1;
        }

        // 3. Tính Quái
        const thượngQuáiSố = trai % 8 === 0 ? 8 : trai % 8;
        const hạQuáiSố = phai % 8 === 0 ? 8 : phai % 8;
        const giờSố = getGioChi();

        // 4. Tìm hào động
        const sum = trai + phai + giờSố;
        const hàoĐộng = sum % 6 === 0 ? 6 : sum % 6;

        // 5. Tính mã nhị phân
        const codeThượng = batQuai[thượngQuáiSố].code;
        const codeHạ = batQuai[hạQuáiSố].code;
        const codeChu = codeThượng + codeHạ;

        // Tính code biến
        let codeBienArr = codeChu.split('');
        const idx = 6 - hàoĐộng; // Chuyển từ số hào sang index mảng
        codeBienArr[idx] = codeBienArr[idx] === '1' ? '0' : '1';
        const codeBien = codeBienArr.join('');

        // Hiển thị
        document.getElementById('resultPanel').style.display = 'block';
        document.getElementById('analysisText').innerHTML = `
            <b>Phân tích:</b><br>
            - Tổng thành tố: ${total} (${trai} Chủ / ${phai} Vị)<br>
            - Giờ lập: ${giờSố} (Chi hiện tại)<br>
            - Hào động: ${hàoĐộng} (Tổng: ${sum})
        `;

        document.getElementById('nameChu').innerText = data64Que[codeChu];
        document.getElementById('codeChu').innerText = `${batQuai[thượngQuáiSố].name}/${batQuai[hạQuáiSố].name}`;
        drawHex('visualChu', codeChu, hàoĐộng);

        document.getElementById('nameBien').innerText = data64Que[codeBien];
        document.getElementById('codeBien').innerText = "Hào " + hàoĐộng + " biến";
        drawHex('visualBien', codeBien);

        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>
</body>
</html>
