<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRUY XUẤT FILE 06 - CHUẨN LOGIC HƯỚNG DẪN</title>
    <style>
        :root { --p-color: #263238; --accent: #e65100; --bg: #f5f5f5; }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: var(--bg); }
        .main-container { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(---p-color); font-size: 22px; border-bottom: 3px solid var(--accent); padding-bottom: 10px; }
        
        .f-row { margin-bottom: 12px; }
        label { display: block; font-weight: bold; font-size: 18px; margin-bottom: 5px; color: #455a64; }
        input { 
            width: 100%; padding: 18px; border: 3px solid #cfd8dc; border-radius: 10px; 
            font-size: 22px; font-weight: bold; box-sizing: border-box; background: #fffde7; 
        }
        
        #res-box { 
            margin-top: 20px; padding: 15px; border: 4px solid var(---p-color); border-radius: 12px; 
            min-height: 250px; white-space: pre-wrap; background: #fafafa; 
            font-size: 22px; line-height: 1.6; font-weight: bold; color: #b71c1c;
        }

        .actions { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        button { 
            padding: 20px; font-size: 20px; font-weight: bold; border: none; 
            border-radius: 10px; color: #fff; text-transform: uppercase;
        }
        .b-run { background: var(---p-color); }
        .b-copy { background: #1565c0; }
    </style>
</head>
<body>

<div class="main-container">
    <h2>TRUY XUẤT 06 - CHUẨN XÁC</h2>
    
    <div class="f-row"><label>Form 1:</label><input type="text" id="v1" placeholder="VD: NGỰA ĐỎ Đ"></div>
    <div class="f-row"><label>Form 2:</label><input type="text" id="v2"></div>
    <div class="f-row"><label>Form 3:</label><input type="text" id="v3"></div>
    <div class="f-row"><label>Form 4:</label><input type="text" id="v4"></div>

    <div class="actions">
        <button class="b-run" onclick="solve06()">TÌM Ý NGHĨA</button>
        <button class="b-copy" onclick="copyResult()">SAO CHÉP KẾT QUẢ</button>
    </div>

    <div id="res-box"></div>
</div>

<script>
    // DÁN THƯ VIỆN ĐẦY ĐỦ VÀO ĐÂY
    const DATA_06 = `
PHẦN 1 : 4 LÁ CÙNG TRẠNG THÁI
4 TƯỚNG XANH :
Ý nghĩa 4 Tướng Xanh Đứng | Ý nghĩa 4 Tướng Xanh Ngược
4 NGỰA ĐỎ :
Ý nghĩa 4 Ngựa Đỏ Đứng | Ý nghĩa 4 Ngựa Đỏ Ngược

PHẦN 2 : 3 LÁ CÙNG 1 VỊ TRÍ + 1 LÁ KHÁC
4 TƯỚNG XANH :
Ý nghĩa 3 Đứng 1 Ngược | Ý nghĩa 3 Ngược 1 Đứng
4 NGỰA ĐỎ :
3 Ngựa Đỏ Đứng + 1 Ngược | 3 Ngựa Đỏ Ngược + 1 Đứng

PHẦN 3 : 3 LÁ CÙNG TRẠNG THÁI
3 TƯỚNG XANH :
3 Tướng Xanh Đứng | 3 Tướng Xanh Ngược

PHẦN 4 : 2 LÁ CÙNG 1 VỊ TRÍ + 1 LÁ KHÁC
3 TƯỚNG XANH :
2 Tướng Xanh Đứng + 1 Ngược | 2 Tướng Xanh Ngược + 1 Đứng

PHẦN 5 : 2 LÁ CÙNG TRẠNG THÁI
2 TƯỚNG XANH :
2 Tướng Xanh Đứng | 2 Tướng Xanh Ngược
    `;

    function findExact(targetPart, targetCard, isRight) {
        const lines = DATA_06.split('\n');
        let currentPart = "";
        let foundBlock = false;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim().toUpperCase();
            if (!line) continue;

            // 1. Xác định PHẦN (Phải khớp chính xác tên Phần)
            if (line.startsWith("PHẦN") && line.includes(targetPart.toUpperCase())) {
                currentPart = targetPart;
                continue;
            }
            // Nếu đụng PHẦN khác thì reset
            if (line.startsWith("PHẦN") && !line.includes(targetPart.toUpperCase())) {
                currentPart = "";
            }

            if (currentPart === targetPart) {
                // 2. Tìm đúng Tiêu đề lá bài (Phải chứa tên lá và kết thúc bằng dấu :)
                if (line.includes(targetCard.toUpperCase()) && line.endsWith(":")) {
                    // 3. CHỈ lấy dòng NGAY SAU tiêu đề
                    let contentLine = lines[i + 1] ? lines[i + 1].trim() : "";
                    if (contentLine && contentLine.includes("|")) {
                        let parts = contentLine.split("|");
                        return isRight ? parts[1].trim() : parts[0].trim();
                    } else if (contentLine && !contentLine.includes(":")) {
                        return contentLine;
                    }
                    return null;
                }
            }
        }
        return null;
    }

    function solve06() {
        let inputs = [
            document.getElementById('v1').value.trim(),
            document.getElementById('v2').value.trim(),
            document.getElementById('v3').value.trim(),
            document.getElementById('v4').value.trim()
        ].filter(x => x !== "");

        let groups = {};
        inputs.forEach(v => {
            let name = v.replace(/ Đ$/i, "").replace(/ N$/i, "").toUpperCase();
            if (!groups[name]) groups[name] = [];
            groups[name].push(v.toUpperCase());
        });

        let results = [];
        for (let name in groups) {
            let cluster = groups[name];
            let n = cluster.length;
            if (n < 2) continue;

            let countD = cluster.filter(c => c.endsWith(" Đ")).length;
            let countN = cluster.filter(c => c.endsWith(" N")).length;
            let finalData = "";

            // LOGIC PHÂN CHIA THEO HƯỚNG DẪN CỰC KỲ CHI TIẾT CỦA BẠN:
            if (n === 4) {
                if (countD === 4) finalData = findExact("PHẦN 1", name, false);
                else if (countN === 4) finalData = findExact("PHẦN 1", name, true);
                else if (countD === 3) finalData = findExact("PHẦN 2", name, false);
                else if (countN === 3) finalData = findExact("PHẦN 2", name, true);
            } 
            else if (n === 3) {
                if (countD === 3) finalData = findExact("PHẦN 3", name, false);
                else if (countN === 3) finalData = findExact("PHẦN 3", name, true);
                else if (countD === 2) finalData = findExact("PHẦN 4", name, false);
                else if (countN === 2) finalData = findExact("PHẦN 4", name, true);
            }
            else if (n === 2) {
                if (countD === 2) finalData = findExact("PHẦN 5", name, false);
                else if (countN === 2) finalData = findExact("PHẦN 5", name, true);
            }

            if (finalData) {
                results.push(`NHÓM ${n} LÁ ${name}:\n=> ${finalData}`);
            } else {
                results.push(`NHÓM ${n} LÁ ${name}:\n=> (Không tìm thấy dữ liệu chuẩn trong PHẦN tương ứng)`);
            }
        }
        document.getElementById('res-box').innerText = results.join("\n\n------------------\n\n");
    }

    function copyResult() {
        const text = document.getElementById('res-box').innerText;
        const el = document.createElement('textarea');
        el.value = text; document.body.appendChild(el);
        el.select(); document.execCommand('copy');
        document.body.removeChild(el); alert("Đã chép!");
    }
</script>

</body>
</html>
