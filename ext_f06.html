<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRUY XUẤT 06 - BẢN KỶ LUẬT SẮT</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #cfd8dc; }
        .box { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 18px; margin-bottom: 10px; border: 3px solid #90a4ae; border-radius: 10px; font-size: 24px; font-weight: bold; box-sizing: border-box; background: #fffde7; }
        #res { margin-top: 20px; padding: 15px; border: 5px solid #1a237e; border-radius: 12px; min-height: 250px; white-space: pre-wrap; background: #fafafa; font-size: 24px; line-height: 1.5; font-weight: bold; color: #b71c1c; }
        button { width: 100%; padding: 22px; font-size: 22px; font-weight: bold; border: none; border-radius: 12px; color: #fff; cursor: pointer; text-transform: uppercase; background: #1a237e; width: 100%; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center">TRUY XUẤT 06 - EXIT PHẦN 1</h2>
    <input type="text" id="i1" placeholder="Form 1">
    <input type="text" id="i2" placeholder="Form 2">
    <input type="text" id="i3" placeholder="Form 3">
    <input type="text" id="i4" placeholder="Form 4">
    <button onclick="lenh_chinh_xac()">TRUY XUẤT DATA</button>
    <div id="res"></div>
</div>

<script>
    // DÁN DỮ LIỆU CỦA BẠN VÀO ĐÂY
    const DATA_GOC = `
PHẦN 1 : 
4 TƯỚNG XANH : Text A (4 Đứng) | Text A (4 Ngược)
PHẦN 2 : 
4 TƯỚNG XANH : Text B (3-1 Trái) | Text B (3-1 Phải)
    `;

    function tim_trong_phan(soPhan, tenLa, layPhai) {
        const lines = DATA_GOC.split('\n');
        let dangOPhan = false;
        let head = tenLa.toUpperCase().trim();

        for (let i = 0; i < lines.length; i++) {
            let row = lines[i].trim().toUpperCase();
            if (!row) continue;

            // KHÓA CỨNG: Chỉ đọc trong PHẦN được chỉ định
            if (row.startsWith("PHẦN") && row.includes(soPhan.toString())) {
                dangOPhan = true; continue;
            }
            if (dangOPhan && row.startsWith("PHẦN") && !row.includes(soPhan.toString())) {
                dangOPhan = false;
            }

            if (dangOPhan) {
                if (row.includes(head) && row.includes(":")) {
                    let content = lines[i].split(":")[1] || "";
                    if (content.includes("|")) {
                        let parts = content.split("|");
                        return layPhai ? parts[1].trim() : parts[0].trim();
                    }
                }
            }
        }
        return null;
    }

    function lenh_chinh_xac() {
        let f = [
            document.getElementById('i1').value.trim(),
            document.getElementById('i2').value.trim(),
            document.getElementById('i3').value.trim(),
            document.getElementById('i4').value.trim()
        ].filter(x => x !== "");

        let groups = {};
        f.forEach(v => {
            let n = v.replace(/ [ĐN]$/i, "").toUpperCase().trim();
            if (!groups[n]) groups[n] = [];
            groups[n].push(v.toUpperCase());
        });

        let ketQua = [];
        for (let name in groups) {
            let list = groups[name];
            let tong = list.length;
            if (tong < 2) continue;

            let d = list.filter(x => x.endsWith(" Đ")).length;
            let n = list.filter(x => x.endsWith(" N")).length;
            let final = "";

            // --- QUY TẮC CỨNG: KIỂM TRA TỈ LỆ TRƯỚC ---

            // TRƯỜNG HỢP 4 LÁ CÙNG TÊN
            if (tong === 4) {
                if ((d === 3 && n === 1) || (n === 3 && d === 1)) {
                    // EXIT PHẦN 1 - NHẢY THẲNG PHẦN 2
                    final = tim_trong_phan(2, "4 " + name, n === 3);
                } 
                else if (d === 4 || n === 4) {
                    // CHỈ VÀO PHẦN 1 KHI ĐỦ 4 LÁ CÙNG CHIỀU
                    final = tim_trong_phan(1, "4 " + name, n === 4);
                }
            } 
            // TRƯỜNG HỢP 3 LÁ CÙNG TÊN
            else if (tong === 3) {
                if ((d === 2 && n === 1) || (n === 2 && d === 1)) {
                    // EXIT PHẦN 3 - NHẢY THẲNG PHẦN 4
                    final = tim_trong_phan(4, "3 " + name, n === 2);
                }
                else if (d === 3 || n === 3) {
                    final = tim_trong_phan(3, "3 " + name, n === 3);
                }
            }
            // TRƯỜNG HỢP 2 LÁ CÙNG TÊN
            else if (tong === 2) {
                if (d === 2 || n === 2) {
                    final = tim_trong_phan(5, "2 " + name, n === 2);
                }
            }

            ketQua.push(`BỘ ${tong} LÁ ${name}:\n=> ${final || "KHÔNG CÓ DỮ LIỆU"}`);
        }
        document.getElementById('res').innerText = ketQua.join("\n\n---\n\n");
    }
</script>
</body>
</html>
