<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRUY XUẤT 06 - BẢN FIX LỖI 3-1</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #cfd8dc; }
        .box { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 18px; margin-bottom: 10px; border: 3px solid #90a4ae; border-radius: 10px; font-size: 24px; font-weight: bold; box-sizing: border-box; background: #fffde7; }
        #res { margin-top: 20px; padding: 15px; border: 5px solid #1a237e; border-radius: 12px; min-height: 250px; white-space: pre-wrap; background: #fafafa; font-size: 24px; line-height: 1.5; font-weight: bold; color: #b71c1c; }
        button { width: 100%; padding: 22px; font-size: 22px; font-weight: bold; border: none; border-radius: 12px; color: #fff; cursor: pointer; text-transform: uppercase; background: #1a237e; width: 100%; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center">TRUY XUẤT 06 - PHÂN TÁCH 3-1</h2>
    <input type="text" id="v1" placeholder="Form 1">
    <input type="text" id="v2" placeholder="Form 2">
    <input type="text" id="v3" placeholder="Form 3">
    <input type="text" id="v4" placeholder="Form 4">
    <button onclick="thuc_thi_truy_xuat()">TÌM Ý NGHĨA</button>
    <div id="res"></div>
</div>

<script>
    // DÁN THƯ VIỆN CỦA BẠN VÀO ĐÂY
    const DATA_06 = `
PHẦN 1 : 
4 TƯỚNG ĐỎ : Ý nghĩa 4 Đứng | Ý nghĩa 4 Ngược
PHẦN 2 : 
4 TƯỚNG ĐỎ : Ý nghĩa 3 Đ đứng 1 N ngược | Ý nghĩa 3 N ngược 1 Đ đứng
PHẦN 3 : 
3 TƯỚNG ĐỎ : Ý nghĩa 3 Đứng | Ý nghĩa 3 Ngược
    `;

    function get_value(phanSo, tenLa, vếPhải) {
        const lines = DATA_06.split('\n');
        let dangTrongPhan = false;
        let timKiem = tenLa.toUpperCase().trim();

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim().toUpperCase();
            if (!line) continue;

            if (line.includes("PHẦN") && line.includes(phanSo.toString())) {
                dangTrongPhan = true; continue;
            }
            if (dangTrongPhan && line.startsWith("PHẦN") && !line.includes(phanSo.toString())) {
                dangTrongPhan = false;
            }

            if (dangTrongPhan) {
                if (line.includes(timKiem) && line.includes(":")) {
                    let noiDung = lines[i].split(":")[1] || "";
                    if (noiDung.includes("|")) {
                        let parts = noiDung.split("|");
                        return vếPhải ? parts[1].trim() : parts[0].trim();
                    }
                }
            }
        }
        return null;
    }

    function thuc_thi_truy_xuat() {
        let inputs = [
            document.getElementById('v1').value.trim(),
            document.getElementById('v2').value.trim(),
            document.getElementById('v3').value.trim(),
            document.getElementById('v4').value.trim()
        ].filter(x => x !== "");

        let groups = {};
        inputs.forEach(v => {
            let name = v.replace(/ [ĐN]$/i, "").toUpperCase().trim();
            if (!groups[name]) groups[name] = [];
            groups[name].push(v.toUpperCase());
        });

        let ketQua = [];
        for (let name in groups) {
            let list = groups[name];
            let tongLá = list.length;
            if (tongLá < 2) continue;

            let soD = list.filter(x => x.endsWith(" Đ")).length;
            let soN = list.filter(x => x.endsWith(" N")).length;
            let result = "";

            // --- ĐIỀU HƯỚNG THEO TỈ LỆ ---
            
            if (tongLá === 4) {
                // Tình huống 4-0 (Cùng chiều) -> PHẦN 1
                if (soD === 4) result = get_value(1, "4 " + name, false);
                else if (soN === 4) result = get_value(1, "4 " + name, true);
                
                // Tình huống 3-1 (Lệch chiều) -> PHẦN 2
                else if (soD === 3) result = get_value(2, "4 " + name, false); // 3Đ-1N lấy vế Trái
                else if (soN === 3) result = get_value(2, "4 " + name, true);  // 3N-1Đ lấy vế Phải
            } 
            else if (tongLá === 3) {
                // Tình huống 3-0 -> PHẦN 3
                if (soD === 3) result = get_value(3, "3 " + name, false);
                else if (soN === 3) result = get_value(3, "3 " + name, true);
                
                // Tình huống 2-1 -> PHẦN 4
                else if (soD === 2) result = get_value(4, "3 " + name, false);
                else if (soN === 2) result = get_value(4, "3 " + name, true);
            }
            else if (tongLá === 2) {
                // Tình huống 2-0 -> PHẦN 5
                if (soD === 2) result = get_value(5, "2 " + name, false);
                else if (soN === 2) result = get_value(5, "2 " + name, true);
            }

            ketQua.push(`NHÓM ${tongLá} LÁ ${name}:\n=> ${result || "KHÔNG TÌM THẤY DỮ LIỆU"}`);
        }
        document.getElementById('res').innerText = ketQua.join("\n\n---\n\n");
    }
</script>
</body>
</html>
