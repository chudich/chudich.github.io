<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRUY XUẤT 06 - FIX LỖI NHẢY PHẦN</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #cfd8dc; }
        .container { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 18px; margin-bottom: 10px; border: 3px solid #90a4ae; border-radius: 10px; font-size: 24px; font-weight: bold; box-sizing: border-box; background: #fffde7; }
        #output { margin-top: 20px; padding: 15px; border: 5px solid #1a237e; border-radius: 12px; min-height: 250px; white-space: pre-wrap; background: #fafafa; font-size: 24px; line-height: 1.5; font-weight: bold; color: #b71c1c; }
        button { width: 100%; padding: 22px; font-size: 22px; font-weight: bold; border: none; border-radius: 12px; color: #fff; cursor: pointer; text-transform: uppercase; background: #1a237e; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center">TRUY XUẤT 06 - CÁCH LY LOGIC</h2>
    <input type="text" id="f1" placeholder="Lá 1">
    <input type="text" id="f2" placeholder="Lá 2">
    <input type="text" id="f3" placeholder="Lá 3">
    <input type="text" id="f4" placeholder="Lá 4">
    <button onclick="bat_dau_truy_xuat()">TÌM Ý NGHĨA</button>
    <div id="output"></div>
</div>

<script>
    // DÁN THƯ VIỆN CỦA BẠN VÀO ĐÂY
    const THU_VIEN_DATA = `
PHẦN 1 : 4 LÁ CÙNG Đ/N
4 TƯỚNG XANH : Ý nghĩa 4 Đứng (Text A) | Ý nghĩa 4 Ngược

PHẦN 2 : 4 LÁ (3-1 HOẶC 1-3)
4 TƯỚNG XANH : Ý nghĩa 3 Đ đứng 1 N ngược (Text B) | Ý nghĩa 3 N ngược 1 Đ đứng
    `;

    function quet_thu_vien(soPhanTarget, tenLaTim, layVePhai) {
        const lines = THU_VIEN_DATA.split('\n');
        let dangTrongPhan = false;
        let headerLa = tenLaTim.toUpperCase().trim();

        for (let i = 0; i < lines.length; i++) {
            let row = lines[i].trim().toUpperCase();
            if (!row) continue;

            // 1. CHỈ ĐỊNH PHẦN CỨNG (ÉP MÁY VÀO ĐÚNG KHU VỰC)
            if (row.startsWith("PHẦN") && row.includes(soPhanTarget.toString())) {
                dangTrongPhan = true; 
                continue;
            }
            // Nếu gặp PHẦN tiếp theo thì thoát ngay
            if (dangTrongPhan && row.startsWith("PHẦN") && !row.includes(soPhanTarget.toString())) {
                dangTrongPhan = false;
            }

            if (dangTrongPhan) {
                // 2. TÌM DÒNG CÓ TÊN LÁ TRONG PHẠM VI ĐÃ KHÓA
                if (row.includes(headerLa) && row.includes(":")) {
                    let noiDung = lines[i].split(":")[1] || "";
                    if (noiDung.includes("|")) {
                        let parts = noiDung.split("|");
                        return layVePhai ? parts[1].trim() : parts[0].trim();
                    }
                }
            }
        }
        return null;
    }

    function bat_dau_truy_xuat() {
        let vals = [
            document.getElementById('f1').value.trim(),
            document.getElementById('f2').value.trim(),
            document.getElementById('f3').value.trim(),
            document.getElementById('f4').value.trim()
        ].filter(x => x !== "");

        let groups = {};
        vals.forEach(v => {
            let n = v.replace(/ [ĐN]$/i, "").toUpperCase().trim();
            if (!groups[n]) groups[n] = [];
            groups[n].push(v.toUpperCase());
        });

        let ketQuaCuoi = [];
        for (let name in groups) {
            let list = groups[name];
            let tong = list.length;
            if (tong < 2) continue;

            let soD = list.filter(x => x.endsWith(" Đ")).length;
            let soN = list.filter(x => x.endsWith(" N")).length;
            let finalOutput = "";

            // --- QUY TẮC CỬA SẬP: TÁCH BIỆT 4 LÁ ---
            if (tong === 4) {
                if (soD === 3 && soN === 1) {
                    // TRƯỜNG HỢP 3-1: ÉP VÀO PHẦN 2, VẾ TRÁI
                    finalOutput = quet_thu_vien(2, "4 " + name, false);
                } 
                else if (soN === 3 && soD === 1) {
                    // TRƯỜNG HỢP 1-3: ÉP VÀO PHẦN 2, VẾ PHẢI
                    finalOutput = quet_thu_vien(2, "4 " + name, true);
                }
                else if (soD === 4) {
                    // TRƯỜNG HỢP 4-0 ĐỨNG: ÉP VÀO PHẦN 1, VẾ TRÁI
                    finalOutput = quet_thu_vien(1, "4 " + name, false);
                }
                else if (soN === 4) {
                    // TRƯỜNG HỢP 4-0 NGƯỢC: ÉP VÀO PHẦN 1, VẾ PHẢI
                    finalOutput = quet_thu_vien(1, "4 " + name, true);
                }
            } 
            // --- TÁCH BIỆT 3 LÁ ---
            else if (tong === 3) {
                if (soD === 2 && soN === 1) {
                    finalOutput = quet_thu_vien(4, "3 " + name, false);
                }
                else if (soN === 2 && soD === 1) {
                    finalOutput = quet_thu_vien(4, "3 " + name, true);
                }
                else if (soD === 3) {
                    finalOutput = quet_thu_vien(3, "3 " + name, false);
                }
                else if (soN === 3) {
                    finalOutput = quet_thu_vien(3, "3 " + name, true);
                }
            }
            // --- TÁCH BIỆT 2 LÁ ---
            else if (tong === 2) {
                if (soD === 2) finalOutput = quet_thu_vien(5, "2 " + name, false);
                else if (soN === 2) finalOutput = quet_thu_vien(5, "2 " + name, true);
            }

            ketQuaCuoi.push(`NHÓM ${tong} LÁ ${name}:\n=> ${finalOutput || "KHÔNG TÌM THẤY DỮ LIỆU"}`);
        }
        document.getElementById('output').innerText = ketQuaCuoi.join("\n\n---\n\n");
    }
</script>
</body>
</html>
