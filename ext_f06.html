<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRUY XUẤT 06 - KHÓA TỈ LỆ 3-1</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #cfd8dc; }
        .box { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 18px; margin-bottom: 10px; border: 3px solid #90a4ae; border-radius: 10px; font-size: 24px; font-weight: bold; box-sizing: border-box; background: #fffde7; }
        #res { margin-top: 20px; padding: 15px; border: 5px solid #1a237e; border-radius: 12px; min-height: 250px; white-space: pre-wrap; background: #fafafa; font-size: 24px; line-height: 1.5; font-weight: bold; color: #b71c1c; }
        button { width: 100%; padding: 22px; font-size: 22px; font-weight: bold; border: none; border-radius: 12px; color: #fff; cursor: pointer; text-transform: uppercase; background: #1a237e; width: 100%; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center">TRUY XUẤT 06 - FIX 3-1 TUYỆT ĐỐI</h2>
    <input type="text" id="v1" placeholder="Form 1">
    <input type="text" id="v2" placeholder="Form 2">
    <input type="text" id="v3" placeholder="Form 3">
    <input type="text" id="v4" placeholder="Form 4">
    <button onclick="lenh_truy_xuat()">TÌM Ý NGHĨA</button>
    <div id="res"></div>
</div>

<script>
    // DÁN THƯ VIỆN CỦA BẠN VÀO ĐÂY
    const THU_VIEN = `
PHẦN 1 : 
4 TƯỚNG XANH : Ý nghĩa 4 Đứng (Text A) | Ý nghĩa 4 Ngược
PHẦN 2 : 
4 TƯỚNG XANH : Ý nghĩa 3 Đứng 1 Ngược (Text B) | Ý nghĩa 3 Ngược 1 Đứng
    `;

    function lay_data_goc(soPhan, tenLa, benPhai) {
        const lines = THU_VIEN.split('\n');
        let trongPhan = false;
        let key = tenLa.toUpperCase().trim();

        for (let i = 0; i < lines.length; i++) {
            let row = lines[i].trim().toUpperCase();
            if (!row) continue;

            if (row.includes("PHẦN") && row.includes(soPhan.toString())) {
                trongPhan = true; continue;
            }
            if (trongPhan && row.startsWith("PHẦN") && !row.includes(soPhan.toString())) {
                trongPhan = false;
            }

            if (trongPhan) {
                if (row.includes(key) && row.includes(":")) {
                    let content = lines[i].split(":")[1] || "";
                    if (content.includes("|")) {
                        let parts = content.split("|");
                        return benPhai ? parts[1].trim() : parts[0].trim();
                    }
                }
            }
        }
        return null;
    }

    function lenh_truy_xuat() {
        let inputs = [
            document.getElementById('v1').value.trim(),
            document.getElementById('v2').value.trim(),
            document.getElementById('v3').value.trim(),
            document.getElementById('v4').value.trim()
        ].filter(x => x !== "");

        let map = {};
        inputs.forEach(v => {
            let name = v.replace(/ [ĐN]$/i, "").toUpperCase().trim();
            if (!map[name]) map[name] = [];
            map[name].push(v.toUpperCase());
        });

        let ketQuaLog = [];
        for (let name in map) {
            let cluster = map[name];
            let n = cluster.length;
            if (n < 2) continue;

            let soD = cluster.filter(x => x.endsWith(" Đ")).length;
            let soN = cluster.filter(x => x.endsWith(" N")).length;
            let finalVal = "";

            // --- BỘ QUY TẮC MỚI: ƯU TIÊN TỈ LỆ LỆCH (3-1) TRƯỚC ---

            if (n === 4) {
                // KIỂM TRA TÌNH HUỐNG LỆCH (PHẦN 2) TRƯỚC TIÊN
                if (soD === 3 && soN === 1) {
                    finalVal = lay_data_goc(2, "4 " + name, false); // Nhảy lập tức sang PHẦN 2 Trái
                } 
                else if (soN === 3 && soD === 1) {
                    finalVal = lay_data_goc(2, "4 " + name, true);  // Nhảy lập tức sang PHẦN 2 Phải
                }
                // NẾU KHÔNG LỆCH MỚI XÉT ĐẾN CÙNG CHIỀU (PHẦN 1)
                else if (soD === 4) {
                    finalVal = lay_data_goc(1, "4 " + name, false);
                } 
                else if (soN === 4) {
                    finalVal = lay_data_goc(1, "4 " + name, true);
                }
            } 
            else if (n === 3) {
                // TƯƠNG TỰ CHO BỘ 3 LÁ (2-1 PHẢI LÀ PHẦN 4)
                if (soD === 2 && soN === 1) {
                    finalVal = lay_data_goc(4, "3 " + name, false);
                }
                else if (soN === 2 && soD === 1) {
                    finalVal = lay_data_goc(4, "3 " + name, true);
                }
                else if (soD === 3) {
                    finalVal = lay_data_goc(3, "3 " + name, false);
                }
                else if (soN === 3) {
                    finalVal = lay_data_goc(3, "3 " + name, true);
                }
            }
            else if (n === 2) {
                if (soD === 2) finalVal = lay_data_goc(5, "2 " + name, false);
                else if (soN === 2) finalVal = lay_data_goc(5, "2 " + name, true);
            }

            ketQuaLog.push(`NHÓM ${n} LÁ ${name}:\n=> ${finalVal || "KHÔNG CÓ DỮ LIỆU"}`);
        }
        document.getElementById('res').innerText = ketQuaLog.join("\n\n---\n\n");
    }
</script>
</body>
</html>
