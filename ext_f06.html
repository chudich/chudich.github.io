<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRÍCH XUẤT 06 - CHUẨN CUỐI</title>
    <style>
        :root { --mau-chinh: #2c3e50; --mau-phu: #d32f2f; --nen-nhap: #fffde7; }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #eceff1; }
        .box-chinh { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        h2 { text-align: center; color: var(--mau-chinh); font-size: 22px; border-bottom: 3px solid #ff8f00; padding-bottom: 10px; margin-top: 0; }
        
        .o-nhap { margin-bottom: 12px; }
        label { display: block; font-weight: bold; font-size: 18px; margin-bottom: 5px; color: #455a64; }
        input { 
            width: 100%; padding: 18px; border: 3px solid #cfd8dc; border-radius: 10px; 
            font-size: 22px; font-weight: bold; box-sizing: border-box; background: var(--nen-nhap); 
        }
        
        #khung-ket-qua { 
            margin-top: 20px; padding: 15px; border: 5px solid var(--mau-chinh); border-radius: 12px; 
            min-height: 250px; white-space: pre-wrap; background: #fff; 
            font-size: 22px; line-height: 1.6; font-weight: bold; color: var(--mau-phu);
        }

        .nhom-nut { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        button { 
            padding: 22px; font-size: 22px; font-weight: bold; border: none; 
            border-radius: 12px; color: #fff; text-transform: uppercase; cursor: pointer;
        }
        .nut-tim { background: var(--mau-chinh); box-shadow: 0 4px #1a252f; }
        .nut-copy { background: #1976d2; box-shadow: 0 4px #0d47a1; }
        button:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

<div class="box-chinh">
    <h2>TRUY XUẤT 06 - BẢN FIX NÚT</h2>
    
    <div class="o-nhap"><label>Lá 1:</label><input type="text" id="v1" placeholder="VD: NGỰA ĐỎ Đ"></div>
    <div class="o-nhap"><label>Lá 2:</label><input type="text" id="v2"></div>
    <div class="o-nhap"><label>Lá 3:</label><input type="text" id="v3"></div>
    <div class="o-nhap"><label>Lá 4:</label><input type="text" id="v4"></div>

    <div class="nhom-nut">
        <button class="nut-tim" onclick="chay_truy_van()">TÌM Ý NGHĨA</button>
        <button class="nut-copy" onclick="copy_kq()">SAO CHÉP KẾT QUẢ</button>
    </div>

    <div id="khung-ket-qua"></div>
</div>

<script>
    // DÁN THƯ VIỆN FILE 06 VÀO ĐÂY
    const THU_VIEN_06 = `
PHẦN 1 : 4 LÁ CÙNG TRẠNG THÁI
4 TƯỚNG XANH :
Ý nghĩa 4 Tướng Xanh Đứng | Ý nghĩa 4 Tướng Xanh Ngược
4 NGỰA ĐỎ :
Công danh rạng rỡ, gặp thời đổi vận | Tiền bạc dư dả, gia đạo bình an
4 CHỐT XANH :
Tin vui cất nhắc | Hôn nhân thuận lợi

PHẦN 2 : 3 LÁ CÙNG 1 VỊ TRÍ + 1 LÁ KHÁC
4 NGỰA ĐỎ :
3 Ngựa Đỏ Đứng + 1 Ngược | 3 Ngựa Đỏ Ngược + 1 Đứng
    `;

    function lay_du_lieu_chuan(ten_phan, ten_la, la_ben_phai) {
        const dong = THU_VIEN_06.split('\n');
        let dang_trong_phan = false;
        let tim_thay_la = false;

        for (let i = 0; i < dong.length; i++) {
            let nd = dong[i].trim().toUpperCase();
            if (!nd) continue;

            // Kiểm tra xem có đang ở đúng PHẦN không
            if (nd.startsWith("PHẦN") && nd.includes(ten_phan.toUpperCase())) {
                dang_trong_phan = true;
                continue;
            }
            if (dang_trong_phan && nd.startsWith("PHẦN") && !nd.includes(ten_phan.toUpperCase())) {
                dang_trong_phan = false;
            }

            if (dang_trong_phan) {
                // Tìm dòng tiêu đề lá bài (ví dụ "4 NGỰA ĐỎ :")
                if (nd.includes(ten_la.toUpperCase()) && nd.endsWith(":")) {
                    // Lấy dòng dữ liệu ngay phía dưới
                    let dong_du_lieu = dong[i + 1] ? dong[i + 1].trim() : "";
                    if (dong_du_lieu && dong_du_lieu.includes("|")) {
                        let hai_ve = dong_du_lieu.split("|");
                        return la_ben_phai ? hai_ve[1].trim() : hai_ve[0].trim();
                    } else if (dong_du_lieu && !dong_du_lieu.includes(":")) {
                        return dong_du_lieu;
                    }
                    return null;
                }
            }
        }
        return null;
    }

    function chay_truy_van() {
        let n1 = document.getElementById('v1').value.trim();
        let n2 = document.getElementById('v2').value.trim();
        let n3 = document.getElementById('v3').value.trim();
        let n4 = document.getElementById('v4').value.trim();
        
        let ds = [n1, n2, n3, n4].filter(x => x !== "");
        let nhom = {};
        
        ds.forEach(v => {
            let ten = v.replace(/ Đ$/i, "").replace(/ N$/i, "").toUpperCase();
            if (!nhom[ten]) nhom[ten] = [];
            nhom[ten].push(v.toUpperCase());
        });

        let kq_cuoi = [];
        for (let ten_la in nhom) {
            let cluster = nhom[ten_la];
            let sl = cluster.length;
            if (sl < 2) continue;

            let soD = cluster.filter(c => c.endsWith(" Đ")).length;
            let soN = cluster.filter(c => c.endsWith(" N")).length;
            let ket_qua_chu = "";

            if (sl === 4) {
                if (soD === 4) ket_qua_chu = lay_du_lieu_chuan("PHẦN 1", ten_la, false);
                else if (soN === 4) ket_qua_chu = lay_du_lieu_chuan("PHẦN 1", ten_la, true);
                else if (soD === 3) ket_qua_chu = lay_du_lieu_chuan("PHẦN 2", ten_la, false);
                else if (soN === 3) ket_qua_chu = lay_du_lieu_chuan("PHẦN 2", ten_la, true);
            } else if (sl === 3) {
                if (soD === 3) ket_qua_chu = lay_du_lieu_chuan("PHẦN 3", ten_la, false);
                else if (soN === 3) ket_qua_chu = lay_du_lieu_chuan("PHẦN 3", ten_la, true);
                else if (soD === 2) ket_qua_chu = lay_du_lieu_chuan("PHẦN 4", ten_la, false);
                else if (soN === 2) ket_qua_chu = lay_du_lieu_chuan("PHẦN 4", ten_la, true);
            } else if (sl === 2) {
                if (soD === 2) ket_qua_chu = lay_du_lieu_chuan("PHẦN 5", ten_la, false);
                else if (soN === 2) ket_qua_chu = lay_du_lieu_chuan("PHẦN 5", ten_la, true);
            }

            if (ket_qua_chu) {
                kq_cuoi.push(`BỘ ${sl} LÁ ${ten_la}:\n=> ${ket_qua_chu}`);
            } else {
                kq_cuoi.push(`BỘ ${sl} LÁ ${ten_la}:\n=> (Chưa có dữ liệu phối hợp trong PHẦN tương ứng)`);
            }
        }
        document.getElementById('khung-ket-qua').innerText = kq_cuoi.join("\n\n------------------\n\n");
    }

    function copy_kq() {
        const text = document.getElementById('khung-ket-qua').innerText;
        if (!text) return;
        const tmp = document.createElement('textarea');
        tmp.value = text; document.body.appendChild(tmp);
        tmp.select(); document.execCommand('copy');
        document.body.removeChild(tmp); alert("Đã copy kết quả!");
    }
</script>
</body>
</html>
