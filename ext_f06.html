<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRUY XUẤT 06 - CHUẨN TỈ LỆ 3-1</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #cfd8dc; }
        .box { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 18px; margin-bottom: 10px; border: 3px solid #90a4ae; border-radius: 10px; font-size: 24px; font-weight: bold; box-sizing: border-box; background: #fffde7; }
        #res { margin-top: 20px; padding: 15px; border: 5px solid #1a237e; border-radius: 12px; min-height: 250px; white-space: pre-wrap; background: #fafafa; font-size: 24px; line-height: 1.5; font-weight: bold; color: #b71c1c; }
        button { width: 100%; padding: 22px; font-size: 22px; font-weight: bold; border: none; border-radius: 12px; color: #fff; cursor: pointer; text-transform: uppercase; background: #1a237e; width: 100%; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center">TRUY XUẤT 06 - BẢN KHÓA TỈ LỆ</h2>
    <input type="text" id="v1" placeholder="Lá 1">
    <input type="text" id="v2" placeholder="Lá 2">
    <input type="text" id="v3" placeholder="Lá 3">
    <input type="text" id="v4" placeholder="Lá 4">
    <button onclick="chay_truy_xuat()">TÌM Ý NGHĨA</button>
    <div id="res"></div>
</div>

<script>
    // DÁN THƯ VIỆN CỦA BẠN VÀO ĐÂY (PHẢI CÓ DẤU : VÀ |)
    const DATA_SOURCE = `
PHẦN 1 : 
4 TƯỚNG ĐỎ : Ý nghĩa 4 Đứng | Ý nghĩa 4 Ngược
PHẦN 2 : 
4 TƯỚNG ĐỎ : Ý nghĩa 3 Đ đứng 1 N ngược | Ý nghĩa 3 N ngược 1 Đ đứng
PHẦN 3 : 
3 TƯỚNG ĐỎ : Ý nghĩa 3 Đ đứng | Ý nghĩa 3 N ngược
PHẦN 4 : 
3 TƯỚNG ĐỎ : Ý nghĩa 2 Đ đứng 1 N ngược | Ý nghĩa 2 N ngược 1 Đ đứng
PHẦN 5 : 
2 TƯỚNG ĐỎ : Ý nghĩa 2 Đ đứng | Ý nghĩa 2 N ngược
    `;

    function find_in_db(targetPart, cardLabel, isN) {
        const lines = DATA_SOURCE.split('\n');
        let active = false;
        let key = cardLabel.toUpperCase().trim();

        for (let i = 0; i < lines.length; i++) {
            let row = lines[i].trim().toUpperCase();
            if (!row) continue;

            // Khóa đúng PHẦN
            if (row.includes("PHẦN") && row.includes(targetPart.toString())) {
                active = true; continue;
            }
            if (active && row.startsWith("PHẦN") && !row.includes(targetPart.toString())) {
                active = false;
            }

            if (active) {
                // Khớp đúng tên lá (VD: 4 TƯỚNG ĐỎ)
                if (row.includes(key) && row.includes(":")) {
                    let content = lines[i].split(":")[1] || "";
                    if (content.includes("|")) {
                        let parts = content.split("|");
                        return isN ? parts[1].trim() : parts[0].trim();
                    }
                }
            }
        }
        return null;
    }

    function chay_truy_xuat() {
        let inputs = [
            document.getElementById('v1').value.trim(),
            document.getElementById('v2').value.trim(),
            document.getElementById('v3').value.trim(),
            document.getElementById('v4').value.trim()
        ].filter(x => x !== "");

        let groups = {};
        inputs.forEach(v => {
            let name = v.replace(/ [ĐN]$/i, "").toUpperCase().trim();
            if (!groups[name]) groups[name] = [];
            groups[name].push(v.toUpperCase());
        });

        let ketQua = [];
        for (let name in groups) {
            let list = groups[name];
            let total = list.length;
            if (total < 2) continue;

            let d = list.filter(x => x.endsWith(" Đ")).length;
            let n = list.filter(x => x.endsWith(" N")).length;
            let val = "";

            // --- ĐIỀU HƯỚNG CỨNG (SỬA ĐÚNG LỖI 3-1) ---

            if (total === 4) {
                // TRƯỜNG HỢP 4 LÁ CÙNG TÊN
                if (d === 4) {
                    val = find_in_db(1, "4 " + name, false); // PHẦN 1 - Vế Trái
                } else if (n === 4) {
                    val = find_in_db(1, "4 " + name, true);  // PHẦN 1 - Vế Phải
                } else if (d === 3) {
                    val = find_in_db(2, "4 " + name, false); // PHẦN 2 - Vế Trái (3Đ-1N)
                } else if (n === 3) {
                    val = find_in_db(2, "4 " + name, true);  // PHẦN 2 - Vế Phải (3N-1Đ)
                }
            } 
            else if (total === 3) {
                // TRƯỜNG HỢP 3 LÁ CÙNG TÊN
                if (d === 3) {
                    val = find_in_db(3, "3 " + name, false); // PHẦN 3 - Vế Trái
                } else if (n === 3) {
                    val = find_in_db(3, "3 " + name, true);  // PHẦN 3 - Vế Phải
                } else if (d === 2) {
                    val = find_in_db(4, "3 " + name, false); // PHẦN 4 - Vế Trái (2Đ-1N)
                } else if (n === 2) {
                    val = find_in_db(4, "3 " + name, true);  // PHẦN 4 - Vế Phải (2N-1Đ)
                }
            }
            else if (total === 2) {
                // TRƯỜNG HỢP 2 LÁ CÙNG TÊN
                if (d === 2) {
                    val = find_in_db(5, "2 " + name, false); // PHẦN 5 - Vế Trái
                } else if (n === 2) {
                    val = find_in_db(5, "2 " + name, true);  // PHẦN 5 - Vế Phải
                }
            }

            ketQua.push(`NHÓM ${total} LÁ ${name}:\n=> ${val || "LỖI: KHÔNG CÓ DATA"}`);
        }
        document.getElementById('res').innerText = ketQua.join("\n\n---\n\n");
    }
</script>
</body>
</html>
