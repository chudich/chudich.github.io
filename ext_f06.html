<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRÍCH XUẤT 06 - BẢN SỬA LỖI CHÍNH XÁC</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #eceff1; }
        .container { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        h2 { text-align: center; color: #37474f; font-size: 22px; border-bottom: 2px solid #ff8f00; padding-bottom: 10px; }
        input { width: 100%; padding: 18px; margin-bottom: 12px; border: 3px solid #cfd8dc; border-radius: 10px; font-size: 22px; font-weight: bold; box-sizing: border-box; background: #fffde7; }
        #result { margin-top: 20px; padding: 15px; border: 4px solid #37474f; border-radius: 12px; min-height: 250px; white-space: pre-wrap; font-size: 21px; line-height: 1.6; font-weight: bold; color: #1a237e; background: #fafafa; }
        .btns { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        button { padding: 20px; font-size: 20px; font-weight: bold; border: none; border-radius: 10px; color: #fff; text-transform: uppercase; }
        .b-exe { background: #37474f; }
        .b-copy { background: #1976d2; }
    </style>
</head>
<body>

<div class="container">
    <h2>TRUY XUẤT FILE 06 - CHUẨN XÁC</h2>
    <input type="text" id="t1" placeholder="Form 1">
    <input type="text" id="t2" placeholder="Form 2">
    <input type="text" id="t3" placeholder="Form 3">
    <input type="text" id="t4" placeholder="Form 4">
    <div class="btns">
        <button class="b-exe" onclick="process06()">TÌM Ý NGHĨA</button>
        <button class="b-copy" onclick="copyResult()">SAO CHÉP</button>
    </div>
    <div id="result"></div>
</div>

<script>
    const DATA_06 = `
PHẦN 1 : 4 LÁ CÙNG TRẠNG THÁI
4 TƯỚNG XANH :
Ý nghĩa 4 Tướng Xanh Đứng | Ý nghĩa 4 Tướng Xanh Ngược
4 NGỰA ĐỎ :
Tin vui về công danh | Sự nghiệp gặp quý nhân
4 CHỐT XANH :
4 Chốt Xanh Đứng | 4 Chốt Xanh Ngược
    `;

    function findData06(partLabel, cardName, isRight) {
        const lines = DATA_06.split('\n');
        let inPart = false;
        let targetHeader = cardName.toUpperCase().trim();

        for (let i = 0; i < lines.length; i++) {
            let row = lines[i].trim().toUpperCase();
            
            // 1. Xác định đang ở đúng PHẦN
            if (row.includes(partLabel.toUpperCase())) { inPart = true; continue; }
            if (inPart && row.startsWith("PHẦN")) { inPart = false; }

            if (inPart) {
                // 2. Tìm dòng tiêu đề lá bài (Ví dụ: "4 NGỰA ĐỎ :")
                // Phải chứa đúng tên lá bài và có dấu hai chấm
                if (row.includes(targetHeader) && row.includes(":")) {
                    // 3. Lấy dòng dữ liệu NGAY SAU dòng tiêu đề
                    let dataLine = lines[i+1] ? lines[i+1].trim() : "";
                    
                    if (dataLine.includes("|")) {
                        let parts = dataLine.split("|");
                        return isRight ? parts[1].trim() : parts[0].trim();
                    } else if (dataLine !== "" && !dataLine.includes(":")) {
                        // Trường hợp dòng dữ liệu không có dấu |
                        return dataLine;
                    }
                }
            }
        }
        return null;
    }

    function process06() {
        let inputs = [
            document.getElementById('t1').value.trim(),
            document.getElementById('t2').value.trim(),
            document.getElementById('t3').value.trim(),
            document.getElementById('t4').value.trim()
        ].filter(x => x !== "");

        let groups = {};
        inputs.forEach(val => {
            let name = val.replace(/ Đ$/i, "").replace(/ N$/i, "").toUpperCase();
            if (!groups[name]) groups[name] = [];
            groups[name].push(val.toUpperCase());
        });

        let finalArr = [];
        for (let name in groups) {
            let cluster = groups[name];
            let count = cluster.length;
            if (count < 2) continue;

            let d = cluster.filter(c => c.endsWith(" Đ")).length;
            let n = cluster.filter(c => c.endsWith(" N")).length;
            let res = "";

            // Áp dụng logic đếm số lượng để chọn Phần và Trái/Phải
            if (count === 4) {
                if (d === 4) res = findData06("PHẦN 1", name, false);
                else if (n === 4) res = findData06("PHẦN 1", name, true);
                else if (d === 3) res = findData06("PHẦN 2", name, false);
                else if (n === 3) res = findData06("PHẦN 2", name, true);
            } else if (count === 3) {
                if (d === 3) res = findData06("PHẦN 3", name, false);
                else if (n === 3) res = findData06("PHẦN 3", name, true);
                else if (d === 2) res = findData06("PHẦN 4", name, false);
                else if (n === 2) res = findData06("PHẦN 4", name, true);
            } else if (count === 2) {
                if (d === 2) res = findData06("PHẦN 5", name, false);
                else if (n === 2) res = findData06("PHẦN 5", name, true);
            }

            if (res) {
                finalArr.push(`NHÓM ${count} LÁ ${name}:\n=> ${res}`);
            } else {
                finalArr.push(`NHÓM ${count} LÁ ${name}:\n=> (Không tìm thấy dòng dữ liệu ngay sau tiêu đề)`);
            }
        }
        document.getElementById('result').innerText = finalArr.length > 0 ? finalArr.join("\n\n---\n\n") : "Không có bộ bài nào.";
    }

    function copyResult() {
        const text = document.getElementById('result').innerText;
        const el = document.createElement('textarea');
        el.value = text; document.body.appendChild(el);
        el.select(); document.execCommand('copy');
        document.body.removeChild(el); alert("Đã chép!");
    }
</script>
</body>
</html>
