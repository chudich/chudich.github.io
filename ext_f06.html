<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRUY XUẤT 06 - BẢN KỶ LUẬT THÉP</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #cfd8dc; }
        .wrapper { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #1a237e; font-size: 22px; border-bottom: 4px solid #ff8f00; padding-bottom: 10px; }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #455a64; }
        input { width: 100%; padding: 18px; border: 3px solid #90a4ae; border-radius: 10px; font-size: 24px; font-weight: bold; box-sizing: border-box; background: #fffde7; }
        #output-screen { margin-top: 20px; padding: 15px; border: 5px solid #1a237e; border-radius: 12px; min-height: 250px; white-space: pre-wrap; background: #fafafa; font-size: 24px; line-height: 1.5; font-weight: bold; color: #b71c1c; }
        .btn-box { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        button { padding: 22px; font-size: 22px; font-weight: bold; border: none; border-radius: 12px; color: #fff; cursor: pointer; text-transform: uppercase; }
        .btn-exe { background: #1a237e; }
        .btn-copy { background: #1565c0; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>TRUY XUẤT 06 - CHUẨN 100%</h2>
    <div class="input-group"><label>Lá 1</label><input type="text" id="m1"></div>
    <div class="input-group"><label>Lá 2</label><input type="text" id="m2"></div>
    <div class="input-group"><label>Lá 3</label><input type="text" id="m3"></div>
    <div class="input-group"><label>Lá 4</label><input type="text" id="m4"></div>
    
    <div class="btn-box">
        <button class="btn-exe" onclick="thuc_thi()">TÌM Ý NGHĨA</button>
        <button class="btn-copy" onclick="copy_text()">SAO CHÉP</button>
    </div>
    <div id="output-screen"></div>
</div>

<script>
    // THƯ VIỆN DỮ LIỆU FILE 06 - DÁN TOÀN BỘ VÀO ĐÂY
    const THU_VIEN = `
PHẦN 1 : 4 LÁ CÙNG VỊ TRÍ
4 NGỰA ĐỎ :
Dữ liệu Ngựa Đỏ Đứng | Dữ liệu Ngựa Đỏ Ngược
4 CHỐT XANH :
Dữ liệu Chốt Xanh Đứng | Dữ liệu Chốt Xanh Ngược

PHẦN 2 : 4 LÁ (3 ĐỨNG 1 NGƯỢC HOẶC 3 NGƯỢC 1 ĐỨNG)
4 NGỰA ĐỎ :
3 Đứng 1 Ngược | 3 Ngược 1 Đứng
    `;

    function lay_du_lieu_goc(ten_phan, tieu_de_la, lay_ve_phai) {
        const lines = THU_VIEN.split('\n');
        let dang_trong_phan = false;
        
        // Chuẩn hóa tiêu đề cần tìm: Ví dụ "4 NGỰA ĐỎ :"
        const find_header = tieu_de_la.toUpperCase().trim() + " :";

        for (let i = 0; i < lines.length; i++) {
            let row = lines[i].trim().toUpperCase();
            if (!row) continue;

            // 1. Khóa PHẦN
            if (row.includes("PHẦN") && row.includes(ten_phan.toUpperCase())) {
                dang_trong_phan = true;
                continue;
            }
            if (dang_trong_phan && row.startsWith("PHẦN") && !row.includes(ten_phan.toUpperCase())) {
                dang_trong_phan = false;
            }

            if (dang_trong_phan) {
                // 2. Tìm đúng dòng tiêu đề lá bài
                if (row === find_header || (row.includes(tieu_de_la.toUpperCase()) && row.endsWith(":"))) {
                    // 3. CHỈ LẤY DÒNG TIẾP THEO (Dòng i + 1)
                    let data_row = lines[i + 1] ? lines[i + 1].trim() : "";
                    
                    // Nếu dòng tiếp theo lại là tiêu đề khác hoặc rỗng, tức là lá này không có data
                    if (!data_row || data_row.includes(":")) return null;

                    if (data_row.includes("|")) {
                        let parts = data_row.split("|");
                        return lay_ve_phai ? parts[parts.length - 1].trim() : parts[0].trim();
                    }
                    return data_row;
                }
            }
        }
        return null;
    }

    function thuc_thi() {
        let f = [
            document.getElementById('m1').value.trim(),
            document.getElementById('m2').value.trim(),
            document.getElementById('m3').value.trim(),
            document.getElementById('m4').value.trim()
        ].filter(x => x !== "");

        let groups = {};
        f.forEach(v => {
            let name = v.replace(/ Đ$/i, "").replace(/ N$/i, "").toUpperCase().trim();
            if (!groups[name]) groups[name] = [];
            groups[name].push(v.toUpperCase());
        });

        let ket_qua = [];
        for (let name in groups) {
            let list = groups[name];
            let total = list.length;
            if (total < 2) continue;

            let d = list.filter(x => x.endsWith(" Đ")).length;
            let n = list.filter(x => x.endsWith(" N")).length;
            let final_text = "";

            // TUÂN THỦ TUYỆT ĐỐI QUY TRÌNH ĐẾM CỦA BẠN
            if (total === 4) {
                if (d === 4) final_text = lay_du_lieu_goc("PHẦN 1", "4 " + name, false);
                else if (n === 4) final_text = lay_du_lieu_goc("PHẦN 1", "4 " + name, true);
                else if (d === 3) final_text = lay_du_lieu_goc("PHẦN 2", "4 " + name, false);
                else if (n === 3) final_text = lay_du_lieu_goc("PHẦN 2", "4 " + name, true);
            } else if (total === 3) {
                if (d === 3) final_text = lay_du_lieu_goc("PHẦN 3", "3 " + name, false);
                else if (n === 3) final_text = lay_du_lieu_goc("PHẦN 3", "3 " + name, true);
                else if (d === 2) final_text = lay_du_lieu_goc("PHẦN 4", "3 " + name, false);
                else if (n === 2) final_text = lay_du_lieu_goc("PHẦN 4", "3 " + name, true);
            } else if (total === 2) {
                if (d === 2) final_text = lay_du_lieu_goc("PHẦN 5", "2 " + name, false);
                else if (n === 2) final_text = lay_du_lieu_goc("PHẦN 5", "2 " + name, true);
            }

            ket_qua.push(`BỘ ${total} LÁ ${name}:\n=> ${final_text || "KHÔNG CÓ DỮ LIỆU"}`);
        }
        document.getElementById('output-screen').innerText = ket_qua.join("\n\n---\n\n");
    }

    function copy_text() {
        const text = document.getElementById('output-screen').innerText;
        const el = document.createElement('textarea');
        el.value = text; document.body.appendChild(el);
        el.select(); document.execCommand('copy');
        document.body.removeChild(el); alert("Đã copy!");
    }
</script>
</body>
</html>
