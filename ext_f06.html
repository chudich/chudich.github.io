<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRUY XUẤT 06 - CHUẨN TỪNG TÌNH HUỐNG</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #cfd8dc; }
        .wrapper { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #1a237e; border-bottom: 4px solid #ff8f00; padding-bottom: 10px; }
        input { width: 100%; padding: 18px; margin-bottom: 10px; border: 3px solid #90a4ae; border-radius: 10px; font-size: 24px; font-weight: bold; box-sizing: border-box; background: #fffde7; }
        #result-box { margin-top: 20px; padding: 15px; border: 5px solid #1a237e; border-radius: 12px; min-height: 250px; white-space: pre-wrap; background: #fafafa; font-size: 24px; line-height: 1.5; font-weight: bold; color: #b71c1c; }
        button { width: 100%; padding: 22px; font-size: 22px; font-weight: bold; border: none; border-radius: 12px; color: #fff; cursor: pointer; text-transform: uppercase; background: #1a237e; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>TRUY XUẤT 06 - KHÓA PHẦN TUYỆT ĐỐI</h2>
    <input type="text" id="in1" placeholder="Form 1">
    <input type="text" id="in2" placeholder="Form 2">
    <input type="text" id="in3" placeholder="Form 3">
    <input type="text" id="in4" placeholder="Form 4">
    <button onclick="chay_truy_xuat()">TÌM Ý NGHĨA</button>
    <div id="result-box"></div>
</div>

<script>
    // THƯ VIỆN DỮ LIỆU CỦA BẠN (DÁN TOÀN BỘ VÀO ĐÂY)
    const DATA_FILE_06 = `
PHẦN 1 : 4 LÁ CÙNG TRẠNG THÁI
4 NGỰA ĐỎ : Mừng bạn xưa đang mong đợi | Phản phúc, cạm bẫy, gian ác.

PHẦN 2 : 4 LÁ (3 ĐỨNG 1 NGƯỢC HOẶC 3 NGƯỢC 1 ĐỨNG)
4 NGỰA ĐỎ : Ý nghĩa 3-1 của Ngựa Đỏ | Ý nghĩa ngược 3-1

PHẦN 3 : 3 LÁ CÙNG TRẠNG THÁI
3 TƯỚNG ĐỎ : Ý nghĩa 3 Đứng | Ý nghĩa 3 Ngược

PHẦN 4 : 3 LÁ (2 ĐỨNG 1 NGƯỢC HOẶC 2 NGƯỢC 1 ĐỨNG)
3 TƯỚNG ĐỎ : Ý nghĩa 2-1 của Tướng Đỏ | Ý nghĩa ngược 2-1

PHẦN 5 : 2 LÁ CÙNG TRẠNG THÁI
2 TƯỚNG XANH : Ý nghĩa 2 Đứng | Ý nghĩa 2 Ngược
    `;

    function query_database(targetPart, cardHeader, getRight) {
        const lines = DATA_FILE_06.split('\n');
        let currentPartActive = false;
        let searchKey = cardHeader.toUpperCase().trim();

        for (let i = 0; i < lines.length; i++) {
            let row = lines[i].trim().toUpperCase();
            if (!row) continue;

            // KHÓA CHẶT PHẠM VI PHẦN
            if (row.includes("PHẦN") && row.includes(targetPart.toString())) {
                currentPartActive = true; continue;
            }
            if (currentPartActive && row.startsWith("PHẦN") && !row.includes(targetPart.toString())) {
                currentPartActive = false;
            }

            if (currentPartActive) {
                // TÌM ĐÚNG TIÊU ĐỀ LÁ TRONG PHẦN ĐÓ
                if (row.includes(searchKey) && row.includes(":")) {
                    let content = lines[i].split(":")[1] || "";
                    if (content.includes("|")) {
                        let splitData = content.split("|");
                        return getRight ? splitData[1].trim() : splitData[0].trim();
                    }
                }
            }
        }
        return null;
    }

    function chay_truy_xuat() {
        let rawInputs = [
            document.getElementById('in1').value.trim(),
            document.getElementById('in2').value.trim(),
            document.getElementById('in3').value.trim(),
            document.getElementById('in4').value.trim()
        ].filter(x => x !== "");

        // Gom nhóm theo tên lá (Bỏ Đ/N)
        let map = {};
        rawInputs.forEach(v => {
            let name = v.replace(/ [ĐN]$/i, "").toUpperCase().trim();
            if (!map[name]) map[name] = [];
            map[name].push(v.toUpperCase());
        });

        let finalLog = [];
        for (let name in map) {
            let cluster = map[name];
            let totalCards = cluster.length; // Tổng số Form nhập cùng tên lá
            if (totalCards < 2) continue;

            let countD = cluster.filter(x => x.endsWith(" Đ")).length;
            let countN = cluster.filter(x => x.endsWith(" N")).length;
            let output = "";

            // --- THỰC THI THEO ĐÚNG TÌNH HUỐNG HƯỚNG DẪN ---

            // TÌNH HUỐNG: CẢ 4 FORM ĐỀU CÙNG TÊN LÁ
            if (totalCards === 4) {
                if (countD === 4) output = query_database(1, "4 " + name, false);
                else if (countN === 4) output = query_database(1, "4 " + name, true);
                else if (countD === 3) output = query_database(2, "4 " + name, false); // 3Đ-1N
                else if (countN === 3) output = query_database(2, "4 " + name, true);  // 3N-1Đ
            } 
            
            // TÌNH HUỐNG: CHỈ CÓ 3 FORM CÙNG TÊN LÁ
            else if (totalCards === 3) {
                if (countD === 3) output = query_database(3, "3 " + name, false);
                else if (countN === 3) output = query_database(3, "3 " + name, true);
                else if (countD === 2) output = query_database(4, "3 " + name, false); // 2Đ-1N
                else if (countN === 2) output = query_database(4, "3 " + name, true);  // 2N-1Đ
            }

            // TÌNH HUỐNG: CHỈ CÓ 2 FORM CÙNG TÊN LÁ
            else if (totalCards === 2) {
                if (countD === 2) output = query_database(5, "2 " + name, false);
                else if (countN === 2) output = query_database(5, "2 " + name, true);
            }

            finalLog.push(`NHÓM ${totalCards} LÁ ${name}:\n=> ${output || "KHÔNG TÌM THẤY DỮ LIỆU"}`);
        }
        document.getElementById('result-box').innerText = finalLog.join("\n\n---\n\n");
    }
</script>
</body>
</html>
