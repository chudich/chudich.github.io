<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRUY XUẤT 06 - CHUẨN LOGIC PHÂN PHẦN</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #cfd8dc; }
        .box { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 18px; margin-bottom: 10px; border: 3px solid #90a4ae; border-radius: 10px; font-size: 24px; font-weight: bold; box-sizing: border-box; background: #fffde7; }
        #res { margin-top: 20px; padding: 15px; border: 5px solid #1a237e; border-radius: 12px; min-height: 250px; white-space: pre-wrap; background: #fafafa; font-size: 24px; line-height: 1.5; font-weight: bold; color: #b71c1c; }
        button { width: 100%; padding: 22px; font-size: 22px; font-weight: bold; border: none; border-radius: 12px; color: #fff; cursor: pointer; text-transform: uppercase; background: #1a237e; width: 100%; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center">TRUY XUẤT 06 - ĐÚNG TỈ LỆ Đ/N</h2>
    <input type="text" id="v1" placeholder="Form 1">
    <input type="text" id="v2" placeholder="Form 2">
    <input type="text" id="v3" placeholder="Form 3">
    <input type="text" id="v4" placeholder="Form 4">
    <button onclick="chay_he_thong()">TÌM Ý NGHĨA</button>
    <div id="res"></div>
</div>

<script>
    // DÁN THƯ VIỆN CỦA BẠN VÀO ĐÂY
    const THU_VIEN_GOC = `
PHẦN 1 : 
4 NGỰA ĐỎ : Ý nghĩa 4 Đứng | Ý nghĩa 4 Ngược
PHẦN 2 : 
4 NGỰA ĐỎ : Ý nghĩa 3 Đứng 1 Ngược | Ý nghĩa 3 Ngược 1 Đứng
PHẦN 3 : 
3 NGỰA ĐỎ : Ý nghĩa 3 Đứng | Ý nghĩa 3 Ngược
PHẦN 4 : 
3 NGỰA ĐỎ : Ý nghĩa 2 Đứng 1 Ngược | Ý nghĩa 2 Ngược 1 Đứng
PHẦN 5 : 
2 NGỰA ĐỎ : Ý nghĩa 2 Đứng | Ý nghĩa 2 Ngược
    `;

    function truy_van_du_lieu(soPhan, tieuDeCanTim, layVePhai) {
        const lines = THU_VIEN_GOC.split('\n');
        let dangTrongPhan = false;
        let chuoiTimKiem = tieuDeCanTim.toUpperCase().trim();

        for (let i = 0; i < lines.length; i++) {
            let row = lines[i].trim().toUpperCase();
            if (!row) continue;

            // Kiểm tra ranh giới PHẦN
            if (row.includes("PHẦN") && row.includes(soPhan.toString())) {
                dangTrongPhan = true; continue;
            }
            if (dangTrongPhan && row.startsWith("PHẦN") && !row.includes(soPhan.toString())) {
                dangTrongPhan = false;
            }

            if (dangTrongPhan) {
                // Khớp tên lá (Ví dụ: 4 NGỰA ĐỎ)
                if (row.includes(chuoiTimKiem) && row.includes(":")) {
                    let noiDung = lines[i].split(":")[1];
                    if (noiDung && noiDung.includes("|")) {
                        let cap = noiDung.split("|");
                        return layVePhai ? cap[1].trim() : cap[0].trim();
                    }
                }
            }
        }
        return null;
    }

    function chay_he_thong() {
        let inputs = [
            document.getElementById('v1').value.trim(),
            document.getElementById('v2').value.trim(),
            document.getElementById('v3').value.trim(),
            document.getElementById('v4').value.trim()
        ].filter(x => x !== "");

        // Gom nhóm theo tên lá (Bỏ Đ/N)
        let groups = {};
        inputs.forEach(val => {
            let cleanName = val.replace(/ [ĐN]$/i, "").toUpperCase().trim();
            if (!groups[cleanName]) groups[cleanName] = [];
            groups[cleanName].push(val.toUpperCase());
        });

        let ketQuaCuoi = [];
        for (let name in groups) {
            let list = groups[name];
            let tong = list.length;
            if (tong < 2) continue;

            let soD = list.filter(x => x.endsWith(" Đ")).length;
            let soN = list.filter(x => x.endsWith(" N")).length;
            let finalOutput = "";

            // LOGIC PHÂN LUỒNG TUYỆT ĐỐI THEO TỈ LỆ
            if (tong === 4) {
                if (soD === 4) finalOutput = truy_van_du_lieu(1, "4 " + name, false); // Phần 1 - Trái
                else if (soN === 4) finalOutput = truy_van_du_lieu(1, "4 " + name, true); // Phần 1 - Phải
                else if (soD === 3) finalOutput = truy_van_du_lieu(2, "4 " + name, false); // Phần 2 - Trái (3Đ-1N)
                else if (soN === 3) finalOutput = truy_van_du_lieu(2, "4 " + name, true);  // Phần 2 - Phải (3N-1Đ)
            } 
            else if (tong === 3) {
                if (soD === 3) finalOutput = truy_van_du_lieu(3, "3 " + name, false); // Phần 3 - Trái
                else if (soN === 3) finalOutput = truy_van_du_lieu(3, "3 " + name, true); // Phần 3 - Phải
                else if (soD === 2) finalOutput = truy_van_du_lieu(4, "3 " + name, false); // Phần 4 - Trái (2Đ-1N)
                else if (soN === 2) finalOutput = truy_van_du_lieu(4, "3 " + name, true);  // Phần 4 - Phải (2N-1Đ)
            }
            else if (tong === 2) {
                if (soD === 2) finalOutput = truy_van_du_lieu(5, "2 " + name, false); // Phần 5 - Trái
                else if (soN === 2) finalOutput = truy_van_du_lieu(5, "2 " + name, true);  // Phần 5 - Phải
            }

            ketQuaCuoi.push(`BỘ ${tong} LÁ ${name}:\n=> ${finalOutput || "(Không có dữ liệu trong PHẦN quy định)"}`);
        }
        document.getElementById('res').innerText = ketQuaCuoi.join("\n\n---\n\n");
    }
</script>
</body>
</html>
