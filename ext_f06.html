<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRÍCH XUẤT 06 - CHUẨN QUY TRÌNH</title>
    <style>
        :root { --dark: #263238; --red: #d32f2f; --yellow: #fffde7; }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #cfd8dc; }
        .wrapper { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: var(--dark); font-size: 22px; border-bottom: 3px solid #ff8f00; padding-bottom: 10px; }
        
        .f-item { margin-bottom: 12px; }
        label { display: block; font-weight: bold; font-size: 18px; color: #455a64; margin-bottom: 5px; }
        input { 
            width: 100%; padding: 18px; border: 3px solid #90a4ae; border-radius: 10px; 
            font-size: 22px; font-weight: bold; box-sizing: border-box; background: var(--yellow); 
        }
        
        #result-area { 
            margin-top: 20px; padding: 15px; border: 5px solid var(--dark); border-radius: 12px; 
            min-height: 250px; white-space: pre-wrap; background: #fafafa; 
            font-size: 22px; line-height: 1.6; font-weight: bold; color: var(--red);
        }

        .btn-box { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        button { 
            padding: 22px; font-size: 20px; font-weight: bold; border: none; 
            border-radius: 10px; color: #fff; text-transform: uppercase; cursor: pointer;
        }
        .btn-run { background: var(--dark); }
        .btn-copy { background: #1565c0; }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>TRUY XUẤT FILE 06</h2>
    
    <div class="f-item"><label>Form 1:</label><input type="text" id="v1" placeholder="VD: NGỰA ĐỎ Đ"></div>
    <div class="f-item"><label>Form 2:</label><input type="text" id="v2"></div>
    <div class="f-item"><label>Form 3:</label><input type="text" id="v3"></div>
    <div class="f-item"><label>Form 4:</label><input type="text" id="v4"></div>

    <div class="btn-box">
        <button class="btn-run" onclick="xuLyTrichXuat()">TÌM Ý NGHĨA</button>
        <button class="btn-copy" onclick="copyKQ()">SAO CHÉP KẾT QUẢ</button>
    </div>

    <div id="result-area"></div>
</div>

<script>
    // THƯ VIỆN DỮ LIỆU FILE 06
    const DATA_06 = `
PHẦN 1 : 4 LÁ CÙNG TRẠNG THÁI (4 ĐỨNG HOẶC 4 NGƯỢC)
4 TƯỚNG XANH :
Ý nghĩa 4 Tướng Xanh Đứng | Ý nghĩa 4 Tướng Xanh Ngược
4 NGỰA ĐỎ :
Cuộc gặp gỡ tuyệt vời. Công danh không hẹn gặp gỡ mà nên | Được sự đỡ đầu đắc lực, danh phận kèm hôn nhân.

PHẦN 2 : 4 LÁ (3 ĐỨNG 1 NGƯỢC HOẶC 3 NGƯỢC 1 ĐỨNG)
4 NGỰA ĐỎ :
Công danh còn dài, chầm chậm tiến tới | Danh phận tốt nhưng bị hôn nhân chi phối.

PHẦN 3 : 3 LÁ CÙNG TRẠNG THÁI (3 ĐỨNG HOẶC 3 NGƯỢC)
3 TƯỚNG XANH :
Thỏa mãn hoàn toàn trong ước vọng | Hy vọng đạt thành trong ngày gần.

PHẦN 4 : 3 LÁ (2 ĐỨNG 1 NGƯỢC HOẶC 2 NGƯỢC 1 ĐỨNG)
3 TƯỚNG XANH :
Có tin về công danh, lợi về tiền bạc | Dự tính bị đảo lộn bởi bàn tay đàn bà

PHẦN 5 : 2 LÁ CÙNG TRẠNG THÁI (2 ĐỨNG HOẶC 2 NGƯỢC)
2 TƯỚNG XANH :
Cuộc giao thiệp nhiều hứa hẹn | Khổ lụy sau cuộc vui.
    `;

    function timTrongPhan(tenPhan, tenLa, layVePhai) {
        const lines = DATA_06.split('\n');
        let dangTrongPhan = false;
        let searchLa = tenLa.toUpperCase().trim();

        for (let i = 0; i < lines.length; i++) {
            let row = lines[i].trim().toUpperCase();
            if (!row) continue;

            // Kiểm tra ranh giới PHẦN
            if (row.includes(tenPhan.toUpperCase())) {
                dangTrongPhan = true;
                continue;
            }
            if (dangTrongPhan && row.startsWith("PHẦN") && !row.includes(tenPhan.toUpperCase())) {
                dangTrongPhan = false;
            }

            if (dangTrongPhan) {
                // Tìm dòng tiêu đề lá (VD: 4 NGỰA ĐỎ :)
                if (row.includes(searchLa) && row.includes(":")) {
                    let dataRow = lines[i + 1] ? lines[i + 1].trim() : "";
                    if (dataRow.includes("|")) {
                        let parts = dataRow.split("|");
                        return layVePhai ? parts[1].trim() : parts[0].trim();
                    }
                    return dataRow;
                }
            }
        }
        return null;
    }

    function xuLyTrichXuat() {
        let f = [
            document.getElementById('v1').value.trim(),
            document.getElementById('v2').value.trim(),
            document.getElementById('v3').value.trim(),
            document.getElementById('v4').value.trim()
        ].filter(x => x !== "");

        let groups = {};
        f.forEach(val => {
            let name = val.replace(/ [ĐN]$/i, "").toUpperCase().trim();
            if (!groups[name]) groups[name] = [];
            groups[name].push(val.toUpperCase());
        });

        let ketQuaCuoi = [];

        for (let name in groups) {
            let cluster = groups[name]; // Danh sách các lá cùng tên
            let tong = cluster.length;
            if (tong < 2) continue;

            let soD = cluster.filter(c => c.endsWith(" Đ")).length;
            let soN = cluster.filter(c => c.endsWith(" N")).length;
            let textValue = "";

            // TUÂN THỦ ĐÚNG QUY TRÌNH HƯỚNG DẪN:
            if (tong === 4) {
                if (soD === 4) textValue = timTrongPhan("PHẦN 1", name, false);
                else if (soN === 4) textValue = timTrongPhan("PHẦN 1", name, true);
                else if (soD === 3) textValue = timTrongPhan("PHẦN 2", name, false);
                else if (soN === 3) textValue = timTrongPhan("PHẦN 2", name, true);
            } 
            else if (tong === 3) {
                if (soD === 3) textValue = timTrongPhan("PHẦN 3", name, false);
                else if (soN === 3) textValue = timTrongPhan("PHẦN 3", name, true);
                else if (soD === 2) textValue = timTrongPhan("PHẦN 4", name, false);
                else if (soN === 2) textValue = timTrongPhan("PHẦN 4", name, true);
            }
            else if (tong === 2) {
                if (soD === 2) textValue = timTrongPhan("PHẦN 5", name, false);
                else if (soN === 2) textValue = timTrongPhan("PHẦN 5", name, true);
            }

            if (textValue) {
                ketQuaCuoi.push(`NHÓM ${tong} LÁ ${name}:\n=> ${textValue}`);
            } else {
                ketQuaCuoi.push(`NHÓM ${tong} LÁ ${name}:\n=> (Không có dữ liệu phù hợp trong PHẦN tương ứng)`);
            }
        }

        document.getElementById('result-area').innerText = ketQuaCuoi.join("\n\n------------------\n\n");
    }

    function copyKQ() {
        const text = document.getElementById('result-area').innerText;
        if (!text) return;
        const tmp = document.createElement('textarea');
        tmp.value = text; document.body.appendChild(tmp);
        tmp.select(); document.execCommand('copy');
        document.body.removeChild(tmp); alert("Đã copy!");
    }
</script>
</body>
</html>
