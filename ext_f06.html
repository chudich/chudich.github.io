<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRUY XUẤT 06 - BẢN KHÓA VÙNG DỮ LIỆU</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #cfd8dc; }
        .box { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 18px; margin-bottom: 10px; border: 3px solid #90a4ae; border-radius: 10px; font-size: 24px; font-weight: bold; box-sizing: border-box; background: #fffde7; }
        #res { margin-top: 20px; padding: 15px; border: 5px solid #1a237e; border-radius: 12px; min-height: 250px; white-space: pre-wrap; background: #fafafa; font-size: 24px; line-height: 1.5; font-weight: bold; color: #b71c1c; }
        button { width: 100%; padding: 22px; font-size: 22px; font-weight: bold; border: none; border-radius: 12px; color: #fff; cursor: pointer; text-transform: uppercase; background: #1a237e; width: 100%; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center">TRUY XUẤT 06 - CHUẨN LOGIC 3-1</h2>
    <input type="text" id="v1" placeholder="Form 1">
    <input type="text" id="v2" placeholder="Form 2">
    <input type="text" id="v3" placeholder="Form 3">
    <input type="text" id="v4" placeholder="Form 4">
    <button onclick="thuc_thi_lenh()">TRUY XUẤT NGAY</button>
    <div id="res"></div>
</div>

<script>
    // DÁN DỮ LIỆU THẬT CỦA BẠN VÀO ĐÂY
    const DATA_GOC = `
PHẦN 1 : 
4 TƯỚNG XANH : Text A (4 Đứng) | Text A (4 Ngược)
PHẦN 2 : 
4 TƯỚNG XANH : Text B (3 Đ - 1 N) | Text B (3 N - 1 Đ)
PHẦN 3 : 
3 TƯỚNG XANH : Text C (3 Đứng) | Text C (3 Ngược)
PHẦN 4 : 
3 TƯỚNG XANH : Text D (2 Đ - 1 N) | Text D (2 N - 1 Đ)
    `;

    function lay_du_lieu_tu_phan(soPhan, tieuDeLa, layPhai) {
        // TÁCH FILE THÀNH CÁC KHÚC THEO CHỮ "PHẦN"
        const segments = DATA_GOC.split(/PHẦN\s+/i);
        let contentPhan = "";

        // Tìm đúng khúc dữ liệu của PHẦN cần tra
        for (let seg of segments) {
            if (seg.trim().startsWith(soPhan.toString())) {
                contentPhan = seg;
                break;
            }
        }

        if (!contentPhan) return null;

        // Quét trong khúc dữ liệu đã tách
        const lines = contentPhan.split('\n');
        for (let row of lines) {
            let cleanRow = row.trim().toUpperCase();
            if (cleanRow.includes(tieuDeLa.toUpperCase()) && cleanRow.includes(":")) {
                let textRaw = row.split(":")[1] || "";
                if (textRaw.includes("|")) {
                    let parts = textRaw.split("|");
                    return layPhai ? parts[1].trim() : parts[0].trim();
                }
            }
        }
        return null;
    }

    function thuc_thi_lenh() {
        let inputs = [
            document.getElementById('v1').value.trim(),
            document.getElementById('v2').value.trim(),
            document.getElementById('v3').value.trim(),
            document.getElementById('v4').value.trim()
        ].filter(x => x !== "");

        let groups = {};
        inputs.forEach(v => {
            let name = v.replace(/ [ĐN]$/i, "").toUpperCase().trim();
            if (!groups[name]) groups[name] = [];
            groups[name].push(v.toUpperCase());
        });

        let ketQua = [];
        for (let name in groups) {
            let list = groups[name];
            let tong = list.length;
            if (tong < 2) continue;

            let soD = list.filter(x => x.endsWith(" Đ")).length;
            let soN = list.filter(x => x.endsWith(" N")).length;
            let textOutput = "";

            // --- QUY TẮC CỨNG: PHÂN LUỒNG TRƯỚC KHI TÌM ---

            if (tong === 4) {
                if (soD === 3 && soN === 1) {
                    textOutput = lay_du_lieu_tu_phan(2, "4 " + name, false); // Buộc vào PHẦN 2 Trái
                } else if (soN === 3 && soD === 1) {
                    textOutput = lay_du_lieu_tu_phan(2, "4 " + name, true);  // Buộc vào PHẦN 2 Phải
                } else if (soD === 4) {
                    textOutput = lay_du_lieu_tu_phan(1, "4 " + name, false); // Buộc vào PHẦN 1 Trái
                } else if (soN === 4) {
                    textOutput = lay_du_lieu_tu_phan(1, "4 " + name, true);  // Buộc vào PHẦN 1 Phải
                }
            } 
            else if (tong === 3) {
                if (soD === 2 && soN === 1) {
                    textOutput = lay_du_lieu_tu_phan(4, "3 " + name, false); // Buộc vào PHẦN 4 Trái
                } else if (soN === 2 && soD === 1) {
                    textOutput = lay_du_lieu_tu_phan(4, "3 " + name, true);  // Buộc vào PHẦN 4 Phải
                } else if (soD === 3) {
                    textOutput = lay_du_lieu_tu_phan(3, "3 " + name, false); // Buộc vào PHẦN 3 Trái
                } else if (soN === 3) {
                    textOutput = lay_du_lieu_tu_phan(3, "3 " + name, true);  // Buộc vào PHẦN 3 Phải
                }
            }
            else if (tong === 2) {
                if (soD === 2) textOutput = lay_du_lieu_tu_phan(5, "2 " + name, false);
                else if (soN === 2) textOutput = lay_du_lieu_tu_phan(5, "2 " + name, true);
            }

            ketQua.push(`NHÓM ${tong} LÁ ${name}:\n=> ${textOutput || "KHÔNG CÓ DỮ LIỆU TRONG PHẦN CHỈ ĐỊNH"}`);
        }
        document.getElementById('res').innerText = ketQua.join("\n\n---\n\n");
    }
</script>
</body>
</html>
