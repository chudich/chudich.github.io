<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG TRÍCH XUẤT 06 - CHUẨN QUY TRÌNH</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #cfd8dc; }
        .box { max-width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 18px; margin-bottom: 10px; border: 3px solid #90a4ae; border-radius: 10px; font-size: 24px; font-weight: bold; box-sizing: border-box; background: #fffde7; }
        #res { margin-top: 20px; padding: 15px; border: 5px solid #1a237e; border-radius: 12px; min-height: 250px; white-space: pre-wrap; background: #fafafa; font-size: 24px; line-height: 1.5; font-weight: bold; color: #b71c1c; }
        button { width: 100%; padding: 22px; font-size: 22px; font-weight: bold; border: none; border-radius: 12px; color: #fff; cursor: pointer; text-transform: uppercase; background: #1a237e; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center">TRUY XUẤT 06 - ĐÚNG HƯỚNG DẪN</h2>
    <input type="text" id="v1" placeholder="Lá 1">
    <input type="text" id="v2" placeholder="Lá 2">
    <input type="text" id="v3" placeholder="Lá 3">
    <input type="text" id="v4" placeholder="Lá 4">
    <button onclick="thuc_thi()">TÌM Ý NGHĨA</button>
    <div id="res"></div>
</div>

<script>
    // THƯ VIỆN DỮ LIỆU CỦA BẠN
    const DATABASE = `
PHẦN 1 : 
4 NGỰA ĐỎ : Mừng bạn xưa đang mong đợi | Phản phúc, cạm bẫy, gian ác.
4 NGỰA TRẮNG : Ách ngoài đàng mang vào cổ | Đừng ham của rẻ.

PHẦN 2 : 
4 NGỰA ĐỎ : Ý nghĩa 3-1 của Ngựa Đỏ | Ý nghĩa ngược 3-1
    `;

    function get_data(targetPart, cardName, isRight) {
        const lines = DATABASE.split('\n');
        let inPart = false;
        let searchHeader = cardName.toUpperCase();

        for (let i = 0; i < lines.length; i++) {
            let row = lines[i].trim().toUpperCase();
            if (!row) continue;

            if (row.includes("PHẦN") && row.includes(targetPart.toString())) {
                inPart = true; continue;
            }
            if (inPart && row.startsWith("PHẦN") && !row.includes(targetPart.toString())) {
                inPart = false;
            }

            if (inPart) {
                if (row.includes(searchHeader) && row.includes(":")) {
                    let content = lines[i].split(":")[1] || "";
                    if (content.includes("|")) {
                        let parts = content.split("|");
                        return isRight ? parts[1].trim() : parts[0].trim();
                    }
                }
            }
        }
        return null;
    }

    function thuc_thi() {
        let f = [
            document.getElementById('v1').value.trim(),
            document.getElementById('v2').value.trim(),
            document.getElementById('v3').value.trim(),
            document.getElementById('v4').value.trim()
        ].filter(x => x !== "");

        let groups = {};
        f.forEach(v => {
            let name = v.replace(/ [ĐN]$/i, "").toUpperCase().trim();
            if (!groups[name]) groups[name] = [];
            groups[name].push(v.toUpperCase());
        });

        let ketQua = [];
        for (let name in groups) {
            let list = groups[name];
            let tong = list.length;
            if (tong < 2) continue;

            let soD = list.filter(x => x.endsWith(" Đ")).length;
            let soN = list.filter(x => x.endsWith(" N")).length;
            let val = "";

            // TUÂN THỦ TUYỆT ĐỐI LOGIC PHÂN PHẦN CỦA BẠN
            if (tong === 4) {
                if (soD === 4 || soN === 4) {
                    val = get_data(1, "4 " + name, soN === 4);
                } else if (soD === 3 || soN === 3) {
                    val = get_data(2, "4 " + name, soN === 3);
                }
            } else if (tong === 3) {
                if (soD === 3 || soN === 3) {
                    val = get_data(3, "3 " + name, soN === 3);
                } else if (soD === 2 || soN === 2) {
                    val = get_data(4, "3 " + name, soN === 2);
                }
            } else if (tong === 2) {
                if (soD === 2 || soN === 2) {
                    val = get_data(5, "2 " + name, soN === 2);
                }
            }

            ketQua.push(`NHÓM ${tong} LÁ ${name}:\n=> ${val || "KHÔNG CÓ DỮ LIỆU TRONG PHẦN CHỈ ĐỊNH"}`);
        }
        document.getElementById('res').innerText = ketQua.join("\n\n---\n\n");
    }
</script>
</body>
</html>
